const { useState, useMemo } = React;

// --- Corpus ---

}

var DOMAINS = [

    questions: [

    questions: [

var ALL_QUESTIONS = [];
DOMAINS.forEach(function(d, di) {

// --- Tips per domain ---
var DOMAIN_TIPS = {
  technique: {
    title: 'Build finger independence and control',
    tips: [
      'Practise scales slowly with a metronome — start at 60 bpm, increase by 4 each week',

    ],
    nextStep: 'Use AMEB or ABRSM sight-reading books one grade below your current level'
  }
};

// --- Wikipedia links ---
var COMPOSER_LINKS = {
  'BACH, J.S.': 'https://en.wikipedia.org/wiki/Johann_Sebastian_Bach',
  'BEETHOVEN, L.': 'https://en.wikipedia.org/wiki/Ludwig_van_Beethoven',
  'CHOPIN, F.': 'https://en.wikipedia.org/wiki/Fr%C3%A9d%C3%A9ric_Chopin',
  'MOZART, W.A.': 'https://en.wikipedia.org/wiki/Wolfgang_Amadeus_Mozart',
  'SCHUBERT, F.': 'https://en.wikipedia.org/wiki/Franz_Schubert',
  'SCHUMANN, R.': 'https://en.wikipedia.org/wiki/Robert_Schumann',
  'BRAHMS, J.': 'https://en.wikipedia.org/wiki/Johannes_Brahms',
  'HAYDN, J.': 'https://en.wikipedia.org/wiki/Joseph_Haydn',
  'HANDEL, G.F.': 'https://en.wikipedia.org/wiki/George_Frideric_Handel',
  'CLEMENTI, M.': 'https://en.wikipedia.org/wiki/Muzio_Clementi',
  'CZERNY, C.': 'https://en.wikipedia.org/wiki/Carl_Czerny',
  'BURGMULLER, F.': 'https://en.wikipedia.org/wiki/Friedrich_Burgm%C3%BCller',
  'KABALEVSKY, D.': 'https://en.wikipedia.org/wiki/Dmitry_Kabalevsky',
  'BARTOK, B.': 'https://en.wikipedia.org/wiki/B%C3%A9la_Bart%C3%B3k',
  'GRIEG, E.': 'https://en.wikipedia.org/wiki/Edvard_Grieg',
  'TCHAIKOVSKY, P.': 'https://en.wikipedia.org/wiki/Pyotr_Ilyich_Tchaikovsky',
};

function composerUrl(c) {
  return COMPOSER_LINKS[c] || ('https://en.wikipedia.org/w/index.php?search=' + encodeURIComponent(c));
}

// --- Result computation ---
function computeResult(answers) {
  var domainScores = DOMAINS.map(function(d, di) {
    var total = 0;
    d.questions.forEach(function(q, qi) {
      var key = di * 2 + qi;
      if (answers[key] !== undefined) total += q.scores[answers[key]];
    });
    return { domain: d, score: total, max: 6, pct: Math.round((total / 6) * 100) };
  });

  var ranked = domainScores.slice().sort(function(a, b) { return a.score - b.score; });
  var weakest = ranked.slice(0, 2);
  var strongest = ranked[ranked.length - 1];

  var totalScore = domainScores.reduce(function(s, d) { return s + d.score; }, 0);
  var levelLabel, levelDesc;
  if (totalScore >= 20) { levelLabel = 'Grade 4-5+'; levelDesc = 'Strong foundation — intermediate repertoire suits you well'; }
  else if (totalScore >= 14) { levelLabel = 'Grade 2-4'; levelDesc = 'Solid basics with clear areas to develop'; }
  else if (totalScore >= 8) { levelLabel = 'Grade 1-2'; levelDesc = 'Building your fundamentals — consistent practice will move you forward'; }
  else { levelLabel = 'Preliminary'; levelDesc = 'Early stages — short, achievable pieces will build confidence fast'; }

  // Pick 4 pieces targeting weak domains
  var weakFocusTags = weakest.reduce(function(arr, w) { return arr.concat(w.domain.focusTags); }, []);
  var candidates = CORPUS.filter(function(p) {
    return ['Prelim','G1','AbG1','TInitial','TG1','G2','AbG2','TG2','G3','AbG3','TG3','G4','AbG4','TG4','G5'].indexOf(p._gradeKey) !== -1;
  });

  var scored = candidates.map(function(p) {
    var focus = (p.focus || []).join(' ').toLowerCase();
    var score = 0;
    weakFocusTags.forEach(function(tag) {
      if (focus.indexOf(tag.toLowerCase().substring(0, 6)) !== -1) score += 2;
    });
    score += Math.random() * 1.5;
    return { p: p, score: score };
  });
  scored.sort(function(a, b) { return b.score - a.score; });

  var pieces = [];
  var usedEras = {};
  var usedComposers = {};
  var eraCount = 0;
  scored.forEach(function(item) {
    if (pieces.length >= 4) return;
    if (usedComposers[item.p.c]) return;
    if (eraCount >= 2 && usedEras[item.p.era]) return;
    pieces.push(item.p);
    if (!usedEras[item.p.era]) { usedEras[item.p.era] = true; eraCount++; }
    usedComposers[item.p.c] = true;
  });
  if (pieces.length < 4) {
    scored.forEach(function(item) {
      if (pieces.length >= 4) return;
      if (pieces.indexOf(item.p) === -1) pieces.push(item.p);
    });
  }

  return { domainScores: domainScores, ranked: ranked, weakest: weakest, strongest: strongest, totalScore: totalScore, levelLabel: levelLabel, levelDesc: levelDesc, pieces: pieces };
}

// --- Components ---

function RadarChart(props) {
  var domainScores = props.domainScores;
  var size = 220;
  var cx = size / 2;
  var cy = size / 2;
  var maxR = 80;

  // 4 axes: top, right, bottom, left (Technique, Ear, Theory, Sight-Reading)
  var axes = [
    { angle: -90 },  // Technique — top
    { angle: 0 },    // Ear — right
    { angle: 90 },   // Theory — bottom
    { angle: 180 }   // Sight-Reading — left
  ];

  function polarToXY(angle, r) {
    var rad = (angle * Math.PI) / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  // Grid rings at 33%, 66%, 100%
  var rings = [0.33, 0.66, 1.0];

  function ringPoints(scale) {
    return axes.map(function(a) {
      var pt = polarToXY(a.angle, maxR * scale);
      return pt.x + ',' + pt.y;
    }).join(' ');
  }

  // Data polygon
  var dataPoints = domainScores.map(function(ds, i) {
    var r = (ds.pct / 100) * maxR;
    var pt = polarToXY(axes[i].angle, r);
    return pt.x + ',' + pt.y;
  }).join(' ');

  // Axis end points for lines and labels
  var axisEnds = axes.map(function(a, i) {
    var labelPt = polarToXY(a.angle, maxR + 22);
    var ds = domainScores[i];
    return { line: polarToXY(a.angle, maxR), label: labelPt, ds: ds };
  });

  return (
    <svg width={size} height={size} style={{display:'block',margin:'0 auto',overflow:'visible'}}>
      {/* Grid rings */}
      {rings.map(function(scale, i) {
        return (
          <polygon key={i}
            points={ringPoints(scale)}
            fill="none"
            stroke="#e0d8cd"
            strokeWidth={i === 2 ? 1.5 : 1}
          />
        );
      })}

      {/* Axis lines */}
      {axisEnds.map(function(a, i) {
        return (
          <line key={i}
            x1={cx} y1={cy}
            x2={a.line.x} y2={a.line.y}
            stroke={a.ds.domain.color} strokeWidth="1" strokeOpacity="0.4"
          />
        );
      })}

      {/* Data polygon */}
      <polygon
        points={dataPoints}
        fill="#d4956a"
        fillOpacity="0.25"
        stroke="#d4956a"
        strokeWidth="2"
        strokeLinejoin="round"
      />

      {/* Data dots */}
      {domainScores.map(function(ds, i) {
        var r = (ds.pct / 100) * maxR;
        var pt = polarToXY(axes[i].angle, r);
        return (
          <circle key={i}
            cx={pt.x} cy={pt.y} r="5"
            fill={ds.domain.color}
            stroke="#fff" strokeWidth="2"
          />
        );
      })}

      {/* Labels */}
      {axisEnds.map(function(a, i) {
        var lx = a.label.x;
        var ly = a.label.y;
        var anchor = lx < cx - 10 ? 'end' : lx > cx + 10 ? 'start' : 'middle';
        return (
          <text key={i}
            x={lx} y={ly + 4}
            textAnchor={anchor}
            fontSize="11"
            fontWeight="600"
            fill={a.ds.domain.color}
            fontFamily="Inter, sans-serif"
          >
            {a.ds.domain.icon} {a.ds.domain.label}
          </text>
        );
      })}

      {/* Center dot */}
      <circle cx={cx} cy={cy} r="3" fill="#d0c9be" />
    </svg>
  );
}

function ScoreBar(props) {

    <div className="score-bar-track" style={{width: '100%'}}>

}

function DomainResult(props) {
  var ds = props.ds;
  var band = ds.pct >= 67 ? 'Strong' : ds.pct >= 34 ? 'Developing' : 'Focus here';
  var bandColor = ds.pct >= 67 ? '#4caf7d' : ds.pct >= 34 ? '#e0a030' : '#e05050';
  return (
    <div className="card" style={{padding: '16px 18px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>{ds.domain.icon}</span>
          <span style={{fontWeight:600,fontSize:15}}>{ds.domain.label}</span>
        </div>
        <span style={{fontSize:12,fontWeight:600,color:bandColor}}>{band}</span>
      </div>
      <ScoreBar pct={ds.pct} color={ds.domain.color} />
      <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
        <span style={{fontSize:12,color:'#9b9590'}}>{ds.score}/{ds.max} points</span>
        <span style={{fontSize:12,color:'#9b9590'}}>{ds.pct}%</span>
      </div>
    </div>
  );
}

function TipCard(props) {
  var tip = DOMAIN_TIPS[props.domainId];
  if (!tip) return null;
  return (
    <div style={{background:'#fdf8f4',border:'1px solid #f0e0d0',borderRadius:10,padding:'14px 16px'}}>
      <div style={{fontWeight:600,fontSize:14,color:'#a05a38',marginBottom:8}}>{tip.title}</div>
      <ul style={{margin:0,paddingLeft:18,fontSize:13,color:'#5a524a',lineHeight:1.7,listStyle:'disc'}}>
        {tip.tips.map(function(t,i){ return <li key={i} style={{listStyle:'disc'}}>{t}</li>; })}
      </ul>
      <div style={{marginTop:10,fontSize:13,color:'#8a6a54',fontStyle:'italic'}}>
        Next step: {tip.nextStep}
      </div>
    </div>
  );
}

function PieceCard(props) {
  var p = props.p;
  var composer = p.c || '';
  var title = p.t || '';
  var surname = composer.split(',')[0].trim();
  var ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(surname + ' ' + title + ' piano');
  var sheetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(surname + ' ' + title + ' sheet music');
  var searchUrl = 'index.html?q=' + encodeURIComponent(surname + ' ' + title);
  return (
    <div className="piece-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:14,color:'#2a2825',marginBottom:2}}>{title}</div>
          <a href={composerUrl(composer)} target="_blank" rel="noopener noreferrer"
             style={{fontSize:13,color:'#d4956a',fontWeight:500,textDecoration:'none'}}>
            {composer}
          </a>
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {p.era && (
            <span style={{fontSize:11,background:'#f0e8dc',color:'#8a6a54',borderRadius:6,padding:'2px 8px',fontWeight:500}}>
              {p.era}
            </span>
          )}
          {p._syllabus && (
            <span style={{fontSize:11,background:'#eef0f8',color:'#5060a0',borderRadius:6,padding:'2px 8px',fontWeight:500}}>
              {p._syllabus}
            </span>
          )}
        </div>
      </div>
      {p.focus && p.focus.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>
          {p.focus.map(function(f,i){
            return <span key={i} style={{fontSize:11,background:'#f5f0eb',color:'#6b6560',borderRadius:5,padding:'2px 7px'}}>{f}</span>;
          })}
        </div>
      )}
      <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
        <a href={ytUrl} target="_blank" rel="noopener noreferrer"
           style={{fontSize:12,color:'#d4956a',textDecoration:'none',padding:'5px 12px',border:'1px solid #f0d8c0',borderRadius:7,fontWeight:500}}>
          Listen
        </a>
        <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
           style={{fontSize:12,color:'#6b6560',textDecoration:'none',padding:'5px 12px',border:'1px solid #e0d8cd',borderRadius:7,fontWeight:500}}>
          Score
        </a>
        <a href={searchUrl} target="_blank" rel="noopener noreferrer"
           style={{fontSize:12,color:'#6b6560',textDecoration:'none',padding:'5px 12px',border:'1px solid #e0d8cd',borderRadius:7,fontWeight:500}}>
          Find in Piano Butler
        </a>
      </div>
    </div>
  );
}

// --- App ---
function App() {
  var state = useState('landing');
  var screen = state[0];
  var setScreen = state[1];

  var qState = useState(0);
  var currentQ = qState[0];
  var setCurrentQ = qState[1];

  var answersState = useState({});
  var answers = answersState[0];
  var setAnswers = answersState[1];

  var selState = useState(null);
  var selected = selState[0];
  var setSelected = selState[1];

  var totalQ = ALL_QUESTIONS.length;

  function handleStart() {
    setAnswers({});
    setCurrentQ(0);
    setSelected(null);
    setScreen('quiz');
  }

  function handleSelect(i) {
    setSelected(i);
  }

  function handleNext() {
    if (selected === null) return;
    var newAnswers = Object.assign({}, answers);
    newAnswers[currentQ] = selected;
    setAnswers(newAnswers);
    setSelected(null);
    if (currentQ < totalQ - 1) {
      setCurrentQ(currentQ + 1);
    } else {
      setScreen('results');
    }
  }

  function handleBack() {
    if (currentQ === 0) { setScreen('landing'); return; }
    var prev = currentQ - 1;
    setCurrentQ(prev);
    setSelected(answers[prev] !== undefined ? answers[prev] : null);
    var newAnswers = Object.assign({}, answers);
    delete newAnswers[currentQ];
    setAnswers(newAnswers);
  }

  var result = useMemo(function() {
    if (screen !== 'results') return null;
    return computeResult(answers);
  }, [screen]);

  // Landing
  if (screen === 'landing') {
    return (
      <div style={{maxWidth:560,margin:'0 auto',padding:'48px 24px'}}>
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:40,marginBottom:16}}>🔬</div>
          <h1 style={{fontSize:28,fontWeight:700,color:'#2a2825',margin:'0 0 12px'}}>
            Piano Skills Diagnosis
          </h1>
          <p style={{fontSize:16,color:'#6b6560',lineHeight:1.6,margin:0}}>
            8 questions across Technique, Ear Training, Theory, and Sight-Reading.
            Find out where you stand and what to work on next.
          </p>
        </div>

        <div className="card" style={{padding:'24px',marginBottom:24}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
            {DOMAINS.map(function(d) {
              return (
                <div key={d.id} style={{background:d.bgColor,borderRadius:10,padding:'14px',border:'1px solid #e8e1d8'}}>
                  <div style={{fontSize:22,marginBottom:4}}>{d.icon}</div>
                  <div style={{fontWeight:600,fontSize:13,color:'#2a2825',marginBottom:4}}>{d.label}</div>
                  <div style={{fontSize:12,color:'#6b6560',lineHeight:1.4}}>{d.desc}</div>
                </div>
              );
            })}
          </div>
          <button className="btn-primary" style={{width:'100%',padding:'14px',fontSize:16}} onClick={handleStart}>
            Start diagnosis
          </button>
        </div>

        <p style={{textAlign:'center',fontSize:13,color:'#9b9590'}}>
          Takes about 2 minutes. No sign-in required.
        </p>
      </div>
    );
  }

  // Quiz
  if (screen === 'quiz') {
    var qObj = ALL_QUESTIONS[currentQ];
    var domain = qObj.domain;
    var progressPct = Math.round((currentQ / totalQ) * 100);

    return (
      <div style={{maxWidth:560,margin:'0 auto',padding:'32px 24px'}}>
        <div style={{marginBottom:28}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:6,background:domain.bgColor,borderRadius:20,padding:'4px 12px',border:'1px solid #e0d8cd'}}>
              <span style={{fontSize:14}}>{domain.icon}</span>
              <span style={{fontSize:12,fontWeight:600,color:domain.color}}>{domain.label}</span>
            </div>
            <span style={{fontSize:13,color:'#9b9590'}}>{currentQ + 1} / {totalQ}</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:progressPct + '%'}} />
          </div>
        </div>

        <div className="card" style={{padding:'28px 24px',marginBottom:20}}>
          <h2 style={{fontSize:17,fontWeight:600,color:'#2a2825',margin:'0 0 24px',lineHeight:1.5}}>
            {qObj.q}
          </h2>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {qObj.options.map(function(opt, i) {
              return (
                <button
                  key={i}
                  className={'option-btn' + (selected === i ? ' selected' : '')}
                  onClick={function() { handleSelect(i); }}
                >
                  <span style={{
                    width:24,height:24,borderRadius:'50%',
                    border:'2px solid ' + (selected === i ? '#d4956a' : '#d0c9be'),
                    background: selected === i ? '#d4956a' : 'transparent',
                    flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'
                  }}>
                    {selected === i ? <span style={{color:'#fff',fontSize:12,fontWeight:700}}>+</span> : null}
                  </span>
                  <span>{opt}</span>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <button className="btn-ghost" onClick={handleBack}>Back</button>
          <button
            className="btn-primary"
            onClick={handleNext}
            disabled={selected === null}
            style={{opacity: selected === null ? 0.5 : 1, cursor: selected === null ? 'not-allowed' : 'pointer'}}
          >
            {currentQ < totalQ - 1 ? 'Next' : 'See my results'}
          </button>
        </div>
      </div>
    );
  }

  // Results
  if (screen === 'results' && result) {
    var domainScores = result.domainScores;
    var weakest = result.weakest;
    var strongest = result.strongest;
    var levelLabel = result.levelLabel;
    var levelDesc = result.levelDesc;
    var pieces = result.pieces;

    return (
      <div style={{maxWidth:680,margin:'0 auto',padding:'32px 24px 60px'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{display:'inline-block',background:'#fdf3eb',border:'1px solid #f0d8c0',borderRadius:12,padding:'8px 20px',marginBottom:14}}>
            <span style={{fontSize:13,fontWeight:600,color:'#a05a38'}}>Suggested level: {levelLabel}</span>
          </div>
          <h2 style={{fontSize:24,fontWeight:700,color:'#2a2825',margin:'0 0 8px'}}>Your Results</h2>
          <p style={{fontSize:15,color:'#6b6560',margin:0}}>{levelDesc}</p>
        </div>

        {/* Radar chart */}
        <div className="card" style={{padding:'28px 16px 20px',marginBottom:28,textAlign:'center'}}>
          <RadarChart domainScores={domainScores} />
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:16,flexWrap:'wrap'}}>
            {domainScores.map(function(ds,i){
              var band = ds.pct >= 67 ? 'Strong' : ds.pct >= 34 ? 'Developing' : 'Focus here';
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:10,height:10,borderRadius:'50%',background:ds.domain.color,display:'inline-block',flexShrink:0}}></span>
                  <span style={{fontSize:12,color:'#6b6560'}}>{ds.domain.label} <strong style={{color:ds.domain.color}}>{band}</strong></span>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:32}}>
          {domainScores.map(function(ds, i) { return <DomainResult key={i} ds={ds} />; })}
        </div>

        <div style={{marginBottom:32}}>
          <h3 style={{fontSize:17,fontWeight:700,color:'#2a2825',margin:'0 0 12px'}}>What to focus on</h3>
          <p style={{fontSize:14,color:'#6b6560',margin:'0 0 16px',lineHeight:1.6}}>
            Your biggest gains will come from working on{' '}
            <strong style={{color:'#a05a38'}}>{weakest[0].domain.label}</strong>
            {weakest[1] ? <span> and <strong style={{color:'#a05a38'}}>{weakest[1].domain.label}</strong></span> : null}.
          </p>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {weakest.map(function(w, i) { return <TipCard key={i} domainId={w.domain.id} />; })}
          </div>
        </div>

        {pieces.length > 0 && (
          <div style={{marginBottom:32}}>
            <h3 style={{fontSize:17,fontWeight:700,color:'#2a2825',margin:'0 0 6px'}}>
              Pieces that address your weak areas
            </h3>
            <p style={{fontSize:13,color:'#9b9590',margin:'0 0 14px'}}>
              Each piece targets {weakest.map(function(w){ return w.domain.label.toLowerCase(); }).join(' or ')} directly.
            </p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {pieces.map(function(p, i) { return <PieceCard key={i} p={p} />; })}
            </div>
          </div>
        )}

        <div className="card" style={{padding:'16px 18px',marginBottom:32,background:'#f0faf0',borderColor:'#c4e0c4'}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:20}}>{strongest.domain.icon}</span>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:'#2a6a2a',marginBottom:4}}>
                Your strength: {strongest.domain.label}
              </div>
              <div style={{fontSize:13,color:'#4a7a4a',lineHeight:1.5}}>
                This is a genuine asset. Choose pieces that showcase it while you develop the other areas.
              </div>
            </div>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <a href="recommend.html"
             style={{display:'block',background:'#d4956a',color:'#fff',textAlign:'center',padding:'14px',borderRadius:10,fontWeight:600,fontSize:15,textDecoration:'none'}}>
            Get a personalised piece recommendation
          </a>
          <a href="index.html"
             style={{display:'block',background:'#fff',color:'#2a2825',textAlign:'center',padding:'14px',borderRadius:10,fontWeight:600,fontSize:15,textDecoration:'none',border:'1px solid #e0d8cd'}}>
            Browse all 4,500 pieces in the repertoire search
          </a>
          <button
            onClick={handleStart}
            style={{background:'none',border:'none',color:'#9b9590',fontSize:13,cursor:'pointer',padding:'8px 0'}}>
            Retake the diagnosis
          </button>
        </div>
      </div>
    );
  }

  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:40,fontFamily:'monospace',color:'#c00',background:'#fff0f0',margin:20,borderRadius:8}}>
          <strong>Error:</strong> {this.state.error.message}
        </div>
      );
    }
    return this.props.children;
  }
}

var rootEl = document.getElementById('root');
var appRoot = ReactDOM.createRoot(rootEl);
appRoot.render(
  React.createElement(ErrorBoundary, null, React.createElement(App, null))
);
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  function tryCompile() {
    if (typeof Babel === 'undefined') { setTimeout(tryCompile, 50); return; }
    var src = document.getElementById('app-jsx');
    if (!src) return;
    try {
      var compiled = Babel.transform(src.textContent, { presets: ['react'] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch(e) {
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;color:#c00;font-family:monospace;background:#fff0f0;margin:20px;border-radius:8px">' +
        '<strong>Compile error:</strong> ' + e.message + '</div>';
    }
  }
  tryCompile();
});
</script>
