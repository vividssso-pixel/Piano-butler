<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ══════════════════════════════════════════
   CORPUS (early/mid grades only for recs)
══════════════════════════════════════════ */
function buildCorpus() {
  const rows = [];
  const push = (arr, syllabus, gradeKey, gradeLabel, type) => {
    if (!arr) return;
    arr.forEach(p => rows.push({ ...p, _syllabus:syllabus, _gradeKey:gradeKey, _grade:gradeLabel, _type:type }));
  };
  const amebComp = [
    [typeof DATA_PRELIM!=='undefined'?DATA_PRELIM:null,'AMEB','Prelim','Prelim'],
    [typeof DATA_G1!=='undefined'?DATA_G1:null,'AMEB','G1','Grade 1'],
    [typeof DATA_G2!=='undefined'?DATA_G2:null,'AMEB','G2','Grade 2'],
    [typeof DATA_G3!=='undefined'?DATA_G3:null,'AMEB','G3','Grade 3'],
    [typeof DATA_G4!=='undefined'?DATA_G4:null,'AMEB','G4','Grade 4'],
    [typeof DATA_G5!=='undefined'?DATA_G5:null,'AMEB','G5','Grade 5'],
    [typeof DATA_G6_COMP!=='undefined'?DATA_G6_COMP:null,'AMEB','G6','Grade 6'],
    [typeof DATA_G7!=='undefined'?DATA_G7:null,'AMEB','G7','Grade 7'],
    [typeof DATA_G8!=='undefined'?DATA_G8:null,'AMEB','G8','Grade 8'],
  ];
  amebComp.forEach(([d,s,k,l]) => push(d,s,k,l,'Comprehensive'));
  const amebLeisure = [
    [typeof DATA_PRELIM_LEISURE!=='undefined'?DATA_PRELIM_LEISURE:null,'AMEB','Prelim','Prelim'],
    [typeof DATA_G1_LEISURE!=='undefined'?DATA_G1_LEISURE:null,'AMEB','G1','Grade 1'],
    [typeof DATA_G2_LEISURE!=='undefined'?DATA_G2_LEISURE:null,'AMEB','G2','Grade 2'],
    [typeof DATA_G3_LEISURE!=='undefined'?DATA_G3_LEISURE:null,'AMEB','G3','Grade 3'],
    [typeof DATA_G4_LEISURE!=='undefined'?DATA_G4_LEISURE:null,'AMEB','G4','Grade 4'],
  ];
  amebLeisure.forEach(([d,s,k,l]) => push(d,s,k,l,'Leisure'));
  const abrsm = [
    [typeof DATA_ABRSM_INITIAL!=='undefined'?DATA_ABRSM_INITIAL:null,'ABRSM','Initial','Initial'],
    [typeof DATA_ABRSM_G1!=='undefined'?DATA_ABRSM_G1:null,'ABRSM','G1','Grade 1'],
    [typeof DATA_ABRSM_G2!=='undefined'?DATA_ABRSM_G2:null,'ABRSM','G2','Grade 2'],
    [typeof DATA_ABRSM_G3!=='undefined'?DATA_ABRSM_G3:null,'ABRSM','G3','Grade 3'],
    [typeof DATA_ABRSM_G4!=='undefined'?DATA_ABRSM_G4:null,'ABRSM','G4','Grade 4'],
    [typeof DATA_ABRSM_G5!=='undefined'?DATA_ABRSM_G5:null,'ABRSM','G5','Grade 5'],
  ];
  abrsm.forEach(([d,s,k,l]) => push(d,s,k,l,'Graded'));
  const trinity = [
    [typeof DATA_TRINITY_INITIAL!=='undefined'?DATA_TRINITY_INITIAL:null,'Trinity','Initial','Initial'],
    [typeof DATA_TRINITY_G1!=='undefined'?DATA_TRINITY_G1:null,'Trinity','G1','Grade 1'],
    [typeof DATA_TRINITY_G2!=='undefined'?DATA_TRINITY_G2:null,'Trinity','G2','Grade 2'],
    [typeof DATA_TRINITY_G3!=='undefined'?DATA_TRINITY_G3:null,'Trinity','G3','Grade 3'],
    [typeof DATA_TRINITY_G4!=='undefined'?DATA_TRINITY_G4:null,'Trinity','G4','Grade 4'],
  ];
  trinity.forEach(([d,s,k,l]) => push(d,s,k,l,'Graded'));
  return rows;
}
const CORPUS = buildCorpus();

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ══════════════════════════════════════════
   STEP CONFIGS
══════════════════════════════════════════ */

// Step 1: Purpose
const PURPOSES = [
  { id:'child',   icon:'👶', label:'I want to teach my child',         sub:'Pass on the basics — play alongside them or help with their lessons.' },
  { id:'self',    icon:'🌟', label:'For myself — a lifelong dream',    sub:'Always wanted to get back to it. No exam pressure, just joy.' },
  { id:'exam',    icon:'🎓', label:'I have an exam goal',              sub:'AMEB, ABRSM, Trinity — I want to work towards a grade.' },
  { id:'hobby',   icon:'☕', label:'Just a relaxing hobby',            sub:'Something enjoyable to do in my own time, no pressure.' },
  { id:'perform', icon:'🎤', label:'I want to perform or play for others', sub:'For a recital, family gathering, or just to impress people.' },
];

// Step 2: Gap
const GAPS = [
  { id:'recent',  icon:'📅', label:'Less than a year ago',    sub:'Still pretty fresh — muscle memory mostly there.' },
  { id:'few',     icon:'🗓️', label:'2–5 years ago',           sub:'Some rust, but the foundations are still in there.' },
  { id:'decade',  icon:'⏰', label:'5–10 years ago',           sub:'It\'ll take a bit of work to get back up to speed.' },
  { id:'long',    icon:'🌫️', label:'More than 10 years',      sub:'Starting fairly fresh — but not from zero.' },
];

// Step 3: Memory test questions (what do they actually remember?)
const MEMORY_QUESTIONS = [
  {
    id: 'm1',
    text: 'Can you name the notes on the treble clef lines from bottom to top?',
    hint: 'E, G, B, D, F — "Every Good Boy Deserves Fruit"',
    options: [
      { label: 'Yes, straight away', score: 3 },
      { label: 'With a moment to think', score: 2 },
      { label: 'Vaguely — I\'d need to look it up', score: 1 },
      { label: 'No — I\'ve forgotten', score: 0 },
    ],
  },
  {
    id: 'm2',
    text: 'If you saw the time signature 3/4, would you know what it means?',
    hint: '3 beats per bar, quarter note gets one beat.',
    options: [
      { label: 'Yes, clearly', score: 3 },
      { label: 'I think so — waltz time?', score: 2 },
      { label: 'I remember it means something but not what', score: 1 },
      { label: 'No idea', score: 0 },
    ],
  },
  {
    id: 'm3',
    text: 'Can you remember any piece you used to play — even just the first few bars?',
    hint: 'A specific title, composer, or even just the melody in your head.',
    options: [
      { label: 'Yes — I could still play parts of it now', score: 3 },
      { label: 'I remember the tune but not the notes', score: 2 },
      { label: 'Vaguely — the name only', score: 1 },
      { label: 'Not really', score: 0 },
    ],
  },
  {
    id: 'm4',
    text: 'Do you remember how to read music notation — notes on the staff, rhythms, dynamics?',
    hint: 'Not just names — can you look at a page and make sense of it?',
    options: [
      { label: 'Yes — I could sit down and read a piece now', score: 3 },
      { label: 'Slowly, with some hesitation', score: 2 },
      { label: 'Very basic — simple rhythms only', score: 1 },
      { label: 'Not really — it\'s gone', score: 0 },
    ],
  },
];

// Step 4: Hands-on self-assessment
const HANDS_QUESTIONS = [
  {
    id: 'h1',
    text: 'If you sat at a piano right now, how long before your fingers started feeling "natural" again?',
    options: [
      { label: 'Almost immediately', score: 3 },
      { label: 'After 10–15 minutes', score: 2 },
      { label: 'It would take a few sessions', score: 1 },
      { label: 'Honestly, quite a while', score: 0 },
    ],
  },
  {
    id: 'h2',
    text: 'How confident are you playing hands together — both hands doing different things at the same time?',
    options: [
      { label: 'Comfortable — I could manage it', score: 3 },
      { label: 'Slow but possible', score: 2 },
      { label: 'I\'d need to build up to it', score: 1 },
      { label: 'That was always hard for me', score: 0 },
    ],
  },
  {
    id: 'h3',
    text: 'Do you remember what level or grade you reached when you last studied piano?',
    options: [
      { label: 'Grade 5 or above (AMEB/ABRSM)', score: 3 },
      { label: 'Around Grade 3–4', score: 2 },
      { label: 'Grade 1–2, or early stages', score: 1 },
      { label: 'Never graded — just lessons for a while', score: 0 },
    ],
  },
  {
    id: 'h4',
    text: 'When you imagine sitting down to play piano again, how does it feel?',
    options: [
      { label: 'Exciting — I can\'t wait', score: 3 },
      { label: 'Hopeful but a bit nervous', score: 2 },
      { label: 'A little daunting', score: 1 },
      { label: 'Quite intimidating honestly', score: 0 },
    ],
  },
];

const ERA_COLOR = {
  Baroque:      { bg:'#ede9fe', text:'#5b21b6' },
  Classical:    { bg:'#fef3c7', text:'#92400e' },
  Romantic:     { bg:'#fce7f3', text:'#9d174d' },
  Modern:       { bg:'#d1fae5', text:'#065f46' },
  Contemporary: { bg:'#e0f2fe', text:'#075985' },
};

/* ══════════════════════════════════════════
   RESULT ENGINE
   Combines purpose + gap + memory + hands
   into a personalised profile + recommendations
══════════════════════════════════════════ */
function computeResult(purpose, gap, memAnswers, handsAnswers) {
  const memScore  = Object.values(memAnswers).reduce((a,b)=>a+b,0);   // 0–12
  const handScore = Object.values(handsAnswers).reduce((a,b)=>a+b,0); // 0–12
  const total     = memScore + handScore; // 0–24

  // Starting level recommendation
  let levelKey, levelLabel, levelDesc;
  if (total >= 20) {
    levelKey = 'G4-G5'; levelLabel = 'Grade 4–5 level';
    levelDesc = 'Your memory and technique retention are strong. You can return at an intermediate level.';
  } else if (total >= 14) {
    levelKey = 'G2-G3'; levelLabel = 'Grade 2–3 level';
    levelDesc = 'Good foundations are still there. A few weeks of targeted practice and you\'ll feel at home again.';
  } else if (total >= 8) {
    levelKey = 'G1-G2'; levelLabel = 'Grade 1–2 level';
    levelDesc = 'Some basics remain but notation and technique need refreshing. Start easy — progress will be fast.';
  } else {
    levelKey = 'Prelim'; levelLabel = 'Prelim level';
    levelDesc = 'The break has been long. Starting from the foundations is the fastest path — you\'ll move through quickly.';
  }

  // Gap modifier
  const gapFactor = { recent: 1.0, few: 0.85, decade: 0.7, long: 0.55 }[gap] || 0.7;

  // Purpose-specific message + next step
  const purposeMessages = {
    child: {
      headline: 'You want to play alongside your child',
      msg: 'The best thing you can do is learn a handful of simple, recognisable pieces your child will enjoy hearing. You don\'t need to be advanced — you just need to be a step or two ahead.',
      nextStep: 'Start with Grade 1–2 repertoire that sounds impressive but isn\'t technically demanding.',
      focus: ['Melodic clarity', 'Simple harmony', 'Recognisable tunes'],
    },
    self: {
      headline: 'This is for you',
      msg: 'No exam pressure means you can choose music you actually love. The fastest way back is to pick one piece you\'ve always wanted to play and build your technique around it.',
      nextStep: 'Choose a "goal piece" slightly above your current level — then work backwards to find pieces that build the skills you need.',
      focus: ['Repertoire you love', 'Gradual challenge', 'Enjoyment first'],
    },
    exam: {
      headline: 'You have an exam in mind',
      msg: 'Exam preparation is very structured — which is actually great for returning players. The syllabus tells you exactly what to learn and in what order.',
      nextStep: 'Identify your realistic starting grade first, then build a 6–12 month plan towards your target exam.',
      focus: ['Technical work', 'Syllabus repertoire', 'Sight-reading + aural'],
    },
    hobby: {
      headline: 'Piano as a relaxing hobby',
      msg: 'This is the most sustainable way to return. No pressure, no deadlines — just the pleasure of playing music you enjoy. The key is consistency over intensity.',
      nextStep: 'Play for 20 minutes a day rather than 2 hours on weekends. Pick pieces that feel satisfying to play, not just impressive.',
      focus: ['Enjoyment', 'Consistency', 'Variety of styles'],
    },
    perform: {
      headline: 'You want to play for others',
      msg: 'Performing is a great motivator. Start building a small repertoire of 3–5 pieces you can really polish — it\'s better to play 3 pieces beautifully than 10 pieces roughly.',
      nextStep: 'Pick pieces that are slightly below your maximum ability — you want to perform with confidence, not just survive.',
      focus: ['Performance confidence', 'Polished repertoire', 'Stage presence'],
    },
  };

  const pmsg = purposeMessages[purpose] || purposeMessages.hobby;

  // Grade range for corpus filtering
  const gradeMap = {
    'G4-G5': ['G3','G4','G5'],
    'G2-G3': ['G2','G3','G4'],
    'G1-G2': ['G1','G2','G3'],
    'Prelim': ['Prelim','G1','G2'],
  };
  const targetGrades = gradeMap[levelKey] || ['G1','G2'];

  // Corpus filter by purpose + level
  let pool = CORPUS.filter(p => targetGrades.includes(p._gradeKey));

  // Purpose-based corpus preference
  if (purpose === 'child') {
    pool = pool.filter(p =>
      p.era === 'Classical' || p.era === 'Baroque' ||
      (p.focus||[]).some(f => /melodic|simple|clear|song|dance|character/i.test(f))
    );
  } else if (purpose === 'exam') {
    pool = pool.filter(p => p._syllabus === 'AMEB' || p._syllabus === 'ABRSM');
  } else if (purpose === 'hobby' || purpose === 'self') {
    pool = pool.filter(p =>
      p.era === 'Romantic' || p.era === 'Classical' || p.era === 'Contemporary' ||
      (p.focus||[]).some(f => /lyric|cantabile|expressive|melody|character/i.test(f))
    );
  } else if (purpose === 'perform') {
    pool = pool.filter(p =>
      p.era === 'Romantic' || p.era === 'Classical' ||
      (p.focus||[]).some(f => /expressive|character|dramatic|musical|shaping/i.test(f))
    );
  }

  // Pick with era diversity
  const picked = [];
  const usedEras = new Set();
  const shuffled = shuffle(pool);
  for (const p of shuffled) {
    if (picked.length >= 5) break;
    if (!usedEras.has(p.era) || picked.length < 3) {
      picked.push(p); usedEras.add(p.era);
    }
  }
  if (picked.length < 5) {
    for (const p of shuffled) {
      if (picked.length >= 5) break;
      if (!picked.includes(p)) picked.push(p);
    }
  }

  // Memory weak areas
  const memWeak = [];
  if ((memAnswers.m1||0) < 2) memWeak.push('Note reading on the staff');
  if ((memAnswers.m2||0) < 2) memWeak.push('Time signatures and rhythm counting');
  if ((memAnswers.m3||0) < 2) memWeak.push('Repertoire memory');
  if ((memAnswers.m4||0) < 2) memWeak.push('Reading notation from a page');

  const handsWeak = [];
  if ((handsAnswers.h2||0) < 2) handsWeak.push('Playing hands together');
  if ((handsAnswers.h4||0) < 2) handsWeak.push('Confidence and mindset at the piano');

  return {
    levelKey, levelLabel, levelDesc, pmsg,
    memScore, handScore, total,
    pieces: picked.slice(0,5),
    memWeak, handsWeak,
  };
}

/* ══════════════════════════════════════════
   PIECE CARD
══════════════════════════════════════════ */
function PieceCard({ piece, idx }) {
  const ec = ERA_COLOR[piece.era] || { bg:'#f1f5f9', text:'#475569' };
  const surname = (piece.c||'').split(',')[0];
  const wikiUrl = `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(surname + ' composer pianist')}`;
  return (
    <div className="piece-card fade-up" style={{ animationDelay:`${idx*0.06}s` }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#1e293b', marginBottom:2 }}>{piece.t}</div>
          <a href={wikiUrl} target="_blank" rel="noopener"
            style={{ fontSize:11, color:'#4f46e5', fontWeight:600, textDecoration:'none' }}>
            {piece.c}
          </a>
        </div>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:3 }}>
          <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:8,
            background:ec.bg, color:ec.text }}>{piece.era}</span>
          <span style={{ fontSize:10, color:'#94a3b8', fontWeight:600 }}>
            {piece._syllabus} · {piece._grade}
          </span>
        </div>
      </div>
      {(piece.focus||[]).length > 0 && (
        <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:7 }}>
          {piece.focus.slice(0,3).map((f,i)=>(
            <span key={i} style={{ fontSize:9, padding:'2px 7px', borderRadius:8,
              background:'#f1f5f9', color:'#64748b', fontWeight:600 }}>{f}</span>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
const TOTAL_STEPS = 4; // purpose, gap, memory (4q), hands (4q)

function App() {
  const [screen, setScreen]       = useState('landing');
  const [step, setStep]           = useState(1);
  const [purpose, setPurpose]     = useState(null);
  const [gap, setGap]             = useState(null);
  const [memAnswers, setMemAns]   = useState({});
  const [handsAnswers, setHandsAns] = useState({});
  const [memQ, setMemQ]           = useState(0); // current memory question index
  const [handsQ, setHandsQ]       = useState(0); // current hands question index
  const [result, setResult]       = useState(null);
  const [procStep, setProcStep]   = useState(0);
  const [showModal, setShowModal] = useState(false);

  // Processing animation
  useEffect(() => {
    if (screen !== 'processing') return;
    const msgs = ['Reading your answers…','Checking memory retention…','Assessing technique…','Matching your purpose…','Building your profile…'];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setProcStep(i);
      if (i >= msgs.length) {
        clearInterval(iv);
        const r = computeResult(purpose, gap, memAnswers, handsAnswers);
        try { localStorage.setItem('pb_diagnosis_v1', JSON.stringify({ result: r, purpose, gap })); } catch(e) {}
        setResult(r);
        setTimeout(() => setScreen('results'), 400);
      }
    }, 550);
    return () => clearInterval(iv);
  }, [screen]);

  const procMsgs = ['Reading your answers…','Checking memory retention…','Assessing technique…','Matching your purpose…','Building your profile…'];

  const progress = step === 1 ? 10
    : step === 2 ? 25
    : step === 3 ? 25 + Math.round((memQ / 4) * 37)
    : 62 + Math.round((handsQ / 4) * 37);

  const goBack = () => {
    if (step === 3 && memQ > 0) { setMemQ(memQ - 1); return; }
    if (step === 4 && handsQ > 0) { setHandsQ(handsQ - 1); return; }
    if (step === 4 && handsQ === 0) { setStep(3); setMemQ(3); return; }
    if (step > 1) { setStep(step - 1); }
  };

  const restart = () => {
    setScreen('landing'); setStep(1); setPurpose(null); setGap(null);
    setMemAns({}); setHandsAns({}); setMemQ(0); setHandsQ(0); setResult(null);
  };

  /* ── LANDING ── */
  if (screen === 'landing') return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(145deg,#1e1b4b 0%,#312e81 50%,#4f46e5 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'40px 20px', textAlign:'center' }}>
      <a href="index.html" style={{ position:'absolute', top:20, left:20,
        color:'rgba(255,255,255,0.7)', textDecoration:'none', fontSize:13, fontWeight:600 }}>
        ← Piano Butler
      </a>
      <div style={{ fontSize:56, marginBottom:16 }}>🎹</div>
      <h1 style={{ fontSize:30, fontWeight:900, color:'#fff', margin:'0 0 14px', maxWidth:480, lineHeight:1.25 }}>
        You used to play piano.<br/>Where are you now?
      </h1>
      <p style={{ fontSize:15, color:'rgba(255,255,255,0.8)', maxWidth:420, lineHeight:1.65,
        margin:'0 0 12px' }}>
        This diagnosis is built for <strong style={{color:'#fff'}}>returning players</strong> —
        people who learned piano before and want to come back.
      </p>
      <p style={{ fontSize:13, color:'rgba(255,255,255,0.6)', maxWidth:380, lineHeight:1.6,
        margin:'0 0 36px' }}>
        8 questions. 3 minutes. A personalised starting point and piece recommendations.
      </p>
      <button className="fade-up" onClick={() => setScreen('quiz')}
        style={{ padding:'16px 44px', borderRadius:14, border:'none', cursor:'pointer',
          background:'#fff', color:'#312e81', fontSize:17, fontWeight:800,
          boxShadow:'0 8px 30px rgba(0,0,0,0.25)', transition:'all 0.2s' }}
        onMouseOver={e=>e.currentTarget.style.transform='translateY(-2px)'}
        onMouseOut={e=>e.currentTarget.style.transform='translateY(0)'}>
        Find my starting point →
      </button>
      <p style={{ marginTop:18, fontSize:11, color:'rgba(255,255,255,0.5)' }}>
        Free · No login · Results in 3 minutes
      </p>
    </div>
  );

  /* ── PROCESSING ── */
  if (screen === 'processing') return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#312e81,#4f46e5)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      textAlign:'center', padding:40 }}>
      <div className="spinning" style={{ width:48, height:48, borderRadius:'50%',
        border:'4px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', marginBottom:28 }} />
      <div className="pulsing" style={{ fontSize:15, color:'rgba(255,255,255,0.9)',
        fontWeight:600, minHeight:24 }}>
        {procMsgs[Math.min(procStep, procMsgs.length-1)]}
      </div>
      <div style={{ marginTop:28, display:'flex', gap:8 }}>
        {procMsgs.map((_,i)=>(
          <div key={i} style={{ width:8, height:8, borderRadius:'50%',
            background: i < procStep ? '#fff' : 'rgba(255,255,255,0.3)',
            transition:'background 0.3s' }} />
        ))}
      </div>
    </div>
  );

  /* ── QUIZ ── */
  if (screen === 'quiz') {
    // Step 1: Purpose
    if (step === 1) return (
      <div style={{ minHeight:'100vh', background:'#f0f4ff' }}>
        <div style={{ background:'linear-gradient(135deg,#312e81,#4f46e5)', padding:'16px 20px' }}>
          <div style={{ maxWidth:560, margin:'0 auto' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
              marginBottom:10 }}>
              <a href="index.html" style={{ color:'rgba(255,255,255,0.7)', textDecoration:'none',
                fontSize:12, fontWeight:600 }}>← Back</a>
              <span style={{ fontSize:11, color:'rgba(255,255,255,0.7)', fontWeight:600 }}>
                Step 1 of 4
              </span>
            </div>
            <div className="prog-track"><div className="prog-fill" style={{ width:`${progress}%` }}/></div>
          </div>
        </div>
        <div style={{ maxWidth:560, margin:'0 auto', padding:'28px 20px' }}>
          <div className="fade-up">
            <h2 style={{ fontSize:22, fontWeight:900, color:'#1e293b', margin:'0 0 8px' }}>
              Why do you want to play piano again?
            </h2>
            <p style={{ fontSize:13, color:'#64748b', margin:'0 0 22px', lineHeight:1.5 }}>
              This shapes everything — your repertoire, your pace, your priorities.
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {PURPOSES.map(p => (
                <button key={p.id} className={`choice-btn ${purpose===p.id?'selected':''}`}
                  onClick={() => { setPurpose(p.id); setTimeout(()=>setStep(2), 200); }}>
                  <span className="icon">{p.icon}</span>
                  <div>
                    <div className="label">{p.label}</div>
                    <div className="sub">{p.sub}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // Step 2: Gap
    if (step === 2) return (
      <div style={{ minHeight:'100vh', background:'#f0f4ff' }}>
        <div style={{ background:'linear-gradient(135deg,#312e81,#4f46e5)', padding:'16px 20px' }}>
          <div style={{ maxWidth:560, margin:'0 auto' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
              marginBottom:10 }}>
              <button onClick={goBack} style={{ background:'none', border:'none',
                color:'rgba(255,255,255,0.7)', cursor:'pointer', fontSize:12, fontWeight:600 }}>
                ← Back
              </button>
              <span style={{ fontSize:11, color:'rgba(255,255,255,0.7)', fontWeight:600 }}>
                Step 2 of 4
              </span>
            </div>
            <div className="prog-track"><div className="prog-fill" style={{ width:`${progress}%` }}/></div>
          </div>
        </div>
        <div style={{ maxWidth:560, margin:'0 auto', padding:'28px 20px' }}>
          <div className="fade-up">
            <h2 style={{ fontSize:22, fontWeight:900, color:'#1e293b', margin:'0 0 8px' }}>
              When did you last play regularly?
            </h2>
            <p style={{ fontSize:13, color:'#64748b', margin:'0 0 22px', lineHeight:1.5 }}>
              This helps calibrate how much of your foundation is still there.
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {GAPS.map(g => (
                <button key={g.id} className={`choice-btn ${gap===g.id?'selected':''}`}
                  onClick={() => { setGap(g.id); setTimeout(()=>setStep(3), 200); }}>
                  <span className="icon">{g.icon}</span>
                  <div>
                    <div className="label">{g.label}</div>
                    <div className="sub">{g.sub}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    // Step 3: Memory questions
    if (step === 3) {
      const q = MEMORY_QUESTIONS[memQ];
      const answered = memAnswers[q.id];
      const handleMemory = (score) => {
        const updated = { ...memAnswers, [q.id]: score };
        setMemAns(updated);
        if (memQ < MEMORY_QUESTIONS.length - 1) {
          setTimeout(() => setMemQ(memQ + 1), 200);
        } else {
          setTimeout(() => { setStep(4); setHandsQ(0); }, 200);
        }
      };
      return (
        <div style={{ minHeight:'100vh', background:'#f0f4ff' }}>
          <div style={{ background:'linear-gradient(135deg,#0369a1,#0284c7)', padding:'16px 20px' }}>
            <div style={{ maxWidth:520, margin:'0 auto' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                marginBottom:10 }}>
                <button onClick={goBack} style={{ background:'none', border:'none',
                  color:'rgba(255,255,255,0.7)', cursor:'pointer', fontSize:12, fontWeight:600 }}>
                  ← Back
                </button>
                <span style={{ fontSize:11, color:'rgba(255,255,255,0.7)', fontWeight:600 }}>
                  Step 3 of 4 · Memory {memQ+1}/4
                </span>
              </div>
              <div className="prog-track"><div className="prog-fill" style={{ width:`${progress}%` }}/></div>
            </div>
          </div>
          <div style={{ maxWidth:520, margin:'0 auto', padding:'28px 20px' }}>
            <div key={q.id} className="fade-up"
              style={{ background:'#fff', borderRadius:20, padding:'26px 22px',
                boxShadow:'0 4px 20px rgba(0,0,0,0.07)' }}>
              <div style={{ display:'inline-flex', alignItems:'center', gap:6,
                padding:'4px 12px', borderRadius:20, background:'#e0f2fe',
                marginBottom:16 }}>
                <span style={{ fontSize:14 }}>👁️</span>
                <span style={{ fontSize:11, fontWeight:700, color:'#0369a1' }}>
                  What do you remember?
                </span>
              </div>
              <p style={{ fontSize:16, fontWeight:700, color:'#1e293b', lineHeight:1.55,
                margin:'0 0 8px' }}>{q.text}</p>
              {q.hint && (
                <p style={{ fontSize:12, color:'#94a3b8', margin:'0 0 20px' }}>
                  💡 {q.hint}
                </p>
              )}
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {q.options.map(opt => (
                  <button key={opt.label}
                    className={`memory-btn ${answered===opt.score?'selected':''}`}
                    onClick={() => handleMemory(opt.score)}>
                    <div className="dot"
                      style={{ background: answered===opt.score ? '#4f46e5' : '#e2e8f0' }} />
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Step 4: Hands questions
    if (step === 4) {
      const q = HANDS_QUESTIONS[handsQ];
      const answered = handsAnswers[q.id];
      const handleHands = (score) => {
        const updated = { ...handsAnswers, [q.id]: score };
        setHandsAns(updated);
        if (handsQ < HANDS_QUESTIONS.length - 1) {
          setTimeout(() => setHandsQ(handsQ + 1), 200);
        } else {
          setTimeout(() => setScreen('processing'), 200);
        }
      };
      return (
        <div style={{ minHeight:'100vh', background:'#f0f4ff' }}>
          <div style={{ background:'linear-gradient(135deg,#065f46,#047857)', padding:'16px 20px' }}>
            <div style={{ maxWidth:520, margin:'0 auto' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                marginBottom:10 }}>
                <button onClick={goBack} style={{ background:'none', border:'none',
                  color:'rgba(255,255,255,0.7)', cursor:'pointer', fontSize:12, fontWeight:600 }}>
                  ← Back
                </button>
                <span style={{ fontSize:11, color:'rgba(255,255,255,0.7)', fontWeight:600 }}>
                  Step 4 of 4 · Technique {handsQ+1}/4
                </span>
              </div>
              <div className="prog-track"><div className="prog-fill" style={{ width:`${progress}%` }}/></div>
            </div>
          </div>
          <div style={{ maxWidth:520, margin:'0 auto', padding:'28px 20px' }}>
            <div key={q.id} className="fade-up"
              style={{ background:'#fff', borderRadius:20, padding:'26px 22px',
                boxShadow:'0 4px 20px rgba(0,0,0,0.07)' }}>
              <div style={{ display:'inline-flex', alignItems:'center', gap:6,
                padding:'4px 12px', borderRadius:20, background:'#d1fae5', marginBottom:16 }}>
                <span style={{ fontSize:14 }}>🎹</span>
                <span style={{ fontSize:11, fontWeight:700, color:'#065f46' }}>
                  How are your hands?
                </span>
              </div>
              <p style={{ fontSize:16, fontWeight:700, color:'#1e293b', lineHeight:1.55,
                margin:'0 0 20px' }}>{q.text}</p>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {q.options.map(opt => (
                  <button key={opt.label}
                    className={`memory-btn ${answered===opt.score?'selected':''}`}
                    style={{ '--dot-color': answered===opt.score ? '#065f46' : '#e2e8f0' }}
                    onClick={() => handleHands(opt.score)}>
                    <div className="dot"
                      style={{ background: answered===opt.score ? '#065f46' : '#e2e8f0' }} />
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }
  }

  /* ── RESULTS ── */
  if (screen === 'results' && result) {
    const { levelLabel, levelDesc, pmsg, memScore, handScore, total,
            pieces, memWeak, handsWeak } = result;
    const totalPct = Math.round((total / 24) * 100);
    const levelColor = totalPct >= 80 ? '#065f46' : totalPct >= 55 ? '#b45309' : '#4f46e5';
    const levelBg    = totalPct >= 80 ? '#d1fae5' : totalPct >= 55 ? '#fef3c7' : '#eef2ff';

    return (
      <div style={{ minHeight:'100vh', background:'#f0f4ff', paddingBottom:60 }}>
        {showModal && <ComingSoonModal onClose={() => setShowModal(false)} />}

        {/* Header */}
        <div style={{ background:'linear-gradient(135deg,#1e1b4b,#312e81)',
          padding:'28px 20px', color:'#fff', textAlign:'center' }}>
          <a href="index.html" style={{ position:'absolute', top:16, left:16,
            color:'rgba(255,255,255,0.65)', textDecoration:'none', fontSize:12, fontWeight:600 }}>
            ← Piano Butler
          </a>
          <div style={{ fontSize:36, marginBottom:10 }}>🎹</div>
          <h1 style={{ fontSize:22, fontWeight:900, margin:'0 0 8px' }}>Your Piano Profile</h1>
          <div className="level-badge" style={{ background: levelBg, color: levelColor }}>
            {levelLabel}
          </div>
        </div>

        <div style={{ maxWidth:580, margin:'0 auto', padding:'24px 20px' }}>

          {/* ── Purpose message ── */}
          <div className="result-section fade-up">
            <div style={{ fontSize:13, fontWeight:700, color:'#94a3b8',
              textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:10 }}>
              {PURPOSES.find(p=>p.id===purpose)?.icon} Your goal
            </div>
            <h2 style={{ fontSize:18, fontWeight:800, color:'#1e293b', margin:'0 0 10px' }}>
              {pmsg.headline}
            </h2>
            <p style={{ fontSize:14, color:'#475569', lineHeight:1.65, margin:'0 0 14px' }}>
              {pmsg.msg}
            </p>
            <div style={{ background:'#f0f9ff', borderRadius:12, padding:'13px 15px',
              borderLeft:'3px solid #0369a1' }}>
              <div style={{ fontSize:11, fontWeight:700, color:'#0369a1',
                marginBottom:4 }}>NEXT STEP</div>
              <div style={{ fontSize:13, color:'#1e293b', lineHeight:1.5 }}>{pmsg.nextStep}</div>
            </div>
          </div>

          {/* ── Retention score ── */}
          <div className="result-section fade-up" style={{ animationDelay:'0.08s' }}>
            <div style={{ fontSize:13, fontWeight:700, color:'#94a3b8',
              textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:12 }}>
              📊 Retention score
            </div>
            <div style={{ display:'flex', gap:16, marginBottom:14 }}>
              <div style={{ flex:1, textAlign:'center', padding:'14px 10px',
                borderRadius:12, background:'#f0f9ff', border:'1.5px solid #bae6fd' }}>
                <div style={{ fontSize:22, fontWeight:900, color:'#0369a1' }}>
                  {memScore}/12
                </div>
                <div style={{ fontSize:11, color:'#64748b', fontWeight:600, marginTop:2 }}>
                  Theory memory
                </div>
              </div>
              <div style={{ flex:1, textAlign:'center', padding:'14px 10px',
                borderRadius:12, background:'#f0fdf4', border:'1.5px solid #bbf7d0' }}>
                <div style={{ fontSize:22, fontWeight:900, color:'#065f46' }}>
                  {handScore}/12
                </div>
                <div style={{ fontSize:11, color:'#64748b', fontWeight:600, marginTop:2 }}>
                  Physical readiness
                </div>
              </div>
              <div style={{ flex:1, textAlign:'center', padding:'14px 10px',
                borderRadius:12, background: levelBg, border:`1.5px solid ${levelColor}30` }}>
                <div style={{ fontSize:22, fontWeight:900, color: levelColor }}>
                  {totalPct}%
                </div>
                <div style={{ fontSize:11, color:'#64748b', fontWeight:600, marginTop:2 }}>
                  Overall retention
                </div>
              </div>
            </div>
            <p style={{ fontSize:13, color:'#475569', lineHeight:1.6, margin:0 }}>
              {levelDesc}
            </p>
          </div>

          {/* ── Things to brush up on ── */}
          {(memWeak.length > 0 || handsWeak.length > 0) && (
            <div className="result-section fade-up" style={{ animationDelay:'0.14s' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'#94a3b8',
                textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:12 }}>
                🔧 Things to brush up on
              </div>
              {[...memWeak, ...handsWeak].map((w, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:10,
                  padding:'10px 12px', borderRadius:10, background:'#fff7ed',
                  border:'1.5px solid #fed7aa', marginBottom:8 }}>
                  <span style={{ fontSize:14 }}>⚡</span>
                  <span style={{ fontSize:13, color:'#92400e', fontWeight:600 }}>{w}</span>
                </div>
              ))}
              <p style={{ fontSize:12, color:'#94a3b8', margin:'10px 0 0', lineHeight:1.5 }}>
                These are common for returning players — they come back quickly with focused practice.
              </p>
            </div>
          )}

          {/* ── Piece recommendations ── */}
          {pieces.length > 0 && (
            <div className="result-section fade-up" style={{ animationDelay:'0.2s' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'#94a3b8',
                textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>
                🎼 Where to start — pieces matched to you
              </div>
              <p style={{ fontSize:13, color:'#64748b', margin:'0 0 14px', lineHeight:1.5 }}>
                Selected from 4,500 pieces based on your goal and current level.
              </p>
              {pieces.map((p, i) => <PieceCard key={i} piece={p} idx={i} />)}
              <div style={{ marginTop:12, textAlign:'center' }}>
                <a href="index.html" style={{ fontSize:12, color:'#4f46e5', fontWeight:700,
                  textDecoration:'none' }}>
                  Browse all 4,500 pieces →
                </a>
              </div>
            </div>
          )}

          {/* ── CTAs ── */}
          <div style={{ background:'linear-gradient(135deg,#1e1b4b,#312e81)', borderRadius:20,
            padding:'26px 22px', textAlign:'center', marginBottom:16 }}>
            <div style={{ fontSize:26, marginBottom:10 }}>✨</div>
            <h3 style={{ fontSize:16, fontWeight:800, color:'#fff', margin:'0 0 8px' }}>
              Ready to take the next step?
            </h3>
            <p style={{ fontSize:13, color:'rgba(255,255,255,0.75)', lineHeight:1.6,
              margin:'0 0 20px' }}>
              Connect with a teacher matched to your goal, or get the full PDF report
              with a 6-month roadmap.
            </p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center' }}>
              <a href="connect.html" className="cta-green">👩‍🏫 Find a teacher</a>
              <button className="cta-indigo" onClick={() => setShowModal(true)}
                style={{ cursor:'pointer', border:'none' }}>
                📋 Full report — $4
              </button>
            </div>
          </div>

          {/* Retake */}
          <div style={{ textAlign:'center' }}>
            <button onClick={restart}
              style={{ background:'none', border:'2px solid #c7d2fe', borderRadius:12,
                padding:'10px 22px', color:'#4f46e5', fontWeight:700, cursor:'pointer',
                fontSize:13 }}>
              ↺ Retake diagnosis
            </button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ padding:40, color:'#dc2626', fontFamily:'monospace' }}>
        <h2>Something went wrong</h2>
        <pre style={{ whiteSpace:'pre-wrap', fontSize:12 }}>{String(this.state.error)}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
