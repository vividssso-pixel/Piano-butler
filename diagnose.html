    .ans-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #555; flex-shrink: 0; transition: all 0.15s; }
    .ans-btn.selected .ans-dot { background: var(--accent); border-color: var(--accent); }

    /* --- domain section header --- */
    .domain-header {
      border-radius: 12px; padding: 14px 16px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;

    .prog-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

    /* --- result sections --- */
    .result-card {
      background: var(--surface); border-radius: 16px; padding: 20px;
      border: 1px solid var(--border); margin-bottom: 14px;

    /* --- radar svg --- */

    .piece-card {

      border: 1px solid var(--border); background: var(--surface2);

  };

    [typeof DATA_PRELIM!=='undefined'?DATA_PRELIM:null,'AMEB','Prelim','Prelim','Comprehensive'],
    [typeof DATA_G1!=='undefined'?DATA_G1:null,'AMEB','G1','Grade 1','Comprehensive'],
    [typeof DATA_G2!=='undefined'?DATA_G2:null,'AMEB','G2','Grade 2','Comprehensive'],
    [typeof DATA_G3!=='undefined'?DATA_G3:null,'AMEB','G3','Grade 3','Comprehensive'],
    [typeof DATA_G4!=='undefined'?DATA_G4:null,'AMEB','G4','Grade 4','Comprehensive'],
    [typeof DATA_G5!=='undefined'?DATA_G5:null,'AMEB','G5','Grade 5','Comprehensive'],
    [typeof DATA_G6_COMP!=='undefined'?DATA_G6_COMP:null,'AMEB','G6','Grade 6','Comprehensive'],
    [typeof DATA_G7!=='undefined'?DATA_G7:null,'AMEB','G7','Grade 7','Comprehensive'],
    [typeof DATA_G8!=='undefined'?DATA_G8:null,'AMEB','G8','Grade 8','Comprehensive'],

    [typeof DATA_G2_LEISURE!=='undefined'?DATA_G2_LEISURE:null,'AMEB','G2','Grade 2','Leisure'],

    [typeof DATA_ABRSM_INITIAL!=='undefined'?DATA_ABRSM_INITIAL:null,'ABRSM','Initial','Initial','Graded'],
    [typeof DATA_ABRSM_G1!=='undefined'?DATA_ABRSM_G1:null,'ABRSM','G1','Grade 1','Graded'],

  return rows;
}
const CORPUS = buildCorpus();

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ─────────────────────────────────────────────
   BEGINNER RESULT ENGINE
───────────────────────────────────────────── */
function computeBeginnerResult(answers) {
  const g = answers;

  // Personality profile label
  const styleMap = {
    structured: { label: 'The Planner', desc: 'You thrive with clear goals, structured lessons, and measurable milestones. A teacher who gives you a proper syllabus and weekly targets will keep you motivated.' },
    flexible:   { label: 'The Explorer', desc: 'You learn best when lessons feel alive and responsive. A teacher who adapts each session to what excites you right now will bring out your best.' },
    results:    { label: 'The Achiever', desc: 'Quick wins keep you going. You need a teacher who celebrates progress visibly and gives you pieces that feel satisfying to play early on.' },
    deep:       { label: 'The Thinker', desc: "You're not satisfied just playing the notes — you want to understand the music. A teacher who explains theory and musical context will be a great fit." },
  };
  const profile = styleMap[g.b_style] || styleMap.flexible;

  // Genre → repertoire style
  const genreLabels = {
    classical: 'Classical & romantic repertoire',
    pop:       'Contemporary songs & popular music',
    jazz:      'Jazz, blues & improvisation',
    musical:   'Musical theatre & film scores',
    kpop:      'Asian pop & contemporary',
    open:      'Mixed — discovering what you love',
  };
  const genres = Array.isArray(g.b_genre) ? g.b_genre : [g.b_genre];
  const genreStr = genres.map(v => genreLabels[v] || v).join(', ');

  // Practice → realistic first milestone
  const practiceMap = {
    minimal:   { weeks: 24, milestone: 'a simple complete melody in 5–6 months' },
    light:     { weeks: 16, milestone: 'a simple complete piece in 3–4 months' },
    moderate:  { weeks: 10, milestone: 'a satisfying piece in 2–3 months' },
    intensive: { weeks: 6,  milestone: 'a solid first piece in 6–8 weeks' },
  };
  const pace = practiceMap[g.b_practice] || practiceMap.light;

  // Goal → teacher priority note
  const goalNotes = {
    one_piece: 'Repertoire-first approach — build technique around a piece you love.',
    exam:      'Structured syllabus work — AMEB/ABRSM framework from the start.',
    casual:    'Enjoyment-led — light structure, strong emphasis on fun repertoire.',
    theory:    'Theory-integrated — understanding is as important as playing.',
    explore:   'Curiosity-led — try different styles and find what sticks.',
  };
  const goalNote = goalNotes[g.b_goal] || goalNotes.explore;

  // Teacher format preference
  const teacherFormatMap = {
    inperson: 'In-person lessons',
    online:   'Online lessons',
    self:     'Self-study + occasional guidance',
    unsure:   'Open to any format',
  };
  const teacherFormat = teacherFormatMap[g.b_teacher] || 'Open to any format';

  // Instrument note
  const instrNotes = {
    acoustic:  'Great — acoustic piano is the gold standard for developing touch and dynamics.',
    digital:   'Perfect — weighted keys give you genuine feel. You\'re ready to start.',
    keyboard:  'Good enough to begin. Consider upgrading to weighted keys within the first year.',
    none:      "You'll want at least a basic digital piano before your first lesson. A 61-key weighted keyboard is a great affordable start.",
  };
  const instrNote = instrNotes[g.b_instrument] || '';

  // Timeline urgency
  const timelineMap = {
    '3mo': { label: 'Within 3 months', urgent: true },
    '6mo': { label: 'Within 6 months', urgent: false },
    '12mo': { label: 'Within a year',  urgent: false },
    'open': { label: 'No rush',        urgent: false },
  };
  const timeline = timelineMap[g.b_timeline] || timelineMap.open;

  // Starter pieces from corpus — Prelim/G1, genre-matched
  const CORPUS_LOCAL = typeof CORPUS !== 'undefined' ? CORPUS : [];
  let pool = CORPUS_LOCAL.filter(p => ['Prelim','G1','Initial'].includes(p._gradeKey));
  if (genres.includes('classical') || genres.includes('open')) {
    pool = pool.filter(p => p.era === 'Baroque' || p.era === 'Classical' || p.era === 'Romantic');
  } else if (genres.includes('jazz')) {
    pool = pool.filter(p => p.era === 'Contemporary' || p.era === 'Modern' ||
      (p.focus||[]).some(f => /jazz|blues|swing|synco/i.test(f)));
  }
  if (pool.length < 6) pool = CORPUS_LOCAL.filter(p => ['Prelim','G1','Initial'].includes(p._gradeKey));

  const picked = [];
  const usedEras = new Set();
  for (const p of shuffle(pool)) {
    if (picked.length >= 4) break;
    if (!usedEras.has(p.era) || picked.length < 2) { picked.push(p); usedEras.add(p.era); }
  }

  return { profile, genreStr, pace, goalNote, teacherFormat, instrNote, timeline, pieces: picked };
}

/* ─────────────────────────────────────────────
   RESULT ENGINE
───────────────────────────────────────────── */
function computeResult(background, purpose, domainAnswers) {
  const scores = {};
  let totalScore = 0, totalMax = 0;
  DOMAINS.forEach(d => {
    let s = 0;
    d.questions.forEach(q => { s += (domainAnswers[q.id] || 0); });
    scores[d.id] = { raw: s, max: d.questions.length * 3, pct: Math.round((s / (d.questions.length * 3)) * 100) };
    totalScore += s;
    totalMax += d.questions.length * 3;
  });

  const overallPct = Math.round((totalScore / totalMax) * 100);

  // Sort domains weakest → strongest
  const ranked = [...DOMAINS].sort((a, b) => scores[a.id].pct - scores[b.id].pct);
  const weakest = ranked.slice(0, 2);
  const strongest = ranked.slice(-1)[0];

  // Estimated level
  let levelKey, levelLabel, levelDesc;
  if (background === 'beginner') {
    levelKey = 'Prelim'; levelLabel = 'Beginner — Prelim level';
    levelDesc = 'Your starting point is the foundations. The good news: with the right guidance, progress in the first 6 months is fast and very satisfying.';
  } else if (overallPct >= 75) {
    levelKey = 'G4-G5'; levelLabel = 'Intermediate — Grade 4–5 level';
    levelDesc = "Strong retention across the board. You can return at an intermediate level and progress quickly — the foundations are largely intact.";
  } else if (overallPct >= 55) {
    levelKey = 'G2-G3'; levelLabel = 'Early intermediate — Grade 2–3 level';
    levelDesc = 'Good foundations are still there. A few weeks of targeted practice and you\'ll feel at home again. Some domains need more attention than others.';
  } else if (overallPct >= 35) {
    levelKey = 'G1-G2'; levelLabel = 'Foundation — Grade 1–2 level';
    levelDesc = 'Some basics remain but several areas need refreshing. Starting easy means fast, satisfying progress — you\'ll move through these levels quickly.';
  } else {
    levelKey = 'Prelim'; levelLabel = 'Foundations — Prelim level';
    levelDesc = 'The break has been long, or the foundations need rebuilding. Starting from the beginning is the fastest path — and you\'ll move through it much quicker than a true beginner.';
  }

  // Purpose message
  const purposeMessages = {
    hobby: {
      headline: 'Piano as a personal joy',
      msg: "No pressure, no deadlines — just the pleasure of playing music you love. The key is consistency over intensity: 20 minutes daily beats 2 hours on weekends every time.",
      nextStep: "Pick 1–2 pieces you've always wanted to play, slightly above your current comfort zone. Work backwards to find pieces that build the skills you need to get there.",
      focusTags: ['Repertoire you love', 'Consistency', 'Expressive playing'],
    },
    exam: {
      headline: 'Working towards an exam',
      msg: "Exam preparation is highly structured — which is actually great. The syllabus tells you exactly what to learn. Your weak domains are exactly what examiners test, so targeting them directly is the fastest path to a good result.",
      nextStep: "Identify your realistic starting grade first. Build a 3–6 month plan: technical work (scales + exercises) + repertoire (1 piece per list) + sight-reading weekly.",
      focusTags: ['Technical work', 'Syllabus repertoire', 'Sight-reading weekly'],
    },
    perform: {
      headline: 'Building a performance repertoire',
      msg: "Performing well requires pieces you can play with confidence, not just accuracy. Build a small repertoire of 3–5 pieces you know deeply — slightly below your maximum ability.",
      nextStep: "Choose pieces slightly easier than your hardest level. Polish each one for 4–6 weeks before moving on. Ear training and musical expression matter most here.",
      focusTags: ['Polished repertoire', 'Musical expression', 'Confidence under pressure'],
    },
    teach: {
      headline: 'Learning to guide someone else',
      msg: "To teach effectively you need to be a few steps ahead — not advanced, just clear and patient. Understanding theory and structure is more important than technical perfection.",
      nextStep: "Focus on theory literacy and simple, recognisable repertoire. Being able to explain concepts clearly matters more than playing impressively.",
      focusTags: ['Theory literacy', 'Simple clear repertoire', 'Understanding structure'],
    },
  };
  const pmsg = purposeMessages[purpose] || purposeMessages.hobby;

  // Corpus picks — matched to level and weakest domain focus
  const gradeMap = {
    'G4-G5': ['G3','G4','G5'],
    'G2-G3': ['G2','G3','G4'],
    'G1-G2': ['G1','G2','G3'],
    'Prelim': ['Prelim','G1','G2'],
  };
  const targetGrades = gradeMap[levelKey] || ['G1','G2'];
  let pool = CORPUS.filter(p => targetGrades.includes(p._gradeKey));

  // Domain-specific focus filtering
  const weakId = weakest[0].id;
  let filteredPool = pool;
  if (weakId === 'technique') {
    filteredPool = pool.filter(p =>
      (p.focus||[]).some(f => /finger|scale|coordination|articulation|independence|staccato|legato|control/i.test(f))
    );
  } else if (weakId === 'ear') {
    filteredPool = pool.filter(p =>
      p.era === 'Baroque' || p.era === 'Classical' ||
      (p.focus||[]).some(f => /melodic|cantabile|lyric|listening|phrasing|singing/i.test(f))
    );
  } else if (weakId === 'theory') {
    filteredPool = pool.filter(p =>
      p.era === 'Baroque' || p.era === 'Classical' ||
      (p.focus||[]).some(f => /structure|form|cadence|harmony|keyboard clarity|Bach/i.test(f))
    );
  } else if (weakId === 'sightreading') {
    filteredPool = pool.filter(p =>
      (p.focus||[]).some(f => /rhythmic|pulse|counting|sight|reading|steady/i.test(f)) ||
      p.era === 'Classical' || p.era === 'Baroque'
    );
  }
  if (filteredPool.length < 6) filteredPool = pool;

  // Era-diverse picks
  const picked = [];
  const usedEras = new Set();
  for (const p of shuffle(filteredPool)) {
    if (picked.length >= 6) break;
    if (!usedEras.has(p.era) || picked.length < 3) { picked.push(p); usedEras.add(p.era); }
  }
  for (const p of shuffle(filteredPool)) {
    if (picked.length >= 6) break;
    if (!picked.includes(p)) picked.push(p);
  }

  // Domain-specific practice tips
  const domainTips = {
    technique: {
      title: 'Technique',
      tips: [
        'Practise scales hands separately at first — slow and even.',
        'Use finger independence exercises: hold 1-2-3 down, lift only finger 4.',
        'Record yourself and listen back — are dynamics and articulation intentional?',
        'Work on one hand at a time before combining.',
      ],
    },
    ear: {
      title: 'Ear Training',
      tips: [
        'Sing back short melodic patterns before playing them.',
        'Listen actively: identify major vs minor in songs you hear daily.',
        'Play a note and sing it before pressing — connect sound to muscle memory.',
        'Practise interval recognition with an app (Teoria.com is free).',
      ],
    },
    theory: {
      title: 'Music Theory',
      tips: [
        'Learn the Circle of Fifths — it unlocks key signatures permanently.',
        'Label every note name in a bar before playing it.',
        'Study the structure of pieces you already know: where does the A section end?',
        'Spend 5 minutes per session on just theory — flashcards for note names.',
      ],
    },
    sightreading: {
      title: 'Sight-Reading',
      tips: [
        'Before playing anything new: scan key sig, time sig, and hardest bars.',
        'Keep going no matter what — stopping to fix is the biggest sight-reading mistake.',
        'Practise sight-reading something new every single day (5 min is enough).',
        'Use the "look ahead" technique: your eyes should be 1 bar ahead of your hands.',
      ],
    },
  };

  // Roadmap (personalised to weakest 2 domains)
  const roadmap = [
    {
      week: 'Week 1–2', phase: 'Reactivation',
      color: '#2d1e10', accent: '#d4956a',
      tasks: [
        `Focus on ${weakest[0].label}: ${domainTips[weakest[0].id].tips[0]}`,
        'Learn one piece hands separately — no rushing to put them together yet.',
        'Spend 5 min each session just listening to pieces at your target level.',
      ],
    },
    {
      week: 'Week 3–4', phase: 'Foundation',
      color: '#0d1e33', accent: '#7c9fd4',
      tasks: [
        `Continue ${weakest[0].label}: ${domainTips[weakest[0].id].tips[1]}`,
        `Start working on ${weakest[1].label}: ${domainTips[weakest[1].id].tips[0]}`,
        'Hands together on the bars you know — very slowly.',
      ],
    },
    {
      week: 'Week 5–6', phase: 'Building',
      color: '#0f2010', accent: '#84c484',
      tasks: [
        'Add a second piece — choose one that targets your weak domain.',
        `${domainTips[weakest[0].id].tips[2]}`,
        'Introduce metronome practice: accuracy before speed.',
      ],
    },
    {
      week: 'Week 7–8', phase: 'Consolidation',
      color: '#1e0d2d', accent: '#c084d4',
      tasks: [
        'Run through both pieces start to finish — imperfect is fine.',
        `${domainTips[weakest[1].id].tips[1]}`,
        'Reassess: which domain feels stronger now? Set your next 4-week goal.',
      ],
    },
  ];

  return {
    scores, overallPct, ranked, weakest, strongest,
    levelKey, levelLabel, levelDesc, pmsg,
    pieces: picked.slice(0, 6),
    roadmap, domainTips,
  };
}

/* ─────────────────────────────────────────────
   RADAR CHART (SVG)
───────────────────────────────────────────── */
function RadarChart({ scores }) {
  const size = 200;
  const cx = size / 2, cy = size / 2, r = 72;
  const n = DOMAINS.length;
  const angles = DOMAINS.map((_, i) => (i * 2 * Math.PI / n) - Math.PI / 2);

  const toXY = (angle, radius) => ({
    x: cx + Math.cos(angle) * radius,
    y: cy + Math.sin(angle) * radius,
  });

  // Grid rings
  const rings = [0.25, 0.5, 0.75, 1.0];

  // Data polygon
  const dataPoints = DOMAINS.map((d, i) => {
    const pct = scores[d.id]?.pct / 100 || 0;
    return toXY(angles[i], r * pct);
  });
  const polyStr = dataPoints.map(p => `${p.x},${p.y}`).join(' ');

  // Axis end points
  const axisEnds = angles.map(a => toXY(a, r));

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ display:'block', margin:'0 auto' }}>
      {/* Grid rings */}
      {rings.map((ratio, ri) => {
        const pts = angles.map(a => toXY(a, r * ratio));
        const path = pts.map((p,i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ') + 'Z';
        return <path key={ri} d={path} fill="none" stroke="#333" strokeWidth={0.8} />;
      })}
      {/* Axis lines */}
      {axisEnds.map((pt, i) => (
        <line key={i} x1={cx} y1={cy} x2={pt.x} y2={pt.y} stroke="#444" strokeWidth={0.8} />
      ))}
      {/* Data polygon */}
      <polygon points={polyStr}
        fill="rgba(212,149,106,0.18)" stroke="#d4956a" strokeWidth={1.8}
        strokeLinejoin="round" />
      {/* Data points */}
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={3.5} fill="#d4956a" />
      ))}
      {/* Labels */}
      {DOMAINS.map((d, i) => {
        const pt = toXY(angles[i], r + 18);
        const anchor = pt.x < cx - 5 ? 'end' : pt.x > cx + 5 ? 'start' : 'middle';
        return (
          <text key={i} x={pt.x} y={pt.y + 4} textAnchor={anchor}
            fontSize={9.5} fontWeight={700}
            fill={scores[d.id]?.pct >= 66 ? d.color : '#aaa49e'}>
            {d.icon} {d.label}
          </text>
        );
      })}
      {/* Pct labels on ring */}
      {['25%','50%','75%','100%'].map((label, i) => (
        <text key={i} x={cx + 2} y={cy - r * (i + 1) * 0.25 - 2}
          fontSize={7} fill="#555" textAnchor="middle">{label}</text>
      ))}
    </svg>
  );
}

/* ── Share Result Button ── */
function ShareResultButton({ type, data }) {
  const [copied, setCopied] = React.useState(false);

  function buildUrl() {
    const payload = { type, ...data };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    return window.location.origin + window.location.pathname + '?result=' + encoded;
  }

  function handleShare() {
    const url = buildUrl();
    if (navigator.share) {
      navigator.share({
        title: 'My Piano Diagnosis — Piano Butler',
        text: type === 'returner'
          ? `I just took the Piano Butler skill assessment. My result: ${data.levelLabel} (${data.overallPct}%)`
          : `I just created my Piano Butler learner profile. I want to play: ${data.genreStr}`,
        url,
      }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      }).catch(() => {
        // Fallback: select a temp input
        const inp = document.createElement('input');
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
        setCopied(true);
        setTimeout(() => setCopied(false), 2500);
      });
    }
  }

  return (
    <div style={{ textAlign:'center', marginTop:24, paddingTop:20, borderTop:'1px solid #252525' }}>
      <button onClick={handleShare}
        style={{ padding:'10px 24px', borderRadius:10, border:'1px solid #333',
          background: copied ? '#1e2d1e' : '#242424', color: copied ? '#84c484' : '#888',
          fontSize:13, fontWeight:700, cursor:'pointer', transition:'all 0.2s', fontFamily:'inherit' }}>
        {copied ? '✓ Link copied!' : '🔗 Share my result'}
      </button>
      <p style={{ fontSize:11, color:'#444', marginTop:8 }}>
        Share this link with your teacher or friends
      </p>
    </div>
  );
}

      const q = encodeURIComponent((composer||'').split(',')[0].trim() + ' ' + title + ' piano');
      const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + q + '&type=video&maxResults=1&key=' + YT_API_KEY_D);
      const data = await res.json();
      const item = data.items && data.items[0];
      if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title });
      else setModal(null);
    } catch(e) { setModal(null); }
  }, []);
  const close = React.useCallback(() => setModal(null), []);
  return { modal, open, close };
}

const PHASE_LABELS = ['Background','Purpose','Technique','Ear Training','Theory','Sight-Reading'];

function App() {
  // ── Check for shared result in URL ──
  const [sharedPayload] = useState(() => {
    try {
      const p = new URLSearchParams(window.location.search).get('result');
      if (p) return JSON.parse(decodeURIComponent(escape(atob(p))));
    } catch(e) {}
    return null;
  });

  const [screen, setScreen]         = useState('landing');
  const [background, setBackground] = useState(null);

  // ── Returner state ──
  const [phase, setPhase]           = useState(0); // 0=background,1=purpose,2-5=domains
  const [purpose, setPurpose]       = useState(null);
  const [domainAnswers, setDomainAnswers] = useState({});
  const [qIdx, setQIdx]             = useState(0);
  const [selected, setSelected]     = useState(null);
  const [result, setResult]         = useState(null);
  const [procStep, setProcStep]     = useState(0);
  const [openWeek, setOpenWeek]     = useState(0);

  // ── Beginner state ──
  const [bqIdx, setBqIdx]           = useState(0); // current beginner question index
  const [bAnswers, setBAnswers]     = useState({}); // { qId: value or [values] }
  const [bPendingMulti, setBPendingMulti] = useState([]); // temp multi-select buffer
  const [bResult, setBResult]       = useState(null);

  const currentDomain = phase >= 2 ? DOMAINS[phase - 2] : null;
  const currentQ = currentDomain ? currentDomain.questions[qIdx] : null;

  // Returner progress bar
  const progressPct = (() => {
    const totalQ = 2 + DOMAINS.reduce((a,d) => a + d.questions.length, 0);
    let done = phase;
    if (phase >= 2) done = 2 + (phase - 2) * DOMAINS[0].questions.length + qIdx;
    return Math.round((done / totalQ) * 100);
  })();

  // Processing animation
  useEffect(() => {
    if (screen !== 'processing') return;
    const msgs = ['Reading your answers…','Analysing technique…','Checking ear training…','Reviewing theory…','Mapping sight-reading…','Building your profile…'];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      setProcStep(i);
      if (i >= msgs.length) {
        clearInterval(iv);
        const r = computeResult(background, purpose, domainAnswers);
        try { localStorage.setItem('pb_diagnosis_v1', JSON.stringify({ result:r, background, purpose })); } catch(e){}
        setResult(r);
        setTimeout(() => setScreen('results'), 300);
      }
    }, 480);
    return () => clearInterval(iv);
  }, [screen]);

  const procMsgs = ['Reading your answers…','Analysing technique…','Checking ear training…','Reviewing theory…','Mapping sight-reading…','Building your profile…'];

  const restart = () => {
    setScreen('landing'); setPhase(0); setBackground(null); setPurpose(null);
    setDomainAnswers({}); setQIdx(0); setSelected(null); setResult(null); setProcStep(0);
    setBqIdx(0); setBAnswers({}); setBPendingMulti([]); setBResult(null);
  };

  // ── Returner answer handler ──
  const answerQ = (score) => {
    const newAnswers = { ...domainAnswers, [currentQ.id]: score };
    setDomainAnswers(newAnswers);
    setSelected(score);
    setTimeout(() => {
      setSelected(null);
      if (qIdx < currentDomain.questions.length - 1) {
        setQIdx(qIdx + 1);
      } else {
        if (phase < 2 + DOMAINS.length - 1) {
          setPhase(phase + 1);
          setQIdx(0);
        } else {
          setScreen('processing');
        }
      }
    }, 220);
  };

  const goBack = () => {
    if (qIdx > 0) { setQIdx(qIdx - 1); return; }
    if (phase > 1) { setPhase(phase - 1); setQIdx(DOMAINS[phase-3]?.questions.length - 1 || 0); return; }
    // phase 1 (purpose) — returner landed here directly from landing card, so go back to landing
    if (phase === 1) { setScreen('landing'); setPhase(0); setBackground(null); return; }
  };

  // ── Beginner answer handlers ──
  const bCurrentQ = BEGINNER_QUESTIONS[bqIdx];

  const bAnswerSingle = (value) => {
    const newA = { ...bAnswers, [bCurrentQ.id]: value };
    setBAnswers(newA);
    setTimeout(() => {
      if (bqIdx < BEGINNER_QUESTIONS.length - 1) {
        setBqIdx(bqIdx + 1);
        setBPendingMulti([]);
      } else {
        // Done — compute result
        const r = computeBeginnerResult(newA);
        try { localStorage.setItem('pb_beginner_v1', JSON.stringify({ result:r, answers:newA })); } catch(e){}
        setBResult(r);
        setScreen('beginner_results');
      }
    }, 200);
  };

  const bToggleMulti = (value) => {
    setBPendingMulti(prev =>
      prev.includes(value) ? prev.filter(v => v !== value) : [...prev, value]
    );
  };

  const bConfirmMulti = () => {
    const val = bPendingMulti.length > 0 ? bPendingMulti : ['open'];
    const newA = { ...bAnswers, [bCurrentQ.id]: val };
    setBAnswers(newA);
    setBPendingMulti([]);
    if (bqIdx < BEGINNER_QUESTIONS.length - 1) {
      setBqIdx(bqIdx + 1);
    } else {
      const r = computeBeginnerResult(newA);
      try { localStorage.setItem('pb_beginner_v1', JSON.stringify({ result:r, answers:newA })); } catch(e){}
      setBResult(r);
      setScreen('beginner_results');
    }
  };

  const bGoBack = () => {
    if (bqIdx > 0) { setBqIdx(bqIdx - 1); setBPendingMulti([]); }
    else { setPhase(0); setBackground(null); }
  };

  const bProgressPct = Math.round(((bqIdx + 1) / BEGINNER_QUESTIONS.length) * 100);

  /* ── SHARED RESULT VIEW ── */
  if (sharedPayload) return <SharedResultView payload={sharedPayload} />;

  /* ── LANDING ── */
  if (screen === 'landing') return (
    <div style={{ minHeight:'100vh', background:'#1a1a1a',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'40px 20px', textAlign:'center' }}>
      <a href="index.html" style={{ position:'absolute', top:20, left:20,
        color:'#888880', textDecoration:'none', fontSize:13, fontWeight:600 }}>
        ← Piano Butler
      </a>
      <div style={{ fontSize:52, marginBottom:14 }}>🎹</div>
      <h1 style={{ fontSize:28, fontWeight:900, color:'#e8e3dc', margin:'0 0 14px', maxWidth:480, lineHeight:1.25 }}>
        Where are you on your piano journey?
      </h1>
      <p style={{ fontSize:14, color:'#aaa49e', maxWidth:420, lineHeight:1.7, margin:'0 0 22px' }}>
        Whether you're just starting or picking it back up — this gives you a
        <strong style={{color:'#e8e3dc'}}> clear, honest picture</strong> of where you are and what to do next.
      </p>

      {/* Two clickable path cards */}
      <div style={{ display:'flex', gap:14, justifyContent:'center', flexWrap:'wrap', margin:'0 0 20px', maxWidth:520, width:'100%' }}>
        <button
          onClick={() => { setBackground('beginner'); setBqIdx(0); setBAnswers({}); setBPendingMulti([]); setScreen('beginner_quiz'); }}
          style={{ flex:'1 1 200px', background:'#1e2d1e', border:'2px solid #2a4a2a', borderRadius:14,
            padding:'18px 20px', textAlign:'left', cursor:'pointer', transition:'all 0.18s',
            outline:'none', maxWidth:240 }}
          onMouseOver={e=>{ e.currentTarget.style.borderColor='#84c484'; e.currentTarget.style.background='#1e3320'; }}
          onMouseOut={e=>{ e.currentTarget.style.borderColor='#2a4a2a'; e.currentTarget.style.background='#1e2d1e'; }}>
          <div style={{ fontSize:22, marginBottom:8 }}>🌱</div>
          <div style={{ fontSize:14, fontWeight:800, color:'#84c484', marginBottom:6 }}>First-time learner</div>
          <div style={{ fontSize:12, color:'#666', lineHeight:1.6 }}>
            Tell us what you want to play, your goals, and how you learn best — we'll build your teacher profile.
          </div>
          <div style={{ marginTop:12, fontSize:11, fontWeight:700, color:'#84c484' }}>Start → </div>
        </button>

        <button
          onClick={() => { setBackground('returner'); setScreen('quiz'); setPhase(1); }}
          style={{ flex:'1 1 200px', background:'#2d1e10', border:'2px solid #4a2e10', borderRadius:14,
            padding:'18px 20px', textAlign:'left', cursor:'pointer', transition:'all 0.18s',
            outline:'none', maxWidth:240 }}
          onMouseOver={e=>{ e.currentTarget.style.borderColor='#d4956a'; e.currentTarget.style.background='#321d0a'; }}
          onMouseOut={e=>{ e.currentTarget.style.borderColor='#4a2e10'; e.currentTarget.style.background='#2d1e10'; }}>
          <div style={{ fontSize:22, marginBottom:8 }}>🔄</div>
          <div style={{ fontSize:14, fontWeight:800, color:'#d4956a', marginBottom:6 }}>Returning player</div>
          <div style={{ fontSize:12, color:'#666', lineHeight:1.6 }}>
            4-domain skill assessment across technique, ear, theory, and sight-reading. Know exactly what to rebuild first.
          </div>
          <div style={{ marginTop:12, fontSize:11, fontWeight:700, color:'#d4956a' }}>Start → </div>
        </button>
      </div>

      <p style={{ marginTop:6, fontSize:11, color:'#444' }}>
        Free · No login · 3–5 minutes
      </p>
    </div>
  );

  /* ── PROCESSING ── */
  if (screen === 'processing') return (
    <div style={{ minHeight:'100vh', background:'#1a1a1a',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      textAlign:'center', padding:40 }}>
      <div className="spinning" style={{ width:44, height:44, borderRadius:'50%',
        border:'3px solid #333', borderTopColor:'#d4956a', marginBottom:24 }} />
      <div className="pulsing" style={{ fontSize:14, color:'#aaa49e', fontWeight:600, minHeight:22 }}>
        {procMsgs[Math.min(procStep, procMsgs.length-1)]}
      </div>
      <div style={{ marginTop:24, display:'flex', gap:6 }}>
        {procMsgs.map((_,i)=>(
          <div key={i} style={{ width:6, height:6, borderRadius:'50%',
            background: i < procStep ? '#d4956a' : '#333', transition:'background 0.3s' }} />
        ))}
      </div>
    </div>
  );

  /* ── QUIZ ── */
  if (screen === 'quiz') {
    const Header = () => (
      <div style={{ background:'#1e1e1e', borderBottom:'1px solid #2a2a2a', padding:'14px 20px', position:'sticky', top:0, zIndex:10 }}>
        <div style={{ maxWidth:580, margin:'0 auto' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
            <button onClick={phase === 0 ? () => setScreen('landing') : goBack}
              style={{ background:'none', border:'none', color:'#888', cursor:'pointer', fontSize:13, fontWeight:600, padding:0 }}>
              ← Back
            </button>
            <span style={{ fontSize:11, color:'#555', fontWeight:600 }}>
              {phase < 2 ? PHASE_LABELS[phase] : `${currentDomain.icon} ${currentDomain.label}`}
            </span>
            <span style={{ fontSize:11, color:'#555', fontWeight:600 }}>
              {progressPct}%
            </span>
          </div>
          <div className="prog-track">
            <div className="prog-fill" style={{ width:`${progressPct}%` }} />
          </div>
        </div>
      </div>
    );

    /* Phase 0: Background */
    if (phase === 0) return (
      <div style={{ minHeight:'100vh', background:'#1a1a1a' }}>
        <Header />
        <div style={{ maxWidth:540, margin:'0 auto', padding:'32px 20px' }}>
          <div className="fade-up">
            <h2 style={{ fontSize:22, fontWeight:900, color:'#e8e3dc', margin:'0 0 8px' }}>
              First — a quick question about your background.
            </h2>
            <p style={{ fontSize:13, color:'#888880', margin:'0 0 24px', lineHeight:1.55 }}>
              This changes how we interpret your answers.
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {BACKGROUNDS.map(b => (
                <button key={b.id} className={`choice-btn ${background===b.id?'selected':''}`}
                  onClick={() => {
                    setBackground(b.id);
                    setTimeout(() => {
                      if (b.id === 'beginner') {
                        setBqIdx(0); setBAnswers({}); setBPendingMulti([]);
                        setScreen('beginner_quiz');
                      } else {
                        setPhase(1);
                      }
                    }, 200);
                  }}>
                  <span className="icon">{b.icon}</span>
                  <div>
                    <div className="label">{b.label}</div>
                    <div className="sub">{b.sub}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    /* Phase 1: Purpose */
    if (phase === 1) return (
      <div style={{ minHeight:'100vh', background:'#1a1a1a' }}>
        <Header />
        <div style={{ maxWidth:540, margin:'0 auto', padding:'32px 20px' }}>
          <div className="fade-up">
            <h2 style={{ fontSize:22, fontWeight:900, color:'#e8e3dc', margin:'0 0 8px' }}>
              What's your main reason for learning piano?
            </h2>
            <p style={{ fontSize:13, color:'#888880', margin:'0 0 24px', lineHeight:1.55 }}>
              This shapes your repertoire recommendations and practice priorities.
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {PURPOSES.map(p => (
                <button key={p.id} className={`choice-btn ${purpose===p.id?'selected':''}`}
                  onClick={() => { setPurpose(p.id); setTimeout(()=>setPhase(2), 200); }}>
                  <span className="icon">{p.icon}</span>
                  <div>
                    <div className="label">{p.label}</div>
                    <div className="sub">{p.sub}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );

    /* Phase 2–5: Domain questions */
    if (currentDomain && currentQ) return (
      <div style={{ minHeight:'100vh', background:'#1a1a1a' }}>
        <Header />
        <div style={{ maxWidth:540, margin:'0 auto', padding:'28px 20px' }}>
          <div className="fade-up" key={currentQ.id}>
            {/* Domain header */}
            <div className="domain-header" style={{ background: currentDomain.colorBg, border:`1px solid ${currentDomain.color}33` }}>
              <span style={{ fontSize:24 }}>{currentDomain.icon}</span>
              <div>
                <div style={{ fontSize:12, fontWeight:800, color: currentDomain.color, letterSpacing:'0.05em' }}>
                  {currentDomain.label.toUpperCase()} · Question {qIdx + 1} of {currentDomain.questions.length}
                </div>
                <div style={{ fontSize:11, color:'#666', marginTop:2 }}>{currentDomain.desc}</div>
              </div>
            </div>

            {/* Question */}
            <h2 style={{ fontSize:18, fontWeight:800, color:'#e8e3dc', margin:'0 0 10px', lineHeight:1.4 }}>
              {currentQ.text}
            </h2>
            {currentQ.hint && (
              <div style={{ fontSize:12, color:'#888880', marginBottom:22, padding:'8px 12px',
                background:'#222', borderRadius:8, borderLeft:`3px solid #444`, lineHeight:1.5 }}>
                💡 {currentQ.hint}
              </div>
            )}

            {/* Answer options */}
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {currentQ.options.map((opt, i) => (
                <button key={i}
                  className={`ans-btn ${selected === opt.score && domainAnswers[currentQ.id] === opt.score ? 'selected' : ''}`}
                  onClick={() => answerQ(opt.score)}>
                  <div className="ans-dot" style={
                    selected === opt.score ? { background:'#d4956a', borderColor:'#d4956a' } : {}
                  } />
                  <span>{opt.label}</span>
                </button>
              ))}
            </div>

            {/* Domain progress dots */}
            <div style={{ display:'flex', gap:6, justifyContent:'center', marginTop:24 }}>
              {currentDomain.questions.map((_, i) => (
                <div key={i} style={{ width:6, height:6, borderRadius:'50%',
                  background: i < qIdx ? '#d4956a' : i === qIdx ? '#d4956a' : '#333',
                  opacity: i <= qIdx ? 1 : 0.4 }} />
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ── BEGINNER QUIZ ── */
  if (screen === 'beginner_quiz' && bCurrentQ) {
    const isMulti = bCurrentQ.multi;
    const pending = bPendingMulti;

    return (
      <div style={{ minHeight:'100vh', background:'#1a1a1a' }}>
        {/* Header */}
        <div style={{ background:'#1e1e1e', borderBottom:'1px solid #2a2a2a', padding:'14px 20px', position:'sticky', top:0, zIndex:10 }}>
          <div style={{ maxWidth:580, margin:'0 auto' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <button onClick={bGoBack}
                style={{ background:'none', border:'none', color:'#888', cursor:'pointer', fontSize:13, fontWeight:600, padding:0 }}>
                ← Back
              </button>
              <span style={{ fontSize:11, color:'#555', fontWeight:600 }}>
                🌱 Getting started — {bqIdx + 1} of {BEGINNER_QUESTIONS.length}
              </span>
              <span style={{ fontSize:11, color:'#555', fontWeight:600 }}>{bProgressPct}%</span>
            </div>
            <div className="prog-track">
              <div className="prog-fill" style={{ width:`${bProgressPct}%` }} />
            </div>
          </div>
        </div>

        <div style={{ maxWidth:540, margin:'0 auto', padding:'28px 20px' }}>
          <div className="fade-up" key={bCurrentQ.id}>

            {/* Question */}
            <h2 style={{ fontSize:19, fontWeight:900, color:'#e8e3dc', margin:'0 0 10px', lineHeight:1.4 }}>
              {bCurrentQ.text}
            </h2>
            {bCurrentQ.hint && (
              <div style={{ fontSize:12, color:'#888880', marginBottom:20, padding:'8px 12px',
                background:'#222', borderRadius:8, borderLeft:'3px solid #444', lineHeight:1.5 }}>
                💡 {bCurrentQ.hint}
              </div>
            )}
            {isMulti && (
              <div style={{ fontSize:11, color:'#d4956a', fontWeight:700, marginBottom:14, background:'#2d1e10',
                padding:'6px 12px', borderRadius:7, display:'inline-block' }}>
                Select all that apply
              </div>
            )}

            {/* Options */}
            <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
              {bCurrentQ.options.map((opt, i) => {
                const isSelected = isMulti
                  ? pending.includes(opt.value)
                  : bAnswers[bCurrentQ.id] === opt.value;
                return (
                  <button key={i}
                    className={`choice-btn ${isSelected ? 'selected' : ''}`}
                    onClick={() => isMulti ? bToggleMulti(opt.value) : bAnswerSingle(opt.value)}>
                    <span className="icon" style={{ fontSize:18 }}>{opt.icon}</span>
                    <div style={{ flex:1 }}>
                      <div className="label" style={{ fontSize:14 }}>{opt.label}</div>
                    </div>
                    {isMulti && (
                      <div style={{ width:18, height:18, borderRadius:4, flexShrink:0, marginTop:2,
                        border:`2px solid ${isSelected ? '#d4956a' : '#555'}`,
                        background: isSelected ? '#d4956a' : 'transparent',
                        display:'flex', alignItems:'center', justifyContent:'center' }}>
                        {isSelected && <span style={{ fontSize:11, color:'#1a1a1a', fontWeight:900 }}>✓</span>}
                      </div>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Multi confirm button */}
            {isMulti && (
              <button onClick={bConfirmMulti}
                style={{ marginTop:18, width:'100%', padding:'13px', borderRadius:11,
                  border:'none', background: pending.length > 0 ? '#d4956a' : '#333',
                  color: pending.length > 0 ? '#1a1a1a' : '#666',
                  fontWeight:800, fontSize:14, cursor:'pointer', transition:'all 0.2s' }}>
                {pending.length > 0 ? `Continue with ${pending.length} selected →` : 'Skip — I\'m not sure yet →'}
              </button>
            )}

            {/* Step dots */}
            <div style={{ display:'flex', gap:5, justifyContent:'center', marginTop:22 }}>
              {BEGINNER_QUESTIONS.map((_, i) => (
                <div key={i} style={{ width:5, height:5, borderRadius:'50%',
                  background: i < bqIdx ? '#d4956a' : i === bqIdx ? '#d4956a' : '#333',
                  opacity: i <= bqIdx ? 1 : 0.35 }} />
              ))}
            </div>

          </div>
        </div>
      </div>
    );
  }

  /* ── BEGINNER RESULTS ── */
  if (screen === 'beginner_results' && bResult) {
    return <BeginnerResults bResult={bResult} onRestart={restart} />;
  }

  /* ── RESULTS ── */
  if (screen === 'results' && result) {
    const { scores, overallPct, weakest, strongest, levelLabel, levelDesc, pmsg, pieces, roadmap, ranked } = result;

    const levelColor = overallPct >= 66 ? '#84c484' : overallPct >= 40 ? '#d4956a' : '#c84b4b';

    return (
      <div style={{ minHeight:'100vh', background:'#1a1a1a' }}>
        {/* Nav */}
        <div style={{ background:'#1e1e1e', borderBottom:'1px solid #2a2a2a',
          padding:'14px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <a href="index.html" style={{ color:'#888', textDecoration:'none', fontSize:13, fontWeight:600 }}>
            ← Piano Butler
          </a>
          <span style={{ fontSize:12, color:'#555', fontWeight:600 }}>Your diagnosis</span>
          <button onClick={restart}
            style={{ background:'none', border:'1px solid #333', borderRadius:8, color:'#888',
              fontSize:12, fontWeight:600, padding:'5px 12px', cursor:'pointer' }}>
            Retake
          </button>
        </div>

        <div style={{ maxWidth:620, margin:'0 auto', padding:'24px 16px 60px' }}>

          {/* ── Section 1: Summary ── */}
          <div className="result-card fade-up" style={{ textAlign:'center', paddingBottom:24 }}>
            <div style={{ fontSize:11, fontWeight:800, color:'#555', letterSpacing:'0.08em', marginBottom:10 }}>
              YOUR RESULT
            </div>
            <div style={{ display:'inline-block', padding:'6px 18px', borderRadius:20,
              background: overallPct >= 66 ? '#0f2010' : overallPct >= 40 ? '#2d1e10' : '#2a0a0a',
              border:`1.5px solid ${levelColor}`, marginBottom:12 }}>
              <span style={{ fontSize:13, fontWeight:800, color:levelColor }}>{levelLabel}</span>
            </div>
            <p style={{ fontSize:13, color:'#aaa49e', lineHeight:1.65, maxWidth:460, margin:'0 auto 18px', textAlign:'left' }}>
              {levelDesc}
            </p>

            {/* Radar + bars side by side */}
            <div style={{ display:'flex', gap:20, alignItems:'flex-start', flexWrap:'wrap' }}>
              <div style={{ flex:'0 0 auto' }}>
                <RadarChart scores={scores} />
              </div>
              <div style={{ flex:1, minWidth:200, textAlign:'left', paddingTop:8 }}>
                {DOMAINS.map(d => (
                  <ScoreBar key={d.id} domain={d} score={scores[d.id]} />
                ))}
              </div>
            </div>
          </div>

          {/* ── Section 2: Weak / Strong ── */}
          <div className="result-card fade-up" style={{ animationDelay:'0.1s' }}>
            <div style={{ fontSize:11, fontWeight:800, color:'#555', letterSpacing:'0.08em', marginBottom:12 }}>
              WHAT THIS MEANS
            </div>

            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#c84b4b', marginBottom:6 }}>
                ⚡ Focus here first
              </div>
              {weakest.map(d => (
                <div key={d.id} style={{ marginBottom:10 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:4 }}>
                    <span style={{ fontSize:15 }}>{d.icon}</span>
                    <span style={{ fontSize:13, fontWeight:700, color:d.color }}>{d.label}</span>
                    <span style={{ fontSize:11, color:'#555' }}>({scores[d.id].pct}%)</span>
                  </div>
                  <ul style={{ margin:0, paddingLeft:20 }}>
                    {result.domainTips[d.id].tips.slice(0,2).map((tip,i) => (
                      <li key={i} style={{ fontSize:12, color:'#aaa49e', lineHeight:1.6 }}>{tip}</li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>

            <div style={{ borderTop:'1px solid #2a2a2a', paddingTop:12 }}>
              <div style={{ fontSize:12, fontWeight:700, color:'#84c484', marginBottom:6 }}>
                ✓ Your strongest area — {strongest.icon} {strongest.label}
              </div>
              <p style={{ fontSize:12, color:'#666', margin:0, lineHeight:1.6 }}>
                {scores[strongest.id].pct}% — use this as your anchor. Pieces that showcase {strongest.label.toLowerCase()} will feel most natural to learn from.
              </p>
            </div>
          </div>

          {/* ── Section 3: Purpose message ── */}
          <div className="result-card fade-up" style={{ animationDelay:'0.15s', borderColor:'#d4956a33' }}>
            <div style={{ fontSize:11, fontWeight:800, color:'#d4956a', letterSpacing:'0.08em', marginBottom:8 }}>
              YOUR GOAL
            </div>
            <div style={{ fontSize:16, fontWeight:800, color:'#e8e3dc', marginBottom:8 }}>{pmsg.headline}</div>
            <p style={{ fontSize:13, color:'#aaa49e', lineHeight:1.65, margin:'0 0 14px' }}>{pmsg.msg}</p>
            <div style={{ background:'#2d1e10', borderLeft:'3px solid #d4956a', borderRadius:'0 8px 8px 0',
              padding:'10px 14px' }}>
              <div style={{ fontSize:11, fontWeight:800, color:'#d4956a', marginBottom:4 }}>NEXT STEP</div>
              <div style={{ fontSize:12, color:'#c0a080', lineHeight:1.6 }}>{pmsg.nextStep}</div>
            </div>
          </div>

          {/* ── Section 4: 8-Week Roadmap ── */}
          <div className="result-card fade-up" style={{ animationDelay:'0.2s' }}>
            <div style={{ fontSize:11, fontWeight:800, color:'#555', letterSpacing:'0.08em', marginBottom:14 }}>
              YOUR 8-WEEK PRACTICE ROADMAP
            </div>
            {roadmap.map((w, wi) => (
              <div key={wi}
                className="roadmap-week"
                style={{ background: w.color, borderLeftColor: w.accent, cursor:'pointer',
                  borderBottom: wi < roadmap.length-1 ? '1px solid #1a1a1a' : 'none',
                  borderRadius: wi===0 ? '10px 10px 0 0' : wi===roadmap.length-1 ? '0 0 10px 10px' : 0 }}
                onClick={() => setOpenWeek(openWeek === wi ? -1 : wi)}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div>
                    <div style={{ fontSize:11, fontWeight:800, color: w.accent }}>{w.week}</div>
                    <div style={{ fontSize:14, fontWeight:700, color:'#e8e3dc' }}>{w.phase}</div>
                  </div>
                  <span style={{ color:'#555', fontSize:16 }}>{openWeek === wi ? '▲' : '▼'}</span>
                </div>
                {openWeek === wi && (
                  <ul style={{ marginTop:10, paddingLeft:18, marginBottom:0 }}>
                    {w.tasks.map((t, ti) => (
                      <li key={ti} style={{ fontSize:12, color:'#c0b8b0', lineHeight:1.7, marginBottom:2 }}>{t}</li>
                    ))}
                  </ul>
                )}
              </div>
            ))}
          </div>

          {/* ── Section 5: Recommended pieces ── */}
          <div className="result-card fade-up" style={{ animationDelay:'0.25s' }}>
            <div style={{ fontSize:11, fontWeight:800, color:'#555', letterSpacing:'0.08em', marginBottom:4 }}>
              RECOMMENDED PIECES — MATCHED TO YOU
            </div>
            <p style={{ fontSize:11, color:'#555', margin:'0 0 14px' }}>
              Selected for your level and your weakest domain — {weakest[0].label.toLowerCase()}.
            </p>
            {pieces.map((p, i) => <PieceCard key={i} piece={p} idx={i} />)}
            <a href="index.html"
              style={{ display:'block', textAlign:'center', marginTop:14, fontSize:13,
                color:'#d4956a', fontWeight:700, textDecoration:'none' }}>
              Browse all 4,500 pieces on Piano Butler →
            </a>
          </div>

          {/* ── CTA ── */}
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center', marginTop:8 }}>
            <a href="index.html" className="cta-primary">
              🎹 Browse repertoire
            </a>
            <a href="recommend.html" className="cta-ghost">
              Get piece recommendations
            </a>
          </div>

          {/* ── Share result ── */}
          <ShareResultButton type="returner" data={{ scores, levelLabel, overallPct,
            weakest: weakest.map(d=>d.id), strongest: [strongest.id],
            pieces: pieces.map(p=>({ c:p.c, t:p.t, era:p.era, grade:p._grade||'' })) }} />

        </div>
      </div>
    );
  }

  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ padding:40, color:'#e8e3dc', fontFamily:'monospace', background:'#1a1a1a', minHeight:'100vh' }}>
        <h2 style={{ color:'#c84b4b' }}>Something went wrong</h2>
        <pre style={{ fontSize:12, color:'#888', whiteSpace:'pre-wrap' }}>{this.state.error.message}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
