/* ══════════════════════════════════════════

══════════════════════════════════════════ */
function scoreDomain(answers, domainId) {
  const qs = QUESTIONS.filter(q => q.domain === domainId);
  return qs.reduce((sum, q) => sum + (answers[q.id] || 0), 0);
}

function bandFor(score) {
  if (score >= 13) return { label: 'Strong',      cls: 'band-strong',     emoji: '✨' };
  if (score >= 8)  return { label: 'Developing',  cls: 'band-developing', emoji: '📈' };
  return               { label: 'Needs work',  cls: 'band-needs',      emoji: '🔧' };
}

// Estimated equivalent level (by-product, not primary framing)
function estimatedLevel(scores) {
  const avg = Object.values(scores).reduce((a,b)=>a+b,0) / 4;
  if (avg >= 15) return 'Diploma / Advanced';
  if (avg >= 13) return 'Grade 7–8';
  if (avg >= 11) return 'Grade 5–6';
  if (avg >= 9)  return 'Grade 3–4';
  if (avg >= 7)  return 'Grade 1–2';
  return 'Beginner / Prelim';
}

/* ══════════════════════════════════════════
   REPERTOIRE MATCHING
   Weak domain → filter logic on CORPUS
══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickPieces(domain, bandLabel, count = 4) {
  // Grade range filter: limit to early–mid grades so results are practical
  const practicalGrades = ['Prelim','G1','G2','G3','G4','G5','Initial'];
  let pool = CORPUS.filter(p => practicalGrades.includes(p._gradeKey));

  if (domain === 'ear') {
    // Clear melodic lines, simple harmony → Baroque or Classical, lyrical focus
    pool = pool.filter(p =>
      p.era === 'Baroque' || p.era === 'Classical' ||
      (p.focus||[]).some(f => /melodic|cantabile|singing|lyric|melody|simple|clear/i.test(f))
    );
  } else if (domain === 'sight') {
    // Shorter pieces, familiar styles, lower rhythmic complexity → Baroque, Classical
    pool = pool.filter(p =>
      p.era === 'Baroque' || p.era === 'Classical' ||
      (p.focus||[]).some(f => /rhythm|reading|pulse|steady|hand coordination|independence/i.test(f))
    );
  } else if (domain === 'technique') {
    // Focus tag match — études, technical pieces
    pool = pool.filter(p =>
      (p.focus||[]).some(f => /scale|finger|articulation|pedal|evenness|velocity|touch|legato|staccato|etude|étude|technical|tone/i.test(f))
    );
  } else if (domain === 'theory') {
    // Strong structural clarity → Bach, Mozart, Haydn, Beethoven
    pool = pool.filter(p =>
      /BACH|MOZART|HAYDN|BEETHOVEN|HANDEL|SCARLATTI/i.test(p.c) ||
      p.era === 'Baroque' || p.era === 'Classical'
    );
  }

  // Shuffle and pick, ensuring variety across eras
  const picked = [];
  const usedEras = new Set();
  const shuffled = shuffle(pool);
  for (const p of shuffled) {
    if (picked.length >= count) break;
    if (!usedEras.has(p.era) || picked.length < 2) {
      picked.push(p);
      usedEras.add(p.era);
    }
  }
  // Fill up if not enough variety
  if (picked.length < count) {
    for (const p of shuffled) {
      if (picked.length >= count) break;
      if (!picked.includes(p)) picked.push(p);
    }
  }
  return picked.slice(0, count);
}

   SVG RADAR CHART
   4-axis diamond layout
══════════════════════════════════════════ */
function RadarChart({ scores }) {
  const size = 220;
  const cx = size / 2;
  const cy = size / 2;
  const maxR = 80;

  // 4 axes: top=Ear, right=Sight, bottom=Technique, left=Theory
  const axes = [
    { domain: 'ear',       angle: -90, label: '🎵 Ear'        },
    { domain: 'sight',     angle:   0, label: '👁️ Sight'       },
    { domain: 'technique', angle:  90, label: '🎹 Technique'   },
    { domain: 'theory',    angle: 180, label: '🧠 Theory'      },
  ];

  const toXY = (angle, r) => {
    const rad = (angle * Math.PI) / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  };

  // Grid rings at 25%, 50%, 75%, 100%
  const gridRings = [0.25, 0.5, 0.75, 1.0].map(frac => {
    const pts = axes.map(a => {
      const p = toXY(a.angle, maxR * frac);
      return `${p.x},${p.y}`;
    });
    return pts.join(' ');
  });

  // Data polygon
  const dataPoints = axes.map(a => {
    const score = scores[a.domain] || 0;
    const frac = score / 16;
    return toXY(a.angle, maxR * frac);
  });
  const dataPath = dataPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ') + 'Z';

  // Axis lines
  const axisLines = axes.map(a => {
    const end = toXY(a.angle, maxR);
    return { x1: cx, y1: cy, x2: end.x, y2: end.y };
  });

  // Labels (positioned outside the chart)
  const labelOffset = maxR + 28;
  const labels = axes.map(a => {
    const p = toXY(a.angle, labelOffset);
    const score = scores[a.domain] || 0;
    const band = bandFor(score);
    return { ...p, label: a.label, score, band };
  });

  return (
    <div style={{ position: 'relative', display: 'inline-block' }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {/* Grid rings */}
        {gridRings.map((pts, i) => (
          <polygon key={i} points={pts} fill="none"
            stroke={i === 3 ? '#c7d2fe' : '#e2e8f0'}
            strokeWidth={i === 3 ? 1.5 : 1}
            strokeDasharray={i < 3 ? '3,3' : 'none'} />
        ))}

        {/* Axis lines */}
        {axisLines.map((l, i) => (
          <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
            stroke="#cbd5e1" strokeWidth="1" />
        ))}

        {/* Data polygon */}
        <path d={dataPath} fill="rgba(79,70,229,0.18)" stroke="#4f46e5" strokeWidth="2.5"
          strokeLinejoin="round" />

        {/* Data point dots */}
        {dataPoints.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y} r="5"
            fill="#4f46e5" stroke="#fff" strokeWidth="2" />
        ))}

        {/* Score labels near axes */}
        {labels.map((l, i) => (
          <g key={i}>
            <text x={l.x} y={l.y - 4} textAnchor="middle"
              fontSize="10" fontWeight="700" fill="#374151">
              {l.label}
            </text>
            <text x={l.x} y={l.y + 10} textAnchor="middle"
              fontSize="11" fontWeight="800" fill="#4f46e5">
              {l.score}/16
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

                        </span>
                        <span className={`${b.cls}`}
                          style={{ fontSize:10, fontWeight:700, padding:'1px 7px', borderRadius:8 }}>
                          {b.emoji} {b.label}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Top weaknesses ── */}
          {needsDomains.length > 0 && (
            <div style={{ background:'#fff', borderRadius:20, padding:'24px 20px',
              marginBottom:20, boxShadow:'0 2px 12px rgba(0,0,0,0.05)' }}>
              <h2 style={{ fontSize:16, fontWeight:800, color:'#1e293b', margin:'0 0 16px' }}>
                🔧 Where to focus next
              </h2>
              {sortedDomains.filter(d => bands[d.id].label !== 'Strong').slice(0,2).map((d, idx) => {
                const tip = WEAKNESS_TIPS[d.id];
                const b = bands[d.id];
                return (
                  <div key={d.id} className="fade-up"
                    style={{ animationDelay:`${idx * 0.1}s`, marginBottom:18,
                      borderRadius:14, border:`1.5px solid ${d.border}`,
                      background: d.bg, padding:'16px 18px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                      <span style={{ fontSize:22 }}>{d.emoji}</span>
                      <div>
                        <span style={{ fontSize:14, fontWeight:800, color: d.color }}>
                          {d.label}
                        </span>
                        <span className={b.cls}
                          style={{ fontSize:10, fontWeight:700, padding:'1px 7px', borderRadius:8,
                            marginLeft:8 }}>
                          {b.emoji} {b.label}
                        </span>
                      </div>
                    </div>
                    <p style={{ fontSize:13, color:'#374151', lineHeight:1.6, margin:'0 0 8px' }}>
                      <strong>What this means:</strong> {tip.what}
                    </p>
                    <p style={{ fontSize:13, color:'#374151', lineHeight:1.6, margin:0 }}>
                      <strong>Quick fix:</strong> {tip.how}
                    </p>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Recommended pieces ── */}
          {weakest.length > 0 && (
            <div style={{ background:'#fff', borderRadius:20, padding:'24px 20px',
              marginBottom:20, boxShadow:'0 2px 12px rgba(0,0,0,0.05)' }}>
              <h2 style={{ fontSize:16, fontWeight:800, color:'#1e293b', margin:'0 0 6px' }}>
                🎼 Pieces matched to your profile
              </h2>
              <p style={{ fontSize:13, color:'#64748b', margin:'0 0 18px' }}>
                Selected from 4,501 pieces — matched to your development areas.
              </p>
              {weakest.map(did => {
                const d = domainOf(did);
                const tip = WEAKNESS_TIPS[did];
                const pieces = recs[did] || [];
                if (!pieces.length) return null;
                return (
                  <div key={did} style={{ marginBottom:22 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:10 }}>
                      <span style={{ fontSize:16 }}>{d.emoji}</span>
                      <span style={{ fontSize:13, fontWeight:700, color: d.color }}>
                        For {d.label} — {tip.pieces.split('—')[0].trim()}
                      </span>
                    </div>
                    {pieces.map((p, i) => (
                      <PieceCard key={i} piece={p}
                        reason={(() => {
                          if (did === 'ear') return 'Clear melody, simple harmony — easy to hear and sing back';
                          if (did === 'sight') return 'Short, predictable structure — good for reading practice';
                          if (did === 'technique') return 'Technical focus keywords match your development area';
                          return 'Clear structural logic — great for building theory awareness';
                        })()} />
                    ))}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── CTAs ── */}
          <div style={{ background:'linear-gradient(135deg,#1e1b4b,#312e81)', borderRadius:20,
            padding:'28px 24px', textAlign:'center', marginBottom:20 }}>
            <div style={{ fontSize:28, marginBottom:10 }}>📋</div>
            <h3 style={{ fontSize:17, fontWeight:800, color:'#fff', margin:'0 0 8px' }}>
              Want the full picture?
            </h3>
            <p style={{ fontSize:13, color:'rgba(255,255,255,0.75)', lineHeight:1.6, margin:'0 0 20px' }}>
              Full PDF report includes a detailed 6-month practice roadmap,
              a complete graded repertoire list matched to your profile,
              and a personalised teacher match.
            </p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center' }}>
              <button className="cta-gold" onClick={() => setShowModal(true)}>
                📋 Get full report — $4
              </button>
              <a href={`index.html`}
                style={{ padding:'13px 28px', borderRadius:12, fontSize:15, fontWeight:700,
                  cursor:'pointer', border:'2px solid rgba(255,255,255,0.4)',
                  background:'rgba(255,255,255,0.1)', color:'#fff', textDecoration:'none',
                  transition:'all 0.18s', display:'inline-block' }}>
                🔍 Browse all 4,501 pieces
              </a>
            </div>
          </div>

          {/* Strengths callout */}
          {strongDomains.length > 0 && (
            <div style={{ background:'#d1fae5', borderRadius:16, padding:'18px 20px',
              marginBottom:20, border:'1.5px solid #6ee7b7' }}>
              <div style={{ fontSize:14, fontWeight:800, color:'#065f46', marginBottom:6 }}>
                ✨ Your strengths
              </div>
              <div style={{ fontSize:13, color:'#047857', lineHeight:1.6 }}>
                You're already strong in{' '}
                {strongDomains.map(d => `${d.emoji} ${d.label}`).join(' and ')}.
                Keep these sharp by choosing pieces that celebrate what you do well.
              </div>
            </div>
          )}

          {/* Retake */}
          <div style={{ textAlign:'center' }}>
            <button onClick={restart}
              style={{ background:'none', border:'2px solid #c7d2fe', borderRadius:12,
                padding:'11px 24px', color:'#4f46e5', fontWeight:700, cursor:'pointer',
                fontSize:14 }}>
              ↺ Retake diagnosis
            </button>
            <p style={{ fontSize:12, color:'#94a3b8', marginTop:12 }}>
              Results are saved locally — refresh or retake anytime.
            </p>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ padding:40, color:'#dc2626', fontFamily:'monospace' }}>
        <h2>Something went wrong</h2>
        <pre style={{ whiteSpace:'pre-wrap', fontSize:12 }}>{String(this.state.error)}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
