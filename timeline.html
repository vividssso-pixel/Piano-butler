// {grade}/{syllabus} substituted with the chosen grade/syllabus. Kept short and generic —

function getTechnicalWork(syllabus, gradeKey) {

/* ── Per-piece helpers — used to make every phase (not just Technical) reference the

// Separate, shorter copy from viva-voce.html's era content — that page explains eras for
// General Knowledge exam answers; this is a practising cue, a different job entirely.
const ERA_MUSICAL_TIPS = {
  Baroque: 'even touch, light pedal — let the independent lines speak clearly',
  Classical: 'clear phrasing in 2s and 4s, terraced dynamics, poised not rushed',
  Romantic: 'singing tone, purposeful rubato, let the melody lead the pedal',
  Modern: 'exact rhythm and dynamics as written — trust the markings on the page',
  Contemporary: 'exact rhythm and dynamics as written — trust the markings on the page',
};
function pieceLabel(p) { return (p && p.t) ? p.t + (p.c ? ' — ' + p.c : '') : null; }
function namedPieces(pieceObjs) { return (pieceObjs || []).filter(p => p && p.t).map(pieceLabel); }

/* ── Checklist builders — one per phase. Each returns the 3-5 concrete things to do
   this month, cycling through a "stage" array indexed the same way as MONTH_FOCUS[phase]
   so lead sentence and checklist always describe the same month. Piece-aware when the
   student supplied real pieces (uses their era/focus tags from the corpus); generic
   fallback wording otherwise. ── */
function foundationChecklist(monthIdx, pieceObjs, grade) {
  const names = namedPieces(pieceObjs);
  const stages = [
    [names.length ? `Hands-separate read-through: ${names.join(', ')}` : `Choose and confirm your ${grade} exam repertoire`,
     `Skim the ${grade} Technical Work Checklist below so nothing's a surprise later`,
     `Set a weekly practice schedule you can actually keep — see Week by week below`],
    [names.length ? `Hands-together, slow tempo: ${names.join(', ')}` : `Begin hands-together practice, slow tempo, on each piece`,
     `Start a daily scale/arpeggio warm-up for ${grade}`,
     `Flag tricky bars as you find them — don't fix them yet, just note them`],
    [`Bring tempo up gradually, metronome on, no rushing`,
     `Begin daily sight-reading practice at ${grade} level (5–10 min)`,
     `Isolate and repeat last month's flagged bars`],
    [`Full hands-together review of everything learned so far`,
     `Mark the 2–3 trickiest bars per piece for focused work ahead`,
     `Check the scale/arpeggio warm-up — is it becoming automatic yet?`],
  ];

}
function technicalChecklist(monthIdx, tech, grade) {
  if (!tech) {
    return [`${grade} technical preparation — work with your teacher's guidance. AMEB's fixed technical-exercise list applies to Preliminary through Grade 8 only.`];
  }
  const codes = tech.exercises.map(e => e.code).join(', ');
  const hasExtras = tech.sections.length > 1;
  const stages = [
    [`Learn Technical Exercises ${codes} hands-separately`,
     `Begin this grade's required scales — full list in the Technical Work Checklist below`],
    [`Bring the required scales up to full tempo, hands together, metronome on`,
     hasExtras ? `Also work through the other scale/arpeggio groups in the checklist below` : `Keep the tempo steady and even across the full range`,
     `Exercises ${codes} should be memory-secure by month end`],

function musicalChecklist(monthIdx, pieceObjs, grade) {
  const named = (pieceObjs || []).filter(p => p && p.t);
  if (monthIdx === 0) {
    if (named.length) {
      return named.slice(0,3).map(p => {

// Dispatches to the right checklist builder and pairs it with this month's lead sentence

function buildMonthContent(phase, monthIdx, pieceObjs, tech, grade) {
  const leadArr = MONTH_FOCUS[phase] || ['Continue focused practice.'];
  const lead = leadArr[Math.min(monthIdx, leadArr.length-1)];
  let checklist;
  switch (phase) {
    case 'foundation':    checklist = foundationChecklist(monthIdx, pieceObjs, grade); break;
    case 'technical':     checklist = technicalChecklist(monthIdx, tech, grade); break;
    case 'musical':       checklist = musicalChecklist(monthIdx, pieceObjs, grade); break;
    case 'consolidation': checklist = consolidationChecklist(monthIdx, pieceObjs, grade, tech); break;
    case 'polish':        checklist = polishChecklist(monthIdx, pieceObjs, grade); break;
    case 'exam':          checklist = examChecklist(grade); break;

  return { lead, checklist, weekly };

function monthsBetween(startDate, endDate) {
  const allMonths = [];
  const cursor = new Date(startDate); cursor.setDate(1);
  const endD = new Date(endDate); endD.setDate(1);
  while (cursor <= endD) {
    allMonths.push({ monthStr: cursor.toISOString().slice(0,7),
      label: cursor.toLocaleDateString('en-AU',{month:'short',year:'numeric'}) });
    cursor.setMonth(cursor.getMonth()+1);
  }
  return allMonths;
}

// Builds an explicit phase-per-month assignment based on how many months are actually
// available, rather than fixed percentage cutoffs (which duplicate phase labels on
// short timelines). Lower readiness compresses the early phases since less is "done"
// already; the exam month is always the last month.
function allocatePhases(total, readinessScore) {
  const readinessRatio = (readinessScore - 4) / 12; // 0 (least ready) .. 1 (most ready)
  const lowReadiness = readinessRatio < 0.4;

  if (total <= 1) return ['exam'];
  if (total === 2) return ['polish','exam'];
  if (total === 3) return lowReadiness ? ['technical','consolidation','exam'] : ['consolidation','polish','exam'];
  if (total === 4) return lowReadiness ? ['technical','musical','consolidation','exam'] : ['foundation','consolidation','polish','exam'];
  if (total === 5) return lowReadiness
    ? ['foundation','technical','musical','consolidation','exam']
    : ['foundation','technical','consolidation','polish','exam'];
  if (total === 6) return ['foundation','technical','musical','consolidation','polish','exam'];

  // 7+ months: build proportionally, then guarantee every phase gets ≥1 month and exam is last.
  const nonExam = total - 1;
  const weights = lowReadiness
    ? { foundation:0.22, technical:0.22, musical:0.18, consolidation:0.20, polish:0.18 }
    : { foundation:0.16, technical:0.20, musical:0.18, consolidation:0.24, polish:0.22 };
  const order = ['foundation','technical','musical','consolidation','polish'];
  let counts = order.map(k => Math.max(1, Math.round(weights[k]*nonExam)));
  let diff = nonExam - counts.reduce((a,b)=>a+b,0);
  let idx = counts.length - 1;
  while (diff !== 0) {
    counts[idx] = Math.max(1, counts[idx] + (diff > 0 ? 1 : -1));
    diff += diff > 0 ? -1 : 1;
    idx = (idx - 1 + counts.length) % counts.length;
  }
  const seq = [];
  order.forEach((k,i) => { for (let n=0;n<counts[i];n++) seq.push(k); });
  seq.push('exam');
  return seq;
}

function fillTemplate(str, vars) {
  return str.replace(/\{(\w+)\}/g, (m,k) => (vars[k] !== undefined && vars[k] !== '') ? vars[k] : m);
}

function buildTimeline(examDate, readinessScore, gradeLabel, syllabus, userPieces, gradeKey) {
  const today = new Date(); today.setHours(12,0,0,0);
  const end = new Date(examDate + 'T12:00:00');
  if (isNaN(end.getTime()) || end <= today) return [];

  const allMonths = monthsBetween(today, end);
  const total = allMonths.length;
  if (total === 0) return [];

  const phaseSeq = allocatePhases(total, readinessScore);
  const vars = { grade: gradeLabel || 'this grade', syllabus: syllabus || '' };
  const pieceObjs = (userPieces || []).filter(p => p && p.t).slice(0,4);

  const tech = getTechnicalWork(syllabus, gradeKey);

  // Cycle of distinct suffixes appended once a phase's MONTH_FOCUS strings run out, so
  // long timelines (beyond ~17 months) never show the exact same paragraph two months
  // running — each repeat lap gets a different suffix before the cycle itself repeats.
  const OVERFLOW_SUFFIXES = [
    ' Keep going at this pace — steady repetition is what builds reliability here.',
    ' Use this extra time to deepen accuracy rather than rushing ahead.',
    ' Revisit anything that still feels uneven before moving on.',
  ];

  const phaseCounter = {};
  return allMonths.map((m,i) => {
    const phase = phaseSeq[i] || 'exam';
    const count = phaseCounter[phase] = (phaseCounter[phase] || 0);
    const content = buildMonthContent(phase, count, pieceObjs, tech, gradeLabel || 'this grade');
    const leadArr = MONTH_FOCUS[phase] || [''];
    let lead = content.lead;
    if (count >= leadArr.length) {
      const lap = count - leadArr.length;
      lead = lead + OVERFLOW_SUFFIXES[lap % OVERFLOW_SUFFIXES.length];
    }
    phaseCounter[phase]++;
    return { ...m, phase, focus: fillTemplate(lead, vars), checklist: content.checklist, weekly: content.weekly };
  });
}

function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); const end = new Date(dateStr + 'T12:00:00');
  return Math.max((end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth()), 0);
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = Math.ceil((new Date(dateStr+'T12:00:00') - new Date()) / (1000*60*60*24));
  return Math.max(diff, 0);
}

/* ── Repertoire picks for the chosen grade (light-weight, deterministic-ish) ── */
function pickRepertoire(syllabus, gradeKey) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey && p._type !== 'Leisure');
  if (pool.length === 0) return [];
  const byList = {};
  pool.forEach(p => { const l = p.l || p.grp || 'Open'; (byList[l] = byList[l]||[]).push(p); });
  const picks = [];
  Object.keys(byList).sort().forEach(l => {
    const arr = byList[l];
    picks.push(arr[Math.floor(Math.random()*arr.length)]);
  });
  return picks.slice(0,4);
}

/* ── Piece search for the chosen syllabus + grade (used by PieceInput) ── */
function searchGradePieces(syllabus, gradeKey, query) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey);
  if (!query || query.trim().length < 1) return [];
  const q = query.trim().toLowerCase();
  return pool.filter(p => (p.t||'').toLowerCase().includes(q) || (p.c||'').toLowerCase().includes(q)).slice(0,8);
}

// Grouped browse list for the chosen grade — lets a student pick a piece by tapping
// through the list instead of having to know/type the exact title. Excludes Leisure
// (this tool is for exam preparation) and groups by List A/B/C/D so it's scannable.
function browseGradePieces(syllabus, gradeKey) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey && p._type !== 'Leisure');
  const byList = {};
  pool.forEach(p => { const l = p.l || p.grp || 'Open'; (byList[l] = byList[l] || []).push(p); });
  const order = ['A','B','C','D','Collab','Open'];
  return order
    .filter(k => byList[k] && byList[k].length)
    .map(k => ({ list: k, pieces: byList[k].slice().sort((a,b) => (a.c||'').localeCompare(b.c||'')) }));
}

function PieceInput({ syllabus, gradeKey, pieces, setPieces, onContinue, onSkip, onBack }) {
  const [query, setQuery] = useState('');
  const [activeSlot, setActiveSlot] = useState(0);
  const suggestions = useMemo(() => searchGradePieces(syllabus, gradeKey, query), [syllabus, gradeKey, query]);
  const browseGroups = useMemo(() => browseGradePieces(syllabus, gradeKey), [syllabus, gradeKey]);
  const isSearching = query.trim().length > 0;

  function choose(p) {
    const next = pieces.slice();
    next[activeSlot] = p;
    setPieces(next);
    setQuery('');
    setActiveSlot(Math.min(activeSlot+1, 3));
  }
  function clearSlot(i) {
    const next = pieces.slice();
    next[i] = '';
    setPieces(next);
  }
  const anyFilled = pieces.some(p => !!p);

  return (
    <div className="fade-up">
      <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>What are you actually playing?</h2>

        {[0,1,2,3].map(i => (

            <span style={{fontSize:11,fontWeight:800,color:'#b0a898',width:16}}>{i+1}</span>
            <button onClick={()=>setActiveSlot(i)}
              className={'opt-btn'+(activeSlot===i?' active':'')} style={{padding:'10px 12px',flex:1}}>
              <span style={{fontSize:12.5,fontWeight:pieces[i]?700:500,color:pieces[i]?'#1a1410':'#b0a898'}}>
                {pieces[i] ? (pieces[i].t + (pieces[i].c ? ' — ' + pieces[i].c : '')) : 'Tap to search & choose a piece'}
              </span>
            </button>
            {pieces[i] && (
              <button onClick={()=>clearSlot(i)} style={{background:'none',border:'none',color:'#b0a898',cursor:'pointer',fontSize:14,padding:4}}>✕</button>
            )}
          </div>
        ))}
      </div>

      <input type="text" placeholder="Search composer or title, or just browse below…" value={query} onChange={e=>setQuery(e.target.value)}
        style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid #e0d8d0',fontSize:13,outline:'none'}} />

      <div style={{marginTop:8,border:'1px solid #e0d8d0',borderRadius:12,overflow:'hidden',maxHeight:280,overflowY:'auto'}}>
        {isSearching ? (
          suggestions.length > 0 ? suggestions.map((p,i) => (
            <button key={i} onClick={()=>choose(p)}
              style={{display:'block',width:'100%',textAlign:'left',padding:'10px 13px',background:'#fff',border:'none',
                borderBottom: i<suggestions.length-1 ? '1px solid #f0ebe5':'none', cursor:'pointer'}}>
              <div style={{fontSize:12.5,fontWeight:700,color:'#1a1410'}}>{p.t}</div>
              <div style={{fontSize:11,color:'#9a8e84'}}>{p.c}{(p.l||p.grp) ? ' · List '+(p.l||p.grp) : ''}</div>
            </button>
          )) : (
            <div style={{padding:'14px 13px',fontSize:12,color:'#9a8e84'}}>No matches — try a different spelling, or clear the search to browse the full list.</div>
          )
        ) : (
          browseGroups.length > 0 ? browseGroups.map(group => (
            <div key={group.list}>
              <div style={{position:'sticky',top:0,background:'#faf7f3',padding:'7px 13px',fontSize:10,fontWeight:800,color:'#9a8e84',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid #f0ebe5'}}>
                List {group.list}
              </div>
              {group.pieces.map((p,i) => (
                <button key={i} onClick={()=>choose(p)}
                  style={{display:'block',width:'100%',textAlign:'left',padding:'10px 13px',background:'#fff',border:'none',
                    borderBottom:'1px solid #f0ebe5',cursor:'pointer'}}>

            </div>

            <div style={{padding:'14px 13px',fontSize:12,color:'#9a8e84'}}>No repertoire list found for this grade — search above instead.</div>
          )
        )}
      </div>

      <div style={{display:'flex',gap:10,marginTop:22}}>
        <button onClick={onBack}
          style={{padding:'12px 18px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
          Back

          <button onClick={onContinue}

                  <div>
                    <div style={{fontSize:10.5,fontWeight:800,color:'#0e7490',marginBottom:9,textTransform:'uppercase',letterSpacing:'0.04em'}}>Technical Exercises</div>
                    <div style={{display:'flex',flexDirection:'column',gap:9}}>
                      {technicalWork.exercises.map((ex,i) => (
                        <div key={i} style={{fontSize:12.5,lineHeight:1.5}}>
                          <span style={{fontWeight:800,color:'#1a1410'}}>{ex.code}</span>
                          <span style={{color:'#7a6e64'}}> — {ex.purpose}: {ex.pieces.join(', ')}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {technicalWork.sections.map((s,i) => (
                    <div key={i} style={{paddingTop:14,marginTop:14,borderTop:'1px solid #f0ebe5'}}>
                      <div style={{fontSize:10.5,fontWeight:800,color:'#0e7490',marginBottom:9,textTransform:'uppercase',letterSpacing:'0.04em'}}>{s.title}</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {s.items.map((item,j) => (
                          <span key={j} style={{fontSize:11.5,fontWeight:600,color:'#5c5248',background:'#f7f3ee',padding:'5px 10px',borderRadius:8,border:'1px solid #ede7df',whiteSpace:'nowrap'}}>{item}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {userPieces.length > 0 && (
              <>
                <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',margin:'22px 0 10px'}}>Your exam pieces</h3>
                <p style={{fontSize:12,color:'#9a8e84',marginBottom:12}}>The monthly plan above is written around these.</p>
                {userPieces.map((p,i) => (
                  <div key={i} className="result-card" style={{padding:'14px 16px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                      <div>
                        <div style={{fontSize:11,color:'#b0a898',fontWeight:800,marginBottom:4}}>
                          PIECE {i+1}{(p.l||p.grp) ? ' · LIST '+(p.l||p.grp) : ''}
                        </div>
                        <div style={{fontSize:13.5,fontWeight:800,color:'#1a1410'}}>{p.t}</div>
                        {p.c && <div style={{fontSize:12,color:'#9a8e84',marginTop:2}}>{p.c}</div>}
                      </div>
                      {p.era && <span style={{background:'#f0ebe5',color:'#7a6e64',fontSize:9,fontWeight:800,padding:'3px 8px',borderRadius:6,whiteSpace:'nowrap'}}>{p.era}</span>}
                    </div>
                    {p.focus && p.focus.length > 0 && (
                      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
                        {p.focus.map((f,j) => (
                          <span key={j} style={{fontSize:10,fontWeight:600,color:'#7a6e64',background:'#f7f3ee',padding:'3px 8px',borderRadius:6,border:'1px solid #ede7df'}}>{f}</span>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </>
            )}

            {repertoire.length > 0 && (
              <>
                <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',margin:'22px 0 10px'}}>
                  {userPieces.length > 0 ? 'More repertoire ideas for this grade' : 'Sample repertoire for this grade'}
                </h3>
                <p style={{fontSize:12,color:'#9a8e84',marginBottom:12}}>
                  {userPieces.length > 0 ? 'A few extra options, in case you want to round out your programme.' : 'One idea per list — swap freely for your own choices.'}
                </p>
                {repertoire.map((p,i) => (
                  <div key={i} className="result-card" style={{padding:'14px 16px'}}>
                    <div style={{display:'flex',gap:7,marginBottom:6}}>
                      {(p.l || p.grp) && <span style={{background:'#eee8e0',color:'#7a6a58',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:6}}>{p.l ? 'List '+p.l : 'Group '+p.grp}</span>}
                      {p.era && <span style={{background:'#f0ebe5',color:'#7a6e64',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:6}}>{p.era}</span>}
                    </div>
                    <div style={{fontSize:13.5,fontWeight:800,color:'#1a1410'}}>{p.t}</div>
                    <div style={{fontSize:12,color:'#9a8e84',marginTop:2}}>{p.c}</div>
                  </div>
                ))}
                <a href={'index.html?q='+encodeURIComponent(gradeLabel)} style={{display:'inline-block',marginTop:4,fontSize:12,color:'#d4956a',fontWeight:700,textDecoration:'none'}}>
                  Browse all {gradeLabel} repertoire →
                </a>
              </>
            )}

            <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:26}}>
              <button onClick={()=>setShowLogin(true)}
                style={{width:'100%',padding:'13px',borderRadius:12,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:14,fontWeight:800}}>
                Save &amp; track progress
              </button>
              <button onClick={reset}
                style={{width:'100%',padding:'12px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Start over
              </button>
            </div>
          </div>
        )}

        {screen===4 && (!timeline || timeline.length===0) && (
          <div className="fade-up" style={{textAlign:'center',padding:'40px 0'}}>
            <p style={{fontSize:13,color:'#9a8e84'}}>That exam date doesn't leave enough room to build a timeline. Try a date further out.</p>
            <button onClick={()=>setScreen(1)} style={{marginTop:14,padding:'10px 20px',borderRadius:10,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:13,fontWeight:700}}>
              Change exam date
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error:null }; }
  static getDerivedStateFromError(err) { return { error:err }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,color:'#ef4444',fontFamily:'monospace',fontSize:13}}>
        <b>Error:</b> {this.state.error.message}<br/>
        <small style={{color:'#9a8e84'}}>Please refresh the page.</small>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  function tryCompile() {
    if (typeof Babel === 'undefined') { setTimeout(tryCompile, 50); return; }
    try {
      var src = document.getElementById('app-jsx').textContent;
      var compiled = Babel.transform(src, { presets: ['react'] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch(e) {
      document.getElementById('root').innerHTML = '<div style="padding:40px;color:#ef4444;font-family:monospace;font-size:13px"><b>Compile error:</b> ' + e.message + '</div>';
    }
  }
  tryCompile();
});
</script>
</body>
</html>
