<script id="app-jsx" type="text/jsx-raw">
const { useState, useCallback, useMemo } = React;

/* ── Corpus (same loader pattern as recommend.html) ── */
function buildCorpus() {
  const rows = [];
  const push = (arr, syllabus, gradeKey, gradeLabel, type) => {
    if (!arr) return;
    arr.forEach(p => rows.push({ ...p, _syllabus: syllabus, _gradeKey: gradeKey, _grade: gradeLabel, _type: type || 'General' }));
  };
  // AMEB Comprehensive
  push(typeof DATA_PRELIM !== 'undefined' ? DATA_PRELIM : null, 'AMEB', 'Prelim', 'Preliminary', 'General');
  push(typeof DATA_G1 !== 'undefined' ? DATA_G1 : null, 'AMEB', 'G1', 'Grade 1', 'General');
  push(typeof DATA_G2 !== 'undefined' ? DATA_G2 : null, 'AMEB', 'G2', 'Grade 2', 'General');
  push(typeof DATA_G3 !== 'undefined' ? DATA_G3 : null, 'AMEB', 'G3', 'Grade 3', 'General');
  push(typeof DATA_G4 !== 'undefined' ? DATA_G4 : null, 'AMEB', 'G4', 'Grade 4', 'General');
  push(typeof DATA_G5 !== 'undefined' ? DATA_G5 : null, 'AMEB', 'G5', 'Grade 5', 'General');
  push(typeof DATA_G6 !== 'undefined' ? DATA_G6 : null, 'AMEB', 'G6', 'Grade 6', 'General');
  push(typeof DATA_G7 !== 'undefined' ? DATA_G7 : null, 'AMEB', 'G7', 'Grade 7', 'General');
  push(typeof DATA_G8 !== 'undefined' ? DATA_G8 : null, 'AMEB', 'G8', 'Grade 8', 'General');
  // AMEB Leisure
  push(typeof DATA_PRELIM_LEISURE !== 'undefined' ? DATA_PRELIM_LEISURE : null, 'AMEB', 'Prelim', 'Preliminary', 'Leisure');
  push(typeof DATA_G1_LEISURE !== 'undefined' ? DATA_G1_LEISURE : null, 'AMEB', 'G1', 'Grade 1', 'Leisure');
  push(typeof DATA_G2_LEISURE !== 'undefined' ? DATA_G2_LEISURE : null, 'AMEB', 'G2', 'Grade 2', 'Leisure');
  push(typeof DATA_G3_LEISURE !== 'undefined' ? DATA_G3_LEISURE : null, 'AMEB', 'G3', 'Grade 3', 'Leisure');
  push(typeof DATA_G4_LEISURE !== 'undefined' ? DATA_G4_LEISURE : null, 'AMEB', 'G4', 'Grade 4', 'Leisure');
  push(typeof DATA_G5_LEISURE !== 'undefined' ? DATA_G5_LEISURE : null, 'AMEB', 'G5', 'Grade 5', 'Leisure');
  push(typeof DATA_G6_LEISURE !== 'undefined' ? DATA_G6_LEISURE : null, 'AMEB', 'G6', 'Grade 6', 'Leisure');
  push(typeof DATA_G7_LEISURE !== 'undefined' ? DATA_G7_LEISURE : null, 'AMEB', 'G7', 'Grade 7', 'Leisure');
  push(typeof DATA_G8_LEISURE !== 'undefined' ? DATA_G8_LEISURE : null, 'AMEB', 'G8', 'Grade 8', 'Leisure');
  // AMEB Diploma
  push(typeof DATA_CERTP !== 'undefined' ? DATA_CERTP : null, 'AMEB Diploma', 'CertP', 'CertP', 'Diploma');
  push(typeof DATA_AMUSA !== 'undefined' ? DATA_AMUSA : null, 'AMEB Diploma', 'AMusA', 'AMusA', 'Diploma');
  push(typeof DATA_LMUSA !== 'undefined' ? DATA_LMUSA : null, 'AMEB Diploma', 'LMusA', 'LMusA', 'Diploma');
  return rows;
}
const CORPUS = buildCorpus();

// timeline.html is AMEB-only (see head comment) — no syllabus picker, this is fixed.
const SYLLABUS = 'AMEB';

const GRADE_OPTIONS = [['Prelim','Preliminary'],['G1','Grade 1'],['G2','Grade 2'],['G3','Grade 3'],['G4','Grade 4'],['G5','Grade 5'],['G6','Grade 6'],['G7','Grade 7'],['G8','Grade 8'],['CertP','CertP'],['AMusA','AMusA'],['LMusA','LMusA']];

/* ── Readiness quiz (4 short questions, scored 1-4) ── */
const READINESS_QUESTIONS = [
  { id:'pieces',     q:'Where are your exam pieces right now?',
    options:[
      { label:'Not chosen yet',                 score:1 },
      { label:'Chosen, learning hands separately', score:2 },
      { label:'Hands together, slow tempo',     score:3 },
      { label:'Up to tempo, just need polishing', score:4 },
    ] },
  { id:'technical',  q:'How comfortable are you with this grade’s scales / technical work?',
    options:[
      { label:'Haven’t started',            score:1 },
      { label:'Know some, shaky',                score:2 },
      { label:'Mostly solid',                    score:3 },
      { label:'Confident, just need speed/evenness', score:4 },
    ] },
  { id:'sightread',  q:'How is your sight-reading at this level?',
    options:[
      { label:'Needs a lot of work',             score:1 },
      { label:'Okay with simple rhythms',        score:2 },
      { label:'Generally fine',                  score:3 },
      { label:'Strong — rarely an issue',        score:4 },
    ] },
  { id:'theory',     q:'How confident are you with the theory / General Knowledge requirements?',
    options:[
      { label:'Haven’t looked at it',        score:1 },
      { label:'Know the basics',                 score:2 },
      { label:'Comfortable with most of it',     score:3 },
      { label:'Confident — just need review',    score:4 },
    ] },
];

/* ── Phase + month-focus logic ── */
const PHASE_META = {
  foundation:    { name:'Foundation & Learning',   color:'#6366f1', bg:'#eef2ff', text:'#4338ca' },
  technical:     { name:'Technical Foundation',    color:'#0891b2', bg:'#ecfeff', text:'#0e7490' },
  musical:       { name:'Musical Shaping',         color:'#7c3aed', bg:'#f5f3ff', text:'#6d28d9' },
  consolidation: { name:'Consolidation',           color:'#16a34a', bg:'#f0fdf4', text:'#15803d' },
  polish:        { name:'Polish & Performance',    color:'#d97706', bg:'#fffbeb', text:'#b45309' },
  exam:          { name:'Exam Preparation',        color:'#dc2626', bg:'#fef2f2', text:'#b91c1c' },
};

// {grade}/{syllabus} substituted with the chosen grade/syllabus.
// {piece1..4} substituted with the student's actual pieces when supplied, else generic wording.
const MONTH_FOCUS = {
  foundation:    ['Confirm all {grade} exam repertoire — lock in {piece1} and the rest. Begin hands-separate reading of each piece. Skim the {syllabus} {grade} technical list so there are no surprises later.',
                   'Hands-together work begins on {piece1} and {piece2}. Daily scale/arpeggio routine for {grade} established — little and often beats one long session.',
                   'Technical work moves to tempo. Begin regular sight-reading practice (5–10 min/day) at {grade} level.',
                   'Full review of all pieces hands-separate and hands-together. Mark the trickiest 2–3 bars in each piece — that\'s where this month\'s time should actually go.'],
  technical:     ['{grade} scales, arpeggios and required exercises — work them up to speed, metronome on. This is the unglamorous month; it pays off later.',
                   'Increase tempo on {piece1}, {piece2} and {piece3} one piece at a time, not all at once. Technical work for this grade should be close to exam speed by month end.',
                   'Tidy fingering trouble-spots flagged earlier. Scales/arpeggios at full speed, hands separately and together.'],
  musical:       ['Musical shaping on every piece — dynamics, articulation, phrasing. Stop playing through; start listening back.',
                   'Voicing and tone across {piece1} and {piece4}. Sight-reading and General Knowledge become a fixed weekly habit, not an afterthought.',
                   'Memory check on all pieces if memorising. Rhythm accuracy under tempo pressure — record yourself and compare to a metronome track.'],
  consolidation: ['Full run-throughs of {piece1}, {piece2}, {piece3} and {piece4} (or your own choices), recorded and self-reviewed.',
                  '{grade} technical work at performance tempo — everything required should be secure with no hesitation.',
                  'General Knowledge: composer context, form, Italian terms for each piece — drill the actual gaps, not everything.',
                  'Back-to-back repertoire run-through, exam order. Note stamina and where concentration slips.'],
  polish:        ['Mock exam #1 — full run in exam order for {grade}, honest self (or teacher) feedback on {piece1} especially.',
                  'Address mock exam feedback directly, piece by piece. Performance detail — the last 5% that separates a good mark from a great one.',
                  'Mock exam #2 — simulate real exam conditions exactly (room, clothes, walking in cold). Final refinements only.'],
  exam:          ['Light maintenance only. No new learning, no new fingerings. Run each piece once a day at performance tempo. Trust the preparation — rest well before the {grade} exam.'],
};
const EXAM_ORDER = ['foundation','technical','musical','consolidation','polish','exam'];

// Real AMEB technical-work data for the chosen grade, if available (Prelim-G8 only —
// not ABRSM/Trinity, not Diploma grades). Returns null otherwise so callers fall back
// to the generic MONTH_FOCUS.technical text.
function getTechnicalWork(syllabus, gradeKey) {
  if (syllabus !== 'AMEB') return null;
  if (typeof DATA_TECHNICAL_AMEB === 'undefined') return null;
  return DATA_TECHNICAL_AMEB[gradeKey] || null;
}

// Builds 3 curriculum-specific paragraphs (mirrors the 3-entry shape of the generic
// MONTH_FOCUS.technical array) referencing the grade's actual named exercises and
// scale/arpeggio requirements, instead of generic template text.
function buildTechnicalFocusLines(tech) {
  if (!tech) return null;
  const codes = tech.exercises.map(e => e.code).join(', ');
  const hasExtras = tech.sections.length > 1;

  // Deliberately short — the full exercise purposes, piece names, and every scale/arpeggio
  // are already laid out clearly in the Technical Work Checklist card below. Repeating that
  // whole list inside the month-card prose just made it an unreadable wall of text.
  return [
    `Learn Technical Exercises ${codes} hands-separately, then begin this grade's required scales. Full details — what each exercise covers and the complete scale list — are in the Technical Work Checklist below.`,
    `Bring the required scales up to full tempo, hands together, metronome on.${hasExtras ? ' Also work through the other scale/arpeggio groups in the checklist below.' : ''} Exercises ${codes} should be memory-secure by month end.`,
    `Full technical routine at exam speed: everything in the checklist below plus Exercises ${codes} — memorised, no hesitation.`,
  ];
}

function monthsBetween(startDate, endDate) {
  const allMonths = [];
  const cursor = new Date(startDate); cursor.setDate(1);
  const endD = new Date(endDate); endD.setDate(1);
  while (cursor <= endD) {
    allMonths.push({ monthStr: cursor.toISOString().slice(0,7),
      label: cursor.toLocaleDateString('en-AU',{month:'short',year:'numeric'}) });
    cursor.setMonth(cursor.getMonth()+1);
  }
  return allMonths;
}

// Builds an explicit phase-per-month assignment based on how many months are actually
// available, rather than fixed percentage cutoffs (which duplicate phase labels on
// short timelines). Lower readiness compresses the early phases since less is "done"
// already; the exam month is always the last month.
function allocatePhases(total, readinessScore) {
  const readinessRatio = (readinessScore - 4) / 12; // 0 (least ready) .. 1 (most ready)
  const lowReadiness = readinessRatio < 0.4;

  if (total <= 1) return ['exam'];
  if (total === 2) return ['polish','exam'];
  if (total === 3) return lowReadiness ? ['technical','consolidation','exam'] : ['consolidation','polish','exam'];
  if (total === 4) return lowReadiness ? ['technical','musical','consolidation','exam'] : ['foundation','consolidation','polish','exam'];
  if (total === 5) return lowReadiness
    ? ['foundation','technical','musical','consolidation','exam']
    : ['foundation','technical','consolidation','polish','exam'];
  if (total === 6) return ['foundation','technical','musical','consolidation','polish','exam'];

  // 7+ months: build proportionally, then guarantee every phase gets ≥1 month and exam is last.
  const nonExam = total - 1;
  const weights = lowReadiness
    ? { foundation:0.22, technical:0.22, musical:0.18, consolidation:0.20, polish:0.18 }
    : { foundation:0.16, technical:0.20, musical:0.18, consolidation:0.24, polish:0.22 };
  const order = ['foundation','technical','musical','consolidation','polish'];
  let counts = order.map(k => Math.max(1, Math.round(weights[k]*nonExam)));
  let diff = nonExam - counts.reduce((a,b)=>a+b,0);
  let idx = counts.length - 1;
  while (diff !== 0) {
    counts[idx] = Math.max(1, counts[idx] + (diff > 0 ? 1 : -1));
    diff += diff > 0 ? -1 : 1;
    idx = (idx - 1 + counts.length) % counts.length;
  }
  const seq = [];
  order.forEach((k,i) => { for (let n=0;n<counts[i];n++) seq.push(k); });
  seq.push('exam');
  return seq;
}

function fillTemplate(str, vars) {
  return str.replace(/\{(\w+)\}/g, (m,k) => (vars[k] !== undefined && vars[k] !== '') ? vars[k] : m)
    .replace(/\{piece1\}/g,'your first piece').replace(/\{piece2\}/g,'your second piece')
    .replace(/\{piece3\}/g,'your third piece').replace(/\{piece4\}/g,'your fourth piece');
}

function buildTimeline(examDate, readinessScore, gradeLabel, syllabus, userPieces, gradeKey) {
  const today = new Date(); today.setHours(12,0,0,0);
  const end = new Date(examDate + 'T12:00:00');
  if (isNaN(end.getTime()) || end <= today) return [];

  const allMonths = monthsBetween(today, end);
  const total = allMonths.length;
  if (total === 0) return [];

  const phaseSeq = allocatePhases(total, readinessScore);
  const vars = { grade: gradeLabel || 'this grade', syllabus: syllabus || '' };
  (userPieces || []).slice(0,4).forEach((p,i) => { vars['piece'+(i+1)] = p; });

  const tech = getTechnicalWork(syllabus, gradeKey);
  const techFocusLines = tech ? buildTechnicalFocusLines(tech) : null;

  // Cycle of distinct suffixes appended once a phase's MONTH_FOCUS strings run out, so
  // long timelines (beyond ~17 months) never show the exact same paragraph two months
  // running — each repeat lap gets a different suffix before the cycle itself repeats.
  const OVERFLOW_SUFFIXES = [
    ' Keep going at this pace — steady repetition is what builds reliability here.',
    ' Use this extra time to deepen accuracy rather than rushing ahead.',
    ' Revisit anything that still feels uneven before moving on.',
  ];

  const phaseCounter = {};
  return allMonths.map((m,i) => {
    const phase = phaseSeq[i] || 'exam';
    const count = phaseCounter[phase] = (phaseCounter[phase] || 0);
    const focusArr = (phase === 'technical' && techFocusLines) ? techFocusLines : (MONTH_FOCUS[phase] || ['Continue focused practice.']);
    let rawFocus = focusArr[Math.min(count, focusArr.length-1)];
    if (count >= focusArr.length) {
      const lap = count - focusArr.length;
      rawFocus = rawFocus + OVERFLOW_SUFFIXES[lap % OVERFLOW_SUFFIXES.length];
    }
    phaseCounter[phase]++;
    return { ...m, phase, focus: fillTemplate(rawFocus, vars) };
  });
}

function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); const end = new Date(dateStr + 'T12:00:00');
  return Math.max((end.getFullYear()-now.getFullYear())*12 + (end.getMonth()-now.getMonth()), 0);
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = Math.ceil((new Date(dateStr+'T12:00:00') - new Date()) / (1000*60*60*24));
  return Math.max(diff, 0);
}

/* ── Repertoire picks for the chosen grade (light-weight, deterministic-ish) ── */
function pickRepertoire(syllabus, gradeKey) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey && p._type !== 'Leisure');
  if (pool.length === 0) return [];
  const byList = {};
  pool.forEach(p => { const l = p.l || p.grp || 'Open'; (byList[l] = byList[l]||[]).push(p); });
  const picks = [];
  Object.keys(byList).sort().forEach(l => {
    const arr = byList[l];
    picks.push(arr[Math.floor(Math.random()*arr.length)]);
  });
  return picks.slice(0,4);
}

/* ── Piece search for the chosen syllabus + grade (used by PieceInput) ── */
function searchGradePieces(syllabus, gradeKey, query) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey);
  if (!query || query.trim().length < 1) return [];
  const q = query.trim().toLowerCase();
  return pool.filter(p => (p.t||'').toLowerCase().includes(q) || (p.c||'').toLowerCase().includes(q)).slice(0,8);
}

// Grouped browse list for the chosen grade — lets a student pick a piece by tapping
// through the list instead of having to know/type the exact title. Excludes Leisure
// (this tool is for exam preparation) and groups by List A/B/C/D so it's scannable.
function browseGradePieces(syllabus, gradeKey) {
  const pool = CORPUS.filter(p => p._syllabus === syllabus && p._gradeKey === gradeKey && p._type !== 'Leisure');
  const byList = {};
  pool.forEach(p => { const l = p.l || p.grp || 'Open'; (byList[l] = byList[l] || []).push(p); });
  const order = ['A','B','C','D','Collab','Open'];
  return order
    .filter(k => byList[k] && byList[k].length)
    .map(k => ({ list: k, pieces: byList[k].slice().sort((a,b) => (a.c||'').localeCompare(b.c||'')) }));
}

/* ── Components ── */
function ReadinessQuiz({ onComplete }) {
  const [answers, setAnswers] = useState({});
  const allAnswered = READINESS_QUESTIONS.every(q => answers[q.id] !== undefined);
  return (
    <div className="fade-up">
      <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>A few quick questions</h2>
      <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>This helps shape how much time to allow for each phase.</p>
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        {READINESS_QUESTIONS.map(q => (
          <div key={q.id}>
            <div style={{fontSize:13,fontWeight:700,color:'#1a1410',marginBottom:8}}>{q.q}</div>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {q.options.map(opt => (
                <button key={opt.label}
                  onClick={() => setAnswers(prev => ({...prev, [q.id]: opt.score}))}
                  className={'opt-btn'+(answers[q.id]===opt.score?' active':'')}
                  style={{padding:'10px 14px'}}>
                  <span style={{fontSize:13,fontWeight:600,color:answers[q.id]===opt.score?'#d4956a':'#1a1410'}}>{opt.label}</span>
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:22}}>
        <button onClick={() => onComplete(Object.values(answers).reduce((a,b)=>a+b,0))} disabled={!allAnswered}
          style={{width:'100%',padding:'13px',borderRadius:12,
            background:allAnswered?'#d4956a':'#e0d8d0', color:allAnswered?'#fff':'#9a8e84',
            border:'none',cursor:allAnswered?'pointer':'default',fontSize:14,fontWeight:800}}>
          Build my timeline
        </button>
      </div>
    </div>
  );
}

function PieceInput({ syllabus, gradeKey, pieces, setPieces, onContinue, onSkip, onBack }) {
  const [query, setQuery] = useState('');
  const [activeSlot, setActiveSlot] = useState(0);
  const suggestions = useMemo(() => searchGradePieces(syllabus, gradeKey, query), [syllabus, gradeKey, query]);
  const browseGroups = useMemo(() => browseGradePieces(syllabus, gradeKey), [syllabus, gradeKey]);
  const isSearching = query.trim().length > 0;

  function choose(p) {
    const next = pieces.slice();
    next[activeSlot] = p.t + (p.c ? ' — ' + p.c : '');
    setPieces(next);
    setQuery('');
    setActiveSlot(Math.min(activeSlot+1, 3));
  }
  function clearSlot(i) {
    const next = pieces.slice();
    next[i] = '';
    setPieces(next);
  }
  const anyFilled = pieces.some(p => p && p.trim());

  return (
    <div className="fade-up">
      <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>What are you actually playing?</h2>
      <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>Optional, but it makes the monthly plan reference your real pieces instead of generic advice. Browse the list below and tap to pick — no need to type anything — or search if you know the title. Pick up to 4, or skip.</p>

      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,fontWeight:800,color:'#b0a898',width:16}}>{i+1}</span>
            <button onClick={()=>setActiveSlot(i)}
              className={'opt-btn'+(activeSlot===i?' active':'')} style={{padding:'10px 12px',flex:1}}>
              <span style={{fontSize:12.5,fontWeight:pieces[i]?700:500,color:pieces[i]?'#1a1410':'#b0a898'}}>
                {pieces[i] || 'Tap to search & choose a piece'}
              </span>
            </button>
            {pieces[i] && (
              <button onClick={()=>clearSlot(i)} style={{background:'none',border:'none',color:'#b0a898',cursor:'pointer',fontSize:14,padding:4}}>✕</button>
            )}
          </div>
        ))}
      </div>

      <input type="text" placeholder="Search composer or title, or just browse below…" value={query} onChange={e=>setQuery(e.target.value)}
        style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid #e0d8d0',fontSize:13,outline:'none'}} />

      <div style={{marginTop:8,border:'1px solid #e0d8d0',borderRadius:12,overflow:'hidden',maxHeight:280,overflowY:'auto'}}>
        {isSearching ? (
          suggestions.length > 0 ? suggestions.map((p,i) => (
            <button key={i} onClick={()=>choose(p)}
              style={{display:'block',width:'100%',textAlign:'left',padding:'10px 13px',background:'#fff',border:'none',
                borderBottom: i<suggestions.length-1 ? '1px solid #f0ebe5':'none', cursor:'pointer'}}>
              <div style={{fontSize:12.5,fontWeight:700,color:'#1a1410'}}>{p.t}</div>
              <div style={{fontSize:11,color:'#9a8e84'}}>{p.c}{(p.l||p.grp) ? ' · List '+(p.l||p.grp) : ''}</div>
            </button>
          )) : (
            <div style={{padding:'14px 13px',fontSize:12,color:'#9a8e84'}}>No matches — try a different spelling, or clear the search to browse the full list.</div>
          )
        ) : (
          browseGroups.length > 0 ? browseGroups.map(group => (
            <div key={group.list}>
              <div style={{position:'sticky',top:0,background:'#faf7f3',padding:'7px 13px',fontSize:10,fontWeight:800,color:'#9a8e84',textTransform:'uppercase',letterSpacing:'0.04em',borderBottom:'1px solid #f0ebe5'}}>
                List {group.list}
              </div>
              {group.pieces.map((p,i) => (
                <button key={i} onClick={()=>choose(p)}
                  style={{display:'block',width:'100%',textAlign:'left',padding:'10px 13px',background:'#fff',border:'none',
                    borderBottom:'1px solid #f0ebe5',cursor:'pointer'}}>
                  <div style={{fontSize:12.5,fontWeight:700,color:'#1a1410'}}>{p.t}</div>
                  <div style={{fontSize:11,color:'#9a8e84'}}>{p.c}</div>
                </button>
              ))}
            </div>
          )) : (
            <div style={{padding:'14px 13px',fontSize:12,color:'#9a8e84'}}>No repertoire list found for this grade — search above instead.</div>
          )
        )}
      </div>

      <div style={{display:'flex',gap:10,marginTop:22}}>
        <button onClick={onBack}
          style={{padding:'12px 18px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
          Back
        </button>
        {anyFilled ? (
          <button onClick={onContinue}
            style={{flex:1,padding:'12px',borderRadius:12,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:13,fontWeight:800}}>
            Continue
          </button>
        ) : (
          <button onClick={onSkip}
            style={{flex:1,padding:'12px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
            Skip — use generic plan
          </button>
        )}
      </div>
    </div>
  );
}

function MonthCard({ m, idx, isPast }) {
  const meta = PHASE_META[m.phase] || PHASE_META.foundation;
  return (
    <div className="month-card" style={{opacity:isPast?0.55:1}}>
      <div className="month-rail" style={{background:meta.color}} />
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:6,paddingLeft:8}}>
        <span style={{fontSize:13,fontWeight:800,color:'#1a1410'}}>{m.label}</span>
        <span style={{fontSize:9,fontWeight:800,padding:'3px 9px',borderRadius:7,background:meta.bg,color:meta.text}}>{meta.name}</span>
      </div>
      <p style={{fontSize:12.5,color:'#5c5248',margin:0,paddingLeft:8,lineHeight:1.5}}>{m.focus}</p>
    </div>
  );
}

function LoginPrompt({ onClose }) {
  const [email, setEmail] = useState('');
  const [sent, setSent]   = useState(false);
  return (
    <div onClick={onClose} style={{position:'fixed',top:0,right:0,bottom:0,left:0,background:'rgba(0,0,0,0.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:24,width:'100%',maxWidth:360}}>
        {!sent ? (
          <>
            <h3 style={{fontSize:15,fontWeight:800,color:'#1a1410',margin:'0 0 4px'}}>Save &amp; track progress</h3>
            <p style={{fontSize:12.5,color:'#9a8e84',margin:'0 0 16px',lineHeight:1.5}}>
              Sign in with a magic link to save this timeline and check off months as you go. No password needed.
            </p>
            <input type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}
              style={{width:'100%',padding:'11px 13px',borderRadius:10,border:'1.5px solid #e0d8d0',fontSize:13,marginBottom:10,outline:'none'}} />
            <button onClick={()=>email.includes('@') && setSent(true)}
              style={{width:'100%',padding:'11px',borderRadius:10,background:email.includes('@')?'#d4956a':'#e0d8d0',
                color:email.includes('@')?'#fff':'#9a8e84',border:'none',cursor:'pointer',fontSize:13,fontWeight:800}}>
              Send magic link
            </button>
            <p style={{fontSize:10.5,color:'#b0a898',margin:'10px 0 0',textAlign:'center'}}>Tracking is coming soon — this gets you on the list.</p>
          </>
        ) : (
          <>
            <div style={{fontSize:28,marginBottom:8}}>✉️</div>
            <h3 style={{fontSize:15,fontWeight:800,color:'#1a1410',margin:'0 0 4px'}}>Check your email</h3>
            <p style={{fontSize:12.5,color:'#9a8e84',margin:0,lineHeight:1.5}}>
              We'll let you know as soon as saved timelines and progress tracking are live.
            </p>
          </>
        )}
        <button onClick={onClose} style={{marginTop:14,width:'100%',padding:'9px',borderRadius:10,background:'#f0ebe5',color:'#7a6e64',border:'none',cursor:'pointer',fontSize:12,fontWeight:700}}>
          Close
        </button>
      </div>
    </div>
  );
}

/* ── App ── */
// Screens: 0=grade, 1=exam date, 2=pieces, 3=quiz, 4=results
// AMEB only — no syllabus picker (see head comment / GRADE_OPTIONS above).
function App() {
  const [screen, setScreen]     = useState(0);
  const [gradeKey, setGradeKey] = useState(null);
  const [gradeLabel, setGradeLabel] = useState(null);
  const [examDate, setExamDate] = useState('');
  const [pieces, setPieces]     = useState(['','','','']);
  const [showLogin, setShowLogin] = useState(false);
  const [timeline, setTimeline] = useState(null);
  const [repertoire, setRepertoire] = useState([]);

  const gradeOptions = GRADE_OPTIONS;
  const today = new Date().toISOString().slice(0,10);
  const userPieces = pieces.filter(p => p && p.trim());

  function finishQuiz(score) {
    const tl = buildTimeline(examDate, score, gradeLabel, SYLLABUS, userPieces, gradeKey);
    setTimeline(tl);
    setRepertoire(pickRepertoire(SYLLABUS, gradeKey));
    setScreen(4);
  }

  const technicalWork = getTechnicalWork(SYLLABUS, gradeKey);

  function reset() {
    setScreen(0); setGradeKey(null); setGradeLabel(null);
    setExamDate(''); setPieces(['','','','']); setTimeline(null); setRepertoire([]);
  }

  const monthsLeft = examDate ? monthsUntil(examDate) : null;
  const daysLeft = examDate ? daysUntil(examDate) : null;

  return (
    <div style={{minHeight:'100vh',background:'#f5f0eb'}}>
      {showLogin && <LoginPrompt onClose={()=>setShowLogin(false)} />}

      {/* Header */}
      <div style={{background:'#fff',borderBottom:'1px solid #ede7df',padding:'16px 20px 18px'}}>
        <a href="index.html" style={{color:'#9a8e84',fontSize:12,textDecoration:'none',display:'block',marginBottom:6}}>
          Back to Piano Butler
        </a>
        <h1 style={{color:'#1a1410',fontSize:19,fontWeight:900,margin:'0 0 2px',letterSpacing:'-0.02em'}}>
          AMEB Exam Timeline
        </h1>
        <p style={{color:'#9a8e84',fontSize:12,margin:'0 0 12px'}}>
          {screen===0 ? 'Step 1 of 4 — grade' : screen===1 ? 'Step 2 of 4 — exam date' : screen===2 ? 'Step 3 of 4 — your pieces' : screen===3 ? 'Step 4 of 4 — readiness' : 'Your timeline'}
        </p>
        {screen < 4 && (
          <div className="progress-bar">
            <div className="progress-fill" style={{width:(screen===0?'0%':screen===1?'25%':screen===2?'50%':'75%')}} />
          </div>
        )}
      </div>

      <div style={{maxWidth:600,margin:'0 auto',padding:'24px 16px 80px'}}>

        {/* STEP 0: Grade */}
        {screen===0 && (
          <div className="fade-up">
            <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>Which AMEB grade are you sitting?</h2>
            <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>Built for the AMEB Piano syllabus — Preliminary through Diploma.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
              {gradeOptions.map(([key,label]) => (
                <button key={key} onClick={()=>{ setGradeKey(key); setGradeLabel(label); }}
                  className={'opt-btn'+(gradeKey===key?' active':'')} style={{padding:'12px 14px',textAlign:'center'}}>
                  <span style={{fontSize:13,fontWeight:700,color:gradeKey===key?'#d4956a':'#1a1410'}}>{label}</span>
                </button>
              ))}
            </div>
            <div style={{marginTop:22}}>
              <button onClick={()=>setScreen(1)} disabled={!gradeKey}
                style={{width:'100%',padding:'13px',borderRadius:12,
                  background:gradeKey?'#d4956a':'#e0d8d0', color:gradeKey?'#fff':'#9a8e84',
                  border:'none',cursor:gradeKey?'pointer':'default',fontSize:14,fontWeight:800}}>
                Next
              </button>
            </div>
          </div>
        )}

        {/* STEP 1: Exam date */}
        {screen===1 && (
          <div className="fade-up">
            <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>When is the exam?</h2>
            <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>An estimate is fine — you can adjust later.</p>
            <input type="date" value={examDate} min={today} onChange={e=>setExamDate(e.target.value)}
              style={{width:'100%',padding:'13px 14px',borderRadius:12,border:'1.5px solid #e0d8d0',fontSize:14,outline:'none'}} />
            {examDate && monthsUntil(examDate) !== null && (
              <p style={{fontSize:12.5,color:'#9a8e84',marginTop:10}}>
                That's about <b style={{color:'#1a1410'}}>{monthsUntil(examDate)} month{monthsUntil(examDate)===1?'':'s'}</b> away.
              </p>
            )}
            <div style={{display:'flex',gap:10,marginTop:22}}>
              <button onClick={()=>setScreen(0)}
                style={{padding:'12px 18px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Back
              </button>
              <button onClick={()=>setScreen(2)} disabled={!examDate || new Date(examDate) <= new Date()}
                style={{flex:1,padding:'12px',borderRadius:12,
                  background:examDate?'#d4956a':'#e0d8d0', color:examDate?'#fff':'#9a8e84',
                  border:'none',cursor:examDate?'pointer':'default',fontSize:13,fontWeight:800}}>
                Next
              </button>
            </div>
          </div>
        )}

        {/* STEP 2: Your actual pieces (optional) */}
        {screen===2 && (
          <PieceInput syllabus={SYLLABUS} gradeKey={gradeKey} pieces={pieces} setPieces={setPieces}
            onContinue={()=>setScreen(3)} onSkip={()=>setScreen(3)} onBack={()=>setScreen(1)} />
        )}

        {/* STEP 3: Readiness quiz */}
        {screen===3 && <ReadinessQuiz onComplete={finishQuiz} />}

        {/* STEP 4: Results */}
        {screen===4 && timeline && (
          <div className="fade-up">
            <div style={{background:'#fff',border:'1px solid #e0d8d0',borderRadius:16,padding:'18px 20px',marginBottom:18}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontSize:11,color:'#9a8e84',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.03em'}}>
                    {SYLLABUS} · {gradeLabel}
                  </div>
                  <div style={{fontSize:18,fontWeight:900,color:'#1a1410',marginTop:2}}>
                    {daysLeft} day{daysLeft===1?'':'s'} to go
                  </div>
                </div>
                <div style={{fontSize:12,color:'#9a8e84'}}>{timeline.length} month plan</div>
              </div>
            </div>

            <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',marginBottom:10}}>Month by month</h3>
            {timeline.map((m,i) => <MonthCard key={m.monthStr} m={m} idx={i} isPast={false} />)}

            {technicalWork && (
              <>
                <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',margin:'22px 0 10px'}}>{gradeLabel} Technical Work Checklist</h3>
                <p style={{fontSize:12,color:'#9a8e84',marginBottom:12}}>Exactly what AMEB requires for this grade, straight from the syllabus — work through this alongside the monthly plan above.</p>
                <div className="result-card" style={{padding:'18px 18px 20px'}}>
                  <div>
                    <div style={{fontSize:10.5,fontWeight:800,color:'#0e7490',marginBottom:9,textTransform:'uppercase',letterSpacing:'0.04em'}}>Technical Exercises</div>
                    <div style={{display:'flex',flexDirection:'column',gap:9}}>
                      {technicalWork.exercises.map((ex,i) => (
                        <div key={i} style={{fontSize:12.5,lineHeight:1.5}}>
                          <span style={{fontWeight:800,color:'#1a1410'}}>{ex.code}</span>
                          <span style={{color:'#7a6e64'}}> — {ex.purpose}: {ex.pieces.join(', ')}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {technicalWork.sections.map((s,i) => (
                    <div key={i} style={{paddingTop:14,marginTop:14,borderTop:'1px solid #f0ebe5'}}>
                      <div style={{fontSize:10.5,fontWeight:800,color:'#0e7490',marginBottom:9,textTransform:'uppercase',letterSpacing:'0.04em'}}>{s.title}</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {s.items.map((item,j) => (
                          <span key={j} style={{fontSize:11.5,fontWeight:600,color:'#5c5248',background:'#f7f3ee',padding:'5px 10px',borderRadius:8,border:'1px solid #ede7df',whiteSpace:'nowrap'}}>{item}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {userPieces.length > 0 && (
              <>
                <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',margin:'22px 0 10px'}}>Your exam pieces</h3>
                <p style={{fontSize:12,color:'#9a8e84',marginBottom:12}}>The monthly plan above is written around these.</p>
                {userPieces.map((p,i) => (
                  <div key={i} className="result-card" style={{padding:'14px 16px'}}>
                    <div style={{fontSize:11,color:'#b0a898',fontWeight:800,marginBottom:4}}>PIECE {i+1}</div>
                    <div style={{fontSize:13.5,fontWeight:800,color:'#1a1410'}}>{p}</div>
                  </div>
                ))}
              </>
            )}

            {repertoire.length > 0 && (
              <>
                <h3 style={{fontSize:14,fontWeight:800,color:'#1a1410',margin:'22px 0 10px'}}>
                  {userPieces.length > 0 ? 'More repertoire ideas for this grade' : 'Sample repertoire for this grade'}
                </h3>
                <p style={{fontSize:12,color:'#9a8e84',marginBottom:12}}>
                  {userPieces.length > 0 ? 'A few extra options, in case you want to round out your programme.' : 'One idea per list — swap freely for your own choices.'}
                </p>
                {repertoire.map((p,i) => (
                  <div key={i} className="result-card" style={{padding:'14px 16px'}}>
                    <div style={{display:'flex',gap:7,marginBottom:6}}>
                      {(p.l || p.grp) && <span style={{background:'#eee8e0',color:'#7a6a58',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:6}}>{p.l ? 'List '+p.l : 'Group '+p.grp}</span>}
                      {p.era && <span style={{background:'#f0ebe5',color:'#7a6e64',fontSize:9,fontWeight:800,padding:'2px 7px',borderRadius:6}}>{p.era}</span>}
                    </div>
                    <div style={{fontSize:13.5,fontWeight:800,color:'#1a1410'}}>{p.t}</div>
                    <div style={{fontSize:12,color:'#9a8e84',marginTop:2}}>{p.c}</div>
                  </div>
                ))}
                <a href={'index.html?q='+encodeURIComponent(gradeLabel)} style={{display:'inline-block',marginTop:4,fontSize:12,color:'#d4956a',fontWeight:700,textDecoration:'none'}}>
                  Browse all {gradeLabel} repertoire →
                </a>
              </>
            )}

            <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:26}}>
              <button onClick={()=>setShowLogin(true)}
                style={{width:'100%',padding:'13px',borderRadius:12,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:14,fontWeight:800}}>
                Save &amp; track progress
              </button>
              <button onClick={reset}
                style={{width:'100%',padding:'12px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Start over
              </button>
            </div>
          </div>
        )}

        {screen===4 && (!timeline || timeline.length===0) && (
          <div className="fade-up" style={{textAlign:'center',padding:'40px 0'}}>
            <p style={{fontSize:13,color:'#9a8e84'}}>That exam date doesn't leave enough room to build a timeline. Try a date further out.</p>
            <button onClick={()=>setScreen(1)} style={{marginTop:14,padding:'10px 20px',borderRadius:10,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:13,fontWeight:700}}>
              Change exam date
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error:null }; }
  static getDerivedStateFromError(err) { return { error:err }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,color:'#ef4444',fontFamily:'monospace',fontSize:13}}>
        <b>Error:</b> {this.state.error.message}<br/>
        <small style={{color:'#9a8e84'}}>Please refresh the page.</small>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
