function ytUrl(composer, title) {{
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(composer + ' ' + title + ' piano');
}}
function sheetUrl(composer, title) {{
  return 'https://www.google.com/search?q=' + encodeURIComponent(composer.split(',')[0] + ' ' + title + ' sheet music');
}}

function App() {{
  const [query, setQuery] = React.useState('');
  const [eraFilter, setEraFilter] = React.useState('All');
  const [natFilter, setNatFilter] = React.useState('All');

  const eras = ['All', ...Array.from(new Set(DATA.map(p => p.era))).sort()];
  const nats = ['All', ...Array.from(new Set(DATA.map(p => p.nat))).sort()];

  const filtered = React.useMemo(() => {{
    const q = query.trim().toLowerCase();
    return DATA.filter(p => {{
      if (eraFilter !== 'All' && p.era !== eraFilter) return false;
      if (natFilter !== 'All' && p.nat !== natFilter) return false;
      if (!q) return true;
      const tokens = q.split(/\s+/);
      const haystack = [p.c, p.t, p.nat, p.era, ...(p.focus||[])].join(' ').toLowerCase();
      return tokens.every(tok => haystack.includes(tok));
    }});
  }}, [query, eraFilter, natFilter]);

  return (
    <div style={{{{maxWidth:900, margin:'0 auto', padding:'0 16px 40px'}}}}>
      {{/* Header */}}
      <div style={{{{background:'linear-gradient(135deg, #6b21a8, #9b1239)', borderRadius:16, padding:'28px 32px', marginBottom:24, marginTop:24}}}}>
        <div style={{{{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:12}}}}>
          <div>
            <a href="../../index.html" style={{{{color:'rgba(255,255,255,0.8)', fontSize:13, textDecoration:'none', display:'block', marginBottom:6}}}}>← Piano Butler</a>
            <h1 style={{{{color:'#fff', fontSize:26, fontWeight:700, margin:0}}}}>Trinity LTCL Diploma</h1>
            <p style={{{{color:'rgba(255,255,255,0.85)', marginTop:6, fontSize:14}}}}>
              Trinity College London · 2026 Edition · 306 works · Open Pool
            </p>
          </div>
          <div style={{{{background:'rgba(255,255,255,0.15)', borderRadius:12, padding:'10px 16px', textAlign:'right'}}}}>
            <div style={{{{color:'#fff', fontSize:12, fontWeight:600}}}}>PERFORMANCE TIME</div>
            <div style={{{{color:'#fff', fontSize:15, marginTop:2}}}}>37–43 min · Exam 45 min</div>
            <div style={{{{color:'rgba(255,255,255,0.75)', fontSize:11, marginTop:2}}}}>Min. 2 works · Own choice permitted*</div>
          </div>
        </div>
      </div>

      {{/* Filters */}}
      <div style={{{{background:'#fff', borderRadius:12, padding:16, marginBottom:16, boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}}}>
        <input
          value={{query}} onChange={{e => setQuery(e.target.value)}}
          placeholder="Search composer or title..."
          style={{{{width:'100%', padding:'9px 14px', border:'1px solid #e5e7eb', borderRadius:8, fontSize:13, boxSizing:'border-box', marginBottom:12}}}}
        />
        <div style={{{{display:'flex', flexWrap:'wrap', gap:6, marginBottom:8}}}}>
          <span style={{{{fontSize:11, fontWeight:600, color:'#6b7280', alignSelf:'center', marginRight:4}}}}>ERA</span>
          {{eras.map(e => (
            <button key={{e}} className={{`filter-btn ${{eraFilter===e?'active':'inactive'}}`}} onClick={{()=>setEraFilter(e)}}>{{e}}</button>
          ))}}
        </div>
        <div style={{{{display:'flex', flexWrap:'wrap', gap:6, alignItems:'center'}}}}>
          <span style={{{{fontSize:11, fontWeight:600, color:'#6b7280', marginRight:4}}}}>NATIONALITY</span>
          <select value={{natFilter}} onChange={{e=>setNatFilter(e.target.value)}}
            style={{{{fontSize:12, padding:'4px 8px', border:'1px solid #e5e7eb', borderRadius:6, background:'#fff'}}}}>
            {{nats.map(n=><option key={{n}}>{{n}}</option>)}}
          </select>
        </div>
      </div>

      {{/* Results count */}}
      <div style={{{{fontSize:12, color:'#6b7280', marginBottom:10, paddingLeft:4}}}}>
        {{filtered.length}} of {{DATA.length}} works
      </div>

      {{/* Piece list */}}
      <div style={{{{background:'#fff', borderRadius:12, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}}}>
        {{filtered.map((p, i) => {{
          const compUrl = COMPOSER_LINKS[p.c];
          return (
            <div key={{i}} className="piece-row" style={{{{padding:'13px 18px', borderBottom:'1px solid #f3f4f6', display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12}}}}>
              <div style={{{{flex:1, minWidth:0}}}}>
                <div style={{{{display:'flex', flexWrap:'wrap', alignItems:'center', gap:6, marginBottom:4}}}}>
                  <span className={{`era-chip ${{p.era}}`}}>{{p.era}}</span>
                  <span style={{{{fontSize:11, color:'#9ca3af', background:'#f9fafb', borderRadius:8, padding:'1px 7px'}}}}>{{p.nat}}</span>
                </div>
                <div style={{{{fontWeight:600, fontSize:13, color:'#111', marginBottom:2}}}}>
                  {{compUrl
                    ? <a href={{compUrl}} target="_blank" rel="noopener noreferrer" style={{{{color:'#111', textDecoration:'none', borderBottom:'1px solid #e5e7eb'}}}} onMouseOver={{e=>e.target.style.color='#9b1239'}} onMouseOut={{e=>e.target.style.color='#111'}}>{{p.c}}</a>
                    : p.c}}
                </div>
                <div style={{{{fontSize:12, color:'#374151', marginBottom:6}}}}>{{p.t}}</div>
                <div style={{{{display:'flex', flexWrap:'wrap', gap:4}}}}>
                  {{(p.focus||[]).map((f,fi)=>(
                    <span key={{fi}} style={{{{fontSize:10, background:'#f1f5f9', color:'#475569', borderRadius:6, padding:'1px 7px'}}}}>{{f}}</span>
                  ))}}
                </div>
              </div>
              <div style={{{{display:'flex', flexDirection:'column', gap:4, flexShrink:0}}}}>
                <a href={{ytUrl(p.c,p.t)}} target="_blank" rel="noopener noreferrer"
                  style={{{{fontSize:10, background:'#fee2e2', color:'#991b1b', borderRadius:6, padding:'3px 8px', textDecoration:'none', textAlign:'center', fontWeight:600}}}}>▶ YT</a>
                <a href={{sheetUrl(p.c,p.t)}} target="_blank" rel="noopener noreferrer"
                  style={{{{fontSize:10, background:'#f0fdf4', color:'#15803d', borderRadius:6, padding:'3px 8px', textDecoration:'none', textAlign:'center', fontWeight:600}}}}>♩ Score</a>
              </div>
            </div>
          );
        }})}}
        {{filtered.length === 0 && (
          <div style={{{{padding:40, textAlign:'center', color:'#9ca3af', fontSize:13}}}}>No works found. Try adjusting filters.</div>
        )}}
      </div>

      <p style={{{{fontSize:11, color:'#9ca3af', textAlign:'center', marginTop:20}}}}>
        * Own-choice programmes must be pre-approved by Trinity College London.<br/>
        Data source: <a href="https://www.trinitycollege.com/resource?id=8546" target="_blank" style={{{{color:'#9ca3af'}}}}>Trinity Piano Diploma Repertoire List 2026</a>
      </p>
    </div>
  );
}}

root.render(<App/>);
