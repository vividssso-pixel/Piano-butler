<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trinity Piano Grade 6 — 2023 Syllabus | Piano Butler</title>
  <meta name="description" content="Trinity College London Piano Grade 6 repertoire list, 2023 syllabus. Browse all pieces with composer, era, nationality and focus area filters.">
  <meta name="keywords" content="Trinity piano Grade 6, Trinity College London piano repertoire, piano exam pieces 2023">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="data_trinity_g6.js"></script>
  <style>
    * { font-family: 'Pretendard', sans-serif; }
    body { background: #fafafa; margin: 0; }
    .era-chip { display:inline-block; padding:2px 9px; border-radius:12px; font-size:11px; font-weight:600; }
    .Baroque    { background:#fef3c7; color:#92400e; }
    .Classical  { background:#dbeafe; color:#1e40af; }
    .Romantic   { background:#fce7f3; color:#9d174d; }
    .Modern     { background:#d1fae5; color:#065f46; }
    .Contemporary { background:#ede9fe; color:#5b21b6; }
    .piece-row:hover { background:#fff7f7; }
    .filter-btn { border:none; cursor:pointer; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; transition:all .15s; }
    .filter-btn.active { background:#b91c1c; color:#fff; }
    .filter-btn.inactive { background:#f1f5f9; color:#374151; }
    .filter-btn.inactive:hover { background:#fee2e2; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DATA = DATA_TRINITY_G6;

const COMPOSER_LINKS = {
  "BACH, J.S.": "https://en.wikipedia.org/wiki/Johann_Sebastian_Bach",
  "BACH, C.P.E.": "https://en.wikipedia.org/wiki/Carl_Philipp_Emanuel_Bach",
  "BARTÓK, B.": "https://en.wikipedia.org/wiki/B%C3%A9la_Bart%C3%B3k",
  "BEETHOVEN, L. van": "https://en.wikipedia.org/wiki/Ludwig_van_Beethoven",
  "BRAHMS, J.": "https://en.wikipedia.org/wiki/Johannes_Brahms",
  "CHOPIN, F.": "https://en.wikipedia.org/wiki/Fr%C3%A9d%C3%A9ric_Chopin",
  "CLEMENTI, M.": "https://en.wikipedia.org/wiki/Muzio_Clementi",
  "COUPERIN, F.": "https://en.wikipedia.org/wiki/Fran%C3%A7ois_Couperin",
  "DEBUSSY, C.": "https://en.wikipedia.org/wiki/Claude_Debussy",
  "DIABELLI, A.": "https://en.wikipedia.org/wiki/Anton_Diabelli",
  "DVORAK, A.": "https://en.wikipedia.org/wiki/Anton%C3%ADn_Dvo%C5%99%C3%A1k",
  "EINAUDI, L.": "https://en.wikipedia.org/wiki/Ludovico_Einaudi",
  "ELGAR, E.": "https://en.wikipedia.org/wiki/Edward_Elgar",
  "FAURÉ, G.": "https://en.wikipedia.org/wiki/Gabriel_Faur%C3%A9",
  "GRANADOS, E.": "https://en.wikipedia.org/wiki/Enrique_Granados",
  "GRIEG, E.": "https://en.wikipedia.org/wiki/Edvard_Grieg",
  "HANDEL, G.F.": "https://en.wikipedia.org/wiki/George_Frideric_Handel",
  "HAYDN, J.": "https://en.wikipedia.org/wiki/Joseph_Haydn",
  "HINDEMITH, P.": "https://en.wikipedia.org/wiki/Paul_Hindemith",
  "JOPLIN, S.": "https://en.wikipedia.org/wiki/Scott_Joplin",
  "KABALEVSKY, D.": "https://en.wikipedia.org/wiki/Dmitry_Kabalevsky",
  "KHACHATURIAN, A.": "https://en.wikipedia.org/wiki/Aram_Khachaturian",
  "LISZT, F.": "https://en.wikipedia.org/wiki/Franz_Liszt",
  "MENDELSSOHN, F.": "https://en.wikipedia.org/wiki/Felix_Mendelssohn",
  "MOZART, W.A.": "https://en.wikipedia.org/wiki/Wolfgang_Amadeus_Mozart",
  "PROKOFIEV, S.": "https://en.wikipedia.org/wiki/Sergei_Prokofiev",
  "PURCELL, H.": "https://en.wikipedia.org/wiki/Henry_Purcell",
  "RAMEAU, J.-P.": "https://en.wikipedia.org/wiki/Jean-Philippe_Rameau",
  "RAVEL, M.": "https://en.wikipedia.org/wiki/Maurice_Ravel",
  "SATIE, E.": "https://en.wikipedia.org/wiki/Erik_Satie",
  "SCARLATTI, D.": "https://en.wikipedia.org/wiki/Domenico_Scarlatti",
  "SCHUBERT, F.": "https://en.wikipedia.org/wiki/Franz_Schubert",
  "SCHUMANN, R.": "https://en.wikipedia.org/wiki/Robert_Schumann",
  "SHOSTAKOVICH, D.": "https://en.wikipedia.org/wiki/Dmitri_Shostakovich",
  "TCHAIKOVSKY, P.": "https://en.wikipedia.org/wiki/Pyotr_Ilyich_Tchaikovsky",
  "TELEMANN, G.P.": "https://en.wikipedia.org/wiki/Georg_Philipp_Telemann",
  "VILLA-LOBOS, H.": "https://en.wikipedia.org/wiki/Heitor_Villa-Lobos",
  "WARLOCK, P.": "https://en.wikipedia.org/wiki/Peter_Warlock",
  "BARTÓK, B.": "https://en.wikipedia.org/wiki/B%C3%A9la_Bart%C3%B3k",
  "POULENC, F.": "https://en.wikipedia.org/wiki/Francis_Poulenc",
  "BYRD, W.": "https://en.wikipedia.org/wiki/William_Byrd",
  "FARRENC, L.": "https://en.wikipedia.org/wiki/Louise_Farrenc",
  "HENSEL, F.M.": "https://en.wikipedia.org/wiki/Fanny_Mendelssohn",
  "TURINA, J.": "https://en.wikipedia.org/wiki/Joaqu%C3%ADn_Turina",
  "JANÁČEK, L.": "https://en.wikipedia.org/wiki/Leo%C5%A1_Jan%C3%A1%C4%8Dek",
  "IRELAND, J.": "https://en.wikipedia.org/wiki/John_Ireland_(composer)",
  "GERSHWIN, G.": "https://en.wikipedia.org/wiki/George_Gershwin",
  "NORTON, C.": "https://en.wikipedia.org/wiki/Christopher_Norton_(composer)",
  "KODÁLY, Z.": "https://en.wikipedia.org/wiki/Zolt%C3%A1n_Kod%C3%A1ly",
  "BOULANGER, L.": "https://en.wikipedia.org/wiki/Lili_Boulanger",
  "NYMAN, M.": "https://en.wikipedia.org/wiki/Michael_Nyman",
  "TANSMAN, A.": "https://en.wikipedia.org/wiki/Alexandre_Tansman",
  "CASELLA, A.": "https://en.wikipedia.org/wiki/Alfredo_Casella",
};

const ERA_COLORS = {
  Baroque:'#fef3c7', Classical:'#dbeafe', Romantic:'#fce7f3',
  Modern:'#d1fae5', Contemporary:'#ede9fe'
};
const ERA_TEXT = {
  Baroque:'#92400e', Classical:'#1e40af', Romantic:'#9d174d',
  Modern:'#065f46', Contemporary:'#5b21b6'
};

function youtubeUrl(c, t) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(c.split(',')[0] + ' ' + t);
}
function sheetUrl(c, t) {
  return 'https://www.google.com/search?q=' + encodeURIComponent(c.split(',')[0] + ' ' + t + ' sheet music');
}

function App() {
  const [eraFilter, setEraFilter] = React.useState('All');
  const [natFilter, setNatFilter] = React.useState('All');
  const [search, setSearch]       = React.useState('');
  const [grpFilter, setGrpFilter] = React.useState('All');

  const eras = ['All', 'Baroque', 'Classical', 'Romantic', 'Modern', 'Contemporary'];
  const nats = React.useMemo(() => {
    const s = new Set(DATA.map(p => p.nat));
    return ['All', ...[...s].sort()];
  }, []);

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase();
    return DATA
      
          .filter(p => grpFilter === 'All' || p.grp === grpFilter)
    
      .filter(p => eraFilter === 'All' || p.era === eraFilter)
      .filter(p => natFilter === 'All' || p.nat === natFilter)
      .filter(p => !q || p.c.toLowerCase().includes(q) || p.t.toLowerCase().includes(q));
  }, [eraFilter, natFilter, search, grpFilter]);

  return (
    <div style={maxWidth:900, margin:'0 auto', padding:'0 16px 60px'}>
      {/* Header */}
      <div style={background:'linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%)', borderRadius:'0 0 20px 20px', padding:'28px 24px 24px', marginBottom:24}>
        <a href="../../index.html" style={color:'rgba(255,255,255,0.75)', fontSize:12, textDecoration:'none', display:'block', marginBottom:8}>← Piano Butler</a>
        <div style={display:'flex', alignItems:'center', gap:12, marginBottom:8}>
          <span style={background:'rgba(255,255,255,0.15)', color:'#fff', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20}>Trinity College London</span>
          <span style={background:'rgba(255,255,255,0.15)', color:'#fff', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20}>2023 Syllabus</span>
        </div>
        <h1 style={color:'#fff', fontSize:26, fontWeight:800, margin:'0 0 4px'}>Piano Grade 6</h1>
        <p style={color:'rgba(255,255,255,0.8)', fontSize:13, margin:0}>
          {filtered.length} of {DATA.length} pieces · Open pool — choose any 3 pieces for your programme
        </p>
      </div>

      {/* Search */}
      <div style={marginBottom:16}>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search composer or title..."
          style={width:'100%', padding:'10px 14px', borderRadius:10, border:'1.5px solid #e5e7eb',
                  fontSize:14, outline:'none', boxSizing:'border-box'}
        />
      </div>

      
        {/* Group A / B filter */}
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          {['All','A','B'].map(grp => (
            <button key={grp}
              onClick={() => setGrpFilter(grp)}
              style={{
                padding:'6px 16px', borderRadius:20, border:'none', cursor:'pointer',
                fontWeight: grpFilter===grp ? 700 : 500,
                background: grpFilter===grp
                  ? (grp==='A' ? '#1d4ed8' : grp==='B' ? '#7c3aed' : '#b91c1c')
                  : '#f1f5f9',
                color: grpFilter===grp ? '#fff' : '#374151',
                fontSize:13
              }}
            >{grp==='All' ? 'All Groups' : 'Group '+grp}</button>
          ))}
        </div>
        

      {/* Era filter */}
      <div style={display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}>
        {eras.map(e => (
          <button key={e} className={`filter-btn ${eraFilter===e?'active':'inactive'}`}
            onClick={()=>setEraFilter(e)}>
            {e==='All' ? 'All Eras' : e}
          </button>
        ))}
      </div>

      {/* Nationality filter */}
      <div style={marginBottom:20}>
        <select value={natFilter} onChange={e=>setNatFilter(e.target.value)}
          style={padding:'7px 12px', borderRadius:8, border:'1.5px solid #e5e7eb', fontSize:13,
                  background:'#fff', cursor:'pointer', outline:'none'}>
          {nats.map(n => <option key={n} value={n}>{n==='All'?'All Nationalities':n}</option>)}
        </select>
      </div>

      {/* Piece list */}
      {filtered.length === 0 ? (
        <div style={textAlign:'center', color:'#9ca3af', padding:40}>No pieces match your filters.</div>
      ) : filtered.map((p, i) => (
        <div key={i} className="piece-row" style={
          padding:'12px 14px', borderBottom:'1px solid #f3f4f6',
          display:'flex', flexWrap:'wrap', alignItems:'flex-start', gap:8
        }>
          <div style={flex:1, minWidth:200}>
            {/* Composer */}
            {COMPOSER_LINKS[p.c]
              ? <a href={COMPOSER_LINKS[p.c]} target="_blank" rel="noopener"
                   style={fontWeight:700, fontSize:13, color:'#b91c1c', textDecoration:'none'}>
                  {p.c}
                </a>
              : <a href={'https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(p.c.split(',')[0])}
                   target="_blank" rel="noopener"
                   style={fontWeight:700, fontSize:13, color:'#b91c1c', textDecoration:'none'}>
                  {p.c}
                </a>
            }
            {/* Title */}
            <div style={fontSize:13, color:'#374151', marginTop:2}>{p.t}</div>
            {/* Focus */}
            <div style={display:'flex', flexWrap:'wrap', gap:4, marginTop:5}>
              {(p.focus||[]).map((f,j) => (
                <span key={j} style={background:'#fef2f2', color:'#991b1b', fontSize:10, padding:'2px 7px', borderRadius:10}>{f}</span>
              ))}
            </div>
          </div>
          {/* Badges */}
          <div style={display:'flex', flexWrap:'wrap', gap:5, alignItems:'center'}>
            
            {p.grp && (
              <span style={{
                background: p.grp==='A' ? '#dbeafe' : '#ede9fe',
                color: p.grp==='A' ? '#1d4ed8' : '#7c3aed',
                fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:10
              }}>Group {p.grp}</span>
            )}
    
            <span className={`era-chip ${p.era}`}>{p.era}</span>
            <span style={background:'#f3f4f6', color:'#6b7280', fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:10}>{p.nat}</span>
            <a href={youtubeUrl(p.c, p.t)} target="_blank" rel="noopener"
               style={background:'#fee2e2', color:'#b91c1c', fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:8, textDecoration:'none'}>▶ YT</a>
            <a href={sheetUrl(p.c, p.t)} target="_blank" rel="noopener"
               style={background:'#f0fdf4', color:'#15803d', fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:8, textDecoration:'none'}>♩ Score</a>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
