  Baroque:'#fef3c7', Classical:'#dbeafe', Romantic:'#fce7f3',
  Modern:'#d1fae5', Contemporary:'#ede9fe'
};
const ERA_TEXT = {
  Baroque:'#92400e', Classical:'#1e40af', Romantic:'#9d174d',
  Modern:'#065f46', Contemporary:'#5b21b6'
};

function youtubeUrl(c, t) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(c.split(',')[0] + ' ' + t);
}
function sheetUrl(c, t) {
  return 'https://www.google.com/search?q=' + encodeURIComponent(c.split(',')[0] + ' ' + t + ' sheet music');
}

function App() {
  const [eraFilter, setEraFilter] = React.useState('All');
  const [natFilter, setNatFilter] = React.useState('All');
  const [search, setSearch]       = React.useState('');
  

  const eras = ['All', 'Baroque', 'Classical', 'Romantic', 'Modern', 'Contemporary'];
  const nats = React.useMemo(() => {
    const s = new Set(DATA.map(p => p.nat));
    return ['All', ...[...s].sort()];
  }, []);

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase();
    return DATA
      
      .filter(p => eraFilter === 'All' || p.era === eraFilter)
      .filter(p => natFilter === 'All' || p.nat === natFilter)
      .filter(p => !q || p.c.toLowerCase().includes(q) || p.t.toLowerCase().includes(q));
  }, [eraFilter, natFilter, search ]);

  return (
    <div style={maxWidth:900, margin:'0 auto', padding:'0 16px 60px'}>
      {/* Header */}

          <span style={background:'rgba(255,255,255,0.15)', color:'#fff', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20}>2023 Syllabus</span>
        </div>
        <h1 style={color:'#fff', fontSize:26, fontWeight:800, margin:'0 0 4px'}>Piano Initial</h1>
        <p style={color:'rgba(255,255,255,0.8)', fontSize:13, margin:0}>
          {filtered.length} of {DATA.length} pieces · Open pool — choose any 3 pieces for your programme
        </p>
      </div>

      {/* Search */}
      <div style={marginBottom:16}>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search composer or title..."
          style={width:'100%', padding:'10px 14px', borderRadius:10, border:'1.5px solid #e5e7eb',
                  fontSize:14, outline:'none', boxSizing:'border-box'}
        />
      </div>

      

      {/* Era filter */}
      <div style={display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}>
        {eras.map(e => (
          <button key={e} className={`filter-btn ${eraFilter===e?'active':'inactive'}`}
            onClick={()=>setEraFilter(e)}>
            {e==='All' ? 'All Eras' : e}
          </button>
        ))}
      </div>

      {/* Nationality filter */}
      <div style={marginBottom:20}>
        <select value={natFilter} onChange={e=>setNatFilter(e.target.value)}
          style={padding:'7px 12px', borderRadius:8, border:'1.5px solid #e5e7eb', fontSize:13,
                  background:'#fff', cursor:'pointer', outline:'none'}>
          {nats.map(n => <option key={n} value={n}>{n==='All'?'All Nationalities':n}</option>)}
        </select>
      </div>

      {/* Piece list */}
      {filtered.length === 0 ? (
        <div style={textAlign:'center', color:'#9ca3af', padding:40}>No pieces match your filters.</div>
      ) : filtered.map((p, i) => (
        <div key={i} className="piece-row" style={
          padding:'12px 14px', borderBottom:'1px solid #f3f4f6',
          display:'flex', flexWrap:'wrap', alignItems:'flex-start', gap:8
        }>
          <div style={flex:1, minWidth:200}>
            {/* Composer */}
            {COMPOSER_LINKS[p.c]
              ? <a href={COMPOSER_LINKS[p.c]} target="_blank" rel="noopener"
                   style={fontWeight:700, fontSize:13, color:'#b91c1c', textDecoration:'none'}>
                  {p.c}
                </a>
              : <a href={'https://en.wikipedia.org/w/index.php?search='+encodeURIComponent(p.c.split(',')[0])}
                   target="_blank" rel="noopener"
                   style={fontWeight:700, fontSize:13, color:'#b91c1c', textDecoration:'none'}>
                  {p.c}
                </a>
            }
            {/* Title */}
            <div style={fontSize:13, color:'#374151', marginTop:2}>{p.t}</div>
            {/* Focus */}
            <div style={display:'flex', flexWrap:'wrap', gap:4, marginTop:5}>
              {(p.focus||[]).map((f,j) => (
                <span key={j} style={background:'#fef2f2', color:'#991b1b', fontSize:10, padding:'2px 7px', borderRadius:10}>{f}</span>

            </div>
          </div>
          {/* Badges */}
          <div style={display:'flex', flexWrap:'wrap', gap:5, alignItems:'center'}>

            <span style={background:'#f3f4f6', color:'#6b7280', fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:10}>{p.nat}</span>

               style={background:'#fee2e2', color:'#b91c1c', fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:8, textDecoration:'none'}>▶ YT</a>

               style={background:'#f0fdf4', color:'#15803d', fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:8, textDecoration:'none'}>♩ Score</a>
          </div>
        </div>

    </div>

}
