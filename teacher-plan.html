    input, select, textarea { font-family: inherit; }

    /* ── Week card ── */

    .week-header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }

    .section-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.05em; text-transform: uppercase; }

    /* Phase colours */
    .phase-foundation { border-left: 4px solid #6366f1; }
    .phase-development { border-left: 4px solid #0891b2; }
    .phase-consolidation { border-left: 4px solid #16a34a; }
    .phase-polish { border-left: 4px solid #d97706; }
    .phase-exam { border-left: 4px solid #dc2626; }

    /* ── Print ── */
    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .week-card { break-inside: avoid; border: 1px solid #cbd5e1; box-shadow: none; }
      .week-body { display: block !important; }

/* ─── Phase logic ────────────────────────────────────────────────────────── */
function buildPhases(totalWeeks) {
  // Distribute weeks into 5 phases
  if (totalWeeks <= 4) {
    return [
      { name: "Consolidation & Polish", key: "consolidation", weeks: Math.max(1, totalWeeks - 1) },
      { name: "Exam Preparation", key: "exam", weeks: 1 },
    ];
  }
  const exam   = Math.min(2, Math.floor(totalWeeks * 0.1) + 1);
  const polish = Math.min(4, Math.floor(totalWeeks * 0.15) + 1);
  const consol = Math.min(6, Math.floor(totalWeeks * 0.2) + 1);
  const dev    = Math.min(Math.floor(totalWeeks * 0.3), totalWeeks - exam - polish - consol - 2);
  const found  = totalWeeks - exam - polish - consol - Math.max(dev, 0);
  return [
    { name: "Foundation & Learning",       key: "foundation",    weeks: Math.max(found, 1) },
    { name: "Development & Technique",     key: "development",   weeks: Math.max(dev, 0) },
    { name: "Consolidation & Memorising",  key: "consolidation", weeks: Math.max(consol, 1) },
    { name: "Polish & Performance",        key: "polish",        weeks: Math.max(polish, 1) },
    { name: "Exam Preparation",            key: "exam",          weeks: exam },
  ].filter(p => p.weeks > 0);
}

}

/* ─── docx export ────────────────────────────────────────────────────────── */
async function exportDocx(studentName, grade, syllabusType, examDate, weeks) {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, BorderStyle, TableRow, TableCell, Table, WidthType } = docx;

  const title = `${studentName || "Student"} — ${grade} ${syllabusType} Practice Plan`;
  const subtitle = `Exam date: ${examDate} · Generated by Piano Butler`;

  const children = [
    new Paragraph({ text: title, heading: HeadingLevel.HEADING_1, spacing: { after: 120 } }),
    new Paragraph({ text: subtitle, spacing: { after: 400 }, run: { color: "888888" } }),
  ];

  for (const w of weeks) {
    children.push(new Paragraph({
      text: `Week ${w.weekNum} — ${w.dateRange} · ${w.phaseName}`,
      heading: HeadingLevel.HEADING_2,
      spacing: { before: 300, after: 120 },
    }));
    children.push(new Paragraph({ text: `Focus: ${w.focus}`, spacing: { after: 80 } }));
    children.push(new Paragraph({ text: "Daily practice plan:", spacing: { after: 60 }, run: { bold: true } }));
    for (const [slot, task] of Object.entries(w.daily)) {
      children.push(new Paragraph({
        text: `• ${slot}: ${task}`,
        spacing: { after: 40 },
        indent: { left: 360 },
      }));
    }
    if (w.techWork?.length) {
      children.push(new Paragraph({ text: "Technical work this week:", spacing: { before: 120, after: 60 }, run: { bold: true } }));
      for (const t of w.techWork) {
        children.push(new Paragraph({ text: `• ${t}`, spacing: { after: 40 }, indent: { left: 360 } }));
      }
    }
    children.push(new Paragraph({ text: "", spacing: { after: 200 } }));
  }

  // Appendix
  children.push(new Paragraph({ text: "Appendix: Grade Requirements", heading: HeadingLevel.HEADING_2, spacing: { before: 400, after: 160 } }));
  children.push(new Paragraph({ text: "Sight-reading:", run: { bold: true }, spacing: { after: 60 } }));
  children.push(new Paragraph({ text: SIGHT_AURAL[grade]?.sr ?? "", spacing: { after: 120 }, indent: { left: 360 } }));
  children.push(new Paragraph({ text: "Aural:", run: { bold: true }, spacing: { after: 60 } }));
  children.push(new Paragraph({ text: SIGHT_AURAL[grade]?.aural ?? "", spacing: { after: 120 }, indent: { left: 360 } }));
  children.push(new Paragraph({ text: "General Knowledge / Viva Voce:", run: { bold: true }, spacing: { after: 60 } }));
  for (const g of (GENERAL_KNOWLEDGE[grade] ?? [])) {
    children.push(new Paragraph({ text: `• ${g}`, spacing: { after: 40 }, indent: { left: 360 } }));
  }

  const doc = new Document({ sections: [{ children }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Piano_Butler_Plan_${(studentName || "Student").replace(/\s+/g, "_")}_${grade.replace(/\s+/g, "")}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ─── SR/Aural checkbox row ─────────────────────────────────────────────── */

  return (
    <label className="flex items-center gap-2 cursor-pointer group">
      <input
        type="checkbox"
        checked={checked}
        onChange={onChange}
        className="w-3.5 h-3.5 rounded accent-indigo-500 cursor-pointer"
      />
      <span className={`text-xs transition-colors ${checked ? "line-through text-slate-300" : "text-slate-600"}`}>{label}</span>
    </label>
  );
}

          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            {/* Daily plan */}

              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Daily practice schedule</p>

                {Object.entries(week.daily).map(([slot, task]) => (

                      <span className="text-xs font-semibold text-slate-600">{slot}: </span>
                      <span className="text-xs text-slate-600">{task}</span>
                    </div>
                  </div>
                ))}

            </div>

            {/* Technical work */}
            {week.techWork?.length > 0 && (
              <div>
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Technical work</p>
                <div className="space-y-1.5">
                  {week.techWork.map((t, i) => (
                    <div key={i} className="flex gap-2">
                      <span className="text-slate-400 text-xs mt-0.5 shrink-0">•</span>
                      <span className="text-xs text-slate-600">{t}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* ── SR / Aural / GK row ── */}
          {week.showSR && (
            <div className="border-t border-slate-100 pt-4 mt-2 grid grid-cols-1 md:grid-cols-3 gap-4">

              {/* Sight-reading */}

                <p className="text-xs font-semibold text-sky-700 uppercase tracking-wide mb-2">Sight-reading</p>

                  ))}
                </div>
                <textarea
                  value={auralChecks[3] ?? ""}
                  onChange={e => setAuralChecks(prev => { const n=[...prev]; n[3]=e.target.value; return n; })}
                  className="w-full text-xs text-slate-600 border border-violet-200 bg-white rounded-lg p-2 resize-none focus:outline-none focus:ring-2 focus:ring-violet-200"
                  rows={2}
                  placeholder="Notes: skills covered, intervals, cadences..."
                />
              </div>

              {/* General Knowledge */}
              <div className="bg-amber-50 rounded-xl p-3 border border-amber-100">
                <p className="text-xs font-semibold text-amber-700 uppercase tracking-wide mb-2">General Knowledge</p>
                <textarea
                  value={gkNote}
                  onChange={e => setGkNote(e.target.value)}
                  className="w-full text-xs text-slate-600 border border-amber-200 bg-white rounded-lg p-2 resize-none focus:outline-none focus:ring-2 focus:ring-amber-200"
                  rows={5}
                  placeholder={"Piece: \nComposer: \nEra / Style: \nItalian terms covered: \nForm / Structure: \nViva voce Q&A notes:"}
                />

          {/* Teacher notes */}
          <div className="mt-4 border-t border-slate-100 pt-3">
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Teacher notes</p>
            <textarea
              value={teacherNote}
              onChange={e => setTeacherNote(e.target.value)}
              className="w-full text-xs text-slate-600 border border-slate-200 rounded-lg p-2 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-200"
              rows={2}
              placeholder="General lesson notes, homework set, parent communication..."
            />
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Main App ───────────────────────────────────────────────────────────── */
function App() {
  const [studentName, setStudentName] = useState("");
  const [grade, setGrade] = useState("Grade 5");
  const [syllabusType, setSyllabusType] = useState("Comprehensive Piano");
  const [examDate, setExamDate] = useState("");
  const [lessonsPerWeek, setLessonsPerWeek] = useState(1);
  const [minutesPerDay, setMinutesPerDay] = useState(30);
  const [generated, setGenerated] = useState(false);
  const [openWeeks, setOpenWeeks] = useState({});
  // Per-week flexible notes state: { [weekIndex]: { srChecks, auralChecks, gkNote, teacherNote } }
  const [weekNotes, setWeekNotes] = useState({});
  const printRef = useRef();

  const getWeekNotes = (i) => weekNotes[i] ?? { srChecks: [false,false,false,""], auralChecks: [false,false,false,""], gkNote: "", teacherNote: "" };
  const setWeekField = (i, field, val) => setWeekNotes(prev => ({ ...prev, [i]: { ...getWeekNotes(i), [field]: val } }));

  // Calculate weeks from today to exam date
  const { totalWeeks, startDate } = useMemo(() => {
    if (!examDate) return { totalWeeks: 0, startDate: null };
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const exam = new Date(examDate);
    const diff = Math.ceil((exam - today) / (1000 * 60 * 60 * 24 * 7));
    return { totalWeeks: Math.max(diff, 1), startDate: today };
  }, [examDate]);

  // Build week objects
  const weeks = useMemo(() => {
    if (!generated || totalWeeks === 0) return [];
    const phases = buildPhases(totalWeeks);
    const result = [];
    let weekNum = 1;
    let cursor = new Date(startDate);

    for (const phase of phases) {
      for (let i = 0; i < phase.weeks; i++) {
        const weekStart = new Date(cursor);
        const weekEnd = new Date(cursor);
        weekEnd.setDate(weekEnd.getDate() + 6);
        const fmt = (d) => d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
        const dateRange = `${fmt(weekStart)} – ${fmt(weekEnd)}`;

        const techWork = TECH_WORK[grade] ?? [];
        // SR/Aural/GK shown from development phase onwards
        const showSR = ["development", "consolidation", "polish", "exam"].includes(phase.key);

        result.push({
          weekNum,
          dateRange,
          phaseKey: phase.key,
          phaseName: phase.name,
          focus: weekFocus(phase.key, i, grade),
          daily: dailyPlan(phase.key, grade),
          techWork: phase.key === "exam" ? [] : techWork,
          showSR,
        });

        weekNum++;
        cursor.setDate(cursor.getDate() + 7);
      }
    }
    return result;
  }, [generated, totalWeeks, grade, startDate]);

  const toggleWeek = (i) => setOpenWeeks(prev => ({ ...prev, [i]: !prev[i] }));
  const openAll = () => {
    const all = {};
    weeks.forEach((_, i) => { all[i] = true; });
    setOpenWeeks(all);
  };

  const phaseColors = {
    foundation: "bg-indigo-100 text-indigo-700",
    development: "bg-cyan-100 text-cyan-700",
    consolidation: "bg-green-100 text-green-700",
    polish: "bg-amber-100 text-amber-700",
    exam: "bg-red-100 text-red-700",
  };

  const phaseSummary = useMemo(() => {
    const map = {};
    weeks.forEach(w => { map[w.phaseKey] = (map[w.phaseKey] ?? { name: w.phaseName, count: 0 }); map[w.phaseKey].count++; });
    return Object.entries(map).map(([key, v]) => ({ key, ...v }));
  }, [weeks]);

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 no-print">
        <div className="max-w-4xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <a href="Index.html" className="text-slate-400 hover:text-slate-600 text-sm">← Piano Butler</a>
            <span className="text-slate-300">|</span>
            <h1 className="text-lg font-bold text-slate-800">Teacher Weekly Plan Generator</h1>
          </div>
          <span className="text-xs text-slate-400 bg-slate-100 px-3 py-1 rounded-full">2026 AMEB Syllabus</span>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-8" ref={printRef}>

        {/* ── Form ── */}
        <div className="bg-white rounded-2xl border border-slate-200 p-6 mb-8 no-print">
          <h2 className="text-base font-bold text-slate-800 mb-5">Plan details</h2>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {/* Student name */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Student name</label>
              <input
                type="text"
                value={studentName}
                onChange={e => setStudentName(e.target.value)}
                placeholder="e.g. Emily Chen"
                className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
            </div>

            {/* Grade */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">AMEB Grade</label>
              <select
                value={grade}
                onChange={e => { setGrade(e.target.value); setGenerated(false); }}
                className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white"
              >
                {GRADES.map(g => <option key={g}>{g}</option>)}
              </select>
            </div>

            {/* Syllabus type */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Syllabus type</label>
              <div className="flex gap-2">
                {SYLLABUS_TYPE.map(t => (
                  <button
                    key={t}
                    onClick={() => setSyllabusType(t)}
                    className={`flex-1 py-2.5 rounded-xl text-sm font-medium border transition-all ${
                      syllabusType === t
                        ? "bg-indigo-600 text-white border-indigo-600"
                        : "bg-white text-slate-600 border-slate-200 hover:border-indigo-300"
                    }`}
                  >{t}</button>
                ))}
              </div>
            </div>

            {/* Exam date */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Exam date</label>
              <input
                type="date"
                value={examDate}
                onChange={e => { setExamDate(e.target.value); setGenerated(false); }}
                className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              />
              {examDate && totalWeeks > 0 && (
                <p className="text-xs text-indigo-600 mt-1.5">{totalWeeks} weeks until exam</p>
              )}
            </div>

            {/* Practice per day */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
                Daily practice target: <span className="text-indigo-600">{minutesPerDay} min</span>
              </label>
              <input
                type="range"
                min={15} max={120} step={5}
                value={minutesPerDay}
                onChange={e => setMinutesPerDay(Number(e.target.value))}
                className="w-full"
              />
              <div className="flex justify-between text-xs text-slate-400 mt-1">
                <span>15 min</span><span>120 min</span>
              </div>
            </div>

            {/* Lessons per week */}
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Lessons per week</label>
              <div className="flex gap-2">
                {[1, 2].map(n => (
                  <button
                    key={n}
                    onClick={() => setLessonsPerWeek(n)}
                    className={`flex-1 py-2.5 rounded-xl text-sm font-medium border transition-all ${
                      lessonsPerWeek === n
                        ? "bg-indigo-600 text-white border-indigo-600"
                        : "bg-white text-slate-600 border-slate-200 hover:border-indigo-300"
                    }`}
                  >{n}× per week</button>
                ))}
              </div>
            </div>
          </div>

          {/* Generate button */}
          <div className="mt-6 flex gap-3">
            <button
              onClick={() => { if (examDate && totalWeeks > 0) { setGenerated(true); setOpenWeeks({ 0: true }); } }}
              disabled={!examDate || totalWeeks <= 0}
              className="flex-1 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-semibold py-3 rounded-xl transition-all text-sm"
            >
              {!examDate ? "Set an exam date to generate" : generated ? "Regenerate plan" : `Generate ${totalWeeks}-week plan →`}
            </button>
          </div>
        </div>

        {/* ── Generated plan ── */}
        {generated && weeks.length > 0 && (
          <>
            {/* Plan header */}
            <div className="flex flex-wrap items-start justify-between gap-4 mb-6">
              <div>
                <h2 className="text-xl font-bold text-slate-800">
                  {studentName ? `${studentName}'s plan` : "Practice plan"} — {grade}
                </h2>
                <p className="text-sm text-slate-500 mt-0.5">
                  {syllabusType} · {totalWeeks} weeks · Exam {new Date(examDate).toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" })}
                </p>
              </div>
              <div className="flex flex-wrap gap-2 no-print">
                <button onClick={openAll} className="text-xs px-3 py-1.5 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50">Expand all</button>
                <button onClick={() => window.print()} className="text-xs px-3 py-1.5 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50">🖨 Print</button>
                <button
                  onClick={() => exportDocx(studentName, grade, syllabusType, examDate, weeks)}
                  className="text-xs px-3 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
                >⬇ Download .docx</button>
              </div>
            </div>

            {/* Phase summary bar */}
            <div className="flex flex-wrap gap-2 mb-6 no-print">
              {phaseSummary.map(p => (
                <span key={p.key} className={`text-xs font-semibold px-3 py-1.5 rounded-full ${phaseColors[p.key]}`}>
                  {p.name} · {p.count}w
                </span>
              ))}
            </div>

            {/* Grade requirements summary */}
            <div className="bg-white rounded-2xl border border-slate-200 p-5 mb-6">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-bold text-slate-700">Technical work — {grade}</h3>
                <span className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded-full">From AMEB Technical Workbook</span>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-slate-600">
                {(TECH_WORK[grade] ?? []).map((t, i) => (
                  <div key={i} className="flex gap-2">
                    <span className="text-slate-300 shrink-0">•</span>
                    <span>{t}</span>
                  </div>
                ))}
              </div>
              <div className="mt-4 pt-3 border-t border-slate-100 flex gap-2 items-start">
                <span className="text-amber-500 text-xs mt-0.5 shrink-0">ℹ</span>
                <p className="text-xs text-slate-400">Sight-reading, Aural, and General Knowledge are tracked per week using the flexible fields below. Fill in based on your lesson and the actual books/pieces used.</p>
              </div>
            </div>

            {/* Week cards */}
            {weeks.map((week, i) => {
              const wn = getWeekNotes(i);
              return (
                <WeekCard
                  key={i}
                  week={week}
                  isOpen={!!openWeeks[i]}
                  onToggle={() => toggleWeek(i)}
                  srChecks={wn.srChecks}
                  setSrChecks={val => setWeekField(i, "srChecks", typeof val === "function" ? val(wn.srChecks) : val)}
                  auralChecks={wn.auralChecks}
                  setAuralChecks={val => setWeekField(i, "auralChecks", typeof val === "function" ? val(wn.auralChecks) : val)}
                  gkNote={wn.gkNote}
                  setGkNote={val => setWeekField(i, "gkNote", val)}
                  teacherNote={wn.teacherNote}
                  setTeacherNote={val => setWeekField(i, "teacherNote", val)}
                />
              );
            })}

            {/* Footer note */}
            <p className="text-xs text-slate-400 text-center mt-8 no-print">
              Generated by Piano Butler · 2026 AMEB Syllabus · Adjust weekly focus to suit individual student needs
            </p>
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
