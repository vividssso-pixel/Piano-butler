<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <title>Piano Butler Logo</title>
  <desc>Watch mark at 10:30 with staff lines — Piano Butler brand mark</desc>

  <g transform="translate(200, 185)">
    <!-- outer circle -->
    <circle cx="0" cy="0" r="88" fill="none" stroke="#111111" stroke-width="2.4"/>
    <!-- inner guide -->
    <circle cx="0" cy="0" r="77" fill="none" stroke="#111111" stroke-width="0.5" opacity="0.18"/>

    <!-- 5 staff lines -->
    <line x1="-74" y1="-24" x2="74" y2="-24" stroke="#111111" stroke-width="1.1" opacity="0.18"/>
    <line x1="-78" y1="-12" x2="78" y2="-12" stroke="#111111" stroke-width="1.1" opacity="0.18"/>
    <line x1="-80" y1="0"   x2="80" y2="0"   stroke="#111111" stroke-width="1.1" opacity="0.18"/>
    <line x1="-78" y1="12"  x2="78" y2="12"  stroke="#111111" stroke-width="1.1" opacity="0.18"/>
    <line x1="-74" y1="24"  x2="74" y2="24"  stroke="#111111" stroke-width="1.1" opacity="0.18"/>

    <!-- hand shaft: dot edge to arrowhead base, 45° upper-left (10:30) -->
    <line x1="-6.4" y1="-6.4" x2="-36.8" y2="-36.8"
          stroke="#111111" stroke-width="2.6" stroke-linecap="butt"/>

    <!-- arrowhead: tip=(-46.7,-46.7), wings=(-41.7,-31.8) and (-31.8,-41.7) -->
    <polygon points="-46.7,-46.7 -41.7,-31.8 -31.8,-41.7" fill="#111111"/>

    <!-- crown -->
    <rect x="-7" y="-100" width="14" height="14" rx="3.5" fill="#111111"/>

    <!-- center dot on middle staff line -->
    <circle cx="0" cy="0" r="9" fill="#111111"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="318" text-anchor="middle"
        font-family="Georgia, serif" font-size="21"
        letter-spacing="4" fill="#111111">PIANO BUTLER</text>
  <line x1="56" y1="327" x2="344" y2="327" stroke="#111111" stroke-width="0.5"/>
  <text x="200" y="343" text-anchor="middle"
        font-family="Georgia, serif" font-size="8"
        letter-spacing="3" fill="#bbbbbb">AT YOUR SERVICE, ALWAYS ON TIME.</text>
</svg>
