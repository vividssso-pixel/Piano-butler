<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Find Your Match | Piano Butler</title>
  <meta name="description" content="Get matched to piano teachers and courses based on your personal diagnosis results.">
  <meta name="robots" content="index, follow">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    :root {
      --bg:      #1a1a1a;
      --surface: #242424;
      --border:  #333333;
      --text:    #e8e3dc;
      --muted:   #888880;
      --accent:  #d4956a;
      --accent2: #c07d54;
    }
    * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
    body { background: var(--bg); margin: 0; color: var(--text); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.25s ease both; }

    .card {
      background: var(--surface); border-radius: 18px;
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.4); transform: translateY(-2px); }

    .tag {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .badge-domain {
      padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }

    .match-bar-wrap { height: 5px; background: #333; border-radius: 4px; overflow: hidden; margin: 6px 0 2px; }
    .match-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

    .cta-btn {
      display: inline-block; padding: 11px 22px; border-radius: 11px;
      font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: all 0.16s; border: none;
    }
    .cta-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

    .tab-btn {
      padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #1a1a1a; }

    .platform-logo {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ══════════════════════════════════════════
   DOMAIN CONFIG
══════════════════════════════════════════ */
const DOMAINS = {

  technique: { label: 'Technique',    emoji: '🎹', color: '#4ade80', bg: '#0d2318', border: '#065f46' },
  theory:    { label: 'Theory',       emoji: '🧠', color: '#fbbf24', bg: '#2a1f0a', border: '#b45309' },

/* ══════════════════════════════════════════
   TEACHER DATA
   Replace with real teachers when ready.
   Each teacher has a `strengths` array —
   matched to the user's weak domains.
══════════════════════════════════════════ */
const TEACHERS = [
  {
    id: 't1',
    name: 'Sohyun Park',
    title: 'AMEB Specialist · 10+ years',
    location: 'Melbourne, VIC · Online available',
    avatar: '🎹',
    avatarBg: '#2a2540',

    grades: 'Prelim – Grade 8 · AMusA',

    bookingUrl: 'mailto:vividssso@gmail.com?subject=Piano Lesson Enquiry via Piano Butler',
    bookingLabel: 'Send enquiry',

    tagBg: '#2d1e10',
  },
  {
    id: 't2',
    name: 'Are you a piano teacher?',

    location: 'Australia-wide · Online available',
    avatar: '🎵',
    avatarBg: '#0d2318',
    strengths: ['ear', 'sight', 'technique', 'theory'],
    specialties: ['All specialties welcome'],
    grades: 'All levels',
    price: 'Set your own rate',
    intro: 'Piano Butler matches returning adult learners to teachers based on their diagnosis. If you work with adults or returning players, we\'d love to list you.',
    bookingUrl: 'mailto:vividssso@gmail.com?subject=Teacher Listing — Piano Butler',

  },

/* ══════════════════════════════════════════
   COURSE / PLATFORM DATA
   Affiliate links go here when ready.
══════════════════════════════════════════ */
const PLATFORMS = [
  {
    id: 'p1',
    name: 'Piano Marvel',
    logo: '🎯',
    logoBg: '#2a2540',
    tagline: 'Structured method + sight-reading trainer',
    desc: 'Game-like platform that builds sight-reading and technique systematically. Great for self-starters and students who want measurable progress.',
    strengths: ['sight', 'technique'],
    price: '~$20/month',
    url: 'https://www.pianomarvel.com',
    label: 'Try Piano Marvel →',
    color: '#d4956a',
    bg: '#2d1e10',
  },
  {
    id: 'p2',
    name: 'Musicarta',
    logo: '🎼',
    logoBg: '#0d2318',
    tagline: 'Theory through creativity and improvisation',
    desc: 'Teaches music theory by doing — chord progressions, improvisation, ear training woven into real piano playing. Perfect for theory and ear development.',
    strengths: ['theory', 'ear'],
    price: 'Free resources + paid courses',
    url: 'https://www.musicarta.com',
    label: 'Explore Musicarta →',
    color: '#4ade80',
    bg: '#0d2318',
  },
  {
    id: 'p3',
    name: 'Lessonface',
    logo: '👩‍🏫',
    logoBg: '#2a1f0a',
    tagline: 'Live online lessons with vetted teachers',
    desc: 'Book live 1-on-1 lessons with professional piano teachers worldwide. Good for targeted work on any weak area with real-time feedback.',
    strengths: ['ear', 'sight', 'technique', 'theory'],
    price: 'From $30 / lesson',
    url: 'https://www.lessonface.com/piano-lessons',
    label: 'Find a teacher →',
    color: '#fbbf24',
    bg: '#2a1f0a',
  },
  {
    id: 'p4',
    name: 'Musicnotes',
    logo: '🎵',
    logoBg: '#2d1f3d',
    tagline: 'Sheet music matched to your repertoire picks',
    desc: 'Download the exact pieces recommended in your diagnosis. 400,000+ titles, instant PDF download, all grades and styles.',
    strengths: ['sight', 'technique', 'ear', 'theory'],
    price: 'From $4.99 / piece',
    url: 'https://www.musicnotes.com',
    label: 'Find sheet music →',
    color: '#c084fc',

  },
  {
    id: 'p5',
    name: 'Simply Piano',
    logo: '📱',
    logoBg: '#0c2233',

    desc: 'Listens to you play via your phone mic and gives instant feedback. Great for self-practice between lessons — especially for ear development and technique.',
    strengths: ['ear', 'technique'],
    price: '~$20/month',
    url: 'https://www.joytunes.com/simply-piano',

    bg: '#0c2233',
  },
];

/* ══════════════════════════════════════════
   MATCH SCORING
══════════════════════════════════════════ */
function matchScore(itemStrengths, weakDomains) {
  if (!weakDomains || weakDomains.length === 0) return 50;
  const hits = itemStrengths.filter(s => weakDomains.includes(s)).length;
  return Math.round((hits / weakDomains.length) * 100);
}

/* ══════════════════════════════════════════
   TEACHER CARD
══════════════════════════════════════════ */
function TeacherCard({ teacher, weakDomains, idx }) {
  const score = matchScore(teacher.strengths, weakDomains);
  const matchedDomains = teacher.strengths.filter(s => weakDomains.includes(s));

  return (
    <div className="card fade-up" style={{ padding: '22px', marginBottom: 16,
      animationDelay: `${idx * 0.08}s` }}>
      <div style={{ display: 'flex', gap: 14, marginBottom: 14 }}>
        {/* Avatar */}
        <div style={{ width: 52, height: 52, borderRadius: 14, flexShrink: 0,
          background: teacher.avatarBg, display: 'flex', alignItems: 'center',
          justifyContent: 'center', fontSize: 24 }}>
          {teacher.avatar}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: '#e8e3dc' }}>{teacher.name}</span>
            <span className="tag" style={{ background: teacher.tagBg, color: teacher.tagColor }}>
              {teacher.tag}
            </span>
          </div>
          <div style={{ fontSize: 12, color: '#888880', marginTop: 2 }}>{teacher.title}</div>
          <div style={{ fontSize: 11, color: '#666660', marginTop: 1 }}>📍 {teacher.location}</div>
        </div>
        {/* Match score */}
        {weakDomains.length > 0 && (
          <div style={{ textAlign: 'center', flexShrink: 0 }}>
            <div style={{ fontSize: 20, fontWeight: 900,
              color: score >= 70 ? '#4ade80' : score >= 40 ? '#fbbf24' : '#888880' }}>
              {score}%
            </div>
            <div style={{ fontSize: 10, color: '#888880', fontWeight: 600 }}>match</div>
          </div>
        )}
      </div>

      {/* Match bar */}
      {weakDomains.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          <div className="match-bar-wrap">
            <div className="match-bar" style={{
              width: `${score}%`,
              background: score >= 70 ? '#4ade80' : score >= 40 ? '#fbbf24' : '#555550'
            }} />
          </div>
          {matchedDomains.length > 0 && (
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginTop: 6 }}>
              <span style={{ fontSize: 11, color: '#888880', fontWeight: 600 }}>Covers your weak areas:</span>
              {matchedDomains.map(d => (
                <span key={d} className="badge-domain"
                  style={{ background: DOMAINS[d].bg, color: DOMAINS[d].color }}>
                  {DOMAINS[d].emoji} {DOMAINS[d].label}
                </span>
              ))}
            </div>
          )}
        </div>
      )}

      <p style={{ fontSize: 13, color: '#aaa49e', lineHeight: 1.6, margin: '0 0 12px' }}>
        {teacher.intro}
      </p>

      {/* Specialties */}
      <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginBottom: 14 }}>
        {teacher.specialties.map((s, i) => (
          <span key={i} className="tag" style={{ background: '#2e2e2e', color: '#aaa49e' }}>{s}</span>
        ))}
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 10 }}>
        <div>
          <div style={{ fontSize: 12, color: '#888880' }}>🎓 {teacher.grades}</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#e8e3dc', marginTop: 2 }}>
            {teacher.price}
          </div>
        </div>
        <a href={teacher.bookingUrl} className="cta-btn"
          style={{ background: '#d4956a', color: '#1a1a1a' }}>
          {teacher.bookingLabel} →
        </a>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PLATFORM CARD
══════════════════════════════════════════ */
function PlatformCard({ platform, weakDomains, idx }) {
  const score = matchScore(platform.strengths, weakDomains);
  const matchedDomains = platform.strengths.filter(s => weakDomains.includes(s));

  return (
    <div className="card fade-up" style={{ padding: '20px', marginBottom: 14,
      animationDelay: `${idx * 0.07}s` }}>
      <div style={{ display: 'flex', gap: 12, marginBottom: 10 }}>
        <div className="platform-logo" style={{ background: platform.logoBg }}>
          {platform.logo}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: '#e8e3dc' }}>{platform.name}</span>
            {weakDomains.length > 0 && score >= 50 && (
              <span className="tag" style={{ background: '#0d2318', color: '#4ade80' }}>
                ✓ Matches your needs
              </span>
            )}
          </div>
          <div style={{ fontSize: 12, color: '#888880', marginTop: 2 }}>{platform.tagline}</div>
        </div>
        {weakDomains.length > 0 && (
          <div style={{ textAlign: 'center', flexShrink: 0 }}>
            <div style={{ fontSize: 18, fontWeight: 900,
              color: score >= 70 ? '#4ade80' : score >= 40 ? '#fbbf24' : '#888880' }}>
              {score}%
            </div>
            <div style={{ fontSize: 10, color: '#888880', fontWeight: 600 }}>match</div>
          </div>
        )}
      </div>

      {weakDomains.length > 0 && matchedDomains.length > 0 && (
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 }}>
          {matchedDomains.map(d => (
            <span key={d} className="badge-domain"
              style={{ background: DOMAINS[d].bg, color: DOMAINS[d].color }}>
              {DOMAINS[d].emoji} {DOMAINS[d].label}
            </span>
          ))}
        </div>
      )}

      <p style={{ fontSize: 13, color: '#aaa49e', lineHeight: 1.6, margin: '0 0 12px' }}>
        {platform.desc}
      </p>

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 8 }}>
        <span style={{ fontSize: 12, color: '#888880', fontWeight: 600 }}>{platform.price}</span>
        <a href={platform.url} target="_blank" rel="noopener" className="cta-btn"
          style={{ background: platform.bg, color: platform.color,
            border: `1.5px solid ${platform.color}20` }}>
          {platform.label}
        </a>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('teachers'); // 'teachers' | 'courses'
  const [diagResult, setDiagResult] = useState(null);

  // Read diagnosis from localStorage
  useEffect(() => {
    try {
      const raw = localStorage.getItem('pb_diagnosis_v1');
      if (raw) setDiagResult(JSON.parse(raw));
    } catch(e) {}
  }, []);

  const weakDomains = diagResult
    ? Object.entries(diagResult.scores)
        .sort((a,b) => a[1] - b[1])
        .slice(0, 2)
        .map(([id]) => id)
    : [];

  const hasDiagnosis = !!diagResult;

  // Sort teachers by match score
  const sortedTeachers = [...TEACHERS].sort(
    (a,b) => matchScore(b.strengths, weakDomains) - matchScore(a.strengths, weakDomains)
  );

  // Sort platforms by match score
  const sortedPlatforms = [...PLATFORMS].sort(
    (a,b) => matchScore(b.strengths, weakDomains) - matchScore(a.strengths, weakDomains)
  );

  return (
    <div style={{ minHeight: '100vh', background: '#1a1a1a' }}>

      {/* ── Header ── */}
      <div style={{ background: 'linear-gradient(135deg, #1a1a1a 0%, #2a1e12 60%, #3a2418 100%)',
        borderBottom: '1px solid #333', padding: '32px 20px 28px', color: '#e8e3dc' }}>
        <div style={{ maxWidth: 640, margin: '0 auto' }}>
          <a href="index.html" style={{ color: '#888880', textDecoration: 'none',
            fontSize: 13, fontWeight: 600 }}>← Piano Butler</a>

          <div style={{ marginTop: 20 }}>
            <h1 style={{ fontSize: 26, fontWeight: 900, margin: '0 0 8px' }}>
              {hasDiagnosis ? 'Your personalised matches' : 'Find your piano match'}
            </h1>
            <p style={{ fontSize: 14, color: '#aaa49e', margin: 0, lineHeight: 1.6 }}>
              {hasDiagnosis
                ? 'Based on your diagnosis — matched to your development areas.'
                : 'Connect with teachers and courses that fit your goals.'}
            </p>
          </div>

          {/* Diagnosis summary pills */}
          {hasDiagnosis && weakDomains.length > 0 && (
            <div style={{ marginTop: 16, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 11, color: '#888880', fontWeight: 600,
                alignSelf: 'center' }}>Focus areas:</span>
              {weakDomains.map(d => (
                <span key={d} style={{ padding: '4px 12px', borderRadius: 20,
                  background: '#2e2e2e', color: '#e8e3dc',
                  fontSize: 12, fontWeight: 700 }}>
                  {DOMAINS[d].emoji} {DOMAINS[d].label}
                </span>
              ))}
              <a href="diagnose.html" style={{ padding: '4px 12px', borderRadius: 20,
                background: '#2e2e2e', color: '#888880',
                fontSize: 11, fontWeight: 600, textDecoration: 'none', alignSelf: 'center' }}>
                ↺ Retake
              </a>
            </div>
          )}

          {/* No diagnosis prompt */}
          {!hasDiagnosis && (
            <div style={{ marginTop: 16, padding: '12px 16px', borderRadius: 12,
              background: '#2a2a2a', border: '1px solid #333', display: 'flex',
              alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
              <span style={{ fontSize: 13, color: '#aaa49e' }}>
                💡 Take the free diagnosis to get personalised matches
              </span>
              <a href="diagnose.html" style={{ padding: '8px 16px', borderRadius: 10,
                background: '#d4956a', color: '#1a1a1a', fontWeight: 700,
                fontSize: 13, textDecoration: 'none' }}>
                Start diagnosis →
              </a>
            </div>
          )}
        </div>
      </div>

      {/* ── Tab bar ── */}
      <div style={{ background: '#1e1e1e', borderBottom: '1.5px solid #333',
        padding: '14px 20px', position: 'sticky', top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 640, margin: '0 auto', display: 'flex', gap: 8 }}>
          <button className={`tab-btn ${tab === 'teachers' ? 'active' : ''}`}
            onClick={() => setTab('teachers')}>
            👩‍🏫 Teachers
          </button>
          <button className={`tab-btn ${tab === 'courses' ? 'active' : ''}`}
            onClick={() => setTab('courses')}>
            📚 Courses & Apps
          </button>
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{ maxWidth: 640, margin: '0 auto', padding: '24px 20px 60px' }}>

        {tab === 'teachers' && (
          <div>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ fontSize: 16, fontWeight: 800, color: '#e8e3dc', margin: '0 0 4px' }}>
                {hasDiagnosis ? 'Teachers matched to your profile' : 'Piano teachers'}
              </h2>
              <p style={{ fontSize: 13, color: '#888880', margin: 0 }}>
                {hasDiagnosis
                  ? 'Sorted by how well they cover your development areas.'
                  : 'Connect with experienced piano teachers.'}
              </p>
            </div>
            {sortedTeachers.map((t, i) => (
              <TeacherCard key={t.id} teacher={t} weakDomains={weakDomains} idx={i} />
            ))}

            {/* List your studio CTA */}
            <div style={{ background: '#242424',
              borderRadius: 16, padding: '20px', border: '1.5px solid #333',
              textAlign: 'center', marginTop: 8 }}>
              <div style={{ fontSize: 22, marginBottom: 8 }}>🎹</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: '#e8e3dc', marginBottom: 6 }}>
                Are you a piano teacher?
              </div>
              <p style={{ fontSize: 13, color: '#888880', lineHeight: 1.6, margin: '0 0 14px' }}>
                Get listed and be matched to students whose diagnosis fits your specialty.
              </p>
              <a href="mailto:vividssso@gmail.com?subject=Teacher Listing — Piano Butler"
                className="cta-btn" style={{ background: '#d4956a', color: '#1a1a1a' }}>
                Apply to be listed →
              </a>
            </div>
          </div>
        )}

        {tab === 'courses' && (
          <div>
            <div style={{ marginBottom: 20 }}>
              <h2 style={{ fontSize: 16, fontWeight: 800, color: '#e8e3dc', margin: '0 0 4px' }}>
                {hasDiagnosis ? 'Courses & apps matched to your profile' : 'Courses & apps'}
              </h2>
              <p style={{ fontSize: 13, color: '#888880', margin: 0 }}>
                {hasDiagnosis
                  ? 'Sorted by how well they address your weak areas.'
                  : 'Platforms to help you grow as a pianist.'}
              </p>
            </div>
            {sortedPlatforms.map((p, i) => (
              <PlatformCard key={p.id} platform={p} weakDomains={weakDomains} idx={i} />
            ))}

            {/* Affiliate note */}
            <div style={{ marginTop: 16, padding: '12px 16px', borderRadius: 12,
              background: '#2a2a2a', border: '1px solid #333' }}>
              <p style={{ fontSize: 11, color: '#666660', margin: 0, lineHeight: 1.5 }}>
                Piano Butler may earn a small commission if you sign up via these links —
                at no extra cost to you. We only list platforms we genuinely recommend.
              </p>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ padding: 40, color: '#dc2626', fontFamily: 'monospace' }}>
        <h2>Something went wrong</h2>
        <pre style={{ whiteSpace: 'pre-wrap', fontSize: 12 }}>{String(this.state.error)}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
