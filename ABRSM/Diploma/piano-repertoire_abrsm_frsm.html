  "SCHUMANN, R.": "https://en.wikipedia.org/wiki/Robert_Schumann",
  "SCRIABIN": "https://en.wikipedia.org/wiki/Alexander_Scriabin",

  "STRAVINSKY": "https://en.wikipedia.org/wiki/Igor_Stravinsky",

  "TIPPETT": "https://en.wikipedia.org/wiki/Michael_Tippett",
  "TIPPETT, M.": "https://en.wikipedia.org/wiki/Michael_Tippett",
  "VINE, Carl": "https://en.wikipedia.org/wiki/Carl_Vine",
  "WEIR, Judith": "https://en.wikipedia.org/wiki/Judith_Weir",
  "WILD, E.": "https://en.wikipedia.org/wiki/Earl_Wild"
};
</script>

<script type="text/babel">
const { useState, useMemo } = React;

const ERA_COLORS = {
  Baroque:      { bg: "#fef3c7", text: "#92400e" },
  Classical:    { bg: "#dbeafe", text: "#1e40af" },
  Romantic:     { bg: "#fce7f3", text: "#9d174d" },
  Modern:       { bg: "#d1fae5", text: "#065f46" },
  Contemporary: { bg: "#ede9fe", text: "#5b21b6" },
};

const ERAS = ["Baroque", "Classical", "Romantic", "Modern", "Contemporary"];

function ytUrl(c, t) {
  return "https://www.youtube.com/results?search_query=" + encodeURIComponent(c.split(",")[0] + " " + t.split(":")[0]);
}
function sheetUrl(c, t) {
  return "https://www.google.com/search?q=" + encodeURIComponent(c.split(",")[0] + " " + t.split(":")[0] + " sheet music");
}

function PieceCard({ p }) {
  const ec = ERA_COLORS[p.era] || { bg: "#f3f4f6", text: "#374151" };
  const wikiUrl = COMPOSER_LINKS[p.c] || ("https://en.wikipedia.org/wiki/Special:Search?search=" + encodeURIComponent(p.c));
  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", boxShadow: "0 1px 4px rgba(0,0,0,0.07)", borderLeft: "4px solid #4c1d95" }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
        <div style={{ flex: 1 }}>
          <a href={wikiUrl} target="_blank" rel="noopener noreferrer"
             style={{ fontWeight: 700, fontSize: "0.85rem", color: "#1e1b4b", letterSpacing: "0.02em", textDecoration: "none" }}
             onMouseOver={e => e.target.style.color="#4c1d95"} onMouseOut={e => e.target.style.color="#1e1b4b"}>
            {p.c}
          </a>
          <div style={{ fontSize: "0.9rem", color: "#374151", marginTop: 2, lineHeight: 1.4 }}>{p.t}</div>
          <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 4 }}>
            <span style={{ background: ec.bg, color: ec.text, fontSize: "0.68rem", fontWeight: 700, padding: "2px 8px", borderRadius: 999 }}>{p.era}</span>
            <span style={{ background: "#f3f4f6", color: "#6b7280", fontSize: "0.68rem", fontWeight: 600, padding: "2px 8px", borderRadius: 999 }}>{p.nat}</span>
            {(p.focus||[]).map((f,i) => (
              <span key={i} style={{ background: "#f3e8ff", color: "#6b21a8", fontSize: "0.65rem", fontWeight: 500, padding: "2px 7px", borderRadius: 999 }}>{f}</span>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
          <a href={ytUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
             style={{ background: "#fee2e2", color: "#991b1b", borderRadius: 8, padding: "4px 8px", fontSize: "0.7rem", fontWeight: 700, textDecoration: "none" }}>▶ YT</a>
          <a href={sheetUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
             style={{ background: "#dbeafe", color: "#1e40af", borderRadius: 8, padding: "4px 8px", fontSize: "0.7rem", fontWeight: 700, textDecoration: "none" }}>♪ Sheet</a>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [search, setSearch] = useState("");
  const [eraFilter, setEraFilter] = useState("All");
  const [natFilter, setNatFilter] = useState("All");

  const nats = useMemo(() => {
    const s = new Set(DATA_ABRSM_FRSM.map(p => p.nat));
    return ["All", ...Array.from(s).sort()];
  }, []);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return DATA_ABRSM_FRSM.filter(p => {
      if (eraFilter !== "All" && p.era !== eraFilter) return false;
      if (natFilter !== "All" && p.nat !== natFilter) return false;
      if (q && !p.c.toLowerCase().includes(q) && !p.t.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [search, eraFilter, natFilter]);

  return (
    <div style={{ minHeight: "100vh", background: "#f8f7f4" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f0a1e 0%, #1e1b4b 40%, #4c1d95 100%)", color: "#fff", padding: "32px 24px 28px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <a href="../../index.html" style={{ color: "rgba(255,255,255,0.7)", fontSize: "0.8rem", textDecoration: "none", display: "inline-block", marginBottom: 8 }}>← Piano Butler</a>
              <h1 style={{ fontSize: "1.8rem", fontWeight: 800, margin: 0 }}>ABRSM FRSM</h1>
              <p style={{ margin: "4px 0 0", opacity: 0.85, fontSize: "0.95rem" }}>Fellow of the Royal Schools of Music — Piano Repertoire List</p>
            </div>
            <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 12, padding: "12px 18px", textAlign: "center" }}>
              <div style={{ fontSize: "2rem", fontWeight: 800 }}>{DATA_ABRSM_FRSM.length}</div>
              <div style={{ fontSize: "0.75rem", opacity: 0.85 }}>repertoire entries</div>
            </div>
          </div>
          {/* Exam banner */}
          <div style={{ marginTop: 18, background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "12px 16px", fontSize: "0.82rem", display: "flex", flexWrap: "wrap", gap: "8px 24px" }}>
            <span>🎓 <strong>FRSM</strong> — Fellowship Diploma (highest level)</span>
            <span>🎵 Open repertoire pool — programme per qualification spec</span>
            <span>📅 Valid from November 2023</span>
            <span>🔗 <a href="https://www.abrsm.org/en-gb/exam-support/music-performance-diplomas/piano/" target="_blank" rel="noopener noreferrer" style={{ color: "#c4b5fd" }}>ABRSM Diploma info</a></span>
          </div>
        </div>
      </div>

      {/* Filters */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 24px 0" }}>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search composer or title…"
          style={{ width: "100%", border: "1.5px solid #e5e7eb", borderRadius: 10, padding: "10px 16px", fontSize: "0.95rem", outline: "none", background: "#fff", boxSizing: "border-box" }}
        />
        <div style={{ marginTop: 12, display: "flex", flexWrap: "wrap", gap: 6 }}>
          {["All", ...ERAS].map(e => {
            const active = eraFilter === e;
            const ec = ERA_COLORS[e];
            return (
              <button key={e} onClick={() => setEraFilter(e)}
                style={{ padding: "5px 14px", borderRadius: 999, border: active ? "2px solid #4c1d95" : "2px solid transparent",
                  background: active ? (ec ? ec.bg : "#f3e8ff") : "#f3f4f6",
                  color: active ? (ec ? ec.text : "#6b21a8") : "#6b7280",
                  fontWeight: active ? 700 : 500, fontSize: "0.8rem", cursor: "pointer" }}>
                {e}
              </button>
            );
          })}
        </div>
        <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}>
          <label style={{ fontSize: "0.8rem", color: "#6b7280", fontWeight: 600 }}>Nationality:</label>
          <select value={natFilter} onChange={e => setNatFilter(e.target.value)}
            style={{ border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "5px 10px", fontSize: "0.85rem", background: "#fff", outline: "none" }}>
            {nats.map(n => <option key={n}>{n}</option>)}
          </select>
          <span style={{ fontSize: "0.8rem", color: "#9ca3af" }}>{filtered.length} of {DATA_ABRSM_FRSM.length} pieces</span>
        </div>
      </div>

      {/* Pieces */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "16px 24px 40px" }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 0", color: "#9ca3af" }}>
            <div style={{ fontSize: "2rem" }}>🎹</div>
            <div style={{ marginTop: 8 }}>No pieces found. Try adjusting your filters.</div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map((p, i) => <PieceCard key={i} p={p} />)}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
