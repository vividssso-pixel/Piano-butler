function sheetUrl(composer, title) {
    const q = encodeURIComponent(composer.split(',')[0] + ' ' + title + ' sheet music');
    return 'https://www.google.com/search?q=' + q;
}

// ── YOUTUBE MODAL ─────────────────────────────────────────────────────────────
const YT_API_KEY = "AIzaSyDR9BQfybtyS2e-H9wgtFgWbfqlQWpLCW8"; // ← paste your key here

function useVideoModal() {
    const [modal, setModal] = React.useState(null); // { videoId, title }
    const open = React.useCallback(async (composer, title) => {
        setModal({ videoId: null, title: title, loading: true });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            const item = data.items && data.items[0];
            if (item) {
                setModal({ videoId: item.id.videoId, title: item.snippet.title, loading: false });
            } else {
                setModal(null);
                window.open('https://www.youtube.com/results?search_query=' + q, '_blank');
            }
        } catch(e) {
            setModal(null);
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            window.open('https://www.youtube.com/results?search_query=' + q, '_blank');
        }
    }, []);
    const close = React.useCallback(() => setModal(null), []);
    return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
    if (!modal) return null;
    return (
        <div onClick={onClose}
             style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
            <div onClick={e => e.stopPropagation()}

                        {modal.loading ? 'Loading...' : modal.title}
                    </span>
                    <button onClick={onClose}
                            style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'20px',lineHeight:1,padding:'4px',flexShrink:0}}>✕</button>
                </div>
                {/* Video */}
                <div style={{position:'relative',paddingBottom:'56.25%',height:0}}>
                    {modal.loading ? (
                        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8',fontSize:'14px'}}>
                            🎹 Searching...
                        </div>
                    ) : (
                        <iframe
                            src={`https://www.youtube.com/embed/${modal.videoId}?autoplay=1&rel=0`}
                            style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',border:'none'}}

                            allowFullScreen
                        />
                    )}
                </div>
            </div>
        </div>
    );
}

                                        : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                }`}>
                                {l === 'ALL' ? `All (${data.length})` : `List ${l} (${countByList[l]||0})`}
                            </button>
                        ))}
                    </div>

                    {/* Era chips */}
                    <div className="flex gap-2 flex-wrap mb-2 no-scrollbar overflow-x-auto">
                        {eras.map(e => (
                            <button key={e} onClick={() => setActiveEra(e)}
                                className={`era-chip ${activeEra===e?'active':''}`}>
                                {e}
                            </button>
                        ))}
                    </div>

                    {/* Nationality filter */}
                    <select value={activeNat} onChange={e => setActiveNat(e.target.value)}
                        className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-300">
                        {nats.map(n => <option key={n} value={n}>{n === 'ALL' ? 'All nationalities' : n}</option>)}
                    </select>
                </div>
            </div>

            {/* Results */}
            <div className="max-w-3xl mx-auto px-4 py-4">
                <div className="text-sm text-slate-400 mb-3">{filtered.length} piece{filtered.length !== 1 ? 's' : ''} shown</div>
                {filtered.length === 0
                    ? <div className="text-center text-slate-400 py-16">No pieces found.</div>
                    : filtered.map((p, i) => <PieceCard onOpenVideo={openVideo} key={i} piece={p} />)
                }
            </div>
            <VideoModal modal={videoModal} onClose={closeVideo} />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
