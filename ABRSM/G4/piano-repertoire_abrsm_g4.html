function sheetUrl(composer, title) {
    const q = encodeURIComponent(composer.split(',')[0] + ' ' + title + ' sheet music');
    return 'https://www.google.com/search?q=' + q;
}

const YT_API_KEY = "AIzaSyAUydn17tJCoduix-iv7f7bKfXweIrR6Mg"; // ← paste your key here

function useVideoModal() {
    const [modal, setModal] = React.useState(null); // { videoId, title }
    const open = React.useCallback(async (composer, title) => {
        setModal({ videoId: null, title: title, loading: true });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            const item = data.items && data.items[0];
            if (item) {
                setModal({ videoId: item.id.videoId, title: item.snippet.title, loading: false });
            } else {
                setModal(null);
                window.open('https://www.youtube.com/results?search_query=' + q, '_blank');
            }
        } catch(e) {
            setModal(null);
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            window.open('https://www.youtube.com/results?search_query=' + q, '_blank');
        }
    }, []);
    const close = React.useCallback(() => setModal(null), []);
    return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
    if (!modal) return null;
    return (
        <div onClick={onClose}
             style={{position:'fixed',top:0,right:0,bottom:0,left:0,background:'rgba(0,0,0,0.75)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
            <div onClick={e => e.stopPropagation()}
                 style={{background:'#0f0f0f',borderRadius:'16px',overflow:'hidden',width:'100%',maxWidth:'800px',boxShadow:'0 25px 60px rgba(0,0,0,0.5)'}}>
                {/* Header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'#1a1a1a'}}>
                    <span style={{color:'#e2e8f0',fontSize:'13px',fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:'12px'}}>
                        {modal.loading ? 'Loading...' : modal.title}
                    </span>
                    <button onClick={onClose}
                            style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:'20px',lineHeight:1,padding:'4px',flexShrink:0}}>✕</button>
                </div>
                {/* Video */}
                <div style={{position:'relative',paddingBottom:'56.25%',height:0}}>

                        />
                    )}
                </div>
            </div>
        </div>
    );

                        }
                    </div>
                    <div className="flex flex-wrap gap-1 mt-2">
                        {piece.focus.map((f,i) => (
                            <span key={i} className="inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-slate-100 text-slate-600">
                                {f}
                            </span>
                        ))}
                    </div>
                </div>
                <div className="flex items-center gap-1 shrink-0">
                    <button onClick={() => onOpenVideo(piece.c, piece.t)}
                       className="p-1.5 rounded-lg text-red-500 hover:text-red-600 hover:bg-red-50 transition-colors"
                       title="Play on YouTube">

                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.06 12.06 0 0 0-12 1.09 11.89 11.89 0 0 0-1.09 12C4.63 20.5 8.13 22 12 22a12 12 0 0 0 12-12c0-1.17-.31-2.66-.41-3.31zM9.75 15.02V8.98L15.5 12z"/>
                        </svg>
                    </button>
                    <a href={sheetUrl(piece.c, piece.t)} target="_blank" rel="noopener noreferrer"
                       className="p-1.5 rounded-lg text-slate-400 hover:text-violet-600 hover:bg-violet-50 transition-colors"
                       title="Search sheet music">
                        <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
    const { modal: videoModal, open: openVideo, close: closeVideo } = useVideoModal();
    const [activeList, setActiveList] = useState('ALL');
    const [activeEra,  setActiveEra]  = useState('ALL');
    const [activeNat,  setActiveNat]  = useState('ALL');
    const [search,     setSearch]     = useState('');

    const data = DATA_ABRSM_G4;

    const lists = ['ALL', 'A', 'B', 'C'];
    const eras  = ['ALL', 'Baroque', 'Classical', 'Romantic', 'Modern', 'Contemporary'];
    const nats  = useMemo(() => {
        const s = new Set(data.map(p => p.nat));
        return ['ALL', ...Array.from(s).sort()];
    }, []);

    const filtered = useMemo(() => {
        return data.filter(p => {
            if (activeList !== 'ALL' && p.l !== activeList) return false;
            if (activeEra  !== 'ALL' && p.era !== activeEra)  return false;
            if (activeNat  !== 'ALL' && p.nat !== activeNat)  return false;
            if (search) {
                const q = search.toLowerCase();
                return p.c.toLowerCase().includes(q) || p.t.toLowerCase().includes(q);
            }
            return true;
        });
    }, [activeList, activeEra, activeNat, search]);

    const countByList = useMemo(() => {
        const c = {};
        data.forEach(p => c[p.l] = (c[p.l]||0)+1);
        return c;
    }, []);

    return (
        <div className="min-h-screen bg-slate-50">
            {/* Header */}
            <div className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                <div className="max-w-3xl mx-auto px-4 py-4">
                    <div className="flex flex-wrap items-start justify-between gap-3 mb-3">
                        <div>
                            <div className="flex items-center gap-2">
                                <span className="text-xs font-bold px-2 py-0.5 rounded bg-violet-100 text-violet-700">ABRSM</span>
                                <h1 className="text-xl font-bold text-slate-800">Piano Grade 4</h1>
                            </div>
                            <p className="text-sm text-slate-500 mt-0.5">2025 & 2026 Syllabus · {data.length} pieces</p>
                        </div>
                        <a href="../../index.html"
                           className="text-sm text-violet-600 hover:text-violet-800 font-medium flex items-center gap-1">
                            ← Back to Index
                        </a>
                    </div>

                    {/* Search */}
                    <input
                        type="text"
                        placeholder="Search composer or title..."
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-300 mb-3"
                    />

                    {/* List tabs */}
                    <div className="flex gap-2 mb-3 no-scrollbar overflow-x-auto">
                        {lists.map(l => (
                            <button key={l} onClick={() => setActiveList(l)}
                                className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-colors ${
                                    activeList === l
                                        ? 'bg-violet-700 text-white'
                                        : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                }`}>
                                {l === 'ALL' ? `All (${data.length})` : `List ${l} (${countByList[l]||0})`}
                            </button>
                        ))}
                    </div>

                    {/* Era chips */}
                    <div className="flex gap-2 flex-wrap mb-2 no-scrollbar overflow-x-auto">
                        {eras.map(e => (
                            <button key={e} onClick={() => setActiveEra(e)}
                                className={`era-chip ${activeEra===e?'active':''}`}>
                                {e}
                            </button>
                        ))}
                    </div>

                    {/* Nationality filter */}
                    <select value={activeNat} onChange={e => setActiveNat(e.target.value)}
                        className="text-sm border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-300">
                        {nats.map(n => <option key={n} value={n}>{n === 'ALL' ? 'All nationalities' : n}</option>)}
                    </select>
                </div>
            </div>

            {/* Results */}
            <div className="max-w-3xl mx-auto px-4 py-4">
                <div className="text-sm text-slate-400 mb-3">{filtered.length} piece{filtered.length !== 1 ? 's' : ''} shown</div>
                {filtered.length === 0
                    ? <div className="text-center text-slate-400 py-16">No pieces found.</div>
                    : filtered.map((p, i) => <PieceCard onOpenVideo={openVideo} key={i} piece={p} />)
                }
            </div>
            <VideoModal modal={videoModal} onClose={closeVideo} />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
