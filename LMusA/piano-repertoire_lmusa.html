<script type="text/babel">
const { useState, useMemo } = React;

const ERAS = ['Baroque','Classical','Romantic','Modern','Contemporary'];
const LISTS = ['A','B','C','D'];
const LIST_LABELS = {
  A: 'List A — Major Works',
  B: 'List B — Contrapuntal Works',
  C: 'List C — Virtuoso Character Pieces',
  D: 'List D — Australian & 20th-Century Works'
};

function App() {
  const [activeList, setActiveList] = useState('A');
  const [activeEra, setActiveEra] = useState('all');
  const [search, setSearch] = useState('');
  const [activeNat, setActiveNat] = useState('all');

  const nats = useMemo(() => {
    const s = new Set(DATA_LMUSA.map(p => p.nat));
    return ['all', ...Array.from(s).sort()];
  }, []);

  const filtered = useMemo(() => DATA_LMUSA.filter(p => {
    if (activeList !== 'all' && p.l !== activeList) return false;
    if (activeEra !== 'all' && p.era !== activeEra) return false;
    if (activeNat !== 'all' && p.nat !== activeNat) return false;
    if (search) {
      const q = search.toLowerCase();
      return p.c.toLowerCase().includes(q) || p.t.toLowerCase().includes(q);
    }
    return true;
  }), [activeList, activeEra, activeNat, search]);

  const byList = useMemo(() => {
    const m = {};
    filtered.forEach(p => { m[p.l] = (m[p.l]||0)+1; });
    return m;
  }, [filtered]);

  return (
    <div className="min-h-screen" style={{background:'#f8f7f4'}}>
      {/* Header */}
      <div className="text-white py-8 px-4" style={{background:'linear-gradient(135deg,#3b0764,#6d28d9)'}}>
        <div className="max-w-5xl mx-auto">
          <div className="flex flex-wrap items-start justify-between gap-3 mb-2">
            <div>
              <a href="../index.html" className="text-purple-200 text-sm hover:text-white mb-1 inline-block">← Piano Butler</a>
              <h1 className="text-2xl font-bold">AMEB LMusA Piano Repertoire</h1>
              <p className="text-purple-200 text-sm mt-1">Licentiate in Music, Australia — 2026 Syllabus</p>
            </div>
            <div className="text-right">
              <div className="text-3xl font-bold">{DATA_LMUSA.length}</div>
              <div className="text-purple-200 text-sm">eligible works</div>
            </div>
          </div>
          {/* Exam requirements summary */}
          <div className="bg-white bg-opacity-10 rounded-lg p-3 mt-4 text-sm text-purple-100">
            <span className="font-semibold text-white">Exam 9951:</span> Program 35–50 min · 1 work from List A · at least 3 from Lists B/C/D · min 3 styles/periods · at least 1 complete work from memory · concert standard
          </div>
        </div>
      </div>

      {/* Filters */}
      <div className="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
        <div className="max-w-5xl mx-auto px-4 py-3 flex flex-wrap gap-2 items-center">
          {/* List tabs */}
          <div className="flex flex-wrap gap-1">
            {LISTS.map(l => (
              <button key={l} onClick={() => setActiveList(l)}
                className={`px-3 py-1 rounded-full text-xs font-semibold border transition ${activeList===l ? 'bg-purple-800 text-white border-purple-800' : 'bg-white text-gray-600 border-gray-300 hover:border-purple-400'}`}>
                List {l} {byList[l] ? `(${byList[l]})` : ''}
              </button>
            ))}
          </div>
          <div className="flex-1 min-w-32">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search composer / title…"
              className="w-full border border-gray-200 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:border-purple-400" />
          </div>
        </div>
        <div className="max-w-5xl mx-auto px-4 pb-2 flex flex-wrap gap-1.5 items-center">
          {/* Era chips */}
          {ERAS.map(e => (
            <button key={e} onClick={() => setActiveEra(activeEra===e ? 'all' : e)}
              className={`era-badge cursor-pointer border transition era-${e} ${activeEra===e ? 'ring-2 ring-offset-1 ring-purple-600' : 'opacity-80 hover:opacity-100'}`}>
              {e}
            </button>
          ))}
          {/* Nationality */}
          <select value={activeNat} onChange={e => setActiveNat(e.target.value)}
            className="ml-auto border border-gray-200 rounded-full px-3 py-1 text-xs text-gray-600 focus:outline-none focus:border-purple-400">
            {nats.map(n => <option key={n} value={n}>{n === 'all' ? 'All nationalities' : n}</option>)}
          </select>
        </div>
      </div>

      {/* Results */}
      <div className="max-w-5xl mx-auto px-4 py-6">
        <p className="text-sm text-gray-500 mb-4">{filtered.length} works shown</p>
        {LISTS.filter(l => activeList === 'all' || activeList === l).map(l => {
          const pieces = filtered.filter(p => p.l === l);
          if (!pieces.length) return null;
          return (
            <div key={l} className="mb-8">
              <div className="flex items-center gap-2 mb-3">
                <span className={`era-badge list-${l} text-xs`}>List {l}</span>
                <h2 className="text-sm font-semibold text-gray-700">{LIST_LABELS[l]}</h2>
                <span className="text-xs text-gray-400 ml-auto">{pieces.length} works</span>
              </div>
              <div className="space-y-2">
                {pieces.map((p, i) => {
                  const wikiUrl = COMPOSER_LINKS[p.c];
                  return (
                    <div key={i} className="bg-white rounded-xl border border-gray-100 p-4 hover:shadow-md transition">
                      <div className="flex flex-wrap items-start justify-between gap-2">
                        <div className="flex-1">
                          <div className="flex flex-wrap items-center gap-1.5 mb-1">
                            <span className={`era-badge era-${p.era}`}>{p.era}</span>
                            <span className="text-xs text-gray-400">{p.nat}</span>
                          </div>
                          <p className="font-semibold text-gray-900 text-sm leading-snug">
                            {wikiUrl
                              ? <a href={wikiUrl} target="_blank" rel="noopener noreferrer" className="hover:text-purple-700 hover:underline">{p.c}</a>
                              : p.c}
                          </p>
                          <p className="text-gray-600 text-sm mt-0.5">{p.t}</p>
                          <div className="flex flex-wrap gap-1 mt-2">
                            {p.focus.map(f => (
                              <span key={f} className="text-xs bg-purple-50 text-purple-700 rounded-full px-2 py-0.5">{f}</span>
                            ))}
                          </div>
                        </div>
                        <div className="flex gap-1.5 shrink-0">
                          <a href={ytUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
                            className="text-xs bg-red-50 text-red-600 hover:bg-red-100 rounded-full px-2.5 py-1 font-medium transition">▶ YT</a>
                          <a href={sheetUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
                            className="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-full px-2.5 py-1 font-medium transition">♩ Sheet</a>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="text-center text-gray-400 py-16 text-sm">No works match your filters.</div>
        )}
      </div>

      <footer className="text-center text-xs text-gray-400 pb-8">
        AMEB LMusA Piano 2026 · <a href="../index.html" className="hover:text-purple-600">Piano Butler</a>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
