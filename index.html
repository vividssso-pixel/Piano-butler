const YT_API_KEY = "AIzaSyAUydn17tJCoduix-iv7f7bKfXweIrR6Mg";

function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + q + '&type=video&maxResults=1&key=' + YT_API_KEY);
            const data = await res.json();
            const item = data.items && data.items[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title });
            else setModal({ error: true, title });
        } catch(e) { setModal({ error: true, title }); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
    if (!modal) return null;
    return (
        <div className="yt-modal-bg" onClick={onClose}>
            <div className="yt-modal-box" onClick={e => e.stopPropagation()}>
                {modal.loading && <div style={{padding:40,textAlign:'center',color:'#666'}}>Loading…</div>}
                {modal.error   && <div style={{padding:40,textAlign:'center',color:'#666'}}>No video found for "{modal.title}"</div>}
                {modal.videoId && (
                    <iframe className="yt-iframe" width="100%" height="450"
                        src={'https://www.youtube.com/embed/' + modal.videoId + '?autoplay=1'}

            </div>

    );
}

    push(typeof DATA_TRINITY_G2 !== 'undefined' ? DATA_TRINITY_G2 : [], 'TG2', 'Grade 2', 'Trinity');
    push(typeof DATA_TRINITY_G3 !== 'undefined' ? DATA_TRINITY_G3 : [], 'TG3', 'Grade 3', 'Trinity');
    push(typeof DATA_TRINITY_G4 !== 'undefined' ? DATA_TRINITY_G4 : [], 'TG4', 'Grade 4', 'Trinity');
    push(typeof DATA_TRINITY_G5 !== 'undefined' ? DATA_TRINITY_G5 : [], 'TG5', 'Grade 5', 'Trinity');
    push(typeof DATA_TRINITY_G6 !== 'undefined' ? DATA_TRINITY_G6 : [], 'TG6', 'Grade 6', 'Trinity');
    push(typeof DATA_TRINITY_G7 !== 'undefined' ? DATA_TRINITY_G7 : [], 'TG7', 'Grade 7', 'Trinity');
    push(typeof DATA_TRINITY_G8 !== 'undefined' ? DATA_TRINITY_G8 : [], 'TG8', 'Grade 8', 'Trinity');
    push(typeof DATA_TRINITY_ATCL !== 'undefined' ? DATA_TRINITY_ATCL : [], 'TATCL', 'ATCL', 'Trinity Diploma');
    push(typeof DATA_TRINITY_LTCL !== 'undefined' ? DATA_TRINITY_LTCL : [], 'TLTCL', 'LTCL', 'Trinity Diploma');
    push(typeof DATA_TRINITY_FTCL !== 'undefined' ? DATA_TRINITY_FTCL : [], 'TFTCL', 'FTCL', 'Trinity Diploma');
    return corpus;
}

// ── Search logic ─────────────────────────────────────────────────────────────
function searchCorpus(query, eraFilter, gradeFilter, syllabusFilter) {
    const q = query.trim().toLowerCase();
    const tokens = q ? q.split(/\s+/) : [];

    return CORPUS.filter(p => {
        // Syllabus filter
        if (syllabusFilter && syllabusFilter !== 'All') {
            if (syllabusFilter === 'Leisure') {
                if (p._type !== 'Leisure') return false;
            } else if (syllabusFilter === 'AMEB') {
                if (p._syllabus !== 'AMEB' || p._type === 'Leisure') return false;
            } else {
                if (p._syllabus !== syllabusFilter) return false;
            }
        }
        // Era filter
        if (eraFilter && p.era !== eraFilter) return false;
        // Grade filter
        if (gradeFilter && gradeFilter !== 'All') {
            if (p._gradeKey !== gradeFilter) return false;
        }
        // Text search — all tokens must match
        if (tokens.length > 0) {
            const hay = [p.c, p.t, p.nat, p.era, ...(p.focus||[])].join(' ').toLowerCase();
            return tokens.every(tok => hay.includes(tok));
        }
        return true;
    });
}

const RAND_SYLLABUSES = [
    { key:'all',     label:'Any' },
    { key:'AMEB',    label:'🇦🇺 AMEB' },
    { key:'ABRSM',   label:'🇬🇧 ABRSM' },

function RandomPickModal({ onClose, openVideo }) {
    const [grade, setGrade] = useState('G1');
    const [syllabus, setSyllabus] = useState('all');
    const [picks, setPicks] = useState(null);

    function generate() {
        // Build pool
        let pool;
        if (grade === 'diploma') {
            pool = CORPUS.filter(p => DIPLOMA_KEYS.includes(p._gradeKey));
        } else {
            const trinityKey = grade === 'Prelim' ? 'TInitial' : 'T' + grade;
            pool = CORPUS.filter(p =>
                (p._gradeKey === grade || p._gradeKey === trinityKey) &&
                (p._syllabus === 'AMEB' || p._syllabus === 'ABRSM' || p._syllabus === 'Trinity')
            );
        }
        // Apply syllabus filter
        if (syllabus !== 'all') {
            const filtered = pool.filter(p => (p._syllabus||'').startsWith(syllabus));
            if (filtered.length >= 3) pool = filtered;
        }
        if (pool.length === 0) { setPicks([]); return; }

        // Pick one piece per era, era order: Baroque → Classical → Romantic → Modern → Contemporary
        const eras = ['Baroque','Classical','Romantic','Modern','Contemporary'];
        const result = [];
        const byEra = {};
        eras.forEach(e => { byEra[e] = pool.filter(p => p.era === e); });

        // Try to get 1 per era (skip eras with 0 pieces)
        eras.forEach(e => {
            const arr = byEra[e];
            if (arr && arr.length > 0) {
                result.push(arr[Math.floor(Math.random() * arr.length)]);
            }
        });

        // If fewer than 3 results (e.g. Diploma is era-sparse), fill from full pool
        if (result.length < 3) {
            const used = new Set(result.map(p => p.t + p.c));
            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            for (const p of shuffled) {
                if (!used.has(p.t + p.c)) { result.push(p); used.add(p.t + p.c); }
                if (result.length >= 5) break;
            }
        }
        setPicks(result);
    }

    return (
        <div onClick={onClose} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.55)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:28,maxWidth:520,width:'100%',maxHeight:'90vh',overflowY:'auto'}}>

                {/* Header */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                    <span style={{fontSize:18,fontWeight:800,color:'#1a1410'}}>🎲 Random Pick</span>
                    <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#9a8e84'}}>✕</button>
                </div>

                {/* Syllabus */}
                <div style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#9a8e84',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Syllabus</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {RAND_SYLLABUSES.map(s => (
                            <button key={s.key} onClick={()=>{setSyllabus(s.key);setPicks(null);}} style={{
                                padding:'5px 13px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'1.5px solid',
                                background: syllabus===s.key ? '#1a1410' : '#fff',
                                color: syllabus===s.key ? '#fff' : '#6b5e54',
                                borderColor: syllabus===s.key ? '#1a1410' : '#e8ddd4'
                            }}>{s.label}</button>
                        ))}
                    </div>
                </div>

                {/* Grade */}
                <div style={{marginBottom:20}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#9a8e84',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>Grade</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {GRADE_OPTIONS.map(g => (
                            <button key={g.key} onClick={()=>{setGrade(g.key);setPicks(null);}} style={{
                                padding:'5px 13px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'1.5px solid',
                                background: grade===g.key ? '#1a1410' : '#fff',
                                color: grade===g.key ? '#fff' : '#6b5e54',
                                borderColor: grade===g.key ? '#1a1410' : '#e8ddd4'
                            }}>{g.label}</button>
                        ))}
                    </div>
                    <div style={{fontSize:11,color:'#b0a898',marginTop:8}}>
                        Picks one piece from each era — {syllabus==='all' ? 'across AMEB, ABRSM & Trinity' : (RAND_SYLLABUSES.find(s=>s.key===syllabus)||{}).label+' only'}.
                    </div>
                </div>

                {/* Generate button */}
                <button onClick={generate} style={{width:'100%',padding:'13px',borderRadius:12,background:'#c4845a',color:'#fff',fontWeight:800,fontSize:14,border:'none',cursor:'pointer',marginBottom:picks?20:0}}>
                    {picks ? '🔀 Shuffle again' : '🎲 Pick for me'}
                </button>

                {/* Results */}
                {picks && picks.length > 0 && (
                    <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
                        {picks.map((p,i) => (
                            <div key={i} style={{background:'#faf7f4',border:'1px solid #ede7df',borderRadius:12,padding:'12px 14px'}}>
                                <div style={{display:'flex',gap:6,marginBottom:5,flexWrap:'wrap',alignItems:'center'}}>
                                    {p.era && (
                                        <span style={{fontSize:10,fontWeight:800,padding:'2px 8px',borderRadius:5,
                                            background: ERA_COLORS[p.era] || '#555', color:'#fff'}}>
                                            {p.era}
                                        </span>
                                    )}
                                    {p._grade && (
                                        <span style={{fontSize:10,color:'#b0a898',fontWeight:600}}>{p._syllabus} {p._grade}</span>
                                    )}
                                </div>
                                <div style={{fontSize:13,fontWeight:700,color:'#1a1410',marginBottom:2,lineHeight:1.4}}>{p.t}</div>
                                <div style={{fontSize:12,color:'#7a6e64',marginBottom:6}}>{p.c}</div>
                                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

                                            background:'#fdf8f4',color:'#c4845a',border:'1px solid #e8ddd4',cursor:'pointer'
                                        }}>▶ Listen</button>
                                    )}
                                    <a href={'https://www.google.com/search?q=' + encodeURIComponent(p.c.split(',')[0].trim() + ' ' + p.t + ' sheet music')}
                                        target="_blank" rel="noopener noreferrer" style={{
                                            fontSize:11,fontWeight:700,padding:'4px 11px',borderRadius:6,
                                            background:'#fdf8f4',color:'#6b5e54',border:'1px solid #e8ddd4',
                                            textDecoration:'none',display:'inline-flex',alignItems:'center'
                                        }}>♩ Score</a>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                {picks && picks.length === 0 && (
                    <div style={{textAlign:'center',color:'#9a8e84',fontSize:13,padding:20}}>
                        No pieces found for this grade. Try another.
                    </div>
                )}

    const inputRef = useRef(null);
    const debounceRef = useRef(null);

    // Debounced search
    useEffect(() => {
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => setSearchQuery(query), 200);
        return () => clearTimeout(debounceRef.current);
    }, [query]);

    const isSearching = !!(showSearchInput || searchQuery.trim() || eraFilter || (gradeFilter && gradeFilter !== 'All') || (syllabusFilter && syllabusFilter !== 'All'));

    const allResults = useMemo(() => {
        if (!isSearching) return [];
        return searchCorpus(searchQuery, eraFilter, gradeFilter, syllabusFilter);
    }, [searchQuery, eraFilter, gradeFilter, syllabusFilter, isSearching]);

    // Reset visible count when search changes

    const results = useMemo(() => allResults.slice(0, visibleCount), [allResults, visibleCount]);

    // Autocomplete suggestions
    const suggestions = useMemo(() => {
        if (query.trim().length < 2) return [];
        const q = query.toLowerCase();
        const seen = new Set();
        const out = [];
        // Composer matches
        for (const p of CORPUS) {
            if (out.length >= 5) break;
            const name = p.c.split(',')[0].trim();
            if (!seen.has('c:'+name) && name.toLowerCase().includes(q)) {
                seen.add('c:'+name); out.push({ type:'composer', label:name });
            }
        }
        // Title matches
        for (const p of CORPUS) {
            if (out.length >= 8) break;
            if (!seen.has('t:'+p.t) && p.t.toLowerCase().includes(q)) {
                seen.add('t:'+p.t); out.push({ type:'title', label:p.t, composer:p.c.split(',')[0].trim() });
            }
        }
        return out.slice(0, 8);

class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    render() {
        if (this.state.error) return (
            <div style={{padding:40,color:'#f87171',fontFamily:'monospace'}}>
                <b>Error:</b> {this.state.error.message}
            </div>
        );
        return this.props.children;
    }
}

<script>
// Manually compile and run the JSX after DOM + all data scripts are ready.
// Babel standalone auto-processes type="text/babel" but can silently fail on
// slow mobile Safari if Babel hasn't finished loading. This explicit trigger
// ensures Babel is available before it tries to compile.
(function() {
    function run() {
        if (typeof Babel === 'undefined' || typeof React === 'undefined') {
            setTimeout(run, 50); // wait a bit more if CDN hasn't loaded yet
            return;
        }
        // Babel already auto-ran on type="text/jsx-raw"? No — we use a custom type
        // to prevent auto-run, then compile manually here.
        var el = document.getElementById('app-jsx');
        if (!el || el.dataset.compiled) return;
        el.dataset.compiled = '1';
        try {
            var compiled = Babel.transform(el.textContent, { presets: ['react'] }).code;
            var s = document.createElement('script');
            s.textContent = compiled;
            document.body.appendChild(s);
        } catch(e) {
            document.getElementById('root').innerHTML =
                '<div style="padding:40px;color:#c00;font-family:monospace"><b>Compile error:</b> ' + e.message + '</div>';
        }
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
    } else {
        run();
    }
})();
</script>
