function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
            const data = await res.json();
            const item = data.items?.[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title, loading: false });
            else { setModal(null); window.open('https://www.youtube.com/results?search_query=' + q, '_blank'); }
        } catch { setModal(null); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

/* ── Magic Link Login Modal ── */
function LoginModal({ onClose, onSuccess }) {
    const [email, setEmail] = useState('');
    const [sent, setSent] = useState(false);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSend = async (e) => {
        e.preventDefault();
        if (!email.trim()) return;
        setLoading(true); setError('');
        const { error: err } = await _sb.auth.signInWithOtp({
            email: email.trim(),
            options: { emailRedirectTo: window.location.href }
        });
        setLoading(false);
        if (err) setError(err.message);
        else setSent(true);
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
                <div style={{background:'linear-gradient(135deg,#4f46e5,#6366f1)',padding:'24px 24px 20px',textAlign:'center'}}>

                    <div style={{fontSize:11,color:'rgba(255,255,255,0.7)',marginTop:4,fontWeight:600}}>Sign in with just your email — no password needed</div>
                </div>
                <div style={{padding:'20px 24px 24px'}}>
                    {sent ? (
                        <div style={{textAlign:'center',padding:'8px 0'}}>
                            <div style={{fontSize:32,marginBottom:12}}>📬</div>
                            <div style={{fontSize:14,fontWeight:800,color:'#1e293b',marginBottom:6}}>Check your email</div>
                            <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.5}}>We sent a sign-in link to <strong>{email}</strong>. Click it to continue.</div>
                        </div>
                    ) : (
                        <form onSubmit={handleSend}>
                            <label style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:'#94a3b8',display:'block',marginBottom:6}}>Email</label>
                            <input
                                type="email" value={email} onChange={e=>setEmail(e.target.value)}
                                placeholder="your@email.com" autoFocus required
                                style={{width:'100%',padding:'10px 12px',fontSize:14,fontFamily:'inherit',fontWeight:600,borderRadius:10,border:'1.5px solid #e2e8f0',outline:'none',color:'#1e293b',background:'#f8fafc',marginBottom:12}}
                            />
                            {error && <div style={{fontSize:11,color:'#dc2626',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'6px 10px',marginBottom:10}}>{error}</div>}
                            <button type="submit" disabled={loading}
                                style={{width:'100%',padding:'11px 0',fontSize:13,fontWeight:800,fontFamily:'inherit',borderRadius:10,border:'none',background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'white',cursor:'pointer',opacity:loading?0.7:1}}>
                                {loading ? 'Sending...' : 'Send sign-in link →'}
                            </button>
                            <button type="button" onClick={onClose}
                                style={{width:'100%',marginTop:8,padding:'9px 0',fontSize:12,fontWeight:700,fontFamily:'inherit',borderRadius:10,border:'1px solid #e2e8f0',background:'transparent',color:'#94a3b8',cursor:'pointer'}}>
                                Continue without signing in
                            </button>
                        </form>
                    )}
                </div>
            </div>
        </div>
    );
}

const eraClass = era => {
    if (!era) return "tag-modern";
    const e = era.toLowerCase();
    if (e.includes("baroque"))      return "tag-baroque";
    if (e.includes("classical"))    return "tag-classical";
    if (e.includes("romantic"))     return "tag-romantic";
    if (e.includes("contemporary")) return "tag-contemporary";
    return "tag-modern";
};

/* ── Local-first Repertoire Lists ── */
const LISTS_KEY = "pb_lists_v1";

const loadLists = () => { try { return JSON.parse(localStorage.getItem(LISTS_KEY)||"[]"); } catch { return []; } };
const saveLists = arr => { try { localStorage.setItem(LISTS_KEY, JSON.stringify(arr)); window.dispatchEvent(new Event("pb_lists_changed")); } catch {} };

const LIST_TYPES = [
    { value:"student",  label:"Student",  color:"#4f46e5", bg:"#eef2ff" },
    { value:"concert",  label:"Concert",  color:"#0f766e", bg:"#f0fdfa" },
    { value:"exam",     label:"Exam",     color:"#b45309", bg:"#fffbeb" },
    { value:"general",  label:"General",  color:"#475569", bg:"#f8fafc" },
];

const listTypeInfo = (type) => LIST_TYPES.find(t=>t.value===type) || LIST_TYPES[3];

function createLocalList({ name, type, description="" }) {
    const list = {
        id: "local_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
        name, type, description,
        pieces: [],
        createdAt: new Date().toISOString(),
        local: true,
    };
    const all = loadLists();
    all.unshift(list);
    saveLists(all);
    return list;
}

function addPieceToList(listId, piece) {
    const all = loadLists();
    const list = all.find(l=>l.id===listId);
    if (!list) return false;
    const already = list.pieces.some(p=>p.composer===piece.c && p.title===piece.t);
    if (already) return false;
    list.pieces.push({
        composer: piece.c, title: piece.t,
        grade: piece._grade, syllabus: piece._syllabus,
        era: piece.era||null, nat: piece.nat||null,
        list: piece.l||null,
        addedAt: new Date().toISOString(),
    });
    saveLists(all);
    return true;
}

function removePieceFromList(listId, composerTitle) {
    const all = loadLists();
    const list = all.find(l=>l.id===listId);
    if (!list) return;
    list.pieces = list.pieces.filter(p=>!(p.composer+"||"+p.title === composerTitle));
    saveLists(all);
}

function deleteList(listId) {
    saveLists(loadLists().filter(l=>l.id!==listId));
}

function updateList(listId, patch) {
    const all = loadLists();
    const idx = all.findIndex(l=>l.id===listId);
    if (idx===-1) return;
    all[idx] = {...all[idx], ...patch};
    saveLists(all);
}

/* ── Recommendation Engine ── */
function getRecommendations(interests, corpus, count=5) {
    if (!interests || interests.length === 0) return { moreLike:[], tryDifferent:[] };

    // 1. Era distribution from saved pieces
    const eraCounts = {};
    const natCounts = {};
    const focusPool = [];
    interests.forEach(p => {
        if (p.era) eraCounts[p.era] = (eraCounts[p.era]||0) + 1;
        if (p.nat) natCounts[p.nat] = (natCounts[p.nat]||0) + 1;
        if (p.focus) p.focus.forEach(f => focusPool.push(f));
    });

    const savedKeys = new Set(interests.map(p => p.composer+"||"+p.title));
    const allEras = ["Baroque","Classical","Romantic","Modern","Contemporary"];

    // Most listened era
    const topEra = Object.entries(eraCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    // Least listened era (from the full era list, excluding zero)
    const leastEra = allEras
        .filter(e => e !== topEra)
        .sort((a,b) => (eraCounts[a]||0) - (eraCounts[b]||0))[0];
    // Top nationality
    const topNat = Object.entries(natCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;

    // Score function for "more like this"
    const scoreSimilar = (p) => {
        if (savedKeys.has(p.c+"||"+p.t)) return -1;
        let score = 0;
        if (p.era === topEra) score += 3;
        if (p.nat === topNat) score += 1;
        if (p.focus) p.focus.forEach(f => { if (focusPool.includes(f)) score += 2; });
        return score;
    };

    // Score function for "try something different"
    const scoreDifferent = (p) => {
        if (savedKeys.has(p.c+"||"+p.t)) return -1;
        let score = 0;
        if (p.era === leastEra) score += 4;
        else if (!eraCounts[p.era]) score += 3; // era never listened
        if (p.nat && !natCounts[p.nat]) score += 2; // nationality never listened
        if (p.focus) p.focus.forEach(f => { if (!focusPool.includes(f)) score += 1; });
        return score;
    };

    // Shuffle for variety, then score
    const shuffled = [...corpus].sort(() => Math.random() - 0.5);

    const moreLike = shuffled
        .map(p => ({ p, score: scoreSimilar(p) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, count)
        .map(x => x.p);

    const tryDifferent = shuffled
        .map(p => ({ p, score: scoreDifferent(p) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, count)
        .map(x => x.p);

    return { moreLike, tryDifferent, topEra, leastEra };
}

/* ── For You Panel ── */
function ForYouPanel({ interests, onLoginRequired, openVideo, user, onSearch }) {
    const { moreLike, tryDifferent, topEra, leastEra } = useMemo(
        () => getRecommendations(interests, CORPUS, 5),
        [interests]
    );

    if (interests.length === 0) return null;

    const MiniCard = ({ p }) => (
        <div style={{background:"white",border:"1px solid #f1f5f9",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
            <div className="flex gap-1 mb-1.5">
                <span className="text-[9px] font-black px-1.5 py-0.5 rounded text-white"
                    style={{background: p._syllabus==="ABRSM"?"#7c3aed":"#4f46e5"}}>{p._grade}</span>
                {p.era && <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ${eraClass(p.era)}`}>{p.era}</span>}
            </div>
            <div className="text-[13px] font-bold text-slate-800 leading-snug mb-0.5">{p.t}</div>
            <div className="text-[11px] text-slate-400 mb-2">
                <a href={COMPOSER_LINKS[p.c] || `https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(p.c.replace(/,.*/, '').trim())}`} target="_blank" rel="noopener noreferrer" className="hover:underline hover:text-slate-600 transition-colors">{p.c}</a>
                {p.nat && <span className="text-slate-300"> · {p.nat}</span>}
            </div>
            <div className="flex gap-1.5">
                <button onClick={() => openVideo(p.c, p.t)}
                    className="px-2.5 py-1 bg-red-600 text-white text-[10px] font-bold rounded-lg">▶</button>
                <a href={sheetUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
                    className="px-2.5 py-1 text-[10px] font-bold rounded-lg border border-slate-200 text-slate-400">Score</a>
                <button onClick={() => onSearch(p.era)}
                    className="px-2.5 py-1 text-[10px] font-bold rounded-lg border border-slate-200 text-slate-400">More {p.era}</button>
            </div>
        </div>
    );

    return (
        <div className="mt-6">
            <div className="flex items-center gap-2 mb-4">
                <div className="w-1 h-5 bg-amber-400 rounded-full"></div>
                <span className="text-[11px] font-black uppercase tracking-widest text-slate-400">For You</span>
                <span className="text-[10px] text-slate-300 font-medium">· based on {interests.length} saved piece{interests.length>1?"s":""}</span>
            </div>

            {moreLike.length > 0 && (
                <div className="mb-5">
                    <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-2">
                        More like what you love {topEra && <span className="text-indigo-300">· {topEra}</span>}
                    </div>
                    {moreLike.map((p,i) => <MiniCard key={i} p={p} />)}
                </div>
            )}

            {tryDifferent.length > 0 && (
                <div>
                    <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-2">
                        Broaden your repertoire {leastEra && <span className="text-emerald-400">→ {leastEra}</span>}
                    </div>
                    {tryDifferent.map((p,i) => <MiniCard key={i} p={p} />)}
                </div>
            )}
        </div>
    );
}

/* ── Add to List Modal (local-first) ── */
function AddToListModal({ piece, user, onClose, onListsChanged }) {
    const [lists, setLists]       = useState(() => loadLists());
    const [added, setAdded]       = useState(new Set());
    const [showCreate, setShowCreate] = useState(false);
    const [newName, setNewName]   = useState("");
    const [newType, setNewType]   = useState("student");
    const [newDesc, setNewDesc]   = useState("");

    const sync = () => { const l = loadLists(); setLists(l); if(onListsChanged) onListsChanged(l); };

    const handleAdd = (listId) => {
        const ok = addPieceToList(listId, piece);
        if (ok) { setAdded(prev => new Set([...prev, listId])); sync(); }
    };

    const handleCreate = () => {
        if (!newName.trim()) return;
        const lst = createLocalList({ name: newName.trim(), type: newType, description: newDesc.trim() });
        addPieceToList(lst.id, piece);
        setAdded(prev => new Set([...prev, lst.id]));
        setShowCreate(false); setNewName(""); setNewDesc("");
        sync();
    };

    const isInList = (lst) => lst.pieces.some(p => p.composer===piece.c && p.title===piece.t);

    return (
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.35)"}}
            onClick={onClose}>
            <div style={{background:"white",borderRadius:16,width:"100%",maxWidth:360,boxShadow:"0 20px 50px rgba(0,0,0,0.12)",border:"1px solid #e2e8f0",overflow:"hidden"}}
                onClick={e=>e.stopPropagation()}>
                {/* Header */}
                <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div>
                            <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>Add to list</div>
                            <div style={{fontSize:11,color:"#94a3b8",marginTop:2,maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{piece.t} · {piece.c}</div>
                        </div>
                        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,color:"#cbd5e1",cursor:"pointer",lineHeight:1,padding:0}}>×</button>
                    </div>
                </div>

                {/* Existing lists */}
                <div style={{maxHeight:240,overflowY:"auto"}}>
                    {lists.length === 0 && !showCreate && (
                        <div style={{padding:"24px 18px",textAlign:"center",color:"#94a3b8",fontSize:12}}>
                            No lists yet — create one below
                        </div>
                    )}
                    {lists.map(lst => {
                        const ti = listTypeInfo(lst.type);
                        const inList = isInList(lst) || added.has(lst.id);
                        return (
                            <div key={lst.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 18px",borderBottom:"1px solid #f8fafc"}}>
                                <div style={{flex:1,minWidth:0}}>
                                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                                        <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:6,background:ti.bg,color:ti.color}}>{ti.label}</span>
                                        <span style={{fontSize:12,fontWeight:600,color:"#334155",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lst.name}</span>
                                    </div>
                                    <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{lst.pieces.length} piece{lst.pieces.length!==1?"s":""}</div>
                                </div>
                                <button onClick={() => handleAdd(lst.id)} disabled={inList}
                                    style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:8,border:"none",cursor:inList?"default":"pointer",
                                        background: inList ? "#f0fdf4" : "#4f46e5",
                                        color:      inList ? "#16a34a" : "white",
                                        transition:"all 0.15s", marginLeft:8, flexShrink:0}}>
                                    {inList ? "✓ Added" : "+ Add"}
                                </button>
                            </div>
                        );
                    })}
                </div>

                {/* Create new */}
                {showCreate ? (
                    <div style={{padding:"14px 18px",borderTop:"1px solid #f1f5f9",background:"#fafafa"}}>
                        <input value={newName} onChange={e=>setNewName(e.target.value)}
                            placeholder="List name (e.g. Sophie Kim, Winter Concert)"
                            autoFocus
                            style={{width:"100%",fontSize:12,padding:"8px 10px",borderRadius:8,border:"1px solid #e2e8f0",outline:"none",marginBottom:8,boxSizing:"border-box",fontFamily:"inherit"}} />
                        <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
                            {LIST_TYPES.map(t => (
                                <button key={t.value} onClick={() => setNewType(t.value)}
                                    style={{fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:20,border:`1.5px solid ${newType===t.value?t.color:t.bg}`,
                                        background: newType===t.value ? t.bg : "white",
                                        color: newType===t.value ? t.color : "#94a3b8",
                                        cursor:"pointer", transition:"all 0.1s"}}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                        <input value={newDesc} onChange={e=>setNewDesc(e.target.value)}
                            placeholder="Note (optional — e.g. Grade 4 AMEB, Exam Oct 2026)"
                            style={{width:"100%",fontSize:11,padding:"7px 10px",borderRadius:8,border:"1px solid #e2e8f0",outline:"none",marginBottom:10,boxSizing:"border-box",fontFamily:"inherit",color:"#475569"}} />
                        <div style={{display:"flex",gap:6}}>
                            <button onClick={handleCreate} disabled={!newName.trim()}
                                style={{flex:1,fontSize:12,fontWeight:700,padding:"8px 0",borderRadius:8,border:"none",
                                    background: newName.trim() ? "#4f46e5" : "#e2e8f0",
                                    color: newName.trim() ? "white" : "#94a3b8", cursor:"pointer"}}>
                                Create &amp; add piece
                            </button>
                            <button onClick={() => setShowCreate(false)}
                                style={{fontSize:12,fontWeight:600,padding:"8px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"white",color:"#94a3b8",cursor:"pointer"}}>
                                Cancel
                            </button>
                        </div>
                    </div>
                ) : (
                    <div style={{padding:"12px 18px",borderTop:"1px solid #f1f5f9"}}>
                        <button onClick={() => setShowCreate(true)}
                            style={{width:"100%",fontSize:12,fontWeight:600,padding:"8px 0",borderRadius:8,border:"1.5px dashed #e2e8f0",background:"#fafafa",color:"#6366f1",cursor:"pointer"}}>
                            + New list
                        </button>
                    </div>
                )}
            </div>
        </div>
    );
}

/* ── My Lists Panel ── */
function MyListsPanel({ user, onClose }) {
    const [lists, setLists]       = useState(() => loadLists());
    const [openList, setOpenList] = useState(null);
    const [editingId, setEditingId] = useState(null);
    const [editName, setEditName] = useState("");
    const [editDesc, setEditDesc] = useState("");
    const [copied, setCopied]     = useState(false);
    const [printMode, setPrintMode] = useState(false);

    const sync = () => setLists(loadLists());

    useEffect(() => {
        const handler = () => sync();
        window.addEventListener("pb_lists_changed", handler);
        return () => window.removeEventListener("pb_lists_changed", handler);
    }, []);

    const handleRemovePiece = (listId, composerTitle) => {
        removePieceFromList(listId, composerTitle);
        sync();
        if (openList?.id === listId) setOpenList(loadLists().find(l=>l.id===listId)||null);
    };

    const handleDeleteList = (listId, name) => {
        if (!window.confirm(`Delete "${name}"?`)) return;
        deleteList(listId);
        sync();
        if (openList?.id === listId) setOpenList(null);
    };

    const handleSaveEdit = (listId) => {
        updateList(listId, { name: editName, description: editDesc });
        sync();
        if (openList?.id === listId) setOpenList(loadLists().find(l=>l.id===listId)||null);
        setEditingId(null);
    };

    const copyLocalLink = () => {
        const data = JSON.stringify(openList);
        const b64 = btoa(unescape(encodeURIComponent(data)));
        const url = `${location.origin}${location.pathname}?locallist=${b64}`;
        navigator.clipboard.writeText(url).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
    };

    const handlePrint = () => {
        const lst = openList;
        const ti = listTypeInfo(lst.type);
        const win = window.open("","_blank");
        win.document.write(`<!DOCTYPE html><html><head><title>${lst.name}</title>
        <style>
          body { font-family: -apple-system, sans-serif; padding: 40px; color: #1e293b; }
          h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
          .meta { font-size: 12px; color: #64748b; margin-bottom: 6px; }
          .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: ${ti.bg}; color: ${ti.color}; margin-bottom: 20px; }
          .desc { font-size: 13px; color: #475569; margin: -10px 0 20px; font-style: italic; }
          table { width: 100%; border-collapse: collapse; }
          th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; padding: 6px 10px; border-bottom: 2px solid #f1f5f9; text-align: left; }
          td { font-size: 13px; padding: 10px 10px; border-bottom: 1px solid #f8fafc; vertical-align: top; }
          .num { color: #94a3b8; font-size: 11px; }
          .grade { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: #eef2ff; color: #4f46e5; }
          .era { font-size: 10px; color: #64748b; }
          .footer { margin-top: 30px; font-size: 11px; color: #cbd5e1; text-align: center; }
          @media print { body { padding: 20px; } }
        </style></head><body>
        <h1>${lst.name}</h1>
        <span class="badge">${ti.label}</span>
        ${lst.description ? `<p class="desc">${lst.description}</p>` : ""}
        <p class="meta">${lst.pieces.length} piece${lst.pieces.length!==1?"s":""} · Generated ${new Date().toLocaleDateString("en-AU",{day:"numeric",month:"long",year:"numeric"})}</p>
        <table>
          <thead><tr><th>#</th><th>Piece</th><th>Composer</th><th>Grade</th><th>Era</th></tr></thead>
          <tbody>
            ${lst.pieces.map((p,i)=>`<tr>
              <td class="num">${i+1}</td>
              <td><strong>${p.title}</strong></td>
              <td>${p.composer}</td>
              <td><span class="grade">${p.grade||""}</span></td>
              <td class="era">${p.era||""}</td>
            </tr>`).join("")}
          </tbody>
        </table>
        <div class="footer">Piano Butler · thepianobutler.com</div>
        </body></html>`);
        win.document.close();
        win.print();
    };

    const currentList = openList ? lists.find(l=>l.id===openList.id) || openList : null;

    return (
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"flex-start",justifyContent:"flex-end"}}
            onClick={onClose}>
            <div style={{background:"white",width:"100%",maxWidth:440,height:"100vh",overflowY:"auto",boxShadow:"-4px 0 24px rgba(0,0,0,0.08)",display:"flex",flexDirection:"column",borderLeft:"1px solid #f1f5f9"}}
                onClick={e=>e.stopPropagation()}>

                {/* ── Header ── */}

                                    style={{background:"none",border:"none",fontSize:14,color:"#94a3b8",cursor:"pointer",padding:"0 4px 0 0"}}>←</button>
                            )}
                            <span style={{fontSize:15,fontWeight:700,color:"#1e293b"}}>
                                {currentList ? currentList.name : "My Lists"}
                            </span>
                            {currentList && (
                                <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,
                                    background: listTypeInfo(currentList.type).bg,
                                    color: listTypeInfo(currentList.type).color}}>
                                    {listTypeInfo(currentList.type).label}
                                </span>
                            )}
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>

                                <button onClick={handlePrint}
                                    style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fafafa",color:"#475569",cursor:"pointer"}}>

                                <button onClick={copyLocalLink}
                                    style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:8,border:"1px solid #e2e8f0",
                                        background: copied?"#f0fdf4":"#fafafa", color: copied?"#16a34a":"#475569",cursor:"pointer"}}>
                                    {copied ? "✓ Copied" : "Share"}

                                                            onMouseOver={e=>e.target.style.color="#f87171"}

                                                        <span style={{color:"#e2e8f0",fontSize:14}}>›</span>
                                                    </div>
                                                </div>

                        )}

                        {/* Login upsell (not signed in) */}
                        {!user && lists.length > 0 && (
                            <div style={{margin:"12px 20px",padding:"12px 14px",borderRadius:10,background:"#fafafa",border:"1px solid #f1f5f9"}}>
                                <div style={{fontSize:11,fontWeight:700,color:"#334155",marginBottom:4}}>Saved in this browser</div>

                            </div>

                )}
            </div>
        </div>
    );
}

/* ── Fuzzy composer surnames — computed ONCE at module load, never rebuilt on keystrokes ── */

function App() {
    const [user, setUser]                   = useState(null);
    const [query, setQuery]                 = useState("");
    const [eraFilter, setEraFilter]         = useState("All");
    const [gradeFilter, setGradeFilter]     = useState("All");
    const [natFilter, setNatFilter]         = useState("All");
    const [syllabusFilter, setSyllabusFilter] = useState("All");
    const [searchTriggered, setSearchTriggered] = useState(false);
    const [searchQuery, setSearchQuery] = useState(""); // debounced — drives actual filtering
    const [showLogin, setShowLogin]         = useState(false);
    const [activeSyllabus, setActiveSyllabus] = useState("AMEB");
    const [interests, setInterests]         = useState(() => loadInterests());
    const [showSuggestions, setShowSuggestions] = useState(false);
    const [listModalPiece, setListModalPiece] = useState(null);   // piece to add to list
    const [showMyLists, setShowMyLists]       = useState(false);  // my lists panel
    const [sharedList, setSharedList]         = useState(null);   // { list, pieces } for shared view
    const searchInputRef = React.useRef(null);
    const { modal: videoModal, open: openVideo, close: closeVideo } = useVideoModal();

    /* Debounce search filtering only — input display stays instant */
    useEffect(() => {
        if (!query.trim()) { setSearchQuery(""); return; }
        const t = setTimeout(() => setSearchQuery(query), 200);
        return () => clearTimeout(t);
    }, [query]);


    /* Check for shared list URL param on load — local-first base64 only */
    useEffect(() => {
        const params = new URLSearchParams(location.search);
        const b64 = params.get("locallist");
        if (!b64) return;
        try {
            const lst = JSON.parse(decodeURIComponent(escape(atob(b64))));
            if (lst && lst.name && Array.isArray(lst.pieces)) {
                setSharedList({ list: lst, pieces: lst.pieces });
            }
        } catch(e) {
            console.warn("Invalid shared list URL", e);
        }
    }, []);

    /* Handle add-to-list click: no login required (local-first) */
    const handleAddToList = (piece) => {
        setListModalPiece(piece);
    };

    /* Sync interests state when localStorage changes (e.g. from PieceRow) */
    useEffect(() => {
        const sync = () => setInterests(loadInterests());
        window.addEventListener("pb_interests_changed", sync);
        return () => window.removeEventListener("pb_interests_changed", sync);
    }, []);

    /* Check session on load */
    useEffect(() => {
        _sb.auth.getSession().then(({ data: { session } }) => {
            setUser(session?.user || null);
        });
        const { data: { subscription } } = _sb.auth.onAuthStateChange((_event, session) => {
            setUser(session?.user || null);
        });
        return () => subscription.unsubscribe();
    }, []);

    const searchActive = searchTriggered || searchQuery.trim() || eraFilter!=="All" || gradeFilter!=="All" || natFilter!=="All" || syllabusFilter!=="All";

    const handleClear = () => { setQuery(""); setSearchQuery(""); setEraFilter("All"); setGradeFilter("All"); setNatFilter("All"); setSyllabusFilter("All"); setSearchTriggered(false); setShowSuggestions(false); };

    /* Autocomplete suggestions — composers, titles, eras, nationalities, focus tags */
    const autoSuggestions = useMemo(() => {
        if (!query || query.trim().length < 2) return [];
        const q = query.toLowerCase().trim();
        const seen = new Set();
        const composerHits = [], titleHits = [], eraHits = [], natHits = [], focusHits = [];

        const ERAS_ALL = ["Baroque","Classical","Romantic","Modern","Contemporary"];
        ERAS_ALL.forEach(e => {
            if (e.toLowerCase().includes(q) && !seen.has("era:"+e)) {
                seen.add("era:"+e);
                eraHits.push({ type:"era", label:e, query:e });
            }
        });

        CORPUS.forEach(p => {
            if (p.c && p.c.toLowerCase().includes(q) && !seen.has("c:"+p.c)) {
                seen.add("c:"+p.c);
                composerHits.push({ type:"composer", label:p.c, query:p.c });
            }
            if (p.t && p.t.toLowerCase().includes(q) && !seen.has("t:"+p.t)) {
                seen.add("t:"+p.t);
                titleHits.push({ type:"title", label:p.t, query:p.t, composer:p.c });
            }
            if (p.nat) {
                p.nat.split("/").forEach(n => {
                    const nat = n.trim();
                    if (nat.toLowerCase().includes(q) && !seen.has("nat:"+nat)) {
                        seen.add("nat:"+nat);
                        natHits.push({ type:"nationality", label:nat, query:nat });
                    }
                });
            }
            if (p.focus) {
                p.focus.forEach(f => {
                    if (f.toLowerCase().includes(q) && !seen.has("focus:"+f)) {
                        seen.add("focus:"+f);
                        focusHits.push({ type:"focus", label:f, query:f });
                    }
                });
            }
        });

        // Priority: era > composer > nationality > title > focus, cap at 8
        return [
            ...eraHits.slice(0,1),
            ...composerHits.slice(0,3),
            ...natHits.slice(0,1),
            ...titleHits.slice(0,2),
            ...focusHits.slice(0,1),
        ].slice(0,8);
    }, [query]);

    const handleGradeClick = (gradeKey) => { setGradeFilter(gradeKey); setSyllabusFilter(activeSyllabus); setSearchTriggered(true); };

    const NAT_LIST = useMemo(() => {
        const s = new Set();
        CORPUS.forEach(p => { if (p.nat) p.nat.split("/").forEach(n => s.add(n.trim())); });
        return ["All", ...Array.from(s).sort()];
    }, []);

    /* ── Multi-token AND search ──
       Splits query into individual words. Every token must match at least one
       of: title, composer, nationality, era, or focus tags.
       e.g. "bach minuet" → token "bach" AND token "minuet" must both hit.
       e.g. "romantic french" → era match AND nationality match.
    */
    const results = useMemo(() => {
        if (!searchActive) return [];
        const q = searchQuery.toLowerCase().trim();
        const tokens = q ? q.split(/\s+/).filter(Boolean) : [];
        return CORPUS.filter(p => {
            // Multi-token AND: every token must match at least one field
            const mQ = tokens.length === 0 || tokens.every(tok => {
                const focusStr = (p.focus || []).join(" ").toLowerCase();
                return p.t.toLowerCase().includes(tok) ||
                    p.c.toLowerCase().includes(tok) ||
                    (p.nat && p.nat.toLowerCase().includes(tok)) ||
                    (p.era && p.era.toLowerCase().includes(tok)) ||
                    focusStr.includes(tok);
            });
            const mE = eraFilter      === "All" || p.era === eraFilter;
            const mG = gradeFilter    === "All" || p._gradeKey === gradeFilter;
            const mN = natFilter      === "All" || (p.nat && p.nat.toLowerCase().includes(natFilter.toLowerCase()));
            const mS = syllabusFilter === "All"
                || (syllabusFilter === "AMEB"          && p._syllabus==="AMEB" && p._type==="General")
                || (syllabusFilter === "AMEB Leisure"  && p._syllabus==="AMEB" && p._type==="Leisure")
                || (syllabusFilter === "ABRSM"         && p._syllabus==="ABRSM")
                || (syllabusFilter === "AMEB Diploma"  && p._syllabus==="AMEB Diploma")
                || (syllabusFilter === "ABRSM Diploma" && p._syllabus==="ABRSM Diploma")
                || (syllabusFilter === "Trinity"         && p._syllabus==="Trinity")
                || (syllabusFilter === "Trinity Diploma" && p._syllabus==="Trinity Diploma");
            return mQ && mE && mG && mN && mS;
        });
    }, [searchQuery, eraFilter, gradeFilter, natFilter, syllabusFilter, searchActive]);

    const parsedSignals = {};

    const ERAS = ["All","Baroque","Classical","Romantic","Modern","Contemporary"];
    const activeFilterCount = [eraFilter!=="All", gradeFilter!=="All", natFilter!=="All", syllabusFilter!=="All"].filter(Boolean).length;

    // Grade keys shown in grade filter — depends on active syllabus filter
    const gradeKeys = useMemo(() => {
        if (syllabusFilter === "Trinity") {
            return TRINITY_META.map(g => g.key);
        } else if (syllabusFilter === "Trinity Diploma") {
            return TRINITY_DIPLOMA_META.map(g => g.key);
        } else if (syllabusFilter === "ABRSM" || syllabusFilter === "ABRSM Diploma") {
            return [...ABRSM_META.map(g => g.key), ...DIPLOMA_META.filter(g=>g._syllabus==="ABRSM Diploma"||g.key==="LRSM"||g.key==="FRSM").map(g=>g.key)];
        } else if (syllabusFilter === "AMEB Diploma") {
            return DIPLOMA_META.filter(g=>g.key==="CertP"||g.key==="AMusA"||g.key==="LMusA").map(g=>g.key);
        } else {
            return GRADE_META.map(g => g.key);
        }
    }, [syllabusFilter]);

    const gradeLabel = (gk) => {
        if (gk === "All") return "All grades";
        if (gk === "Prelim") return "Preliminary";
        if (gk === "TInitial") return "Initial";
        if (gk.startsWith("TG")) return "Grade " + gk.slice(2);
        if (gk === "CertP") return "Cert. of Perf.";
        if (gk === "AMusA" || gk === "LMusA" || gk === "LRSM" || gk === "FRSM" || gk === "TATCL" || gk === "TLTCL" || gk === "TFTCL") return gk.replace("T","");
        if (gk === "ABRSMInitial") return "Initial";
        return gk.replace("G", "Grade ");
    };

    return (
        <>
        {showLogin && <LoginModal onClose={() => setShowLogin(false)} onSuccess={(u) => { setShowLogin(false); }} />}
        <VideoModal modal={videoModal} onClose={closeVideo} />
        {listModalPiece && <AddToListModal piece={listModalPiece} user={user} onClose={() => setListModalPiece(null)} onListsChanged={() => {}} />}
        {showMyLists && <MyListsPanel user={user} onClose={() => setShowMyLists(false)} />}

        {/* Shared list view — full page overlay */}
        {sharedList && (
            <div className="fixed inset-0 z-50 overflow-y-auto" style={{background:"#f1f5f9"}}>
                <div className="max-w-2xl mx-auto px-4 py-10">
                    <div className="flex items-center gap-3 mb-6">
                        <button onClick={() => { setSharedList(null); history.replaceState(null,"",location.pathname); }}
                            className="text-[11px] font-bold text-indigo-400 hover:text-indigo-300">← Back to Piano Butler</button>
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-lg" style={{background:"white",border:"1px solid #e2e8f0"}}>
                        <div className="px-6 py-5 border-b border-slate-100">
                            {sharedList.list.type && (() => { const ti = listTypeInfo(sharedList.list.type); return (
                                <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:ti.bg,color:ti.color,display:"inline-block",marginBottom:8}}>{ti.label}</span>
                            ); })()}
                            <div className="text-[20px] font-black text-slate-800">{sharedList.list.name}</div>
                            {sharedList.list.description && <div className="text-[12px] text-slate-500 mt-1 italic">{sharedList.list.description}</div>}
                            <div className="text-[12px] text-slate-400 mt-1">{sharedList.pieces.length} piece{sharedList.pieces.length!==1?"s":""} · shared via Piano Butler</div>
                        </div>
                        {sharedList.pieces.map((pc, i) => (
                            <div key={i} className="flex items-center gap-3 px-6 py-4 border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                <span className="text-[10px] font-black text-slate-400 w-5 shrink-0">{i+1}</span>
                                <div className="flex-1 min-w-0">
                                    <div className="flex gap-1 mb-1 flex-wrap">
                                        <span className="text-[9px] font-black px-1.5 py-0.5 rounded text-white"
                                            style={{background: pc.syllabus==="ABRSM"?"#7c3aed":"#4f46e5"}}>{pc.grade}</span>
                                        {pc.era && <span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500">{pc.era}</span>}
                                    </div>
                                    <div className="text-[14px] font-bold text-slate-800 leading-snug">{pc.title}</div>
                                    <div className="text-[11px] text-slate-400 mt-0.5">{pc.composer}{pc.nat ? ` · ${pc.nat}` : ""}</div>
                                    {pc.note && <div className="text-[11px] text-indigo-400 mt-1 italic">{pc.note}</div>}
                                </div>
                                <button onClick={() => openVideo(pc.composer, pc.title)}
                                    className="px-2.5 py-1 bg-red-600 text-white text-[10px] font-bold rounded-lg shrink-0">▶</button>
                            </div>
                        ))}
                        <div className="px-6 py-4 text-center">
                            <a href={location.pathname} className="text-[11px] font-bold text-indigo-500 hover:text-indigo-400">
                                🎹 Explore 4,500 pieces on Piano Butler →
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        )}

        <div className="min-h-screen flex flex-col" style={{background:"#ffffff"}}>

            {/* ── Nav ── */}
            <header style={{background:"#ffffff",borderBottom:"1px solid #f1f5f9"}} className="sticky top-0 z-30">
                <div className="max-w-screen-xl mx-auto px-4 h-13 flex items-center gap-3" style={{height:52}}>
                    <button onClick={handleClear} style={{background:"none",border:"none",padding:0,cursor:"pointer",position:"relative",zIndex:40}} className="flex items-center gap-2 shrink-0 hover:opacity-70 transition-opacity">
                        <div style={{width:3,height:20,borderRadius:2,background:"#6366f1"}}></div>
                        <span style={{fontSize:15,fontWeight:900,color:"#1e293b",letterSpacing:"-0.02em"}}>Piano Butler</span>
                    </button>
                    {/* Right */}
                    <div className="ml-auto flex items-center gap-2">
                        <a href="diagnose.html"
                            style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,border:"1px solid #fde68a",background:"#fffbeb",color:"#b45309",cursor:"pointer",textDecoration:"none"}}>
                            🔬 Diagnose
                        </a>
                        <a href="recommend.html"
                            style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,border:"1px solid #e0e7ff",background:"#eef2ff",color:"#4f46e5",cursor:"pointer",textDecoration:"none"}}>
                            🎹 Recommend
                        </a>
                        <button onClick={() => setShowMyLists(true)}
                            style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fafafa",color:"#6366f1",cursor:"pointer"}}>
                            My Lists
                        </button>
                        {user ? (
                            <span style={{fontSize:10,fontWeight:500,color:"#94a3b8",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} className="hidden md:block">{user.email}</span>
                        ) : (
                            <button data-signin onClick={() => setShowLogin(true)}
                                style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fafafa",color:"#94a3b8",cursor:"pointer"}}>
                                Sign in
                            </button>
                        )}
                    </div>
                </div>
            </header>

            {/* ── Body ── */}
            <div className="flex flex-1 max-w-screen-xl mx-auto w-full">

                {/* Sidebar */}
                <aside className="hidden md:flex flex-col shrink-0 sticky top-[52px] self-start overflow-y-auto no-scrollbar"
                    style={{width:200,height:"calc(100vh - 52px)",borderRight:"1px solid #f1f5f9",padding:"20px 12px",background:"#fafafa"}}>

                    <div className="flex items-center justify-between mb-4">
                        <span style={{fontSize:11,fontWeight:700,color:"#334155"}}>Filters</span>
                        {activeFilterCount > 0 && (
                            <button onClick={handleClear}
                                style={{fontSize:10,fontWeight:600,color:"#6366f1",background:"none",border:"none",cursor:"pointer",padding:0}}>
                                Clear
                            </button>
                        )}
                    </div>

                    {/* Syllabus */}
                    <div style={{marginBottom:16}}>
                        <span className="sidebar-label">Syllabus</span>
                        {[
                            {val:"All",           lbl:"All syllabuses"},
                            {val:"AMEB",          lbl:"🇦🇺 AMEB Comprehensive"},
                            {val:"AMEB Leisure",  lbl:"🎵 AMEB Leisure"},
                            {val:"ABRSM",         lbl:"🇬🇧 ABRSM"},
                            {val:"AMEB Diploma",  lbl:"🎓 AMEB Diploma"},
                            {val:"ABRSM Diploma", lbl:"🎓 ABRSM Diploma"},
                            {val:"Trinity",          lbl:"🇬🇧 Trinity"},
                            {val:"Trinity Diploma",  lbl:"🎓 Trinity Diploma"},
                        ].map(({val,lbl}) => (
                            <button key={val}
                                className={`filter-btn${syllabusFilter===val?" active":""}`}
                                onClick={() => { setSyllabusFilter(val); setGradeFilter("All"); setSearchTriggered(true); }}>
                                {lbl}
                            </button>
                        ))}
                    </div>

                    {/* Era */}
                    <div style={{marginBottom:16}}>
                        <span className="sidebar-label">Era</span>
                        {ERAS.map(era => (
                            <button key={era}
                                className={`filter-btn${eraFilter===era?" active":""}`}
                                onClick={() => { setEraFilter(era); setSearchTriggered(true); }}>
                                {era==="All" ? "All eras" : era}
                            </button>
                        ))}
                    </div>

                    {/* Grade */}
                    <div style={{marginBottom:16}}>
                        <span className="sidebar-label">Grade</span>
                        {["All",...gradeKeys].map(gk => (
                            <button key={gk}
                                className={`filter-btn${gradeFilter===gk?" active":""}`}
                                onClick={() => { setGradeFilter(gk); setSearchTriggered(true); }}>
                                {gradeLabel(gk)}
                            </button>
                        ))}
                    </div>

                    {/* Nationality */}
                    <div style={{marginBottom:16}}>
                        <span className="sidebar-label">Nationality</span>
                        <select value={natFilter} onChange={e => { setNatFilter(e.target.value); setSearchTriggered(true); }}
                            style={{width:"100%",fontSize:12,fontWeight:500,padding:"6px 8px",borderRadius:8,border:"1px solid #e2e8f0",background:"white",color:natFilter!=="All"?"#4f46e5":"#94a3b8",outline:"none",cursor:"pointer"}}>
                            {NAT_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                        </select>
                    </div>
                </aside>

                {/* Main */}
                <main className="flex-1 min-w-0 px-4 py-5">

                    {/* Mobile filter panel */}
                    {(() => {
                        const [mobileFiltersOpen, setMobileFiltersOpen] = React.useState(false);
                        return (
                            <div className="md:hidden mb-4">
                                {/* Toggle row */}
                                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom: mobileFiltersOpen ? 10 : 0}}>
                                    <button
                                        onClick={() => setMobileFiltersOpen(v => !v)}
                                        style={{display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,
                                            border: activeFilterCount > 0 ? "1.5px solid #6366f1" : "1px solid #e2e8f0",
                                            background: activeFilterCount > 0 ? "#eef2ff" : "white",
                                            color: activeFilterCount > 0 ? "#4f46e5" : "#64748b",cursor:"pointer"}}>
                                        <span style={{fontSize:13}}>⚙</span>
                                        Filters
                                        {activeFilterCount > 0 && <span style={{fontSize:10,fontWeight:800,background:"#6366f1",color:"white",borderRadius:99,padding:"1px 6px"}}>{activeFilterCount}</span>}
                                        <span style={{fontSize:10,color:"#94a3b8"}}>{mobileFiltersOpen ? "▲" : "▼"}</span>
                                    </button>
                                    {activeFilterCount > 0 && (
                                        <button onClick={handleClear}
                                            style={{fontSize:11,fontWeight:600,padding:"6px 10px",borderRadius:8,border:"1px solid #fee2e2",background:"#fef2f2",color:"#ef4444",cursor:"pointer"}}>
                                            Clear all
                                        </button>
                                    )}
                                </div>

                                {/* Expanded filter panel */}
                                {mobileFiltersOpen && (
                                    <div style={{background:"#fafafa",border:"1px solid #f1f5f9",borderRadius:12,padding:"14px 14px 10px",display:"flex",flexDirection:"column",gap:12}}>

                                        {/* Syllabus */}
                                        <div>
                                            <div style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"#d1d5db",marginBottom:6}}>Syllabus</div>
                                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                                {[
                                                    {val:"All", lbl:"All"},
                                                    {val:"AMEB", lbl:"🇦🇺 AMEB"},
                                                    {val:"AMEB Leisure", lbl:"🎵 Leisure"},
                                                    {val:"ABRSM", lbl:"🇬🇧 ABRSM"},
                                                    {val:"AMEB Diploma", lbl:"🎓 AMEB Dip"},
                                                    {val:"ABRSM Diploma", lbl:"🎓 ABRSM Dip"},
                                                    {val:"Trinity",         lbl:"🇬🇧 Trinity"},
                                                    {val:"Trinity Diploma", lbl:"🎓 Trinity Dip"},
                                                ].map(({val,lbl}) => (
                                                    <button key={val}
                                                        onClick={() => { setSyllabusFilter(val); setGradeFilter("All"); setSearchTriggered(true); }}
                                                        style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:20,cursor:"pointer",
                                                            background: syllabusFilter===val ? "#b91c1c" : "white",
                                                            color:      syllabusFilter===val ? "white" : "#64748b",
                                                            border:     syllabusFilter===val ? "1.5px solid #b91c1c" : "1px solid #e2e8f0"}}>
                                                        {lbl}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Era */}
                                        <div>
                                            <div style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"#d1d5db",marginBottom:6}}>Era</div>
                                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                                {ERAS.map(era => (
                                                    <button key={era}
                                                        onClick={() => { setEraFilter(era); setSearchTriggered(true); }}
                                                        style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:20,cursor:"pointer",
                                                            background: eraFilter===era ? "#4f46e5" : "white",
                                                            color:      eraFilter===era ? "white" : "#64748b",
                                                            border:     eraFilter===era ? "1.5px solid #4f46e5" : "1px solid #e2e8f0"}}>
                                                        {era==="All" ? "All eras" : era}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Grade */}
                                        <div>
                                            <div style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"#d1d5db",marginBottom:6}}>Grade</div>
                                            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                                {["All",...gradeKeys].map(gk => (
                                                    <button key={gk}
                                                        onClick={() => { setGradeFilter(gk); setSearchTriggered(true); }}
                                                        style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:20,cursor:"pointer",
                                                            background: gradeFilter===gk ? "#4f46e5" : "white",
                                                            color:      gradeFilter===gk ? "white" : "#64748b",
                                                            border:     gradeFilter===gk ? "1.5px solid #4f46e5" : "1px solid #e2e8f0"}}>
                                                        {gk==="All" ? "All" : gradeLabel(gk)}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Nationality */}
                                        <div>
                                            <div style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:"#d1d5db",marginBottom:6}}>Nationality</div>
                                            <select value={natFilter} onChange={e => { setNatFilter(e.target.value); setSearchTriggered(true); }}
                                                style={{width:"100%",fontSize:12,fontWeight:500,padding:"7px 10px",borderRadius:8,border:"1px solid #e2e8f0",background:"white",
                                                    color:natFilter!=="All"?"#4f46e5":"#94a3b8",outline:"none",cursor:"pointer"}}>
                                                {NAT_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                                            </select>
                                        </div>

                                    </div>
                                )}
                            </div>
                        );
                    })()}

                    {/* Header + search always visible */}
                    <div style={{marginBottom:28, paddingTop:8}}>
                        <div style={{marginBottom:14}}>
                            <span style={{fontSize:22,fontWeight:900,color:"#1e293b",letterSpacing:"-0.03em"}}>Piano Butler</span>
                            <span style={{fontSize:13,color:"#94a3b8",fontWeight:500,marginLeft:10}}>4,500 pieces · AMEB, ABRSM, Trinity & Diploma</span>
                            <div style={{fontSize:13,color:"#64748b",fontWeight:400,marginTop:6,lineHeight:1.5}}>
                                Search 4,500 piano exam pieces across AMEB, ABRSM, Trinity, and Diploma syllabuses — filter by grade, era, and nationality.
                            </div>
                        </div>
                        <div style={{position:"relative", maxWidth:560}}>
                            <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none"}}>🔍</span>
                            <input
                                type="text" value={query}
                                onChange={e => { setQuery(e.target.value); setShowSuggestions(true); if (!e.target.value.trim()) setSearchTriggered(false); }}
                                onKeyDown={e => {
                                    if (e.key==="Enter") { setSearchTriggered(true); setShowSuggestions(false); }
                                    if (e.key==="Escape") { setQuery(""); setSearchTriggered(false); setShowSuggestions(false); }
                                }}
                                onFocus={e => { e.currentTarget.style.borderColor="#a5b4fc"; e.currentTarget.style.boxShadow="0 0 0 3px #eef2ff"; if (query.trim().length>=2) setShowSuggestions(true); }}
                                onBlur={e => { e.currentTarget.style.borderColor="#e2e8f0"; e.currentTarget.style.boxShadow="none"; setTimeout(()=>setShowSuggestions(false),150); }}
                                placeholder="Search composer, title, grade, era…"
                                style={{width:"100%",padding:"14px 48px",fontSize:15,fontWeight:500,borderRadius:14,border:"1.5px solid #e2e8f0",outline:"none",color:"#1e293b",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}
                            />
                            {query && (
                                <button onClick={() => { setQuery(""); setSearchTriggered(false); }}
                                    style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#94a3b8",fontSize:18,cursor:"pointer",lineHeight:1}}>×</button>
                            )}
                            {showSuggestions && autoSuggestions.length > 0 && (
                                <div style={{position:"absolute",left:0,right:0,top:"100%",marginTop:6,borderRadius:12,overflow:"hidden",zIndex:50,background:"#1e293b",border:"1px solid #334155",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
                                    {autoSuggestions.map((s,i) => {
                                        const badgeStyle = {
                                            composer:    {bg:"#4f46e522", color:"#818cf8"},
                                            title:       {bg:"#0891b222", color:"#38bdf8"},
                                            era:         {bg:"#dc262622", color:"#f87171"},
                                            nationality: {bg:"#d9770622", color:"#fb923c"},
                                            focus:       {bg:"#05966922", color:"#34d399"},
                                        }[s.type] || {bg:"#ffffff11", color:"#94a3b8"};
                                        const icon = {
                                            composer:"🎼", title:"🎵", era:"🕰️", nationality:"🌍", focus:"🎯"
                                        }[s.type] || "";
                                        return (
                                            <button key={i} className="w-full text-left px-4 py-2.5 flex items-center gap-2 hover:bg-slate-700 transition-colors"
                                                onMouseDown={() => { setQuery(s.query); setSearchTriggered(true); setShowSuggestions(false); }}>
                                                <span style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",padding:"2px 6px",borderRadius:4,background:badgeStyle.bg,color:badgeStyle.color,whiteSpace:"nowrap"}}>
                                                    {icon} {s.type}
                                                </span>
                                                <span style={{fontSize:13,fontWeight:600,color:"white",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
                                                {s.composer && s.type==="title" && <span style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{s.composer}</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Grade grid — always visible when not searching */}
                    {!searchActive && (
                        <div style={{marginBottom:32}}>
                            <GradeGrid onGradeClick={handleGradeClick} activeSyllabus={activeSyllabus} setActiveSyllabus={setActiveSyllabus} />
                        </div>
                    )}

                    {/* Results — inline below search bar, no page transition */}
                    {searchActive && (
                        <>
                        <div className="flex items-center justify-between mb-5 flex-wrap gap-2"
                            style={{borderBottom:"1px solid #f1f5f9", paddingBottom:14}}>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                                {/* Active filter pills */}
                                {query && (
                                    <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"#4f46e5",color:"white"}}>
                                        {query}
                                    </span>
                                )}
                                {eraFilter!=="All" && (
                                    <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#eef2ff",color:"#4f46e5",border:"1px solid #e0e7ff"}}>
                                        {eraFilter}
                                    </span>
                                )}
                                {gradeFilter!=="All" && (
                                    <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#f8fafc",color:"#475569",border:"1px solid #e2e8f0"}}>
                                        {gradeLabel(gradeFilter)}
                                    </span>
                                )}
                                {syllabusFilter!=="All" && (
                                    <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#f5f3ff",color:"#6d28d9",border:"1px solid #ede9fe"}}>
                                        {syllabusFilter}
                                    </span>
                                )}
                                {natFilter!=="All" && (
                                    <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:"#ecfeff",color:"#0e7490",border:"1px solid #cffafe"}}>
                                        {natFilter}
                                    </span>
                                )}
                                {/* Auto-detected signals */}
                                {parsedSignals.detectedEra      && eraFilter==="All"      && <span style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:20,border:"1px dashed #c7d2fe",color:"#6366f1"}}>↳ {parsedSignals.detectedEra}</span>}
                                {parsedSignals.detectedNat      && natFilter==="All"      && <span style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:20,border:"1px dashed #a5f3fc",color:"#0891b2"}}>↳ {parsedSignals.detectedNat}</span>}
                                {parsedSignals.detectedGrade    && gradeFilter==="All"    && <span style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:20,border:"1px dashed #e2e8f0",color:"#64748b"}}>↳ {parsedSignals.detectedGrade}</span>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                                {results.length > 0 && (
                                    <span style={{fontSize:12,fontWeight:500,color:"#94a3b8"}}>
                                        {results.length.toLocaleString()} pieces
                                    </span>
                                )}
                                {(eraFilter!=="All"||syllabusFilter!=="All"||gradeFilter!=="All"||natFilter!=="All"||query) && (
                                    <button onClick={handleClear}
                                        style={{fontSize:11,fontWeight:600,color:"#6366f1",background:"none",border:"none",cursor:"pointer",padding:0}}>
                                        ← Back
                                    </button>
                                )}
                            </div>
                        </div>
                        {results.length > 0
                            ? results.map((p,i) => <PieceRow key={i} p={p} user={user} onLoginRequired={() => setShowLogin(true)} openVideo={openVideo} onAddToList={handleAddToList} />)
                            : (
                                <div className="py-12 text-center">
                                    <div className="text-4xl mb-4">🎹</div>
                                    <div className="text-slate-600 text-sm font-bold mb-1">No pieces found</div>
                                    {query && (
                                        <div className="text-slate-400 text-xs mb-5">
                                            No results for <span className="font-bold text-slate-500">"{query}"</span>
                                            {(eraFilter!=="All"||syllabusFilter!=="All"||gradeFilter!=="All"||natFilter!=="All") && " with your current filters"}
                                        </div>
                                    )}
                                    <div className="flex flex-col items-center gap-2 mt-4">
                                        {(eraFilter!=="All"||gradeFilter!=="All"||syllabusFilter!=="All"||natFilter!=="All") && (
                                            <button onClick={() => { setEraFilter("All"); setGradeFilter("All"); setSyllabusFilter("All"); setNatFilter("All"); }}
                                                className="text-[12px] font-bold px-4 py-2 rounded-xl bg-indigo-500 text-white hover:bg-indigo-400 transition-colors">
                                                Clear all filters
                                            </button>
                                        )}
                                        <div className="text-[11px] text-slate-400 font-semibold mt-2">Try searching for:</div>
                                        <div className="flex flex-wrap gap-2 justify-center mt-1">
                                            {["Chopin","Bach","Beethoven","Debussy","Schubert","Brahms"].map(name => (
                                                <button key={name} onClick={() => { setQuery(name); setSearchTriggered(true); }}
                                                    className="text-[11px] font-bold px-3 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:border-indigo-300 hover:text-indigo-600 transition-colors">
                                                    {name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )
                        }
                        </>
                    )}
                </main>
            </div>

            {/* Footer */}
            <footer style={{borderTop:"1px solid #f1f5f9",padding:"16px 0",textAlign:"center",fontSize:10,fontWeight:500,color:"#cbd5e1",letterSpacing:"0.05em",background:"#fafafa"}}>
                Piano Butler · AMEB 2026 · ABRSM 2025 &amp; 2026 · Trinity · Diploma · 4,500 pieces
            </footer>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
