function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
            const data = await res.json();
            const item = data.items?.[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title, loading: false });
            else { setModal(null); window.open('https://www.youtube.com/results?search_query=' + q, '_blank'); }
        } catch { setModal(null); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

/* ── Magic Link Login Modal ── */
function LoginModal({ onClose, onSuccess }) {
    const [email, setEmail] = useState('');
    const [sent, setSent] = useState(false);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSend = async (e) => {
        e.preventDefault();
        if (!email.trim()) return;
        setLoading(true); setError('');
        const { error: err } = await _sb.auth.signInWithOtp({
            email: email.trim(),
            options: { emailRedirectTo: window.location.href }
        });
        setLoading(false);
        if (err) setError(err.message);
        else setSent(true);
    };

    return (
        <div className="modal-overlay" onClick={onClose}>

    const rows = [];

        if (g.leisure) g.leisure.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"Leisure",  _accent:g.accent, _syllabus:"AMEB"}));

    ABRSM_META.forEach(g => {
        if (g.data) g.data.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"ABRSM", _accent:g.accent, _syllabus:"ABRSM"}));

    DIPLOMA_META.forEach(g => {
        const syllabusTag = (g.key==="LRSM"||g.key==="FRSM") ? "ABRSM Diploma" : "AMEB Diploma";
        if (g.data) g.data.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"Diploma", _accent:g.accent, _syllabus:syllabusTag}));
    });

    if (!era) return "tag-modern";
    const e = era.toLowerCase();
    if (e.includes("baroque"))      return "tag-baroque";

    if (e.includes("romantic"))     return "tag-romantic";
    if (e.includes("contemporary")) return "tag-contemporary";
    return "tag-modern";
};

const INTERESTS_KEY = "pb_interests_v2";
const loadInterests = () => { try { return JSON.parse(localStorage.getItem(INTERESTS_KEY)||"[]"); } catch { return []; } };
const saveInterests = arr => { try { localStorage.setItem(INTERESTS_KEY, JSON.stringify(arr)); window.dispatchEvent(new Event("pb_interests_changed")); } catch {} };

/* ── Recommendation Engine ── */
function getRecommendations(interests, corpus, count=5) {
    if (!interests || interests.length === 0) return { moreLike:[], tryDifferent:[] };

    // 1. Era distribution from saved pieces
    const eraCounts = {};
    const natCounts = {};
    const focusPool = [];
    interests.forEach(p => {
        if (p.era) eraCounts[p.era] = (eraCounts[p.era]||0) + 1;
        if (p.nat) natCounts[p.nat] = (natCounts[p.nat]||0) + 1;
        if (p.focus) p.focus.forEach(f => focusPool.push(f));
    });

    const savedKeys = new Set(interests.map(p => p.composer+"||"+p.title));
    const allEras = ["Baroque","Classical","Romantic","Modern","Contemporary"];

    // Most listened era
    const topEra = Object.entries(eraCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    // Least listened era (from the full era list, excluding zero)
    const leastEra = allEras
        .filter(e => e !== topEra)
        .sort((a,b) => (eraCounts[a]||0) - (eraCounts[b]||0))[0];
    // Top nationality
    const topNat = Object.entries(natCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;

    // Score function for "more like this"
    const scoreSimilar = (p) => {
        if (savedKeys.has(p.c+"||"+p.t)) return -1;
        let score = 0;
        if (p.era === topEra) score += 3;
        if (p.nat === topNat) score += 1;
        if (p.focus) p.focus.forEach(f => { if (focusPool.includes(f)) score += 2; });
        return score;
    };

    // Score function for "try something different"
    const scoreDifferent = (p) => {
        if (savedKeys.has(p.c+"||"+p.t)) return -1;
        let score = 0;
        if (p.era === leastEra) score += 4;
        else if (!eraCounts[p.era]) score += 3; // era never listened
        if (p.nat && !natCounts[p.nat]) score += 2; // nationality never listened
        if (p.focus) p.focus.forEach(f => { if (!focusPool.includes(f)) score += 1; });
        return score;
    };

    // Shuffle for variety, then score
    const shuffled = [...corpus].sort(() => Math.random() - 0.5);

    const moreLike = shuffled
        .map(p => ({ p, score: scoreSimilar(p) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, count)
        .map(x => x.p);

    const tryDifferent = shuffled
        .map(p => ({ p, score: scoreDifferent(p) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, count)
        .map(x => x.p);

    return { moreLike, tryDifferent, topEra, leastEra };
}

/* ── For You Panel ── */
function ForYouPanel({ interests, onLoginRequired, openVideo, user, onSearch }) {
    const { moreLike, tryDifferent, topEra, leastEra } = useMemo(
        () => getRecommendations(interests, CORPUS, 5),
        [interests]
    );

    if (interests.length === 0) return null;

    const MiniCard = ({ p }) => (

            <div className="text-[11px] text-slate-400 mb-2">

                {p.nat && <span className="text-slate-300"> · {p.nat}</span>}
            </div>

            </div>

            {moreLike.length > 0 && (
                <div className="mb-5">
                    <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-2">
                        More like what you love {topEra && <span className="text-indigo-300">· {topEra}</span>}
                    </div>
                    {moreLike.map((p,i) => <MiniCard key={i} p={p} />)}
                </div>
            )}

            {tryDifferent.length > 0 && (
                <div>
                    <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-2">
                        Broaden your repertoire {leastEra && <span className="text-emerald-400">→ {leastEra}</span>}
                    </div>
                    {tryDifferent.map((p,i) => <MiniCard key={i} p={p} />)}
                </div>
            )}
        </div>
    );
}

    const toggleStar = () => {
        let updated;
        if (isStarred) {
            updated = interests.filter(i => !(i.composer===p.c && i.title===p.t));
        } else {
            updated = [...interests, { composer:p.c, title:p.t, grade:p._grade, gradeKey:p._gradeKey, list:p.l, era:p.era, nat:p.nat, focus:p.focus||[] }];

                        className="px-4 py-2 text-[12px] font-bold rounded-xl transition-all"
                        style={{
                            background:  activeSyllabus===val ? col : "white",
                            color:       activeSyllabus===val ? "white" : "#94a3b8",
                            border:      `1.5px solid ${activeSyllabus===val ? col : "#e2e8f0"}`,
                        }}>
                        {lbl}
                    </button>
                ))}
            </div>

            {/* Grade cards */}
            <div className="grid grid-cols-3 gap-3">
                {(activeSyllabus === "AMEB" ? GRADE_META : ABRSM_META).map(g => (
                    <button key={g.key} onClick={() => onGradeClick(g.key)}
                        className="rounded-2xl p-4 text-left transition-all hover:-translate-y-0.5 hover:shadow-md"
                        style={{background: activeSyllabus==="AMEB" ? (GRADE_META.find(x=>x.key===g.key)?.bg||"#f8fafc") : "#f5f3ff",
                                border: `1.5px solid ${g.accent}22`}}>

            {/* Diploma cards */}
            {(() => {
                const amebDip  = DIPLOMA_META.filter(g => g.key!=="LRSM" && g.key!=="FRSM");
                const abrsmdip = DIPLOMA_META.filter(g => g.key==="LRSM" || g.key==="FRSM");
                const showAmeb  = activeSyllabus === "AMEB";
                const showAbrsm = activeSyllabus === "ABRSM";
                if (!showAmeb && !showAbrsm) return null;
                return (
                    <div className="mt-5">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-2">Diploma Level</div>
                        <div className={`grid gap-3 ${showAmeb ? "grid-cols-3" : "grid-cols-2"}`}>
                            {(showAmeb ? amebDip : abrsmdip).map(g => (
                                <a key={g.key} href={g.url}
                                    className="rounded-2xl p-4 text-left transition-all hover:-translate-y-0.5 hover:shadow-md block"
                                    style={{background: g.bg, border:`1.5px solid ${g.accent}33`, textDecoration:"none"}}>
                                    <div className="text-[13px] font-black" style={{color: g.accent}}>{g.label}</div>
                                    <div className="text-[10px] text-slate-500 mt-0.5">{g.desc}</div>
                                    <div className="mt-2 flex items-center gap-2">
                                        <div className="w-6 h-1 rounded-full" style={{background: g.accent}}></div>
                                        <span className="text-[9px] text-slate-400 font-bold">{g.program}</span>
                                    </div>
                                </a>
                            ))}
                        </div>
                    </div>
                );
            })()}
        </div>
    );
}

/* ── Main App ── */
function App() {
    const [user, setUser]                   = useState(null);
    const [query, setQuery]                 = useState("");
    const [eraFilter, setEraFilter]         = useState("All");
    const [gradeFilter, setGradeFilter]     = useState("All");
    const [natFilter, setNatFilter]         = useState("All");
    const [syllabusFilter, setSyllabusFilter] = useState("All");
    const [searchTriggered, setSearchTriggered] = useState(false);
    const [showLogin, setShowLogin]         = useState(false);
    const [activeSyllabus, setActiveSyllabus] = useState("AMEB");
    const [interests, setInterests]         = useState(() => loadInterests());
    const [showSuggestions, setShowSuggestions] = useState(false);
    const searchInputRef = React.useRef(null);
    const { modal: videoModal, open: openVideo, close: closeVideo } = useVideoModal();

    /* Sync interests state when localStorage changes (e.g. from PieceRow) */
    useEffect(() => {
        const sync = () => setInterests(loadInterests());
        window.addEventListener("pb_interests_changed", sync);
        return () => window.removeEventListener("pb_interests_changed", sync);
    }, []);

    /* Check session on load */
    useEffect(() => {
        _sb.auth.getSession().then(({ data: { session } }) => {
            setUser(session?.user || null);
        });
        const { data: { subscription } } = _sb.auth.onAuthStateChange((_event, session) => {
            setUser(session?.user || null);
        });
        return () => subscription.unsubscribe();
    }, []);

    const searchActive = searchTriggered || query.trim() || eraFilter!=="All" || gradeFilter!=="All" || natFilter!=="All" || syllabusFilter!=="All";

    const handleClear = () => { setQuery(""); setEraFilter("All"); setGradeFilter("All"); setNatFilter("All"); setSyllabusFilter("All"); setSearchTriggered(false); setShowSuggestions(false); };

    /* Autocomplete suggestions — top 8 matching composers or titles */
    const autoSuggestions = useMemo(() => {
        if (!query || query.trim().length < 2) return [];
        const q = query.toLowerCase().trim();
        const seen = new Set();
        const composerHits = [];
        const titleHits = [];
        CORPUS.forEach(p => {
            if (p.c && p.c.toLowerCase().includes(q) && !seen.has("c:"+p.c)) {
                seen.add("c:"+p.c);
                composerHits.push({ type: "composer", label: p.c, query: p.c });
            }
            if (p.t && p.t.toLowerCase().includes(q) && !seen.has("t:"+p.t)) {
                seen.add("t:"+p.t);
                titleHits.push({ type: "title", label: p.t, query: p.t, composer: p.c });
            }
        });
        return [...composerHits.slice(0,4), ...titleHits.slice(0,4)].slice(0,8);
    }, [query]);

    const handleGradeClick = (gradeKey) => { setGradeFilter(gradeKey); setSyllabusFilter(activeSyllabus); setSearchTriggered(true); };

    const NAT_LIST = useMemo(() => {
        const s = new Set();
        CORPUS.forEach(p => { if (p.nat) p.nat.split("/").forEach(n => s.add(n.trim())); });
        return ["All", ...Array.from(s).sort()];
    }, []);

    /* ── Smart query parser ──
       Extracts grade / era / syllabus / nationality signals from free text,
       returns { tokens: [...remaining words], detectedGrade, detectedEra, detectedNat, detectedSyllabus }
    */
    const parseQuery = (raw) => {
        const GRADE_MAP = {
            "preliminary":"Prelim","prelim":"Prelim",
            "grade 1":"G1","grade1":"G1","g1":"G1","grade 2":"G2","grade2":"G2","g2":"G2",
            "grade 3":"G3","grade3":"G3","g3":"G3","grade 4":"G4","grade4":"G4","g4":"G4",
            "grade 5":"G5","grade5":"G5","g5":"G5","grade 6":"G6","grade6":"G6","g6":"G6",
            "grade 7":"G7","grade7":"G7","g7":"G7","grade 8":"G8","grade8":"G8","g8":"G8",
            "amusa":"AMusA","lmusa":"LMusA","certp":"CertP","lrsm":"LRSM","frsm":"FRSM",
        };
        const ERA_MAP = {
            "baroque":"Baroque","bach era":"Baroque","early music":"Baroque",
            "classical":"Classical","classic":"Classical","classical era":"Classical",
            "romantic":"Romantic","romance":"Romantic","19th century":"Romantic",
            "modern":"Modern","20th century":"Modern",
            "contemporary":"Contemporary","current":"Contemporary","new music":"Contemporary",
        };
        const NAT_MAP = {
            "australian":"Australian","australia":"Australian","aussie":"Australian",
            "french":"French","france":"French",
            "german":"German","germany":"German","deutsch":"German",
            "russian":"Russian","russia":"Russian",
            "english":"English","british":"English","uk":"English",
            "italian":"Italian","italy":"Italian",
            "spanish":"Spanish","spain":"Spanish",
            "american":"American","usa":"American","us":"American",
            "chinese":"Chinese","china":"Chinese",
            "japanese":"Japanese","japan":"Japanese",
            "hungarian":"Hungarian","hungary":"Hungarian",
            "polish":"Polish","poland":"Polish",
            "norwegian":"Norwegian","norway":"Norwegian",
            "austrian":"Austrian","austria":"Austrian",
            "czech":"Czech","bohemian":"Czech",
        };
        const SYLLABUS_MAP = {
            "ameb":"AMEB","ameb comprehensive":"AMEB",
            "leisure":"AMEB Leisure","piano for leisure":"AMEB Leisure","ameb leisure":"AMEB Leisure",
            "abrsm":"ABRSM",
            "diploma":"AMEB Diploma","ameb diploma":"AMEB Diploma",
            "abrsm diploma":"ABRSM Diploma",
        };
        // Typo tolerance: Levenshtein distance ≤ 1 for short words
        const levenshtein = (a, b) => {
            if (Math.abs(a.length - b.length) > 2) return 99;
            const dp = Array.from({length: a.length+1}, (_,i) => [i]);
            for (let j=1; j<=b.length; j++) dp[0][j]=j;
            for (let i=1; i<=a.length; i++)
                for (let j=1; j<=b.length; j++)
                    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
            return dp[a.length][b.length];
        };
        // Fuzzy match against known composer names (Levenshtein ≤ 1 on surname)
        const fuzzyComposers = (() => {
            const surnames = new Set();
            CORPUS.forEach(p => {
                if (p.c) {
                    const s = p.c.split(",")[0].toLowerCase().trim();
                    if (s.length >= 4) surnames.add(s);
                }
            });
            return Array.from(surnames);
        })();

        const lower = raw.toLowerCase().trim();
        let remaining = lower;
        let detectedGrade = null, detectedEra = null, detectedNat = null, detectedSyllabus = null;

        // Check multi-word patterns first (longest match first)
        const allMaps = [
            [GRADE_MAP, (v) => { detectedGrade = v; }],
            [ERA_MAP,   (v) => { detectedEra = v; }],
            [NAT_MAP,   (v) => { detectedNat = v; }],
            [SYLLABUS_MAP, (v) => { detectedSyllabus = v; }],
        ];
        for (const [map, setter] of allMaps) {
            const keys = Object.keys(map).sort((a,b) => b.length - a.length);
            for (const k of keys) {
                if (remaining.includes(k)) {
                    setter(map[k]);
                    remaining = remaining.replace(k, " ").replace(/\s+/g," ").trim();
                    break;
                }
            }
        }

        // Split remaining into tokens, apply fuzzy correction
        const rawTokens = remaining.split(/\s+/).filter(t => t.length > 1);
        const tokens = rawTokens.map(tok => {
            if (tok.length < 4) return tok;
            // find closest composer surname
            let best = tok, bestDist = 1; // max dist 1
            for (const s of fuzzyComposers) {
                const d = levenshtein(tok, s);
                if (d < bestDist || (d === bestDist && s.length === tok.length)) {
                    bestDist = d; best = s;
                }
            }
            return best;
        });

        return { tokens, detectedGrade, detectedEra, detectedNat, detectedSyllabus };
    };

    const results = useMemo(() => {
        if (!searchActive) return [];
        const raw = query.toLowerCase().trim();
        const { tokens, detectedGrade, detectedEra, detectedNat, detectedSyllabus } = parseQuery(raw);

        // Effective filters: sidebar filters OR detected from query
        const effEra      = eraFilter      !== "All" ? eraFilter      : (detectedEra      || "All");
        const effGrade    = gradeFilter    !== "All" ? gradeFilter    : (detectedGrade    || "All");
        const effNat      = natFilter      !== "All" ? natFilter      : (detectedNat      || "All");
        const effSyllabus = syllabusFilter !== "All" ? syllabusFilter : (detectedSyllabus || "All");

        return CORPUS.filter(p => {
            // Multi-token AND match: every token must hit at least one field
            const mQ = tokens.length === 0 || tokens.every(tok =>
                p.t.toLowerCase().includes(tok) ||
                p.c.toLowerCase().includes(tok) ||
                (p.nat  && p.nat.toLowerCase().includes(tok)) ||
                (p.era  && p.era.toLowerCase().includes(tok)) ||
                (p.focus && p.focus.some(f => f.toLowerCase().includes(tok)))
            );
            const mE = effEra   === "All" || p.era === effEra;
            const mG = effGrade === "All" || p._gradeKey === effGrade;
            const mN = effNat   === "All" || (p.nat && p.nat.toLowerCase().includes(effNat.toLowerCase()));
            const mS = effSyllabus === "All"
                || (effSyllabus === "AMEB"          && p._syllabus==="AMEB" && p._type==="General")
                || (effSyllabus === "AMEB Leisure"  && p._syllabus==="AMEB" && p._type==="Leisure")
                || (effSyllabus === "ABRSM"         && p._syllabus==="ABRSM")
                || (effSyllabus === "AMEB Diploma"  && p._syllabus==="AMEB Diploma")
                || (effSyllabus === "ABRSM Diploma" && p._syllabus==="ABRSM Diploma");
            return mQ && mE && mG && mN && mS;
        });
    }, [query, eraFilter, gradeFilter, natFilter, syllabusFilter, searchActive]);

    /* Detected signals from current query (for showing hint pills) */
    const parsedSignals = useMemo(() => query.trim() ? parseQuery(query.toLowerCase().trim()) : {}, [query]);

    const ERAS = ["All","Baroque","Classical","Romantic","Modern","Contemporary"];
    const activeFilterCount = [eraFilter!=="All", gradeFilter!=="All", natFilter!=="All", syllabusFilter!=="All"].filter(Boolean).length;

    return (
        <>
        {showLogin && <LoginModal onClose={() => setShowLogin(false)} onSuccess={() => setShowLogin(false)} />}
        <VideoModal modal={videoModal} onClose={closeVideo} />

        <div className="min-h-screen flex flex-col" style={{background:"#f1f5f9"}}>

            {/* ── Nav ── */}
            <header style={{background:"#1e293b",borderBottom:"1px solid #0f172a"}} className="sticky top-0 z-30">
                <div className="max-w-screen-xl mx-auto px-4 h-13 flex items-center gap-3" style={{height:52}}>
                    <button onClick={handleClear} style={{background:"none",border:"none",padding:0,cursor:"pointer",position:"relative",zIndex:40}} className="flex items-center gap-2 shrink-0 hover:opacity-80 transition-opacity">
                        <div className="w-1 h-6 rounded-full bg-indigo-400"></div>
                        <span className="text-[16px] font-black text-white">Piano Butler</span>
                    </button>
                    {/* Search */}
                    <div className="flex-1 flex items-center gap-2 max-w-xl">
                        <div className="relative flex-1">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none">🔍</span>
                            <input ref={searchInputRef} type="text" value={query}
                                onChange={e => { setQuery(e.target.value); setShowSuggestions(true); if (!e.target.value.trim()) { setSearchTriggered(false); } }}
                                onKeyDown={e => {
                                    if (e.key==="Enter") { setSearchTriggered(true); setShowSuggestions(false); }
                                    if (e.key==="Escape") { if (query) { setShowSuggestions(false); } else handleClear(); }
                                }}
                                onFocus={() => { if (query.trim().length >= 2) setShowSuggestions(true); }}
                                onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
                                placeholder="Search composer, title, nationality…"
                                className="w-full pl-9 pr-8 py-1.5 rounded-xl text-[13px] font-medium text-slate-800 outline-none"
                                style={{background:"#f8fafc",border:"1.5px solid #334155"}}
                            />
                            {query && <button onClick={handleClear} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-base leading-none">×</button>}
                            {/* Autocomplete dropdown */}
                            {showSuggestions && autoSuggestions.length > 0 && (
                                <div className="absolute left-0 right-0 top-full mt-1 rounded-xl shadow-2xl overflow-hidden z-50"
                                    style={{background:"#1e293b",border:"1px solid #334155"}}>
                                    {autoSuggestions.map((s,i) => (
                                        <button key={i} className="w-full text-left px-3 py-2 flex items-center gap-2 hover:bg-slate-700 transition-colors"
                                            onMouseDown={() => { setQuery(s.query); setSearchTriggered(true); setShowSuggestions(false); }}>
                                            <span className="text-[9px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded"
                                                style={{background: s.type==="composer" ? "#4f46e522" : "#0891b222", color: s.type==="composer" ? "#818cf8" : "#38bdf8"}}>
                                                {s.type==="composer" ? "composer" : "title"}
                                            </span>
                                            <span className="text-[12px] font-semibold text-white truncate flex-1">{s.label}</span>
                                            {s.composer && s.type==="title" && (
                                                <span className="text-[10px] text-slate-400 shrink-0 truncate max-w-[100px]">{s.composer}</span>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        {searchActive && (
                            <button onClick={handleClear} className="text-[11px] font-bold text-slate-400 hover:text-indigo-300 transition-colors whitespace-nowrap">
                                ← Back
                            </button>

                    </div>
                    {/* Right */}

                        ) : (

                                style={{background:"#4f46e522",color:"#818cf8",border:"1px solid #4f46e544"}}>
                                Sign in
                            </button>
                        )}
                        <a href="teacher-dashboard.html"
                            className="hidden md:block px-3 py-1.5 text-[11px] font-bold rounded-xl transition-colors"
                            style={{background:"#0f172a",color:"#475569",border:"1px solid #1e293b"}}>
                            Teacher →
                        </a>
                    </div>
                </div>
            </header>

            {/* ── Body ── */}
            <div className="flex flex-1 max-w-screen-xl mx-auto w-full">

                {/* Sidebar */}
                <aside className="hidden md:flex flex-col shrink-0 sticky top-[52px] self-start overflow-y-auto no-scrollbar"
                    style={{width:220,height:"calc(100vh - 52px)",background:"white",borderRight:"1px solid #e2e8f0",padding:"16px 14px"}}>

                    <div className="flex items-center justify-between mb-4">

                                Clear ({activeFilterCount})
                            </button>

                    </div>

                    {/* Syllabus */}
                    <div className="mb-4">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-1.5">Syllabus</div>
                        {[["All","All","#4f46e5"],["AMEB","🇦🇺 AMEB Comprehensive","#4f46e5"],["AMEB Leisure","🎵 AMEB Leisure","#0891b2"],["ABRSM","🇬🇧 ABRSM","#7c3aed"],["AMEB Diploma","🎓 AMEB Diploma","#4c1d95"],["ABRSM Diploma","🎓 ABRSM Diploma","#6d28d9"]].map(([val,lbl,col]) => (
                            <button key={val} onClick={() => { setSyllabusFilter(val); setGradeFilter("All"); setSearchTriggered(true); }}

                                {lbl}
                            </button>
                        ))}
                    </div>

                    {/* Era */}

                            <button key={era} onClick={() => { setEraFilter(era); setSearchTriggered(true); }}

                                    color:      eraFilter===era ? "#4f46e5"   : "#94a3b8",

                            return (

                                    className="block w-full text-left text-[11px] font-bold px-3 py-1.5 rounded-lg mb-0.5 transition-all"
                                    style={{
                                        background: gradeFilter===gk ? col+"18" : "transparent",
                                        color:      gradeFilter===gk ? col      : "#94a3b8",
                                        border:     `1px solid ${gradeFilter===gk ? col+"44" : "transparent"}`,
                                    }}>
                                    {gk==="All" ? "All Grades" : gk==="Prelim" ? "Preliminary" : gk.replace("G","Grade ")}
                                </button>

                        </select>
                    </div>
                </aside>

                {/* Main */}
                <main className="flex-1 min-w-0 px-4 py-5">

                    {/* Mobile filter strip */}
                    <div className="md:hidden flex gap-1.5 overflow-x-auto no-scrollbar mb-4 pb-1">
                        {ERAS.slice(1).map(era => (
                            <button key={era} onClick={() => { setEraFilter(era===eraFilter?"All":era); setSearchTriggered(true); }}
                                className="whitespace-nowrap text-[11px] font-bold px-2.5 py-1 rounded-lg shrink-0"
                                style={{background:eraFilter===era?"#4f46e5":"white",color:eraFilter===era?"white":"#64748b",border:"1px solid #e2e8f0"}}>
                                {era}
                            </button>

                        {activeFilterCount > 0 && (

                    </div>

                    {/* Home — grade grid + quick searches + For You */}
                    {!searchActive && (
                        <>
                        <GradeGrid onGradeClick={handleGradeClick} activeSyllabus={activeSyllabus} setActiveSyllabus={setActiveSyllabus} />

                                    {label:"🔥 Beethoven",     q:"Beethoven"},
                                    {label:"🦋 Romantic",      q:"Romantic",   era:"Romantic"},
                                    {label:"🏛 Baroque",       q:"",           era:"Baroque"},
                                    {label:"🌏 Australian",    q:"Australian"},
                                    {label:"🎸 Contemporary",  q:"",           era:"Contemporary"},
                                    {label:"🇫🇷 French",        q:"French"},
                                    {label:"🇷🇺 Russian",       q:"Russian"},
                                    {label:"📖 Sonatina",      q:"Sonatina"},
                                    {label:"🎼 Waltz",         q:"Waltz"},
                                    {label:"💃 Mazurka",       q:"Mazurka"},
                                    {label:"🌙 Nocturne",      q:"Nocturne"},
                                ].map((chip,i) => (
                                    <button key={i}
                                        onClick={() => {
                                            if (chip.era) { setEraFilter(chip.era); }
                                            if (chip.q)   { setQuery(chip.q); }
                                            setSearchTriggered(true);
                                        }}
                                        className="text-[11px] font-bold px-3 py-1.5 rounded-full transition-all hover:shadow-sm"
                                        style={{background:"white",border:"1.5px solid #e2e8f0",color:"#475569"}}>
                                        {chip.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <ForYouPanel
                            interests={interests}
                            user={user}
                            onLoginRequired={() => setShowLogin(true)}
                            openVideo={openVideo}
                            onSearch={(era) => { setEraFilter(era); setSearchTriggered(true); }}
                        />
                        </>
                    )}

                    {/* Results */}
                    {searchActive && (
                        <>
                        <div className="flex items-center justify-between mb-3 px-1 flex-wrap gap-2">
                            <div className="text-[12px] font-semibold text-slate-400">
                                {results.length === 0
                                    ? <span className="text-rose-400 font-bold">No pieces found</span>
                                    : <>{results.length.toLocaleString()} <span className="text-slate-300">pieces found</span>
                                        {(eraFilter!=="All"||syllabusFilter!=="All"||gradeFilter!=="All"||natFilter!=="All") && (
                                            <button onClick={handleClear} className="ml-2 text-[10px] text-indigo-400 hover:text-indigo-300 font-bold">clear filters</button>
                                        )}
                                      </>}
                            </div>
                            {/* Active filter pills — sidebar + auto-detected from query */}
                            <div className="flex gap-1 flex-wrap justify-end items-center">
                                {query && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-500 text-white">"{query}"</span>}
                                {eraFilter!=="All" && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-600">{eraFilter}</span>}
                                {gradeFilter!=="All" && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">{gradeFilter}</span>}
                                {syllabusFilter!=="All" && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-violet-100 text-violet-600">{syllabusFilter}</span>}
                                {natFilter!=="All" && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-600">{natFilter}</span>}
                                {/* Auto-detected signals from query text */}
                                {parsedSignals.detectedGrade    && gradeFilter==="All"    && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full border border-dashed border-slate-300 text-slate-500">↳ {parsedSignals.detectedGrade}</span>}
                                {parsedSignals.detectedEra      && eraFilter==="All"      && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full border border-dashed border-indigo-300 text-indigo-400">↳ {parsedSignals.detectedEra}</span>}
                                {parsedSignals.detectedNat      && natFilter==="All"      && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full border border-dashed border-cyan-300 text-cyan-500">↳ {parsedSignals.detectedNat}</span>}
                                {parsedSignals.detectedSyllabus && syllabusFilter==="All" && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full border border-dashed border-violet-300 text-violet-400">↳ {parsedSignals.detectedSyllabus}</span>}
                            </div>
                        </div>
                        {results.length > 0
                            ? results.map((p,i) => <PieceRow key={i} p={p} user={user} onLoginRequired={() => setShowLogin(true)} openVideo={openVideo} />)
                            : (
                                <div className="py-12 text-center">
                                    <div className="text-4xl mb-4">🎹</div>
                                    <div className="text-slate-600 text-sm font-bold mb-1">No pieces found</div>
                                    {query && (
                                        <div className="text-slate-400 text-xs mb-5">
                                            No results for <span className="font-bold text-slate-500">"{query}"</span>
                                            {(eraFilter!=="All"||syllabusFilter!=="All"||gradeFilter!=="All"||natFilter!=="All") && " with your current filters"}
                                        </div>
                                    )}
                                    <div className="flex flex-col items-center gap-2 mt-4">
                                        {(eraFilter!=="All"||gradeFilter!=="All"||syllabusFilter!=="All"||natFilter!=="All") && (
                                            <button onClick={() => { setEraFilter("All"); setGradeFilter("All"); setSyllabusFilter("All"); setNatFilter("All"); }}
                                                className="text-[12px] font-bold px-4 py-2 rounded-xl bg-indigo-500 text-white hover:bg-indigo-400 transition-colors">
                                                Clear all filters
                                            </button>
                                        )}
                                        <div className="text-[11px] text-slate-400 font-semibold mt-2">Try searching for:</div>
                                        <div className="flex flex-wrap gap-2 justify-center mt-1">
                                            {["Chopin","Bach","Beethoven","Debussy","Schubert","Brahms"].map(name => (
                                                <button key={name} onClick={() => { setQuery(name); setSearchTriggered(true); }}
                                                    className="text-[11px] font-bold px-3 py-1.5 rounded-full bg-white border border-slate-200 text-slate-600 hover:border-indigo-300 hover:text-indigo-600 transition-colors">
                                                    {name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )
                        }
                        </>
                    )}
                </main>
            </div>

            {/* Footer */}
            <footer className="border-t border-slate-200 py-4 text-center text-[10px] text-slate-300 font-semibold tracking-wide" style={{background:"white"}}>
                Piano Butler · AMEB 2026 · ABRSM 2025&amp;2026 · AMEB &amp; ABRSM Diploma · 3,283 pieces
            </footer>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
