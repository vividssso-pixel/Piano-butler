const YT_API_KEY = "AIzaSyDR9BQfybtyS2e-H9wgtFgWbfqlQWpLCW8";

function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, composer, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
            const data = await res.json();
            const item = data.items?.[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title });
            else setModal({ error: true, title });
        } catch { setModal({ error: true, title }); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
    if (!modal) return null;
    return (
        <div className="yt-modal-bg" onClick={onClose}>
            <div className="yt-modal-box" onClick={e => e.stopPropagation()}>
                {modal.loading && <div style={{padding:40,textAlign:"center",color:"#666"}}>Loading…</div>}
                {modal.error   && <div style={{padding:40,textAlign:"center",color:"#666"}}>No video found for "{modal.title}"</div>}

};

const ERAS = ["Baroque","Classical","Romantic","Modern","Contemporary"];

// ── Score + pick pieces ────────────────────────────────────────────────────
function scorePiece(p, prefs) {
    let score = Math.random() * 10; // variety
    if (prefs.era && p.era === prefs.era) score += 30;
    if (prefs.nat && p.nat && p.nat.toLowerCase().includes(prefs.nat.toLowerCase())) score += 20;
    if (prefs.focus && p.focus && p.focus.some(f => f.toLowerCase().includes(prefs.focus.toLowerCase()))) score += 25;
    return score;
}

function pickDiverse(scored, n) {
    const usedEras = new Set(), usedNats = new Set(), result = [];
    const sorted = [...scored].sort((a,b) => b.score - a.score);
    for (const item of sorted) {
        if (result.length >= n) break;
        const era = item.p.era, nat = item.p.nat;
        let bonus = 0;
        if (era && !usedEras.has(era)) { bonus += 15; }
        if (nat && !usedNats.has(nat)) { bonus += 10; }
        item.score += bonus;
        result.push(item);
        if (era) usedEras.add(era);
        if (nat) usedNats.add(nat);
    }
    return result;
}

function getMatches({ gradeKey, syllabus, era, nat, count = 12 }) {
    // Filter corpus to matching grade+syllabus, then score
    let pool = CORPUS.filter(p => {
        if (gradeKey && p._gradeKey !== gradeKey) return false;
        if (syllabus && syllabus !== "All" && p._syllabus !== syllabus) return false;
        return true;
    });
    if (pool.length === 0) return [];
    const scored = pool.map(p => ({ p, score: scorePiece(p, { era, nat }) }));
    return pickDiverse(scored, count).map(x => x.p);
}

    const SYLLABUSES = [
        { val:"All",    label:"All syllabuses" },
        { val:"AMEB",   label:"🇦🇺 AMEB" },
        { val:"ABRSM",  label:"🇬🇧 ABRSM" },
        { val:"Trinity",label:"Trinity" },
    ];

    return (
        <div>
            {/* Step: grade */}
            {step === "grade" && (
                <div>
                    <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:20}}>
                        What grade is your student working at?
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>
                        {["Prelim","G1","G2","G3","G4","G5","G6","G7","G8"].map(gk => (
                            <button key={gk}
                                className={`grade-btn${gradeKey===gk?" active":""}`}
                                onClick={() => setGradeKey(gk)}>
                                {GRADE_LABEL[gk]}
                            </button>
                        ))}
                    </div>
                    {gradeKey && (
                        <button onClick={() => setStep("syllabus")}
                            style={{padding:"12px 28px",borderRadius:12,background:"#d4956a",color:"#1a1a1a",border:"none",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                            Next →
                        </button>
                    )}
                </div>
            )}

            {/* Step: syllabus */}
            {step === "syllabus" && (
                <div>
                    <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:20}}>
                        Which syllabus are you working with?
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>
                        {SYLLABUSES.map(s => (
                            <button key={s.val}
                                className={`chip${syllabus===s.val?" active":""}`}
                                onClick={() => setSyllabus(s.val)}>
                                {s.label}
                            </button>
                        ))}
                    </div>
                    <div style={{display:"flex",gap:10}}>
                        <button onClick={() => setStep("grade")}
                            style={{padding:"10px 20px",borderRadius:10,background:"transparent",color:"#666",border:"1px solid #333",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                            ← Back
                        </button>
                        <button onClick={() => setStep("prefs")}
                            style={{padding:"12px 28px",borderRadius:12,background:"#d4956a",color:"#1a1a1a",border:"none",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                            Next →
                        </button>
                    </div>
                </div>
            )}

            {/* Step: preferences */}
            {step === "prefs" && (
                <div>
                    <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:20}}>
                        Any style preferences? <span style={{color:"#555"}}>(optional)</span>
                    </div>
                    <span className="section-label">Era</span>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
                        <button className={`chip${!era?" active":""}`} onClick={() => setEra(null)}>Any era</button>
                        {ERAS.map(e => (
                            <button key={e} className={`chip${era===e?" active":""}`} onClick={() => setEra(era===e?null:e)}>{e}</button>
                        ))}
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:8}}>
                        <button onClick={() => setStep("syllabus")}
                            style={{padding:"10px 20px",borderRadius:10,background:"transparent",color:"#666",border:"1px solid #333",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                            ← Back
                        </button>
                        <button onClick={() => generate(gradeKey, syllabus, era)}
                            style={{padding:"12px 28px",borderRadius:12,background:"#d4956a",color:"#1a1a1a",border:"none",fontSize:14,fontWeight:800,cursor:"pointer"}}>
                            Find pieces →
                        </button>
                    </div>
                </div>
            )}

            {/* Results */}
            {step === "results" && (
                <div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
                        <div>
                            <span style={{fontSize:16,fontWeight:800,color:"#e8e3dc"}}>
                                {GRADE_LABEL[gradeKey]} {syllabus !== "All" ? `· ${syllabus}` : ""}
                                {era ? ` · ${era}` : ""}
                            </span>
                            <span style={{fontSize:12,color:"#555",marginLeft:10}}>{pieces.length} pieces matched</span>
                        </div>
                        <div style={{display:"flex",gap:8"}}>
                            <button onClick={() => generate(gradeKey, syllabus, era)}
                                style={{fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:8,border:"1px solid #333",background:"transparent",color:"#888",cursor:"pointer"}}>
                                🔀 Regenerate
                            </button>
                            <button onClick={() => { setStep("grade"); setGradeKey(null); setSyllabus("All"); setEra(null); setPieces([]); setGenerated(false); }}
                                style={{fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:8,border:"1px solid #333",background:"transparent",color:"#888",cursor:"pointer"}}>
                                ← New search
                            </button>
                        </div>
                    </div>
                    {pieces.length === 0
                        ? <div style={{padding:40,textAlign:"center",color:"#555"}}>No pieces found for this combination.</div>
                        : (
                            <div style={{display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))"}}>
                                {pieces.map((p,i) => <PieceCard key={i} p={p} openVideo={openVideo} />)}
                            </div>
                        )
                    }
                </div>
            )}
        </div>
    );
}

class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    render() {
        if (this.state.error) return (
            <div style={{padding:40,color:"#f87171",fontFamily:"monospace"}}>
                <b>Error:</b> {this.state.error.message}
            </div>
        );
        return this.props.children;
    }
}

ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App /></ErrorBoundary>
);
