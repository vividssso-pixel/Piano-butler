function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
            const data = await res.json();
            const item = data.items?.[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title, loading: false });
            else { setModal(null); window.open('https://www.youtube.com/results?search_query=' + q, '_blank'); }
        } catch { setModal(null); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

/* ── Magic Link Login Modal ── */
function LoginModal({ onClose, onSuccess }) {
    const [email, setEmail] = useState('');
    const [sent, setSent] = useState(false);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSend = async (e) => {
        e.preventDefault();
        if (!email.trim()) return;
        setLoading(true); setError('');
        const { error: err } = await _sb.auth.signInWithOtp({
            email: email.trim(),
            options: { emailRedirectTo: window.location.href }

        setLoading(false);
        if (err) setError(err.message);
        else setSent(true);
    };

    return (
        <div className="modal-overlay" onClick={onClose}>

const buildCorpus = () => {
    const rows = [];
    GRADE_META.forEach(g => {
        if (g.comp)    g.comp.forEach(p    => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"General",  _accent:g.accent, _syllabus:"AMEB"}));
        if (g.leisure) g.leisure.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"Leisure",  _accent:g.accent, _syllabus:"AMEB"}));
    });
    ABRSM_META.forEach(g => {
        if (g.data) g.data.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"ABRSM", _accent:g.accent, _syllabus:"ABRSM"}));
    });
    DIPLOMA_META.forEach(g => {
        if (g.data) g.data.forEach(p => rows.push({...p, _grade:g.label, _gradeKey:g.key, _type:"Diploma", _accent:g.accent, _syllabus:"AMEB Diploma"}));
    });
    return rows;
};
const CORPUS = buildCorpus();

const eraClass = era => {
    if (!era) return "tag-modern";
    const e = era.toLowerCase();
    if (e.includes("baroque"))      return "tag-baroque";
    if (e.includes("classical"))    return "tag-classical";
    if (e.includes("romantic"))     return "tag-romantic";
    if (e.includes("contemporary")) return "tag-contemporary";
    return "tag-modern";
};

const sheetUrl = (composer, title) =>
    `https://www.google.com/search?q=${encodeURIComponent(composer.replace(/,.*/, '').trim() + ' ' + title + ' sheet music')}`;

const INTERESTS_KEY = "pb_interests_v2";
const loadInterests = () => { try { return JSON.parse(localStorage.getItem(INTERESTS_KEY)||"[]"); } catch { return []; } };
const saveInterests = arr => { try { localStorage.setItem(INTERESTS_KEY, JSON.stringify(arr)); } catch {} };

/* ── Piece Row ── */
function PieceRow({ p, user, onLoginRequired, openVideo }) {
    const [interests, setInterests] = useState(() => loadInterests());
    const isStarred = interests.some(i => i.composer===p.c && i.title===p.t);

    const toggleStar = () => {
        if (!user) { onLoginRequired(); return; }
        let updated;
        if (isStarred) {
            updated = interests.filter(i => !(i.composer===p.c && i.title===p.t));
        } else {
            updated = [...interests, { composer:p.c, title:p.t, grade:p._grade, gradeKey:p._gradeKey, list:p.l, era:p.era, nat:p.nat }];
        }
        setInterests(updated);
        saveInterests(updated);
    };

    return (
        <div className="piece-row fade-in">
            {/* Tags row */}
            <div className="flex flex-wrap gap-1 mb-2">
                <span className="text-[10px] font-black px-2 py-0.5 rounded-full text-white"
                    style={{background: p._syllabus==="ABRSM" ? "#7c3aed" : "#4f46e5"}}>
                    {p._syllabus}
                </span>
                <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">{p._grade}</span>
                <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-50 text-slate-400 border border-slate-200">List {p.l}</span>
                {p.era && <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${eraClass(p.era)}`}>{p.era}</span>}
            </div>
            {/* Title + composer */}
            <div className="text-[15px] font-bold text-slate-800 leading-snug">{p.t}</div>
            <div className="text-[12px] text-slate-400 font-medium mt-0.5 mb-3">
                {p.c}{p.nat && <span className="text-slate-300"> · {p.nat}</span>}
            </div>
            {/* Focus tags */}
            {p.focus && p.focus.length > 0 && (
                <div className="flex flex-wrap gap-1 mb-3">
                    {p.focus.map((f,i) => (
                        <span key={i} className="text-[10px] px-2 py-0.5 bg-indigo-50 text-indigo-400 rounded-full font-semibold">{f}</span>
                    ))}
                </div>
            )}
            {/* Actions */}
            <div className="flex flex-wrap gap-1.5">
                <button onClick={toggleStar}
                    className="px-3 py-1.5 text-[11px] font-bold rounded-lg transition-colors border"
                    style={{
                        background: isStarred ? "#f59e0b" : "#fffbeb",
                        color:      isStarred ? "white"   : "#d97706",
                        borderColor: isStarred ? "#f59e0b" : "#fde68a",
                    }}>
                    {isStarred ? "⭐ Saved" : "☆ Save"}
                </button>
                <button onClick={() => openVideo(p.c, p.t)}
                    className="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white text-[11px] font-bold rounded-lg transition-colors">
                    ▶ YouTube
                </button>
                <a href={sheetUrl(p.c, p.t)} target="_blank" rel="noopener noreferrer"
                    className="px-3 py-1.5 text-[11px] font-bold rounded-lg border border-slate-200 text-slate-400 hover:border-slate-300 transition-colors">
                    📄 Score
                </a>
            </div>
        </div>
    );
}

                ))}
            </div>

            {/* Diploma cards — AMEB only */}
            {activeSyllabus === "AMEB" && (
                <div className="mt-5">
                    <div className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-2">Diploma Level</div>
                    <div className="grid grid-cols-2 gap-3">
                        {DIPLOMA_META.map(g => (
                            <a key={g.key} href={g.url}
                                className="rounded-2xl p-4 text-left transition-all hover:-translate-y-0.5 hover:shadow-md block"
                                style={{background: g.bg, border:`1.5px solid ${g.accent}33`, textDecoration:"none"}}>
                                <div className="text-[13px] font-black" style={{color: g.accent}}>{g.label}</div>
                                <div className="text-[10px] text-slate-500 mt-0.5">{g.desc}</div>
                                <div className="mt-2 flex items-center gap-2">
                                    <div className="w-6 h-1 rounded-full" style={{background: g.accent}}></div>
                                    <span className="text-[9px] text-slate-400 font-bold">{g.program}</span>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            )}
        </div>
    );
}

/* ── Main App ── */
function App() {
    const [user, setUser]                   = useState(null);
    const [query, setQuery]                 = useState("");
    const [eraFilter, setEraFilter]         = useState("All");
    const [gradeFilter, setGradeFilter]     = useState("All");
    const [natFilter, setNatFilter]         = useState("All");
    const [syllabusFilter, setSyllabusFilter] = useState("All");
    const [searchTriggered, setSearchTriggered] = useState(false);
    const [showLogin, setShowLogin]         = useState(false);
    const [activeSyllabus, setActiveSyllabus] = useState("AMEB");
    const { modal: videoModal, open: openVideo, close: closeVideo } = useVideoModal();

    /* Check session on load */
    useEffect(() => {
        _sb.auth.getSession().then(({ data: { session } }) => {
            setUser(session?.user || null);
        });
        const { data: { subscription } } = _sb.auth.onAuthStateChange((_event, session) => {
            setUser(session?.user || null);
        });
        return () => subscription.unsubscribe();
    }, []);

    const searchActive = searchTriggered || query.trim() || eraFilter!=="All" || gradeFilter!=="All" || natFilter!=="All" || syllabusFilter!=="All";

    const handleClear = () => { setQuery(""); setEraFilter("All"); setGradeFilter("All"); setNatFilter("All"); setSyllabusFilter("All"); setSearchTriggered(false); };

    const handleGradeClick = (gradeKey) => { setGradeFilter(gradeKey); setSyllabusFilter(activeSyllabus); setSearchTriggered(true); };

    const NAT_LIST = useMemo(() => {
        const s = new Set();
        CORPUS.forEach(p => { if (p.nat) p.nat.split("/").forEach(n => s.add(n.trim())); });
        return ["All", ...Array.from(s).sort()];
    }, []);

    const results = useMemo(() => {
        if (!searchActive) return [];
        const q = query.toLowerCase();
        return CORPUS.filter(p => {
            const mQ = !q || p.t.toLowerCase().includes(q) || p.c.toLowerCase().includes(q) || (p.nat&&p.nat.toLowerCase().includes(q)) || (p.era&&p.era.toLowerCase().includes(q));
            const mE = eraFilter==="All"      || p.era===eraFilter;
            const mG = gradeFilter==="All"    || p._gradeKey===gradeFilter;
            const mN = natFilter==="All"      || (p.nat&&p.nat.toLowerCase().includes(natFilter.toLowerCase()));
            const mS = syllabusFilter==="All" || p._syllabus===syllabusFilter;
            return mQ && mE && mG && mN && mS;
        });
    }, [query, eraFilter, gradeFilter, natFilter, syllabusFilter, searchActive]);

    const ERAS = ["All","Baroque","Classical","Romantic","Modern","Contemporary"];
    const activeFilterCount = [eraFilter!=="All", gradeFilter!=="All", natFilter!=="All", syllabusFilter!=="All"].filter(Boolean).length;

    return (
        <>
        {showLogin && <LoginModal onClose={() => setShowLogin(false)} onSuccess={() => setShowLogin(false)} />}
        <VideoModal modal={videoModal} onClose={closeVideo} />

        <div className="min-h-screen flex flex-col" style={{background:"#f1f5f9"}}>

            {/* ── Nav ── */}
            <header style={{background:"#1e293b",borderBottom:"1px solid #0f172a"}} className="sticky top-0 z-30">
                <div className="max-w-screen-xl mx-auto px-4 h-13 flex items-center gap-3" style={{height:52}}>
                    <div className="flex items-center gap-2 shrink-0">
                        <div className="w-1 h-6 rounded-full bg-indigo-400"></div>
                        <span className="text-[16px] font-black text-white">Piano Butler</span>
                    </div>
                    {/* Search */}
                    <div className="flex-1 flex items-center gap-2 max-w-xl">
                        <div className="relative flex-1">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none">🔍</span>
                            <input type="text" value={query}
                                onChange={e => setQuery(e.target.value)}
                                onKeyDown={e => { if (e.key==="Enter") setSearchTriggered(true); if (e.key==="Escape") handleClear(); }}
                                placeholder="Search composer, title, era…"
                                className="w-full pl-9 pr-8 py-1.5 rounded-xl text-[13px] font-medium text-slate-800 outline-none"
                                style={{background:"#f8fafc",border:"1.5px solid #334155"}}
                            />
                            {query && <button onClick={handleClear} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-base leading-none">×</button>}
                        </div>
                        <button onClick={() => setSearchTriggered(true)}
                            className="px-4 py-1.5 bg-indigo-500 hover:bg-indigo-400 text-white text-[12px] font-bold rounded-xl transition-colors whitespace-nowrap">
                            Search
                        </button>
                        {searchActive && (
                            <button onClick={handleClear} className="text-[11px] font-bold text-slate-400 hover:text-indigo-300 transition-colors whitespace-nowrap">
                                ← Back
                            </button>
                        )}
                    </div>
                    {/* Right */}
                    <div className="ml-auto flex items-center gap-2">
                        {user ? (
                            <span className="text-[11px] font-bold text-slate-400 hidden md:block">{user.email}</span>
                        ) : (
                            <button onClick={() => setShowLogin(true)}
                                className="px-3 py-1.5 text-[11px] font-bold rounded-xl transition-colors"
                                style={{background:"#4f46e522",color:"#818cf8",border:"1px solid #4f46e544"}}>
                                Sign in
                            </button>
                        )}
                        <a href="teacher-dashboard.html"
                            className="hidden md:block px-3 py-1.5 text-[11px] font-bold rounded-xl transition-colors"
                            style={{background:"#0f172a",color:"#475569",border:"1px solid #1e293b"}}>
                            Teacher →
                        </a>
                    </div>
                </div>
            </header>

            {/* ── Body ── */}
            <div className="flex flex-1 max-w-screen-xl mx-auto w-full">

                {/* Sidebar */}
                <aside className="hidden md:flex flex-col shrink-0 sticky top-[52px] self-start overflow-y-auto no-scrollbar"
                    style={{width:220,height:"calc(100vh - 52px)",background:"white",borderRight:"1px solid #e2e8f0",padding:"16px 14px"}}>

                    <div className="flex items-center justify-between mb-4">
                        <span className="text-[9px] font-black uppercase tracking-widest text-slate-400">Filters</span>
                        {activeFilterCount > 0 && (
                            <button onClick={handleClear} className="text-[10px] font-bold text-indigo-400 hover:text-indigo-600">
                                Clear ({activeFilterCount})
                            </button>
                        )}
                    </div>

                    {/* Syllabus */}
                    <div className="mb-4">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-1.5">Syllabus</div>
                        {[["All","All"],["AMEB","🇦🇺 AMEB"],["ABRSM","🇬🇧 ABRSM"],["AMEB Diploma","🎓 Diploma"]].map(([val,lbl]) => (
                            <button key={val} onClick={() => { setSyllabusFilter(val); setSearchTriggered(true); }}
                                className="block w-full text-left text-[11px] font-bold px-3 py-1.5 rounded-lg mb-0.5 transition-all"
                                style={{
                                    background: syllabusFilter===val ? (val==="ABRSM"?"#7c3aed18":"#4f46e518") : "transparent",
                                    color:      syllabusFilter===val ? (val==="ABRSM"?"#7c3aed":"#4f46e5") : "#94a3b8",
                                    border:     `1px solid ${syllabusFilter===val ? (val==="ABRSM"?"#7c3aed44":"#4f46e544") : "transparent"}`,
                                }}>
                                {lbl}
                            </button>
                        ))}
                    </div>

                    {/* Era */}
                    <div className="mb-4">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-1.5">Era</div>
                        {ERAS.map(era => (
                            <button key={era} onClick={() => { setEraFilter(era); setSearchTriggered(true); }}
                                className="block w-full text-left text-[11px] font-bold px-3 py-1.5 rounded-lg mb-0.5 transition-all"
                                style={{
                                    background: eraFilter===era ? "#4f46e518" : "transparent",
                                    color:      eraFilter===era ? "#4f46e5"   : "#94a3b8",
                                    border:     `1px solid ${eraFilter===era ? "#4f46e544" : "transparent"}`,
                                }}>
                                {era}
                            </button>
                        ))}
                    </div>

                    {/* Grade */}
                    <div className="mb-4">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-1.5">Grade</div>
                        {["All",...GRADE_META.map(g=>g.key)].map(gk => {
                            const meta = GRADE_META.find(g=>g.key===gk);
                            const col = meta?.accent || "#64748b";
                            return (
                                <button key={gk} onClick={() => { setGradeFilter(gk); setSearchTriggered(true); }}
                                    className="block w-full text-left text-[11px] font-bold px-3 py-1.5 rounded-lg mb-0.5 transition-all"
                                    style={{
                                        background: gradeFilter===gk ? col+"18" : "transparent",
                                        color:      gradeFilter===gk ? col      : "#94a3b8",
                                        border:     `1px solid ${gradeFilter===gk ? col+"44" : "transparent"}`,
                                    }}>
                                    {gk==="All" ? "All Grades" : gk==="Prelim" ? "Preliminary" : gk.replace("G","Grade ")}
                                </button>
                            );
                        })}
                    </div>

                    {/* Nationality */}
                    <div className="mb-4">
                        <div className="text-[9px] font-black uppercase tracking-widest text-slate-300 mb-1.5">Nationality</div>
                        <select value={natFilter} onChange={e => { setNatFilter(e.target.value); setSearchTriggered(true); }}
                            className="w-full text-[11px] font-semibold px-2 py-1.5 rounded-lg outline-none cursor-pointer"
                            style={{border:"1px solid #e2e8f0",background:"#f8fafc",color:natFilter!=="All"?"#4f46e5":"#94a3b8"}}>
                            {NAT_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                        </select>
                    </div>
                </aside>

                {/* Main */}
                <main className="flex-1 min-w-0 px-4 py-5">

                    {/* Mobile filter strip */}
                    <div className="md:hidden flex gap-1.5 overflow-x-auto no-scrollbar mb-4 pb-1">
                        {ERAS.slice(1).map(era => (
                            <button key={era} onClick={() => { setEraFilter(era===eraFilter?"All":era); setSearchTriggered(true); }}
                                className="whitespace-nowrap text-[11px] font-bold px-2.5 py-1 rounded-lg shrink-0"
                                style={{background:eraFilter===era?"#4f46e5":"white",color:eraFilter===era?"white":"#64748b",border:"1px solid #e2e8f0"}}>
                                {era}
                            </button>
                        ))}
                        {activeFilterCount > 0 && (
                            <button onClick={handleClear} className="whitespace-nowrap text-[11px] font-bold px-2.5 py-1 rounded-lg shrink-0 bg-red-50 text-red-400 border border-red-100">✕</button>
                        )}
                    </div>

                    {/* Home — grade grid */}
                    {!searchActive && (
                        <GradeGrid onGradeClick={handleGradeClick} activeSyllabus={activeSyllabus} setActiveSyllabus={setActiveSyllabus} />
                    )}

                    {/* Results */}
                    {searchActive && (
                        <>
                        <div className="flex items-center justify-between mb-3 px-1">
                            <div className="text-[12px] font-semibold text-slate-400">
                                {results.length === 0
                                    ? "No pieces found"
                                    : <>{results.length.toLocaleString()} <span className="text-slate-300">pieces found</span></>}
                            </div>
                        </div>
                        {results.length > 0
                            ? results.map((p,i) => <PieceRow key={i} p={p} user={user} onLoginRequired={() => setShowLogin(true)} openVideo={openVideo} />)
                            : (
                                <div className="py-20 text-center">
                                    <div className="text-3xl mb-3">🎹</div>
                                    <div className="text-slate-300 text-sm font-bold">No pieces found</div>
                                    <div className="text-slate-300 text-xs mt-1">Try adjusting your filters</div>
                                </div>
                            )
                        }
                        </>
                    )}
                </main>
            </div>

            {/* Footer */}
            <footer className="border-t border-slate-200 py-4 text-center text-[10px] text-slate-300 font-semibold tracking-wide" style={{background:"white"}}>
                Piano Butler · AMEB 2026 · ABRSM 2025&amp;2026 · 2,510 pieces
            </footer>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
