function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + q + '&type=video&maxResults=1&key=' + YT_API_KEY);
            const data = await res.json();
            const item = data.items && data.items[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title });
            else setModal({ error: true, title });
        } catch(e) { setModal({ error: true, title }); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

// ── Search logic ─────────────────────────────────────────────────────────────
function searchCorpus(query, eraFilter, gradeFilter, syllabusFilter) {
    const q = query.trim().toLowerCase();
    const tokens = q ? q.split(/\s+/) : [];

    return CORPUS.filter(p => {
        // Syllabus filter
        if (syllabusFilter && syllabusFilter !== 'All') {
            if (syllabusFilter === 'Leisure') {
                if (p._type !== 'Leisure') return false;
            } else if (syllabusFilter === 'AMEB') {
                if (p._syllabus !== 'AMEB' || p._type === 'Leisure') return false;
            } else {
                if (p._syllabus !== syllabusFilter) return false;
            }
        }
        // Era filter
        if (eraFilter && p.era !== eraFilter) return false;
        // Grade filter
        if (gradeFilter && gradeFilter !== 'All') {
            if (p._gradeKey !== gradeFilter) return false;
        }
        // Text search — all tokens must match
        if (tokens.length > 0) {
            const hay = [p.c, p.t, p.nat, p.era, ...(p.focus||[])].join(' ').toLowerCase();
            return tokens.every(tok => hay.includes(tok));
        }
        return true;
    });
}

                        padding:'3px 8px',borderRadius:6,background:bg,color:color,lineHeight:1.5,
                        letterSpacing:'0.03em'}}>
                        {label}
                    </span>
                );
                // List badge (A/B/C/D or Group A/B)
                const listBadge = (() => {
                    if (p.l) {
                        const map = {
                            A: { bg:'#dbe8f5', color:'#1a4a7a' },
                            B: { bg:'#e0daf5', color:'#3a2a8a' },
                            C: { bg:'#ead8f5', color:'#5a1a8a' },
                            D: { bg:'#f5d8f0', color:'#7a1a6a' },
                        };
                        const lc = map[p.l] || { bg:'#eee8e0', color:'#7a6a58' };
                        return bdg(lc.bg, lc.color, 'List ' + p.l);
                    }
                    if (p.grp) {
                        return bdg('#e0f0e8', '#1a6a40', 'Group ' + p.grp);
                    }
                    return null;
                })();
                return (
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6,alignItems:'center'}}>
                        {bdg(sb.bg, sb.color, sb.label)}
                        {showGrade && bdg('#eee8e0', '#7a6a58', p._grade)}
                        {listBadge}
                        {seriesBadge && bdg(seriesBadge.bg, seriesBadge.color, seriesBadge.label)}
                        {p.era && bdg(ec.bg, ec.color, p.era)}
                    </div>
                );
            })()}

            {/* Title + Composer + Actions — single row */}
            <div style={{display:'flex',alignItems:'center',gap:12,justifyContent:'space-between'}}>
                <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:800,color:'#1a1410',lineHeight:1.3,letterSpacing:'-0.01em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {p.t}
                    </div>
                    <a href={wikiUrl} target="_blank" rel="noopener noreferrer"
                        style={{fontSize:12,color:'#9a8e84',textDecoration:'none',fontWeight:500}}>
                        {p.c.split(',').reverse().join(' ').trim()}
                        {p.nat ? <span style={{color:'#b0a898'}}> · {p.nat}</span> : null}
                    </a>
                    {/* Focus tags */}
                    {p.focus && p.focus.length > 0 && (
                        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:5}}>
                            {p.focus.map((f,i) => (
                                <span key={i} style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:20,
                                    background:'#f0ebe5',color:'#7a6e64',lineHeight:1.5}}>
                                    {f}
                                </span>
                            ))}
                        </div>
                    )}
                </div>
                {/* Actions */}
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={() => openVideo(p.c, p.t)}
                        style={{fontSize:11,fontWeight:700,padding:'5px 12px',borderRadius:7,
                            background:'#fdf8f4',color:'#c4845a',border:'1px solid #e8ddd4',
                            cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                        ▶ Listen
                    </button>
                    <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
                        style={{fontSize:11,fontWeight:700,padding:'5px 12px',borderRadius:7,
                            border:'1px solid #e8ddd4',color:'#9a8e84',textDecoration:'none',
                            display:'inline-flex',alignItems:'center'}}>
                        Score
                    </a>
                </div>
            </div>
        </div>
    );
}

class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    render() {
        if (this.state.error) return (
            <div style={{padding:40,color:'#f87171',fontFamily:'monospace'}}>
                <b>Error:</b> {this.state.error.message}
            </div>
        );
        return this.props.children;
    }
}

<script>
// Manually compile and run the JSX after DOM + all data scripts are ready.
// Babel standalone auto-processes type="text/babel" but can silently fail on
// slow mobile Safari if Babel hasn't finished loading. This explicit trigger
// ensures Babel is available before it tries to compile.
(function() {
    function run() {
        if (typeof Babel === 'undefined' || typeof React === 'undefined') {
            setTimeout(run, 50); // wait a bit more if CDN hasn't loaded yet
            return;
        }
        // Babel already auto-ran on type="text/jsx-raw"? No — we use a custom type
        // to prevent auto-run, then compile manually here.
        var el = document.getElementById('app-jsx');
        if (!el || el.dataset.compiled) return;
        el.dataset.compiled = '1';
        try {
            var compiled = Babel.transform(el.textContent, { presets: ['react'] }).code;
            var s = document.createElement('script');
            s.textContent = compiled;
            document.body.appendChild(s);
        } catch(e) {
            document.getElementById('root').innerHTML =
                '<div style="padding:40px;color:#c00;font-family:monospace"><b>Compile error:</b> ' + e.message + '</div>';
        }
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
    } else {
        run();
    }
})();
</script>
