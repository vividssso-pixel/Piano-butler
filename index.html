const YT_API_KEY = "AIzaSyDR9BQfybtyS2e-H9wgtFgWbfqlQWpLCW8";

function useVideoModal() {
    const [modal, setModal] = useState(null);
    const open = useCallback(async (composer, title) => {
        setModal({ loading: true, title });
        try {
            const q = encodeURIComponent(composer.split(',')[0].trim() + ' ' + title + ' piano');
            const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + q + '&type=video&maxResults=1&key=' + YT_API_KEY);
            const data = await res.json();
            const item = data.items && data.items[0];
            if (item) setModal({ videoId: item.id.videoId, title: item.snippet.title });
            else setModal({ error: true, title });
        } catch(e) { setModal({ error: true, title }); }
    }, []);
    const close = useCallback(() => setModal(null), []);
    return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
    if (!modal) return null;
    return (
        <div className="yt-modal-bg" onClick={onClose}>
            <div className="yt-modal-box" onClick={e => e.stopPropagation()}>
                {modal.loading && <div style={{padding:40,textAlign:'center',color:'#666'}}>Loading…</div>}
                {modal.error   && <div style={{padding:40,textAlign:'center',color:'#666'}}>No video found for "{modal.title}"</div>}
                {modal.videoId && (
                    <iframe width="100%" height="450"
                        src={'https://www.youtube.com/embed/' + modal.videoId + '?autoplay=1'}

    );
}

    push(typeof DATA_ABRSM_G3 !== 'undefined' ? DATA_ABRSM_G3 : [], 'G3', 'Grade 3', 'ABRSM');
    push(typeof DATA_ABRSM_G4 !== 'undefined' ? DATA_ABRSM_G4 : [], 'G4', 'Grade 4', 'ABRSM');

// ── Search logic ─────────────────────────────────────────────────────────────
function searchCorpus(query, eraFilter, gradeFilter, syllabusFilter) {
    const q = query.trim().toLowerCase();
    const tokens = q ? q.split(/\s+/) : [];

    return CORPUS.filter(p => {
        // Syllabus filter
        if (syllabusFilter && syllabusFilter !== 'All') {
            if (syllabusFilter === 'Leisure') {
                if (p._type !== 'Leisure') return false;
            } else {
                if (p._syllabus !== syllabusFilter) return false;
            }
        }
        // Era filter
        if (eraFilter && p.era !== eraFilter) return false;
        // Grade filter
        if (gradeFilter && gradeFilter !== 'All') {
            if (p._gradeKey !== gradeFilter) return false;
        }
        // Text search — all tokens must match
        if (tokens.length > 0) {
            const hay = [p.c, p.t, p.nat, p.era, ...(p.focus||[])].join(' ').toLowerCase();
            return tokens.every(tok => hay.includes(tok));
        }
        return true;
    });
}

// ── Piece card ───────────────────────────────────────────────────────────────
function PieceCard({ p, openVideo }) {
    const sb = SYLLABUS_BADGE[p._syllabus] || SYLLABUS_BADGE['AMEB'];
    const eraClass = ERA_TAG_CLASS[p.era] || '';
    const sheetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(p.c.split(',')[0].trim() + ' ' + p.t + ' sheet music');
    const wikiUrl  = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(p.c.split(',')[0].trim());

    // Show grade only for non-diploma grades (G1–G8, Prelim, Initial)
    const showGrade = p._grade && !['AMusA','LMusA','CertP','LRSM','FRSM','ATCL','LTCL','FTCL'].includes(p._gradeKey);

    return (
        <div className="piece-card">
            {/* Top badges — syllabus + grade + era only, no List info */}
            <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
                <span className="badge" style={{background:sb.bg,color:sb.color}}>{sb.label}</span>
                {showGrade && (
                    <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'#2a2a2a',color:'#666'}}>
                        {p._grade}
                    </span>
                )}
                {p.era && <span className={'badge ' + eraClass}>{p.era}</span>}
            </div>

            {/* Title — prominent */}
            <div style={{fontSize:17,fontWeight:800,color:'#e8e3dc',lineHeight:1.3,marginBottom:6,letterSpacing:'-0.01em'}}>
                {p.t}
            </div>

            {/* Composer */}
            <a href={wikiUrl} target="_blank" rel="noopener noreferrer"
                style={{fontSize:12,color:'#666',display:'block',marginBottom:14,textDecoration:'none',fontWeight:500}}>
                {p.c.split(',').reverse().join(' ').trim()}
                {p.nat ? <span style={{color:'#444'}}> · {p.nat}</span> : null}
            </a>

            {/* Actions */}
            <div style={{display:'flex',gap:8}}>
                <button onClick={() => openVideo(p.c, p.t)}
                    style={{fontSize:11,fontWeight:700,padding:'6px 14px',borderRadius:8,
                        background:'#2a2a2a',color:'#d4956a',border:'1px solid #333',
                        cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                    ▶ Listen
                </button>
                <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
                    style={{fontSize:11,fontWeight:700,padding:'6px 14px',borderRadius:8,
                        border:'1px solid #2a2a2a',color:'#555',textDecoration:'none',
                        display:'inline-flex',alignItems:'center'}}>
                    Score
                </a>
            </div>
        </div>
    );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
    const [query, setQuery]             = useState('');
    const [searchQuery, setSearchQuery] = useState('');
    const [eraFilter, setEraFilter]     = useState('');
    const [gradeFilter, setGradeFilter] = useState('All');
    const [syllabusFilter, setSyllabusFilter] = useState('All');
    const [showSuggestions, setShowSuggestions] = useState(false);
    const inputRef = useRef(null);
    const debounceRef = useRef(null);

    const { modal: videoModal, open: openVideo, close: closeVideo } = useVideoModal();

    // Debounced search
    useEffect(() => {
        clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => setSearchQuery(query), 200);
        return () => clearTimeout(debounceRef.current);
    }, [query]);

    const isSearching = !!(searchQuery.trim() || eraFilter || (gradeFilter && gradeFilter !== 'All') || (syllabusFilter && syllabusFilter !== 'All'));

    const results = useMemo(() => {
        if (!isSearching) return [];
        return searchCorpus(searchQuery, eraFilter, gradeFilter, syllabusFilter).slice(0, 60);
    }, [searchQuery, eraFilter, gradeFilter, syllabusFilter, isSearching]);

    // Autocomplete suggestions
    const suggestions = useMemo(() => {
        if (query.trim().length < 2) return [];
        const q = query.toLowerCase();
        const seen = new Set();
        const out = [];
        // Composer matches
        for (const p of CORPUS) {
            if (out.length >= 5) break;
            const name = p.c.split(',')[0].trim();
            if (!seen.has('c:'+name) && name.toLowerCase().includes(q)) {
                seen.add('c:'+name); out.push({ type:'composer', label:name });
            }
        }
        // Title matches
        for (const p of CORPUS) {
            if (out.length >= 8) break;
            if (!seen.has('t:'+p.t) && p.t.toLowerCase().includes(q)) {
                seen.add('t:'+p.t); out.push({ type:'title', label:p.t, composer:p.c.split(',')[0].trim() });
            }
        }
        return out.slice(0, 8);
    }, [query]);

    function clearAll() {
        setQuery(''); setSearchQuery('');
        setEraFilter(''); setGradeFilter('All'); setSyllabusFilter('All');
    }

    function pickHint(q) {
        // Era hint
        if (ERAS.includes(q)) { setEraFilter(q); setQuery(''); setSearchQuery(''); }
        else { setQuery(q); setSearchQuery(q); }
    }

    const SYLLABUS_FILTERS = [
        { val:'All',     label:'All' },
        { val:'AMEB',    label:'🇦🇺 AMEB' },
        { val:'Leisure', label:'🎵 Leisure' },
        { val:'ABRSM',   label:'🇬🇧 ABRSM' },
        { val:'Trinity', label:'Trinity' },
    ];

    return (
        <>
        <VideoModal modal={videoModal} onClose={closeVideo} />

        <div style={{minHeight:'100vh',background:'#1a1a1a',display:'flex',flexDirection:'column'}}>

            {/* Nav */}
            <header style={{background:'#1a1a1a',borderBottom:'1px solid #252525',position:'sticky',top:0,zIndex:30}}>
                <div style={{maxWidth:900,margin:'0 auto',padding:'0 20px',height:52,display:'flex',alignItems:'center',gap:12}}>
                    <button onClick={clearAll}
                        style={{background:'none',border:'none',padding:0,cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
                        <div style={{width:3,height:20,borderRadius:2,background:'#d4956a'}}></div>
                        <span style={{fontSize:15,fontWeight:900,color:'#e8e3dc',letterSpacing:'-0.02em'}}>Piano Butler</span>
                    </button>
                    <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
                        <a href="diagnose.html"  className="nav-btn accent" style={{textDecoration:'none'}}>🔬 Diagnose</a>
                        <a href="recommend.html" className="nav-btn"        style={{textDecoration:'none'}}>🎹 Recommend</a>
                    </div>
                </div>
            </header>

            {/* Main */}
            <main style={{flex:1,maxWidth:900,margin:'0 auto',width:'100%',padding:'32px 20px 60px'}}>

                {/* Search bar */}
                <div style={{marginBottom:20,position:'relative'}}>
                    <input
                        ref={inputRef}
                        className="search-input"
                        value={query}
                        onChange={e => { setQuery(e.target.value); setShowSuggestions(true); }}
                        onFocus={() => setShowSuggestions(true)}
                        onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
                        placeholder="Search composer, title, nationality…"
                    />
                    {query && (
                        <button onClick={clearAll}
                            style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:16,lineHeight:1}}>
                            ✕
                        </button>
                    )}
                    {/* Autocomplete */}
                    {showSuggestions && suggestions.length > 0 && (
                        <div className="autocomplete-box">
                            {suggestions.map((s,i) => (
                                <div key={i} className="autocomplete-item"
                                    onMouseDown={() => { setQuery(s.label); setSearchQuery(s.label); setShowSuggestions(false); }}>
                                    <span style={{fontSize:10,fontWeight:800,padding:'2px 7px',borderRadius:5,
                                        background:s.type==='composer'?'#2a1e3e':'#1e2a4a',
                                        color:s.type==='composer'?'#b59ef0':'#7ea8f0'}}>
                                        {s.type}
                                    </span>
                                    <span style={{flex:1}}>{s.label}</span>
                                    {s.composer && <span style={{fontSize:11,color:'#555'}}>{s.composer}</span>}
                                </div>
                            ))}
                        </div>
                    )}
                </div>

                {/* Filters row */}
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:24,alignItems:'center'}}>
                    {/* Syllabus */}
                    {SYLLABUS_FILTERS.map(f => (
                        <button key={f.val}
                            className={'chip' + (syllabusFilter===f.val?' active':'')}
                            onClick={() => setSyllabusFilter(f.val)}>
                            {f.label}
                        </button>
                    ))}
                    <div style={{width:1,height:18,background:'#2e2e2e',margin:'0 4px'}} />
                    {/* Era */}
                    {ERAS.map(e => (
                        <button key={e}
                            className={'chip' + (eraFilter===e?' active':'')}
                            onClick={() => setEraFilter(eraFilter===e?'':e)}>
                            {e}
                        </button>
                    ))}
                </div>

                {/* Grade chips — only when searching */}
                {isSearching && (
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>
                        <button className={'chip'+(gradeFilter==='All'?' active':'')} onClick={()=>setGradeFilter('All')}>All grades</button>
                        {GRADE_KEYS.map(gk => (
                            <button key={gk} className={'chip'+(gradeFilter===gk?' active':'')} onClick={()=>setGradeFilter(gradeFilter===gk?'All':gk)}>
                                {GRADE_LABEL_MAP[gk]}
                            </button>
                        ))}
                    </div>
                )}

                {/* Homepage — not searching */}
                {!isSearching && (
                    <div>
                        {/* Hint chips */}
                        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:28}}>
                            {HINT_CHIPS.map(h => (
                                <button key={h.label}
                                    className="chip"
                                    onClick={() => pickHint(h.q)}>
                                    {h.label}
                                </button>
                            ))}
                        </div>

                        {/* Stats footer */}
                        <div style={{fontSize:11,color:'#333'}}>
                            {CORPUS.length.toLocaleString()} pieces across AMEB, ABRSM, and Trinity ·{' '}
                            <a href="admin-search.html" style={{color:'#333',textDecoration:'none'}}
                                onMouseOver={e=>e.target.style.color='#555'}
                                onMouseOut={e=>e.target.style.color='#333'}>
                                Full search ↗
                            </a>
                        </div>
                    </div>
                )}

                {/* Search results */}
                {isSearching && (
                    <div>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:8}}>
                            <span style={{fontSize:12,color:'#444',fontWeight:500,fontStyle:'italic'}}>
                                {results.length === 0
                                    ? 'Nothing found — shall I suggest something else?'
                                    : 'I\'ve found ' + (results.length === 60 ? '60+' : results.length) + ' pieces' + (searchQuery ? ' for “' + searchQuery + '”' : '') + '.'}
                            </span>
                            <button onClick={clearAll}
                                style={{fontSize:11,fontWeight:600,color:'#444',background:'none',border:'none',cursor:'pointer',padding:0,textDecoration:'underline',textDecorationColor:'#333'}}>
                                Clear
                            </button>
                        </div>

                        {results.length === 0 ? (
                            <div style={{padding:'60px 0',textAlign:'center'}}>
                                <div style={{fontSize:13,color:'#444',marginBottom:16,fontStyle:'italic'}}>
                                    Nothing matched that search. May I suggest trying a composer name?
                                </div>
                                <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
                                    {['Chopin','Bach','Debussy','Beethoven','Schubert'].map(n => (
                                        <button key={n} className="chip" onClick={() => { setQuery(n); setSearchQuery(n); }}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div style={{display:'grid',gap:14,gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))'}}>
                                {results.map((p,i) => <PieceCard key={i} p={p} openVideo={openVideo} />)}
                            </div>
                        )}
                    </div>
                )}

            </main>

            {/* Footer */}
            <footer style={{borderTop:'1px solid #252525',padding:'14px 20px',textAlign:'center',fontSize:10,fontWeight:500,color:'#333',letterSpacing:'0.04em'}}>
                Piano Butler · Not affiliated with AMEB, ABRSM, or Trinity College London · Repertoire data for reference only
            </footer>
        </div>
        </>
    );
}

class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(err) { return { error: err }; }
    render() {
        if (this.state.error) return (
            <div style={{padding:40,color:'#f87171',fontFamily:'monospace'}}>
                <b>Error:</b> {this.state.error.message}
            </div>
        );
        return this.props.children;
    }
}

ReactDOM.createRoot(document.getElementById('root')).render(
    <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
