    p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    button { background: #4f46e5; color: white; border: none; border-radius: 12px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    #log { margin-top: 24px; font-size: 13px; line-height: 1.8; color: #475569; white-space: pre-wrap; }
    .ok  { color: #0d9488; }
    .err { color: #dc2626; }
    .done { font-weight: 700; color: #4f46e5; }
    a { color: #4f46e5; text-decoration: none; font-size: 14px; }
  </style>

    ];

    function log(msg, cls) {
      const el = document.getElementById("log");
      const line = document.createElement("span");
      if (cls) line.className = cls;
      line.textContent = msg + "\n";
      el.appendChild(line);
    }

    async function runImport() {
      const btn = document.getElementById("btn");
      btn.disabled = true;
      document.getElementById("log").innerHTML = "";

      const session = await requireAuth();
      if (!session) return; // requireAuth redirects to login.html if not logged in
      const userId = session.user.id;
      log(`Logged in as: ${session.user.email}\n`);

      const today = new Date().toISOString().slice(0,10);
      let added = 0, failed = 0;

      for (const s of SCHEDULE) {
        const row = {
          user_id: userId,
          name: s.name,
          grade: "Grade 5",
          track: "general",
          exam_date: null,
          plan_months: 3,
          lesson_dur: s.lessonDuration,
          lesson_day: s.lessonDay,
          lesson_time: s.lessonTime,
          start_phase: "exploration",
          extra: JSON.stringify({ level:"Elementary", lessonsPerWeek:1, startDate: today }),
        };
        const { error } = await _supabase.from("students").insert(row);
        if (error) {
          log(`✗ ${s.name} (${s.lessonDay} ${s.lessonTime}) — ${error.message}`, "err");
          failed++;
        } else {
          log(`✓ ${s.name} — ${s.lessonDay} ${s.lessonTime}`, "ok");
          added++;
        }
      }

      log(`\n━━━ Done: ${added} added, ${failed} failed ━━━`, "done");
      if (added > 0) {
        const link = document.createElement("a");
        link.href = "teacher-dashboard.html";
        link.textContent = "→ Open Teacher Dashboard";
        link.style.display = "block";
        link.style.marginTop = "16px";
        document.getElementById("log").appendChild(link);
      }
      btn.disabled = false;
    }
  </script>
