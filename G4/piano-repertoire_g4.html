  { "l":"Manual","s":"Manual","c":"SLAVICKÝ, K.","t":"Im Wechseltakt","nat":"Czech","era":"Modern","key":"Variable","focus":["Changing metre","Modern style","Rhythmic character"] },
  { "l":"Manual","s":"Manual","c":"TANSMAN, A.","t":"Fin des vacances","nat":"Polish-French","era":"Modern","key":"Variable","focus":["Character piece","End of holiday mood","Modern style"] },
  { "l":"Manual","s":"Manual","c":"TSITSAROS, C.","t":"Little mazurka","nat":"Contemporary","era":"Contemporary","key":"Variable","focus":["Mazurka character","Dance rhythm","Contemporary style"] },
  { "l":"Manual","s":"Manual","c":"WAXMAN, F.","t":"The mosquito","nat":"German-American","era":"Modern","key":"Variable","focus":["Musical humour","Character piece","Musical imagery"] },
  { "l":"Manual","s":"Manual","c":"WESLEY-SMITH, M.","t":"Grey's beach","nat":"Australian","era":"Contemporary","key":"Variable","focus":["Australian imagery","Beach character","Contemporary style"] },
  { "l":"Manual","s":"Manual","c":"YU, J.","t":"Flower riddle","nat":"Chinese-Australian","era":"Contemporary","key":"Variable","focus":["Cultural fusion","Musical puzzle","Contemporary idiom"] },
];
    </script>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const GENERAL_LISTS = ["A", "B", "C"];
        const LEISURE_LISTS = ["S4", "S3", "S2", "S1", "Manual"];
        const ERAS = ["All", "Baroque", "Classical", "Romantic", "Modern", "Contemporary"];

        function App() {
            const [search, setSearch] = useState("");
            const [mode, setMode] = useState("General");
            const [activeList, setActiveList] = useState("A");
            const [selectedEra, setSelectedEra] = useState("All");
            const [selectedNationality, setSelectedNationality] = useState("All");

            const lists = mode === "General" ? GENERAL_LISTS : LEISURE_LISTS;
            const data = mode === "General" ? DATA_G4 : DATA_G4_LEISURE;

            const handleMode = (m) => {
                setMode(m);
                setSearch("");
                setActiveList(m === "General" ? "A" : "S4");
                setSelectedEra("All");
                setSelectedNationality("All");
            };

            const eraClass = (era) => {
                if (!era) return "tag-modern";
                const e = era.toLowerCase();
                if (e.includes("baroque")) return "tag-baroque";
                if (e.includes("classical")) return "tag-classical";
                if (e.includes("romantic")) return "tag-romantic";
                if (e.includes("contemporary")) return "tag-contemporary";
                return "tag-modern";
            };

            const getNationalities = useMemo(() => {
                const nats = new Set(data.map(p => p.nat).filter(Boolean));
                return ["All", ...Array.from(nats).sort()];
            }, [data]);

            const matchesEra = (era) => {
                if (selectedEra === "All") return true;
                if (!era) return false;
                return era.toLowerCase().includes(selectedEra.toLowerCase());
            };

            const filtered = useMemo(() => {
                return data.filter(p => {
                    const matchSearch = (p.t + p.c).toLowerCase().includes(search.toLowerCase());
                    const matchList = p.l === activeList;
                    const matchEra = matchesEra(p.era);
                    const matchNat = selectedNationality === "All" || p.nat === selectedNationality;
                    return matchSearch && matchList && matchEra && matchNat;
                });
            }, [search, activeList, data, selectedEra, selectedNationality]);

            const listLabel = (l) => {
                if (l.startsWith("S")) return `Series ${l.slice(1)}`;
                return `List ${l}`;
            };

            const ComposerLink = ({ name }) => {
                const link = getComposerLink(name);
                return (
                    <a href={link} target="_blank" rel="noopener noreferrer" className="composer-link">
                        {name}
                    </a>
                );
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-10">
                    <header className="mb-8 flex flex-wrap items-start justify-between gap-3">
                        <div>
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-8 bg-indigo-600 rounded-full"></div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">AMEB Grade 4</h1>
                            </div>
                            <p className="text-[12px] text-slate-400 font-semibold uppercase tracking-widest mt-1 ml-4">2026 Piano Syllabus Master</p>
                        </div>
                        <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100 text-right">
                            <span className="text-2xl font-black text-indigo-600">{filtered.length}</span>
                            <span className="text-[10px] text-slate-400 block font-bold uppercase">Pieces</span>
                        </div>
                    </header>

                    <div className="sticky top-4 z-20 mb-8">
                        <div className="bg-white/80 backdrop-blur-md p-3 rounded-2xl shadow-xl shadow-slate-200/50 border border-white">

                            {/* General / Leisure toggle */}
                            <div className="flex gap-1 mb-2">
                                {["General", "Leisure"].map(m => (
                                    <button key={m} onClick={() => handleMode(m)}
                                        className={`flex-1 py-2 rounded-xl text-[13px] font-bold transition-all ${mode === m ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'text-slate-400 hover:bg-slate-50'}`}>
                                        {m === "General" ? "🎼 General" : "🎹 Leisure"}
                                    </button>
                                ))}
                            </div>

                            {/* List tabs */}
                            <div className="flex gap-1 mb-2 overflow-x-auto no-scrollbar">
                                {lists.map(list => (
                                    <button key={list} onClick={() => setActiveList(list)}
                                        className={`flex-1 min-w-[60px] py-2.5 rounded-xl text-[12px] font-bold transition-all ${activeList === list ? 'bg-slate-700 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}`}>
                                        {listLabel(list)}
                                    </button>
                                ))}
                            </div>

                            {/* Era filter chips */}
                            <div className="flex gap-1 mb-2 overflow-x-auto no-scrollbar">
                                {ERAS.map(era => (
                                    <button key={era} onClick={() => setSelectedEra(era)}
                                        className={`era-chip whitespace-nowrap ${selectedEra === era ? 'active' : ''}`}>
                                        {era}
                                    </button>
                                ))}
                            </div>

                            {/* Search */}
                            <input type="text" placeholder="Search composer or title..."
                                className="w-full px-5 py-3 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 outline-none placeholder:text-slate-300"
                                value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                    </div>

                    <div className="space-y-2">
                        {filtered.length > 0 ? filtered.map((p, idx) => (
                            <div key={idx} className="list-row">
                                {/* Tags row */}
                                <div className="flex flex-wrap items-center gap-1.5 mb-2">
                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500`}>{p.s}</span>
                                    {p.era && <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${eraClass(p.era)}`}>{p.era}</span>}
                                    {p.key && p.key !== "None" && p.key !== "Variable" && (
                                        <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-50 text-slate-400 border border-slate-200">{p.key}</span>
                                    )}
                                </div>
                                {/* Title */}
                                <h3 className="text-[15px] font-bold text-slate-800 leading-snug mb-0.5">{p.t}</h3>
                                {/* Composer */}
                                <p className="text-[13px] text-slate-400 font-medium mb-3">
                                    <ComposerLink name={p.c} />
                                    {p.nat && <span className="ml-2 text-slate-300">· {p.nat}</span>}
                                </p>
                                {/* Bottom row: focus tags + action buttons */}
                                <div className="flex flex-col gap-2">
                                    <div className="flex flex-wrap gap-1">
                                        {p.focus && p.focus.map((f, i) => (
                                            <span key={i} className="text-[10px] px-2 py-0.5 bg-indigo-50 text-indigo-400 rounded-full font-semibold">{f}</span>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-1.5">
                                        <a href={`https://www.youtube.com/results?search_query=piano+${encodeURIComponent(p.c + " " + p.t)}`} target="_blank" rel="noopener noreferrer"
                                            className="px-3 py-1.5 bg-slate-800 text-white text-[11px] font-bold rounded-lg hover:bg-slate-900 transition-colors whitespace-nowrap">▶ YouTube</a>
                                        <a href={`https://www.google.com/search?q=${encodeURIComponent(p.c + " " + p.t + " sheet music pdf")}`} target="_blank" rel="noopener noreferrer"
                                            className="px-3 py-1.5 bg-slate-100 text-slate-600 text-[11px] font-bold rounded-lg hover:bg-slate-200 transition-colors whitespace-nowrap">♪ Sheet</a>
                                    </div>
                                </div>
                            </div>
                        )) : (
                            <div className="py-20 text-center">
                                <div className="text-4xl mb-4">🎹</div>
                                <div className="text-slate-300 text-sm font-bold uppercase tracking-widest">No pieces found</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
