<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Find a Piano Teacher | Piano Butler</title>
  <meta name="description" content="Tell us what you're looking for and we'll match you with the right piano teacher. AMEB, ABRSM, Trinity — any goal, any level.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://thepianobutler.com/find-a-teacher.html">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0eb; color: #1a1008; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* Nav */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: #f5f0eb; border-bottom: 1px solid #e8e0d8; position: sticky; top: 0; z-index: 10; }
    .nav-logo { font-weight: 700; font-size: 15px; color: #1a1008; display: flex; align-items: center; gap: 8px; }
    .nav-logo-bar { width: 3px; height: 18px; background: #d4956a; border-radius: 2px; }
    .nav-back { font-size: 13px; color: #8a7a6a; }
    .nav-back:hover { color: #d4956a; }

    /* Hero */
    .hero { text-align: center; padding: 64px 24px 48px; max-width: 560px; margin: 0 auto; }
    .hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: #d4956a; text-transform: uppercase; margin-bottom: 16px; }
    .hero-title { font-size: 36px; font-weight: 800; line-height: 1.15; color: #1a1008; margin-bottom: 16px; }
    .hero-sub { font-size: 15px; color: #6a5a4a; line-height: 1.6; }

    /* Steps */
    .steps { display: flex; justify-content: center; gap: 8px; padding: 0 24px 40px; flex-wrap: wrap; }
    .step-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8a7a6a; }
    .step-dot.active { color: #d4956a; font-weight: 600; }
    .step-dot.done { color: #6abf6a; }
    .step-num { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .step-sep { width: 24px; height: 1px; background: #d8cfc6; }

    /* Card */
    .card { background: #fff; border-radius: 16px; border: 1px solid #e8e0d8; max-width: 560px; margin: 0 auto 40px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }

    /* Form */
    .field { margin-bottom: 24px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #3a2a1a; margin-bottom: 8px; }
    .field label span { font-weight: 400; color: #8a7a6a; margin-left: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0d8d0; border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #1a1008; background: #faf8f5;
      transition: border-color 0.15s;
      appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #d4956a; background: #fff;
    }
    .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .field-hint { font-size: 12px; color: #8a7a6a; margin-top: 6px; }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e0d8d0; font-size: 13px; cursor: pointer; background: #faf8f5; color: #3a2a1a; transition: all 0.15s; }
    .chip:hover { border-color: #d4956a; }
    .chip.selected { border-color: #d4956a; background: #fdf0e8; color: #b8703a; font-weight: 600; }

    /* Row */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }

    /* Section divider */
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8a7a6a; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0e8e0; }

    /* Submit */
    .btn-submit { width: 100%; padding: 14px; background: #d4956a; color: #fff; font-size: 15px; font-weight: 700; border-radius: 12px; transition: background 0.15s; margin-top: 8px; }
    .btn-submit:hover:not(:disabled) { background: #b8703a; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success */
    .success-card { text-align: center; padding: 48px 32px; }
    .success-icon { font-size: 48px; margin-bottom: 20px; }
    .success-title { font-size: 24px; font-weight: 800; color: #1a1008; margin-bottom: 12px; }
    .success-msg { font-size: 15px; color: #6a5a4a; line-height: 1.6; margin-bottom: 28px; }
    .btn-back { display: inline-block; padding: 11px 24px; border: 1.5px solid #e0d8d0; border-radius: 10px; font-size: 14px; color: #3a2a1a; }
    .btn-back:hover { border-color: #d4956a; color: #d4956a; }

    /* Error */
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><div class="nav-logo-bar"></div>Piano Butler</div>
    <a href="index.html" class="nav-back">← Back to search</a>
  </nav>
  <div id="root"></div>

  <script id="app-jsx" type="text/jsx-raw">
  const { useState } = React;

  const GOALS = ["AMEB exam", "ABRSM exam", "Trinity exam", "Hobby / leisure", "Adult returner", "Performance / recital", "Not sure yet"];
  const FORMATS = ["In-person", "Online", "Either"];
  const FREQUENCIES = ["Once a week", "Twice a week", "Fortnightly", "Flexible"];
  const BUDGETS = ["Under $60/hr", "$60–80/hr", "$80–100/hr", "$100+/hr", "Not sure"];
  const LEVELS = ["Complete beginner", "Preliminary", "Grade 1–2", "Grade 3–4", "Grade 5–6", "Grade 7–8", "Diploma / Advanced"];

  const STEPS = ["About you", "Your goals", "Preferences", "Submit"];

  function ChipGroup({ options, value, onChange, multi }) {
    const toggle = (opt) => {
      if (multi) {
        const cur = value || [];
        onChange(cur.includes(opt) ? cur.filter(x => x !== opt) : [...cur, opt]);
      } else {
        onChange(value === opt ? '' : opt);
      }
    };
    const isSelected = (opt) => multi ? (value || []).includes(opt) : value === opt;
    return (
      <div className="chips">
        {options.map(opt => (
          <button key={opt} type="button" className={"chip" + (isSelected(opt) ? " selected" : "")} onClick={() => toggle(opt)}>{opt}</button>
        ))}
      </div>
    );
  }

  function StepDots({ current, total }) {
    return (
      <div className="steps">
        {STEPS.map((label, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div className="step-sep" />}
            <div className={"step-dot" + (i === current ? " active" : i < current ? " done" : "")}>
              <div className="step-num">{i < current ? "✓" : i + 1}</div>
              <span>{label}</span>
            </div>
          </React.Fragment>
        ))}
      </div>
    );
  }

  function App() {
    const [step, setStep] = useState(0);
    const [submitted, setSubmitted] = useState(false);
    const [submitting, setSubmitting] = useState(false);
    const [error, setError] = useState('');

    const [form, setForm] = useState({
      name: '', email: '', phone: '', age: '',
      level: '', goals: [],
      location: '', format: '', frequency: '', budget: '',
      notes: ''
    });

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const canNext = () => {
      if (step === 0) return form.name.trim() && form.email.trim();
      if (step === 1) return form.level && form.goals.length > 0;
      if (step === 2) return form.format && form.frequency && form.budget;
      return true;
    };

    const handleSubmit = async () => {
      setSubmitting(true);
      setError('');
      try {
        const body = {
          access_key: '1905cf40-5bcd-463a-87dd-c9d5ee673f56',
          subject: 'New Teacher Match Request — Piano Butler',
          name: form.name,
          email: form.email,
          message: `
Name: ${form.name}
Email: ${form.email}
Phone: ${form.phone || '—'}
Age: ${form.age || '—'}
Level: ${form.level}
Goals: ${form.goals.join(', ')}
Location: ${form.location || '—'}
Format: ${form.format}
Frequency: ${form.frequency}
Budget: ${form.budget}
Notes: ${form.notes || '—'}
          `.trim()
        };
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          setSubmitted(true);
        } else {
          setError('Something went wrong. Please try again or email us directly.');
        }
      } catch (e) {
        setError('Network error. Please check your connection and try again.');
      }
      setSubmitting(false);
    };

    if (submitted) {
      return (
        <div style={{ maxWidth: 560, margin: '0 auto', padding: '0 24px' }}>
          <div className="card success-card">
            <div className="success-icon">🎹</div>
            <div className="success-title">Request received!</div>
            <div className="success-msg">
              Thank you, {form.name.split(' ')[0]}. We'll review your request and get back to you within 1–2 business days with a tailored recommendation.
            </div>
            <a href="index.html" className="btn-back">← Back to Piano Butler</a>
          </div>
        </div>
      );
    }

    return (
      <div style={{ padding: '0 24px' }}>
        <div className="hero">
          <div className="hero-eyebrow">Teacher Matching</div>
          <div className="hero-title">Find your perfect piano teacher</div>
          <div className="hero-sub">Tell us what you're looking for. We'll do the matching.</div>
        </div>

        <StepDots current={step} total={STEPS.length} />

        <div className="card">

          {step === 0 && (
            <div>
              <div className="section-label">About you</div>
              <div className="field-row">
                <div className="field">
                  <label>Name</label>
                  <input type="text" placeholder="Your full name" value={form.name} onChange={e => set('name', e.target.value)} />
                </div>
                <div className="field">
                  <label>Age <span>(optional)</span></label>
                  <input type="text" placeholder="e.g. 28 or 8" value={form.age} onChange={e => set('age', e.target.value)} />
                </div>
              </div>
              <div className="field">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" value={form.email} onChange={e => set('email', e.target.value)} />
              </div>
              <div className="field">
                <label>Phone <span>(optional)</span></label>
                <input type="tel" placeholder="+61 4xx xxx xxx" value={form.phone} onChange={e => set('phone', e.target.value)} />
              </div>
            </div>
          )}

          {step === 1 && (
            <div>
              <div className="section-label">Your goals</div>
              <div className="field">
                <label>Current level</label>
                <ChipGroup options={LEVELS} value={form.level} onChange={v => set('level', v)} />
              </div>
              <div className="field">
                <label>What are you working towards? <span>(pick all that apply)</span></label>
                <ChipGroup options={GOALS} value={form.goals} onChange={v => set('goals', v)} multi />
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="section-label">Lesson preferences</div>
              <div className="field">
                <label>Location <span>(optional)</span></label>
                <input type="text" placeholder="e.g. Sydney, Melbourne, or anywhere online" value={form.location} onChange={e => set('location', e.target.value)} />
              </div>
              <div className="field">
                <label>In-person or online?</label>
                <ChipGroup options={FORMATS} value={form.format} onChange={v => set('format', v)} />
              </div>
              <div className="field-row">
                <div className="field">
                  <label>How often?</label>
                  <ChipGroup options={FREQUENCIES} value={form.frequency} onChange={v => set('frequency', v)} />
                </div>
                <div className="field">
                  <label>Budget per hour</label>
                  <ChipGroup options={BUDGETS} value={form.budget} onChange={v => set('budget', v)} />
                </div>
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <div className="section-label">Anything else?</div>
              <div className="field">
                <label>Tell us more <span>(optional)</span></label>
                <textarea
                  placeholder="e.g. I last played 10 years ago and want to get back into it. I have a digital piano at home. I'd like someone patient and encouraging."
                  value={form.notes}
                  onChange={e => set('notes', e.target.value)}
                />
                <div className="field-hint">The more you share, the better we can match you.</div>
              </div>
              <div style={{ background: '#fdf8f4', border: '1px solid #f0e0d0', borderRadius: 10, padding: '14px 16px', marginBottom: 20 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: '#8a7a6a', marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Your request summary</div>
                <div style={{ fontSize: 13, color: '#3a2a1a', lineHeight: 1.8 }}>
                  <div><strong>Name:</strong> {form.name}</div>
                  <div><strong>Level:</strong> {form.level}</div>
                  <div><strong>Goals:</strong> {form.goals.join(', ')}</div>
                  <div><strong>Format:</strong> {form.format}{form.location ? ` · ${form.location}` : ''}</div>
                  <div><strong>Frequency:</strong> {form.frequency} · {form.budget}</div>
                </div>
              </div>
              {error && <div className="error-msg">{error}</div>}
              <button className="btn-submit" onClick={handleSubmit} disabled={submitting}>
                {submitting ? 'Sending...' : '🎹 Send my request'}
              </button>
            </div>
          )}

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 28 }}>
            {step > 0
              ? <button onClick={() => setStep(s => s - 1)} style={{ fontSize: 14, color: '#8a7a6a' }}>← Back</button>
              : <div />
            }
            {step < 3 && (
              <button
                onClick={() => setStep(s => s + 1)}
                disabled={!canNext()}
                style={{
                  padding: '10px 24px', background: canNext() ? '#d4956a' : '#e0d8d0',
                  color: canNext() ? '#fff' : '#a09080', borderRadius: 10, fontSize: 14, fontWeight: 600,
                  transition: 'all 0.15s'
                }}
              >
                Next →
              </button>
            )}
          </div>

        </div>

        <div style={{ textAlign: 'center', fontSize: 12, color: '#a09080', paddingBottom: 40 }}>
          Your details are only used to match you with a teacher. We never share your information.
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function tryCompile() {
        if (typeof Babel === 'undefined') { setTimeout(tryCompile, 50); return; }
        try {
          const src = document.getElementById('app-jsx').textContent;
          const compiled = Babel.transform(src, { presets: ['react'] }).code;
          const s = document.createElement('script');
          s.textContent = compiled;
          document.body.appendChild(s);
        } catch(e) {
          document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:monospace">Error: ' + e.message + '</div>';
        }
      }
      tryCompile();
    });
  </script>
</body>
</html>
