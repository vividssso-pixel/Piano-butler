  <script src="ABRSM/G1/data_abrsm_g1.js"></script>
  <script src="ABRSM/G2/data_abrsm_g2.js"></script>
  <script src="ABRSM/G3/data_abrsm_g3.js"></script>
  <script src="ABRSM/G4/data_abrsm_g4.js"></script>
  <script src="ABRSM/G5/data_abrsm_g5.js"></script>
  <script src="ABRSM/G6/data_abrsm_g6.js"></script>
  <script src="ABRSM/G7/data_abrsm_g7.js"></script>

  <script src="Trinity/G4/data_trinity_g4.js"></script>
  <script src="Trinity/G5/data_trinity_g5.js"></script>
  <script src="Trinity/G6/data_trinity_g6.js"></script>
  <script src="Trinity/G7/data_trinity_g7.js"></script>
  <script src="Trinity/G8/data_trinity_g8.js"></script>
  <!-- Trinity Diploma -->
  <script src="Trinity/Diploma/data_trinity_atcl.js"></script>
  <script src="Trinity/Diploma/data_trinity_ltcl.js"></script>
  <script src="Trinity/Diploma/data_trinity_ftcl.js"></script>

  <style>
    body { background: #0f172a; font-family: -apple-system, sans-serif; color: #e2e8f0; margin: 0; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SUPABASE_URL  = "https://icefqxaccclwasnfzgnp.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZWZxeGFjY2Nsd2FzbmZ6Z25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjgzMTgsImV4cCI6MjA5MjY0NDMxOH0.lZ8BO_L8iOtET8RtUuk9trkf9bQbLqR8K6rKEfPtmtQ";
const _sbCounts = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Data catalogue ──────────────────────────────────────────────────────────
const AMEB_COMP = [
  { label:"Preliminary", data: typeof DATA_PRELIM      !=="undefined" ? DATA_PRELIM      : [] },
  { label:"Grade 1",     data: typeof DATA_G1          !=="undefined" ? DATA_G1          : [] },
  { label:"Grade 2",     data: typeof DATA_G2          !=="undefined" ? DATA_G2          : [] },
  { label:"Grade 3",     data: typeof DATA_G3          !=="undefined" ? DATA_G3          : [] },
  { label:"Grade 4",     data: typeof DATA_G4          !=="undefined" ? DATA_G4          : [] },
  { label:"Grade 5",     data: typeof DATA_G5_1        !=="undefined" ? DATA_G5_1        : [] },
  { label:"Grade 6",     data: typeof DATA_G6          !=="undefined" ? DATA_G6          : [] },
  { label:"Grade 7",     data: typeof DATA_G7          !=="undefined" ? DATA_G7          : [] },
  { label:"Grade 8",     data: typeof DATA_G8          !=="undefined" ? DATA_G8          : [] },
];
const AMEB_LEISURE = [
  { label:"Preliminary", data: typeof DATA_PRELIM_LEISURE !=="undefined" ? DATA_PRELIM_LEISURE : [] },
  { label:"Grade 1",     data: typeof DATA_G1_LEISURE     !=="undefined" ? DATA_G1_LEISURE     : [] },
  { label:"Grade 2",     data: typeof DATA_G2_LEISURE     !=="undefined" ? DATA_G2_LEISURE     : [] },
  { label:"Grade 3",     data: typeof DATA_G3_LEISURE     !=="undefined" ? DATA_G3_LEISURE     : [] },
  { label:"Grade 4",     data: typeof DATA_G4_LEISURE     !=="undefined" ? DATA_G4_LEISURE     : [] },
  { label:"Grade 5",     data: typeof DATA_G5_LEISURE     !=="undefined" ? DATA_G5_LEISURE     : [] },
  { label:"Grade 6",     data: typeof DATA_G6_LEISURE     !=="undefined" ? DATA_G6_LEISURE     : [] },
  { label:"Grade 7",     data: typeof DATA_G7_LEISURE     !=="undefined" ? DATA_G7_LEISURE     : [] },
  { label:"Grade 8",     data: typeof DATA_G8_LEISURE     !=="undefined" ? DATA_G8_LEISURE     : [] },
];
const DIPLOMA = [
  { label:"Cert. of Performance", data: typeof DATA_CERTP       !=="undefined" ? DATA_CERTP       : [] },
  { label:"AMusA (9950)",         data: typeof DATA_AMUSA        !=="undefined" ? DATA_AMUSA        : [] },
  { label:"LMusA (9951)",         data: typeof DATA_LMUSA        !=="undefined" ? DATA_LMUSA        : [] },
  { label:"ABRSM LRSM",           data: typeof DATA_ABRSM_LRSM   !=="undefined" ? DATA_ABRSM_LRSM   : [] },
  { label:"ABRSM FRSM",           data: typeof DATA_ABRSM_FRSM   !=="undefined" ? DATA_ABRSM_FRSM   : [] },
];
const ABRSM = [
  { label:"Initial", data: typeof DATA_ABRSM_INITIAL !=="undefined" ? DATA_ABRSM_INITIAL : [] },
  { label:"Grade 1", data: typeof DATA_ABRSM_G1      !=="undefined" ? DATA_ABRSM_G1      : [] },
  { label:"Grade 2", data: typeof DATA_ABRSM_G2      !=="undefined" ? DATA_ABRSM_G2      : [] },
  { label:"Grade 3", data: typeof DATA_ABRSM_G3      !=="undefined" ? DATA_ABRSM_G3      : [] },
  { label:"Grade 4", data: typeof DATA_ABRSM_G4      !=="undefined" ? DATA_ABRSM_G4      : [] },
  { label:"Grade 5", data: typeof DATA_ABRSM_G5      !=="undefined" ? DATA_ABRSM_G5      : [] },
  { label:"Grade 6", data: typeof DATA_ABRSM_G6      !=="undefined" ? DATA_ABRSM_G6      : [] },
  { label:"Grade 7", data: typeof DATA_ABRSM_G7      !=="undefined" ? DATA_ABRSM_G7      : [] },
  { label:"Grade 8", data: typeof DATA_ABRSM_G8      !=="undefined" ? DATA_ABRSM_G8      : [] },
];
const TRINITY = [
  { label:"Initial", data: typeof DATA_TRINITY_INITIAL !=="undefined" ? DATA_TRINITY_INITIAL : [] },
  { label:"Grade 1", data: typeof DATA_TRINITY_G1      !=="undefined" ? DATA_TRINITY_G1      : [] },
  { label:"Grade 2", data: typeof DATA_TRINITY_G2      !=="undefined" ? DATA_TRINITY_G2      : [] },
  { label:"Grade 3", data: typeof DATA_TRINITY_G3      !=="undefined" ? DATA_TRINITY_G3      : [] },
  { label:"Grade 4", data: typeof DATA_TRINITY_G4      !=="undefined" ? DATA_TRINITY_G4      : [] },
  { label:"Grade 5", data: typeof DATA_TRINITY_G5      !=="undefined" ? DATA_TRINITY_G5      : [] },
  { label:"Grade 6", data: typeof DATA_TRINITY_G6      !=="undefined" ? DATA_TRINITY_G6      : [] },
  { label:"Grade 7", data: typeof DATA_TRINITY_G7      !=="undefined" ? DATA_TRINITY_G7      : [] },
  { label:"Grade 8", data: typeof DATA_TRINITY_G8      !=="undefined" ? DATA_TRINITY_G8      : [] },
];

const TRINITY_DIPLOMA = [
  { label:"ATCL", data: typeof DATA_TRINITY_ATCL !=="undefined" ? DATA_TRINITY_ATCL : [] },
  { label:"LTCL", data: typeof DATA_TRINITY_LTCL !=="undefined" ? DATA_TRINITY_LTCL : [] },
  { label:"FTCL", data: typeof DATA_TRINITY_FTCL !=="undefined" ? DATA_TRINITY_FTCL : [] },
];

function countByList(data) {
  const m = {};
  data.forEach(p => { m[p.l] = (m[p.l]||0)+1; });
  return m;
}

function listBadge(key, count) {
  const colors = {
    A:"bg-red-900 text-red-200", B:"bg-yellow-900 text-yellow-200",
    C:"bg-blue-900 text-blue-200", D:"bg-green-900 text-green-200",
    S4:"bg-purple-900 text-purple-200", S3:"bg-purple-900 text-purple-200",
    S2:"bg-purple-900 text-purple-200", S1:"bg-purple-900 text-purple-200",
    Manual:"bg-slate-700 text-slate-200",
  };
  return (
    <span key={key} className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full ${colors[key]||"bg-slate-700 text-slate-300"}`}>
      {key}:{count}
    </span>
  );
}

function SectionTable({ title, rows, accent }) {
  const total = rows.reduce((s, r) => s + r.data.length, 0);
  return (
    <div className="mb-8">
      <div className="flex items-center gap-3 mb-3">
        <h2 className="text-[13px] font-black uppercase tracking-widest" style={{color: accent}}>{title}</h2>
        <span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-slate-700 text-slate-300">{total} total</span>
      </div>
      <div className="rounded-xl overflow-hidden border border-slate-700">
        <table className="w-full text-[12px]">
          <thead>
            <tr style={{background:"#1e293b"}}>
              <th className="text-left px-4 py-2.5 font-bold text-slate-400 w-32">Grade</th>
              <th className="text-center px-4 py-2.5 font-bold text-slate-400 w-16">Total</th>
              <th className="text-left px-4 py-2.5 font-bold text-slate-400">Breakdown</th>
              <th className="text-center px-4 py-2.5 font-bold text-slate-400 w-20">Status</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => {
              const by = countByList(r.data);
              const lists = Object.keys(by).sort();
              const ok = r.data.length > 0;
              return (
                <tr key={i} className={i%2===0 ? "bg-slate-800" : "bg-slate-800/50"}>
                  <td className="px-4 py-2.5 font-semibold text-slate-200">{r.label}</td>
                  <td className="px-4 py-2.5 text-center font-black text-white">{r.data.length}</td>
                  <td className="px-4 py-2.5">
                    <div className="flex flex-wrap gap-1">
                      {lists.map(l => listBadge(l, by[l]))}
                    </div>
                  </td>
                  <td className="px-4 py-2.5 text-center">
                    {ok
                      ? <span className="text-green-400 font-bold text-[11px]">✓ OK</span>
                      : <span className="text-red-400 font-bold text-[11px]">⚠ MISSING</span>}
                  </td>
                </tr>
              );
            })}
            {/* Subtotal row */}
            <tr style={{background:"#0f172a"}}>
              <td className="px-4 py-2.5 font-black text-slate-300">SUBTOTAL</td>
              <td className="px-4 py-2.5 text-center font-black text-white text-[14px]">{total}</td>
              <td className="px-4 py-2.5"></td>
              <td className="px-4 py-2.5"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Dashboard() {
  const grandTotal = useMemo(() => {
    return [...AMEB_COMP, ...AMEB_LEISURE, ...DIPLOMA, ...ABRSM, ...TRINITY, ...TRINITY_DIPLOMA]
      .reduce((s, r) => s + r.data.length, 0);
  }, []);

  const compTotal        = AMEB_COMP.reduce((s,r)=>s+r.data.length,0);
  const leisureTotal     = AMEB_LEISURE.reduce((s,r)=>s+r.data.length,0);
  const diplomaTotal     = DIPLOMA.reduce((s,r)=>s+r.data.length,0);
  const abrsmTotal       = ABRSM.reduce((s,r)=>s+r.data.length,0);
  const trinityTotal     = TRINITY.reduce((s,r)=>s+r.data.length,0);
  const trinityDipTotal  = TRINITY_DIPLOMA.reduce((s,r)=>s+r.data.length,0);

  return (
    <div className="min-h-screen p-6 max-w-4xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-8">
        <div>
          <div className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">Piano Butler · Admin</div>
          <h1 className="text-2xl font-black text-white">Piece Count Dashboard</h1>
          <p className="text-slate-500 text-[12px] mt-1">Live counts from loaded data files · {new Date().toLocaleDateString("en-AU")}</p>
        </div>
        <a href="index.html" className="text-[11px] font-bold text-slate-500 hover:text-slate-300 transition-colors">← Back to Piano Butler</a>
      </div>

      {/* Grand total card */}
      <div className="rounded-2xl p-6 mb-8 flex flex-wrap gap-6 items-center" style={{background:"linear-gradient(135deg,#1e1b4b,#312e81)"}}>
        <div>
          <div className="text-[10px] font-black uppercase tracking-widest text-indigo-300 mb-1">Grand Total</div>
          <div className="text-5xl font-black text-white">{grandTotal.toLocaleString()}</div>
          <div className="text-indigo-300 text-[12px] mt-1">pieces across all syllabuses</div>
        </div>
        <div className="flex flex-wrap gap-4 ml-auto">
          {[
            ["AMEB Comp",    compTotal,    "#6366f1"],
            ["AMEB Leisure", leisureTotal, "#8b5cf6"],
            ["All Diploma",     diplomaTotal,    "#a78bfa"],
            ["ABRSM",           abrsmTotal,      "#c4b5fd"],
            ["Trinity",         trinityTotal,    "#fca5a5"],
            ["Trinity Diploma", trinityDipTotal, "#fda4af"],
          ].map(([lbl, n, col]) => (
            <div key={lbl} className="text-center">
              <div className="text-2xl font-black text-white">{n}</div>
              <div className="text-[10px] font-bold mt-0.5" style={{color: col}}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tables */}
      <SectionTable title="AMEB Comprehensive" rows={AMEB_COMP} accent="#6366f1" />
      <SectionTable title="AMEB Piano for Leisure" rows={AMEB_LEISURE} accent="#8b5cf6" />
      <SectionTable title="AMEB Diploma" rows={DIPLOMA} accent="#a78bfa" />
      <SectionTable title="ABRSM Initial – Grade 8" rows={ABRSM} accent="#7c3aed" />
      <SectionTable title="Trinity College London Initial – Grade 8" rows={TRINITY} accent="#b91c1c" />
      <SectionTable title="Trinity Diploma (ATCL / LTCL / FTCL)" rows={TRINITY_DIPLOMA} accent="#7f1d1d" />

      {/* Expected vs actual */}
      <div className="rounded-xl border border-slate-700 p-5 mb-8" style={{background:"#1e293b"}}>
        <h2 className="text-[13px] font-black uppercase tracking-widest text-slate-400 mb-4">Expected vs Actual (CLAUDE.md targets)</h2>
        <div className="grid grid-cols-2 gap-3 text-[12px]">
          {[
            ["AMEB Comprehensive", compTotal,    1393],
            ["AMEB Leisure",       leisureTotal, 706],
            ["AMEB Diploma + CertP", diplomaTotal - (typeof DATA_ABRSM_LRSM!=="undefined"?DATA_ABRSM_LRSM.length:0) - (typeof DATA_ABRSM_FRSM!=="undefined"?DATA_ABRSM_FRSM.length:0), 515],
            ["ABRSM Diploma (LRSM+FRSM)", (typeof DATA_ABRSM_LRSM!=="undefined"?DATA_ABRSM_LRSM.length:0)+(typeof DATA_ABRSM_FRSM!=="undefined"?DATA_ABRSM_FRSM.length:0), 236],
            ["ABRSM",              abrsmTotal,   433],
            ["Trinity",            trinityTotal, 516],
            ["Trinity Diploma",    trinityDipTotal, 702],
            ["Grand Total",        grandTotal,   4500],
          ].map(([lbl, actual, expected]) => {
            const match = actual === expected;
            return (
              <div key={lbl} className={`rounded-lg p-3 flex items-center justify-between ${match ? "bg-green-950 border border-green-800" : "bg-red-950 border border-red-800"}`}>
                <span className={match ? "text-green-300 font-semibold" : "text-red-300 font-semibold"}>{lbl}</span>
                <span className={`font-black text-[13px] ${match ? "text-green-200" : "text-red-200"}`}>
                  {actual} {match ? "✓" : `≠ ${expected}`}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="text-center text-[11px] text-slate-600 pb-6">
        Piano Butler Admin · For owner use only · <span className="text-slate-500">noindex</span>
      </div>
    </div>
  );
}

function LoginGate() {
  const [status, setStatus] = useState('checking'); // 'checking' | 'ok' | 'redirect'

  useEffect(() => {
    _sbCounts.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        setStatus('ok');
      } else {
        window.location.href = 'login.html?next=admin-counts.html';
      }
    });
  }, []);

  if (status === 'checking') return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#555',fontSize:13}}>
      Checking session…
    </div>
  );
  return <Dashboard />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<LoginGate />);
</script>
</body>
</html>
