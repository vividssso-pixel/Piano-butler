/* ─── Engine ─── */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function scorepiece(p, prefs) {
  let score = 0;
  const reasons = [];
  const focus = (p.focus||[]).join(' ').toLowerCase();
  const nat = (p.nat||'').toLowerCase();
  const era = (p.era||'');

  // Era preference
  if (prefs.eras.length > 0 && prefs.eras.includes(era)) {
    score += 30;
    reasons.push({ label:era, icon:'🕰️', bg:ERA_BG[era]||'#f1f5f9', color:ERA_COLORS[era]||'#475569' });
  }

  // Character alignment
  const CHAR_WORDS = {
    technical:  ['finger','scale','arpeggio','technical','velocity','dexterity','agility','precision','hand independence','coordination','clarity'],
    expressive: ['cantabile','lyrical','expressive','phrasing','voicing','tone','singing','melodic','shaping','rubato'],
    playful:    ['dance','character','humour','playful','energetic','rhythmic drive','jazz','swing','wit','fun'],
    virtuosic:  ['virtuosity','brilliance','velocity','octave','dramatic','bravura','power','showpiece','toccata'],
    lyrical:    ['lyrical','cantabile','singing','melodic','lullaby','nocturne','romance','beautiful','smooth','legato'],
    balanced:   [],
  };
  const words = CHAR_WORDS[prefs.character] || [];
  const matched = words.find(w => focus.includes(w));
  if (matched && prefs.character !== 'balanced') {
    score += 25;
    const charLabel = { technical:'Technical focus', expressive:'Expressive depth', playful:'Student appeal', virtuosic:'Impressive & showy', lyrical:'Beautiful melody' }[prefs.character];
    const charBg    = { technical:'#f0fdf4', expressive:'#fdf4ff', playful:'#fff7ed', virtuosic:'#fff1f2', lyrical:'#fdf2f8' }[prefs.character];
    const charCol   = { technical:'#166534', expressive:'#7e22ce', playful:'#c2410c', virtuosic:'#9f1239', lyrical:'#86198f' }[prefs.character];
    const charMatch = CHARACTERS.find(c=>c.id===prefs.character);
    reasons.push({ label:charLabel, icon:charMatch ? charMatch.label.split(' ')[0] : '✓', bg:charBg, color:charCol });
  }

  // Nationality
  const NAT_MATCHES = {
    australian: ['australian'],
    french:     ['french'],
    german:     ['german','austrian'],
    russian:    ['russian'],
    western:    ['german','french','austrian','english','italian','polish','russian','czech','spanish','norwegian','hungarian'],
    diverse:    [],
    any:        [],
  };
  const matchNats = NAT_MATCHES[prefs.natDiversity] || [];
  if (matchNats.length > 0 && matchNats.includes(nat)) {
    score += 20;
    const flag = { australian:'🇦🇺', french:'🇫🇷', german:'🇩🇪', russian:'🇷🇺' }[prefs.natDiversity] || '🌍';
    reasons.push({ label:p.nat, icon:flag, bg:'#fffbeb', color:'#92400e' });
  }

  // Small random factor
  score += Math.random() * 12;

  return { ...p, _score:score, _reasons:reasons };
}

function pickByList(pool, list) {
  const lp = pool.filter(p => p.l === list);
  if (!lp.length) return null;
  return lp.sort((a,b) => b._score - a._score)[0];
}

function pickDiverse(scored, count, prefs) {
  const result = [];
  const usedEras = new Set();
  const usedNats = new Set();
  const sorted = [...scored].sort((a,b) => b._score - a._score);
  if (sorted.length) { result.push(sorted[0]); usedEras.add(sorted[0].era); usedNats.add(sorted[0].nat); }

  // For 'diverse' nationality pref, strongly prefer new nationalities
  const natBonus = (prefs && prefs.natDiversity === 'diverse') ? 20 : 10;

  for (const p of sorted) {
    if (result.length >= count) break;
    if (result.some(r => r.c===p.c && r.t===p.t)) continue;
    const newEra = !usedEras.has(p.era);
    const newNat = !usedNats.has(p.nat);
    if (newEra) { p._diversityBonus = (p._diversityBonus||0) + 20; }
    if (newNat) { p._diversityBonus = (p._diversityBonus||0) + natBonus; }
    result.push(p);
    usedEras.add(p.era); usedNats.add(p.nat);
  }
  for (const p of sorted) {
    if (result.length >= count) break;
    if (!result.some(r => r.c===p.c && r.t===p.t)) result.push(p);
  }
  return result;
}

function generateCombination(corpus, prefs, seed) {
  const pool = corpus.filter(p => {
    const sylOk = p._syllabus === prefs.syllabus || p._syllabus === prefs.syllabus + ' Diploma';
    return sylOk && p._gradeKey === prefs.grade;
  });
  if (!pool.length) return null;
  const scored = shuffle(pool).map(p => scorepiece(p, prefs));

  let selected = [];
  if (prefs.comboType === 'exam3') {
    ['A','B','C'].forEach(l => { const p=pickByList(scored,l); if(p) selected.push({...p,_listLabel:'List '+l}); });
    if (selected.length < 2) selected = pickDiverse(scored, 3, prefs);
  } else if (prefs.comboType === 'exam4') {
    ['A','B','C','D'].forEach(l => { const p=pickByList(scored,l); if(p) selected.push({...p,_listLabel:'List '+l}); });
    if (selected.length < 2) selected = pickDiverse(scored, 4, prefs);
  } else if (prefs.comboType === 'lesson4') {
    selected = pickDiverse(scored, 4, prefs);
  } else {
    selected = pickDiverse(scored, 6, prefs);
  }
  return selected;
}

function generateFreeMode(corpus, prefs) {
  const scored = shuffle(corpus).map(p => scorepiece(p, prefs));
  const count = prefs.comboType === 'lesson6' ? 6 : 4;
  return pickDiverse(scored, count, prefs);
}

const YT_API_KEY = "AIzaSyDR9BQfybtyS2e-H9wgtFgWbfqlQWpLCW8";
function useVideoModal() {
  const [modal, setModal] = React.useState(null);
  const open = React.useCallback(async (composer, title) => {
    setModal({ loading:true, title });
    try {
      const q = encodeURIComponent(composer.split(',')[0].trim()+' '+title+' piano');
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
      const data = await res.json();
      const item = data.items && data.items[0];
      if (item) setModal({ videoId:item.id.videoId, title:item.snippet.title, loading:false });
      else { setModal(null); window.open('https://www.youtube.com/results?search_query='+q,'_blank'); }
    } catch { setModal(null); }
  },[]);
  const close = React.useCallback(() => setModal(null),[]);
  return { modal, open, close };
}

function VideoModal({ modal, onClose }) {
  if (!modal) return null;
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#0f0f0f',borderRadius:16,overflow:'hidden',width:'100%',maxWidth:760,boxShadow:'0 25px 60px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#1a1a1a'}}>
          <span style={{color:'#e2e8f0',fontSize:12,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:12}}>
            {modal.loading ? 'Searching...' : modal.title}
          </span>
          <button onClick={onClose} style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontSize:20,lineHeight:1}}>✕</button>
        </div>
        <div style={{position:'relative',paddingBottom:'56.25%',height:0}}>
          {modal.loading
            ? <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8',fontSize:13}}>🎹 Searching YouTube...</div>
            : <iframe src={`https://www.youtube.com/embed/${modal.videoId}?autoplay=1&rel=0`}
                style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',border:'none'}}
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen/>
          }
        </div>
      </div>
    </div>
  );
}

/* ─── Series badge ─── */
function SeriesBadge({ s }) {
  if (!s) return null;
  const cfg = {
    S19:{ bg:'#dbeafe', color:'#1e40af', label:'S19' },
    S18:{ bg:'#ede9fe', color:'#5b21b6', label:'S18' },
    S17:{ bg:'#f3e8ff', color:'#7e22ce', label:'S17' },
    AustAnth:{ bg:'#fef3c7', color:'#92400e', label:'AustAnth' },
    Manual:{ bg:'#f1f5f9', color:'#475569', label:'Manual' },
  };
  const key = s.startsWith('Series') ? null : s;
  const c = key && cfg[key] ? cfg[key] : (s.startsWith('Series') ? { bg:'#d1fae5', color:'#065f46', label:s } : { bg:'#f1f5f9', color:'#475569', label:s });
  return (
    <span style={{ background:c.bg, color:c.color, fontSize:9, fontWeight:800, padding:'2px 7px', borderRadius:8, letterSpacing:'0.03em' }}>
      {c.label}
    </span>
  );
}

/* ─── Era balance bar ─── */
function EraBalanceBar({ pieces }) {
  const counts = {};
  ERAS.forEach(e => counts[e] = 0);
  pieces.forEach(p => { if (counts[p.era] !== undefined) counts[p.era]++; });
  const total = pieces.length || 1;
  const hasAny = ERAS.some(e => counts[e] > 0);
  if (!hasAny) return null;
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6 }}>Era balance</div>
      <div className="era-bar-wrap">
        {ERAS.map(era => counts[era] > 0 && (
          <div key={era} className="era-bar-seg" title={era + ': ' + counts[era]}
            style={{ width:(counts[era]/total*100)+'%', background:ERA_COLORS[era], borderRadius:3 }} />
        ))}
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:6 }}>
        {ERAS.filter(e => counts[e] > 0).map(era => (
          <span key={era} style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:ERA_COLORS[era], fontWeight:600 }}>
            <span style={{ width:8, height:8, borderRadius:2, background:ERA_COLORS[era], display:'inline-block' }}/>
            {era} ×{counts[era]}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ─── Result card ─── */
function ResultCard({ piece, index, onListen, onSaveToList }) {
  const [saved, setSaved] = useState(false);
  const sheetUrl = 'https://www.google.com/search?q=' + encodeURIComponent((piece.c||'').split(',')[0]+' '+piece.t+' sheet music');
  const listLabel = piece._listLabel;
  const listColors = { 'List A':'#1d4ed8','List B':'#6d28d9','List C':'#be185d','List D':'#0f766e' };
  const eraColor = ERA_COLORS[piece.era]||'#475569';
  const eraBg   = ERA_BG[piece.era]||'#f1f5f9';

  function handleSave() {
    setSaved(true);
    onSaveToList(piece);
    setTimeout(() => setSaved(false), 2000);
  }

  return (
    <div className="result-card fade-up" style={{ animationDelay: (index*0.06)+'s' }}>
      <div style={{ display:'flex', gap:12 }}>
        {/* Index circle */}
        <div style={{
          width:30, height:30, borderRadius:'50%',
          background: listLabel ? (listColors[listLabel]||'#4f46e5') : '#4f46e5',
          color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:13, fontWeight:800, flexShrink:0, marginTop:2
        }}>{index+1}</div>

        <div style={{ flex:1, minWidth:0 }}>
          {/* Badges row */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:7, alignItems:'center' }}>
            {listLabel && (
              <span style={{ background:listColors[listLabel]||'#4f46e5', color:'#fff', fontSize:10, fontWeight:800, padding:'2px 8px', borderRadius:9 }}>
                {listLabel}
              </span>
            )}
            <span style={{ background:eraBg, color:eraColor, fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:9 }}>
              {piece.era}
            </span>
            {piece.nat && (
              <span style={{ background:'#f8fafc', color:'#64748b', fontSize:10, fontWeight:600, padding:'2px 8px', borderRadius:9, border:'1px solid #e2e8f0' }}>
                {piece.nat}
              </span>
            )}
            {piece.s && <SeriesBadge s={piece.s} />}
          </div>

          {/* Composer + title */}
          <div style={{ fontWeight:800, fontSize:13, color:'#1e293b', marginBottom:1 }}>{piece.c}</div>
          <div style={{ fontSize:13, color:'#475569', marginBottom:8, lineHeight:1.4 }}>{piece.t}</div>

          {/* Why this piece */}
          {piece._reasons && piece._reasons.length > 0 && (
            <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:8 }}>
              {piece._reasons.map((r,i) => (
                <span key={i} className="reason-badge" style={{ background:r.bg, color:r.color }}>
                  <span>{r.icon}</span>{r.label}
                </span>
              ))}
            </div>
          )}

          {/* Focus tags */}
          {piece.focus && piece.focus.length > 0 && (
            <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:12 }}>
              {piece.focus.map((f,i) => <span key={i} className="focus-tag">{f}</span>)}
            </div>
          )}

          {/* Actions */}
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            <button onClick={() => onListen(piece.c||'', piece.t||'')}
              style={{ background:'#fee2e2', color:'#b91c1c', fontSize:11, fontWeight:700, padding:'5px 11px', borderRadius:8, border:'none', cursor:'pointer' }}>
              ▶ Listen
            </button>
            <a href={sheetUrl} target="_blank" rel="noopener"
              style={{ background:'#f0fdf4', color:'#15803d', fontSize:11, fontWeight:700, padding:'5px 11px', borderRadius:8, textDecoration:'none', display:'inline-block' }}>
              ♩ Score
            </a>
            <button onClick={handleSave}
              style={{ background: saved ? '#d1fae5' : '#f8fafc', color: saved ? '#065f46' : '#64748b',
                fontSize:11, fontWeight:700, padding:'5px 11px', borderRadius:8, border:'1.5px solid', borderColor: saved ? '#6ee7b7' : '#e2e8f0', cursor:'pointer', transition:'all 0.2s' }}>
              {saved ? '✓ Saved' : '+ Save'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Programme summary ─── */
function ProgrammeSummary({ results, prefs, mode }) {
  if (!results || results.length === 0) return null;
  const eras = [...new Set(results.map(p=>p.era).filter(Boolean))];
  const nats = [...new Set(results.map(p=>p.nat).filter(Boolean))];
  const hasList = results.some(p=>p._listLabel);

  return (
    <div style={{ background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:14, padding:16, marginBottom:20 }}>
      <div style={{ fontSize:11, fontWeight:800, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:10 }}>
        Programme overview
      </div>
      <EraBalanceBar pieces={results} />
      <div style={{ display:'flex', flexWrap:'wrap', gap:16, marginTop:8 }}>
        <div>
          <div style={{ fontSize:10, color:'#94a3b8', fontWeight:600, marginBottom:3 }}>NATIONALITIES</div>
          <div style={{ fontSize:12, color:'#374151', fontWeight:600 }}>{nats.join(', ') || '—'}</div>
        </div>
        {hasList && (
          <div>
            <div style={{ fontSize:10, color:'#94a3b8', fontWeight:600, marginBottom:3 }}>LISTS COVERED</div>
            <div style={{ fontSize:12, color:'#374151', fontWeight:600 }}>
              {[...new Set(results.map(p=>p._listLabel).filter(Boolean))].join(', ')}
            </div>
          </div>
        )}
        <div>
          <div style={{ fontSize:10, color:'#94a3b8', fontWeight:600, marginBottom:3 }}>PIECES</div>
          <div style={{ fontSize:12, color:'#374151', fontWeight:600 }}>{results.length}</div>
        </div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [mode, setMode]           = useState(null);
  const [step, setStep]           = useState(0);
  const [syllabus, setSyllabus]   = useState(null);
  const [grade, setGrade]         = useState(null);
  const [comboType, setComboType] = useState('lesson4');
  const [character, setCharacter] = useState(null);
  const [eras, setEras]           = useState([]);
  const [natDiversity, setNatDiversity] = useState('any');
  const [results, setResults]     = useState(null);
  const [seed, setSeed]           = useState(0);
  const [copyDone, setCopyDone]   = useState(false);
  const { modal:videoModal, open:openVideo, close:closeVideo } = useVideoModal();

  const gradeOptions = syllabus ? GRADE_OPTIONS[syllabus]||[] : [];
  const isDiploma = grade && !['Prelim','Initial','G1','G2','G3','G4','G5','G6','G7','G8'].includes(grade);
  const comboOptions = (mode==='free'||isDiploma)
    ? [
        { id:'lesson4', label:'4-piece set', desc:'Varied programme across 4 pieces' },
        { id:'lesson6', label:'6-piece set', desc:'Broader exploration across 6 pieces' },
      ]
    : [
        { id:'exam3', label:'Exam — 3 pieces', desc:'One from each list: A + B + C' },
        { id:'exam4', label:'Exam — 4 pieces', desc:'Full programme: List A + B + C + D' },
        { id:'lesson4', label:'Lesson set — 4 pieces', desc:'Varied programme for studio lessons' },
        { id:'lesson6', label:'Lesson set — 6 pieces', desc:'Broader selection, 6 pieces' },
      ];

  const syllabusColor = { AMEB:'#4f46e5', ABRSM:'#7c3aed', Trinity:'#b91c1c' };
  const accentColor = mode==='free' ? '#0891b2' : (syllabus ? syllabusColor[syllabus] : '#4f46e5');

  // Steps: exam 0→1→2→3→4→5→6→7(results), free 0→3→4→5→6→7
  const totalSteps = mode==='free' ? 4 : 6;
  const stepForProgress = mode==='free' ? Math.max(0,step-2) : step;
  const progress = Math.min(100, Math.round((stepForProgress/totalSteps)*100));

  function toggleEra(era) { setEras(prev=>prev.includes(era)?prev.filter(e=>e!==era):[...prev,era]); }

  function chooseMode(m) {
    setMode(m);
    setStep(m==='free' ? 3 : 1);
  }

  const prefs = { syllabus, grade, comboType, character, eras, natDiversity };

  function generate() {
    const combo = mode==='free' ? generateFreeMode(CORPUS, prefs) : generateCombination(CORPUS, prefs, seed);
    setResults(combo);
    setStep(7);
  }

  function regenerate() {
    setSeed(s=>s+1);
    const combo = mode==='free' ? generateFreeMode(CORPUS, prefs) : generateCombination(CORPUS, prefs, seed+1);
    setResults(combo);
  }

  function reset() {
    setMode(null); setSyllabus(null); setGrade(null); setComboType('lesson4');
    setCharacter(null); setEras([]); setNatDiversity('any');
    setResults(null); setStep(0);
  }

  function goBack() {
    if (step===7) { setStep(6); return; }
    if (step===3 && mode==='free') { setMode(null); setStep(0); }
    else if (step===1) { setMode(null); setStep(0); }
    else setStep(s=>s-1);
  }

  function nextStep() {
    if (mode==='free' && step===0) { setStep(3); return; }
    setStep(s=>s+1);
  }

  function canAdvance() {
    if (step===1) return !!syllabus;
    if (step===2) return !!grade;
    if (step===3) return !!comboType;
    if (step===4) return !!character;
    return true;
  }

  function handleSaveToList(piece) {
    try {
      const lists = JSON.parse(localStorage.getItem('pb_lists_v1')||'[]');
      let target = lists.find(l=>l.name==='Recommender Picks');
      if (!target) {
        target = { id:'rec-'+Date.now(), name:'Recommender Picks', type:'general', pieces:[], created:Date.now() };
        lists.push(target);
      }
      const alreadyIn = target.pieces.some(p=>p.composer===piece.c && p.title===piece.t);
      if (!alreadyIn) {
        target.pieces.push({ composer:piece.c, title:piece.t, grade:piece._grade, syllabus:piece._syllabus, era:piece.era, nat:piece.nat, focus:piece.focus||[], added:Date.now() });
        localStorage.setItem('pb_lists_v1', JSON.stringify(lists));
        window.dispatchEvent(new Event('pb_lists_changed'));
      }
    } catch(e) { console.error(e); }
  }

  function copyProgramme() {
    if (!results) return;
    const lines = results.map((p,i) => `${i+1}. ${p.c} — ${p.t}${p._listLabel?' ('+p._listLabel+')':''} [${p.era}, ${p.nat}]`);
    const header = mode==='free' ? 'Free Discovery Programme' : `${syllabus} ${grade} Programme`;
    navigator.clipboard.writeText(header+'\n\n'+lines.join('\n')).then(()=>{
      setCopyDone(true); setTimeout(()=>setCopyDone(false), 2000);
    });
  }

  return (
    <div style={{ minHeight:'100vh', background:'#f8fafc' }}>
      <VideoModal modal={videoModal} onClose={closeVideo} />

      {/* Header */}
      <div style={{ background:`linear-gradient(135deg, ${accentColor} 0%, #0f172a 100%)`, padding:'18px 20px 22px' }}>
        <a href="index.html" style={{ color:'rgba(255,255,255,0.6)', fontSize:12, textDecoration:'none', display:'block', marginBottom:8 }} className="no-print">← Piano Butler</a>
        <h1 style={{ color:'#fff', fontSize:20, fontWeight:900, margin:'0 0 3px', letterSpacing:'-0.02em' }}>🎹 Repertoire Recommender</h1>
        <p style={{ color:'rgba(255,255,255,0.7)', fontSize:12, margin:'0 0 14px' }}>
          {mode==='free' ? 'Searching all 4,500 pieces' : 'Personalised exam programme builder'}
        </p>
        {step < 7 && (
          <div className="progress-bar">
            <div className="progress-fill" style={{ width:progress+'%' }}/>
          </div>
        )}
      </div>

      <div style={{ maxWidth:620, margin:'0 auto', padding:'24px 16px 96px' }}>

        {/* STEP 0: Mode */}
        {step===0 && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>How would you like to explore?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>Choose a mode to get started.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <button onClick={()=>chooseMode('exam')} className="option-btn" style={{'--accent':'#4f46e5'} as any}>
                <div style={{ fontSize:15, fontWeight:800, color:'#1e293b', marginBottom:3 }}>🎓 By exam syllabus</div>
                <div style={{ fontSize:12, color:'#64748b' }}>Pick AMEB, ABRSM, or Trinity — then a grade. Recommends pieces matching the list structure (A/B/C/D).</div>
              </button>
              <button onClick={()=>chooseMode('free')} className="option-btn" style={{'--accent':'#0891b2'} as any}>
                <div style={{ fontSize:15, fontWeight:800, color:'#1e293b', marginBottom:3 }}>🎲 Free discovery</div>
                <div style={{ fontSize:12, color:'#64748b' }}>No syllabus required. Just describe the student — I'll search all 4,500 pieces across every syllabus.</div>
              </button>
            </div>
          </div>
        )}

        {/* STEP 1: Syllabus */}
        {step===1 && mode==='exam' && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>Which syllabus?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>Select the exam board for this student.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {SYLLABUSES.map(s => (
                <button key={s.id} onClick={()=>{setSyllabus(s.id);setGrade(null);}}
                  className="option-btn"
                  style={{ '--accent':s.color, borderColor:syllabus===s.id?s.color:'#e2e8f0', background:syllabus===s.id?s.color+'11':'#fff' } as any}>
                  <div style={{ fontSize:15, fontWeight:700, color:syllabus===s.id?s.color:'#1e293b' }}>{s.label}</div>
                  <div style={{ fontSize:12, color:'#64748b', marginTop:2 }}>{s.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 2: Grade */}
        {step===2 && mode==='exam' && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>Which grade?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>Select the student's current exam grade.</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:24 }}>
              {gradeOptions.map(g => (
                <button key={g.id} onClick={()=>setGrade(g.id)}
                  className="chip" style={{ ...(grade===g.id ? { background:accentColor, borderColor:accentColor, color:'#fff' } : {}) }}>
                  {g.label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 3: Combo type */}
        {step===3 && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>What kind of programme?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>How will these pieces be used?</p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {comboOptions.map(c => (
                <button key={c.id} onClick={()=>setComboType(c.id)}
                  className="option-btn"
                  style={{ '--accent':accentColor, borderColor:comboType===c.id?accentColor:'#e2e8f0', background:comboType===c.id?accentColor+'11':'#fff' } as any}>
                  <div style={{ fontSize:14, fontWeight:700, color:comboType===c.id?accentColor:'#1e293b' }}>{c.label}</div>
                  <div style={{ fontSize:12, color:'#64748b', marginTop:2 }}>{c.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 4: Character */}
        {step===4 && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>Student personality?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>Shapes which focus areas get prioritised in the selection.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {CHARACTERS.map(ch => (
                <button key={ch.id} onClick={()=>setCharacter(ch.id)}
                  className="option-btn"
                  style={{ '--accent':accentColor, borderColor:character===ch.id?accentColor:'#e2e8f0', background:character===ch.id?accentColor+'11':'#fff' } as any}>
                  <div style={{ fontSize:14, fontWeight:700, color:character===ch.id?accentColor:'#1e293b' }}>{ch.label}</div>
                  <div style={{ fontSize:12, color:'#94a3b8', marginTop:2 }}>{ch.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 5: Era preferences */}
        {step===5 && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>Era preferences?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>
              Select eras you'd especially like included. <em>Optional — skip for a balanced mix.</em>
            </p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:20 }}>
              {ERAS.map(era => (
                <button key={era} onClick={()=>toggleEra(era)}
                  className="chip"
                  style={ eras.includes(era)
                    ? { background:ERA_COLORS[era], borderColor:ERA_COLORS[era], color:'#fff', fontWeight:700 }
                    : { borderColor:'#e2e8f0', color:'#475569' } }>
                  {era}
                </button>
              ))}
            </div>
            {eras.length > 0 && (
              <p style={{ fontSize:12, color:'#64748b' }}>Selected: <strong>{eras.join(', ')}</strong></p>
            )}
          </div>
        )}

        {/* STEP 6: Nationality */}
        {step===6 && (
          <div className="fade-up">
            <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', marginBottom:5 }}>Composer nationality?</h2>
            <p style={{ fontSize:13, color:'#64748b', marginBottom:18 }}>Do you have a preference for the national flavour of the repertoire?</p>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {NAT_OPTIONS.map(n => (
                <button key={n.id} onClick={()=>setNatDiversity(n.id)}
                  className="option-btn"
                  style={{ '--accent':accentColor, borderColor:natDiversity===n.id?accentColor:'#e2e8f0', background:natDiversity===n.id?accentColor+'11':'#fff' } as any}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <div style={{ fontSize:14, fontWeight:700, color:natDiversity===n.id?accentColor:'#1e293b' }}>{n.label}</div>
                    {natDiversity===n.id && <span style={{ fontSize:14 }}>✓</span>}
                  </div>
                  <div style={{ fontSize:11, color:'#94a3b8', marginTop:2 }}>{n.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 7: Results */}
        {step===7 && (
          <div className="fade-up">
            {/* Header row */}
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16, gap:12 }}>
              <div>
                <h2 style={{ fontSize:17, fontWeight:800, color:'#1e293b', margin:'0 0 2px' }}>Your programme</h2>
                <p style={{ fontSize:12, color:'#64748b', margin:0 }}>
                  {mode==='free'
                    ? `Free discovery · ${comboType==='lesson6'?'6':'4'} pieces`
                    : `${syllabus} · ${grade} · ${(comboOptions.find(c=>c.id===comboType)||{label:comboType}).label}`}
                </p>
              </div>
              <div style={{ display:'flex', gap:6, flexShrink:0 }} className="no-print">
                <button onClick={copyProgramme}
                  style={{ padding:'7px 12px', borderRadius:9, border:'1.5px solid #e2e8f0', background:copyDone?'#d1fae5':'#fff', cursor:'pointer', fontSize:11, fontWeight:700, color:copyDone?'#065f46':'#475569', transition:'all 0.2s' }}>
                  {copyDone ? '✓ Copied' : '📋 Copy'}
                </button>
                <button onClick={()=>window.print()}
                  style={{ padding:'7px 12px', borderRadius:9, border:'1.5px solid #e2e8f0', background:'#fff', cursor:'pointer', fontSize:11, fontWeight:700, color:'#475569' }}>
                  🖨️ Print
                </button>
                <button onClick={regenerate}
                  style={{ padding:'7px 12px', borderRadius:9, border:'1.5px solid #e2e8f0', background:'#fff', cursor:'pointer', fontSize:11, fontWeight:700, color:'#4f46e5' }}>
                  🔀
                </button>
              </div>
            </div>

            {/* Programme summary */}
            {results && results.length > 0 && <ProgrammeSummary results={results} prefs={prefs} mode={mode} />}

            {/* Result cards */}
            {results && results.length > 0 ? (
              results.map((p,i) => (
                <ResultCard key={i} piece={p} index={i} onListen={openVideo} onSaveToList={handleSaveToList} />
              ))
            ) : (
              <div style={{ textAlign:'center', padding:40, color:'#94a3b8', fontSize:14 }}>
                Not enough pieces found for this combination.
                <button onClick={reset} style={{ display:'block', margin:'16px auto 0', padding:'10px 24px', borderRadius:10, border:'none', background:'#4f46e5', color:'#fff', cursor:'pointer', fontWeight:700 }}>
                  Try different options
                </button>
              </div>
            )}

            {results && results.length > 0 && (
              <div style={{ marginTop:20, display:'flex', gap:10 }} className="no-print">
                <button onClick={reset}
                  style={{ flex:1, padding:'12px', borderRadius:12, border:'1.5px solid #e2e8f0', background:'#fff', cursor:'pointer', fontSize:13, fontWeight:700, color:'#475569' }}>
                  ← Start over
                </button>
                <button onClick={regenerate}
                  style={{ flex:2, padding:'12px', borderRadius:12, border:'none', background:accentColor, cursor:'pointer', fontSize:13, fontWeight:700, color:'#fff' }}>
                  🔀 Generate another
                </button>
              </div>
            )}
          </div>
        )}

        {/* Navigation — steps 1–6 */}
        {step > 0 && step < 7 && (
          <div style={{ display:'flex', gap:10, marginTop:24 }} className="no-print">
            <button onClick={goBack}
              style={{ padding:'12px 20px', borderRadius:12, border:'1.5px solid #e2e8f0', background:'#fff', cursor:'pointer', fontSize:13, fontWeight:600, color:'#475569' }}>
              ← Back
            </button>
            {step < 6 ? (
              <button onClick={nextStep} disabled={!canAdvance()}
                style={{ flex:1, padding:'12px', borderRadius:12, border:'none',
                  background: canAdvance()?accentColor:'#e2e8f0',
                  color: canAdvance()?'#fff':'#94a3b8',
                  cursor: canAdvance()?'pointer':'not-allowed',
                  fontSize:13, fontWeight:700 }}>
                Continue →
              </button>
            ) : (
              <button onClick={generate}
                style={{ flex:1, padding:'12px', borderRadius:12, border:'none', background:accentColor, color:'#fff', cursor:'pointer', fontSize:13, fontWeight:700 }}>
                🎹 Get recommendations
              </button>
            )}
          </div>
        )}

        {/* Step dots */}
        {step > 0 && step < 7 && (
          <div style={{ display:'flex', justifyContent:'center', gap:6, marginTop:18 }}>
            {Array.from({length: mode==='free'?4:6}).map((_,i) => {
              const dotStep = mode==='free' ? i+3 : i+1;
              return <div key={i} className={`step-dot ${step>dotStep?'done':step===dotStep?'active':''}`}/>;
            })}
          </div>
        )}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,color:'#ef4444',fontFamily:'monospace',fontSize:13}}>
        <b>Error:</b> {this.state.error.message}<br/>
        <small style={{color:'#94a3b8'}}>Please refresh the page.</small>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
