  const amebComp = [

    [typeof DATA_G5_LEISURE!=='undefined'?DATA_G5_LEISURE:null,'AMEB','G5','Grade 5'],
    [typeof DATA_G6_LEISURE!=='undefined'?DATA_G6_LEISURE:null,'AMEB','G6','Grade 6'],
    [typeof DATA_G7_LEISURE!=='undefined'?DATA_G7_LEISURE:null,'AMEB','G7','Grade 7'],
    [typeof DATA_G8_LEISURE!=='undefined'?DATA_G8_LEISURE:null,'AMEB','G8','Grade 8'],

  const abrsm = [

  ];
  abrsm.forEach(([d,s,k,l]) => push(d,s,k,l,'Graded'));
  if (typeof DATA_ABRSM_LRSM!=='undefined') push(DATA_ABRSM_LRSM,'ABRSM Diploma','LRSM','LRSM','Diploma');
  if (typeof DATA_ABRSM_FRSM!=='undefined') push(DATA_ABRSM_FRSM,'ABRSM Diploma','FRSM','FRSM','Diploma');
  const trinity = [
    [typeof DATA_TRINITY_INITIAL!=='undefined'?DATA_TRINITY_INITIAL:null,'Trinity','Initial','Initial'],
    [typeof DATA_TRINITY_G1!=='undefined'?DATA_TRINITY_G1:null,'Trinity','G1','Grade 1'],

const CORPUS = buildCorpus();

/* ── Config ── */
const LEVELS = [
  { id:'beginner',     label:'Beginner',     sub:'First pieces, very simple patterns', gradeKeys:['Prelim','Initial'] },
  { id:'elementary',   label:'Elementary',   sub:'Grades 1–3 range',                   gradeKeys:['G1','G2','G3'] },
  { id:'intermediate', label:'Intermediate', sub:'Grades 4–6 range',                   gradeKeys:['G4','G5','G6'] },
  { id:'advanced',     label:'Advanced',     sub:'Grades 7–8 range',                   gradeKeys:['G7','G8','CertP','ATCL'] },
  { id:'diploma',      label:'Diploma',      sub:'AMusA, LMusA, LRSM and above',       gradeKeys:['AMusA','LMusA','LRSM','FRSM','LTCL','FTCL'] },
];

const CHARACTERS = [
  { id:'technical',  icon:'🎯', label:'Technical',   sub:'Loves scales, velocity, precision' },
  { id:'expressive', icon:'🎭', label:'Expressive',  sub:'Tone, phrasing, musical shaping' },
  { id:'playful',    icon:'🎪', label:'Playful',     sub:'Fun, catchy, dance-like pieces' },
  { id:'lyrical',    icon:'🌸', label:'Lyrical',     sub:'Beautiful melodies, singing tone' },
  { id:'dramatic',   icon:'⚡', label:'Dramatic',    sub:'Impressive, powerful, showy' },
  { id:'balanced',   icon:'⚖️', label:'Any style',   sub:'Happy with a varied mix' },
];

const ERAS = [
  { id:'Baroque',      label:'Baroque' },
  { id:'Classical',    label:'Classical' },
  { id:'Romantic',     label:'Romantic' },
  { id:'Modern',       label:'Modern' },
  { id:'Contemporary', label:'Contemporary' },
];

const CHAR_WORDS = {
  technical:  ['finger','scale','arpeggio','technical','velocity','dexterity','agility','precision','hand independence','coordination','clarity'],
  expressive: ['cantabile','lyrical','expressive','phrasing','voicing','tone','singing','melodic','shaping','rubato'],
  playful:    ['dance','character','humour','playful','energetic','rhythmic drive','jazz','swing','wit','fun'],
  dramatic:   ['virtuosity','brilliance','velocity','octave','dramatic','bravura','power','showpiece','toccata'],
  lyrical:    ['lyrical','cantabile','singing','melodic','lullaby','nocturne','romance','beautiful','smooth','legato'],
  balanced:   [],
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function generate(level, character, eras, syllabus) {
  const lv = LEVELS.find(l => l.id === level);
  let pool = lv ? CORPUS.filter(p => lv.gradeKeys.includes(p._gradeKey)) : CORPUS;
  if (syllabus && syllabus !== 'all') {
    const filtered = pool.filter(p => (p._syllabus||'').startsWith(syllabus));
    if (filtered.length >= 5) pool = filtered;
  }
  if (!pool.length) pool = CORPUS;

  const scored = shuffle(pool).map(p => {
    let score = 0;
    const focus = (p.focus||[]).join(' ').toLowerCase();
    if (eras.length && eras.includes(p.era)) score += 30;
    const words = CHAR_WORDS[character]||[];
    if (words.length && words.find(w => focus.includes(w))) score += 25;
    score += Math.random() * 12;
    return { ...p, _score: score };
  });

  const sorted = [...scored].sort((a,b) => b._score - a._score);
  const result = [];
  const usedEras = new Set();
  const usedNats = new Set();
  for (const p of sorted) {
    if (result.length >= 5) break;
    if (result.some(r => r.c===p.c && r.t===p.t)) continue;
    if (!usedEras.has(p.era)) p._score += 15;
    if (!usedNats.has(p.nat)) p._score += 10;
    result.push(p);
    usedEras.add(p.era);
    usedNats.add(p.nat);
  }
  for (const p of sorted) {
    if (result.length >= 5) break;
    if (!result.some(r => r.c===p.c && r.t===p.t)) result.push(p);
  }
  return result;
}

/* ── YouTube modal ── */
const YT_API_KEY = "AIzaSyAUydn17tJCoduix-iv7f7bKfXweIrR6Mg";
function useVideoModal() {
  const [modal, setModal] = useState(null);
  const open = useCallback(async (composer, title) => {
    setModal({ loading:true, title });
    try {
      const q = encodeURIComponent(composer.split(',')[0].trim()+' '+title+' piano');
      const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q='+q+'&type=video&maxResults=1&key='+YT_API_KEY);
      const data = await res.json();
      const item = data.items && data.items[0];
      if (item) setModal({ videoId:item.id.videoId, title:item.snippet.title, loading:false });
      else setModal({ error:true, title, searchUrl:'https://www.youtube.com/results?search_query='+q, loading:false });
    } catch(e) {
      setModal({ error:true, title, searchUrl:'https://www.youtube.com/results?search_query='+encodeURIComponent(title+' piano'), loading:false });
    }
  },[]);
  const close = useCallback(() => setModal(null),[]);
  return { modal, open, close };
}

  return (

          }

      </div>

          {piece.c}
        </a>
        {piece.nat && <span style={{fontSize:11,color:'#b0a898'}}>· {piece.nat}</span>}
        {piece.key && piece.key !== 'Variable' && <span style={{fontSize:11,color:'#b0a898'}}>· {piece.key}</span>}
      </div>

      {/* Focus tags */}
      {piece.focus && piece.focus.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}}>
          {piece.focus.map((f,i) => (
            <span key={i} style={{background:'#f0ebe5',color:'#7a6e64',fontSize:10,padding:'2px 8px',borderRadius:6,border:'1px solid #e0d8d0'}}>{f}</span>
          ))}
        </div>
      )}

      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button onClick={()=>onWatch(piece.c,piece.t)}
          style={{padding:'7px 13px',borderRadius:8,background:'#d4956a',color:'#fff',border:'none',cursor:'pointer',fontSize:11,fontWeight:700}}>
          Listen
        </button>
        <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
          style={{padding:'7px 13px',borderRadius:8,background:'#f0ebe5',color:'#7a6e64',textDecoration:'none',fontSize:11,fontWeight:700}}>
          Sheet music
        </a>
        <a href={searchUrl}
          style={{padding:'7px 13px',borderRadius:8,background:'#f0ebe5',color:'#7a6e64',textDecoration:'none',fontSize:11,fontWeight:700}}>
          Find in Piano Butler
        </a>
      </div>
    </div>
  );
}

/* ── App ── */
const SYLLABUSES = [
  { id:'all',     label:'Any syllabus',  icon:'🌐', sub:'Mix from AMEB, ABRSM, Trinity' },
  { id:'AMEB',    label:'AMEB only',     icon:'🇦🇺', sub:'2026 Comprehensive + Leisure' },
  { id:'ABRSM',   label:'ABRSM only',    icon:'🇬🇧', sub:'2025 & 2026' },
  { id:'Trinity', label:'Trinity only',  icon:'🎓', sub:'Trinity College London 2023' },
];

// Steps: 0=syllabus, 1=level, 2=style+era, 3=results
function App() {
  const [step, setStep]           = useState(0);
  const [syllabus, setSyllabus]   = useState(null);
  const [level, setLevel]         = useState(null);
  const [character, setCharacter] = useState(null);
  const [eras, setEras]           = useState([]);
  const [results, setResults]     = useState(null);
  const { modal:videoModal, open:openVideo, close:closeVideo } = useVideoModal();

  function toggleEra(era) {
    setEras(prev => prev.includes(era) ? prev.filter(e=>e!==era) : [...prev,era]);
  }

  function goResults() {
    setResults(generate(level, character||'balanced', eras, syllabus));
    setStep(3);
  }

  function regenerate() {
    setResults(generate(level, character||'balanced', eras, syllabus));
  }

  function reset() {
    setStep(0); setSyllabus(null); setLevel(null); setCharacter(null); setEras([]); setResults(null);
  }

  const canGo1 = !!syllabus;
  const canGo2 = !!level;
  const canGo3 = !!character;

  return (
    <div style={{minHeight:'100vh',background:'#f5f0eb'}}>
      <VideoModal modal={videoModal} onClose={closeVideo} />

      {/* Header */}
      <div style={{background:'#fff',borderBottom:'1px solid #ede7df',padding:'16px 20px 18px'}}>
        <a href="index.html" style={{color:'#9a8e84',fontSize:12,textDecoration:'none',display:'block',marginBottom:6}}>
          Back to Piano Butler
        </a>
        <h1 style={{color:'#1a1410',fontSize:19,fontWeight:900,margin:'0 0 2px',letterSpacing:'-0.02em'}}>
          Piece Recommender
        </h1>
        <p style={{color:'#9a8e84',fontSize:12,margin:'0 0 12px'}}>
          {step===0 ? 'Step 1 of 3 — syllabus' : step===1 ? 'Step 2 of 3 — level' : step===2 ? 'Step 3 of 3 — style' : 'Your recommendations'}
        </p>
        {step < 3 && (
          <div className="progress-bar">
            <div className="progress-fill" style={{width:(step===0?'0%':step===1?'33%':'66%')}} />
          </div>
        )}
      </div>

      <div style={{maxWidth:580,margin:'0 auto',padding:'24px 16px 80px'}}>

        {/* STEP 0: Syllabus */}
        {step===0 && (
          <div className="fade-up">
            <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>Which syllabus?</h2>
            <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>Pick one or mix from all three.</p>
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              {SYLLABUSES.map(s => (
                <button key={s.id} onClick={()=>setSyllabus(s.id)}
                  className={'opt-btn'+(syllabus===s.id?' active':'')}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:20}}>{s.icon}</span>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:syllabus===s.id?'#d4956a':'#1a1410'}}>{s.label}</div>
                      <div style={{fontSize:12,color:'#9a8e84',marginTop:1}}>{s.sub}</div>
                    </div>
                  </div>
                </button>
              ))}
            </div>
            <div style={{marginTop:22}}>
              <button onClick={()=>setStep(1)} disabled={!canGo1}
                style={{width:'100%',padding:'13px',borderRadius:12,
                  background:canGo1?'#d4956a':'#e0d8d0',
                  color:canGo1?'#fff':'#9a8e84',
                  border:'none',cursor:canGo1?'pointer':'default',fontSize:14,fontWeight:800}}>
                Next
              </button>
            </div>
          </div>
        )}

        {/* STEP 1: Level */}
        {step===1 && (
          <div className="fade-up">
            <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>What level is this student?</h2>
            <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>Approximate is fine.</p>
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              {LEVELS.map(lv => (
                <button key={lv.id} onClick={()=>setLevel(lv.id)}
                  className={'opt-btn'+(level===lv.id?' active':'')}>
                  <div style={{fontSize:14,fontWeight:700,color:level===lv.id?'#d4956a':'#1a1410'}}>{lv.label}</div>
                  <div style={{fontSize:12,color:'#9a8e84',marginTop:2}}>{lv.sub}</div>
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:10,marginTop:22}}>
              <button onClick={()=>setStep(0)}
                style={{padding:'12px 18px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Back
              </button>
              <button onClick={()=>setStep(2)} disabled={!canGo2}
                style={{flex:1,padding:'13px',borderRadius:12,
                  background:canGo2?'#d4956a':'#e0d8d0',
                  color:canGo2?'#fff':'#9a8e84',
                  border:'none',cursor:canGo2?'pointer':'default',fontSize:14,fontWeight:800}}>
                Next
              </button>
            </div>
          </div>
        )}

        {/* STEP 2: Character + Era */}
        {step===2 && (
          <div className="fade-up">
            <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',marginBottom:4}}>What style suits them?</h2>
            <p style={{fontSize:13,color:'#9a8e84',marginBottom:16}}>Pick the personality that fits best.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:22}}>
              {CHARACTERS.map(ch => (
                <button key={ch.id} onClick={()=>setCharacter(ch.id)}
                  className={'opt-btn'+(character===ch.id?' active':'')}
                  style={{padding:'12px 14px'}}>
                  <div style={{fontSize:18,marginBottom:4}}>{ch.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,color:character===ch.id?'#d4956a':'#1a1410'}}>{ch.label}</div>
                  <div style={{fontSize:11,color:'#9a8e84',marginTop:2,lineHeight:1.4}}>{ch.sub}</div>
                </button>
              ))}
            </div>

            <div style={{borderTop:'1px solid #e8e2dc',paddingTop:18,marginBottom:20}}>
              <p style={{fontSize:13,fontWeight:700,color:'#1a1410',marginBottom:10}}>
                Era preference? <span style={{fontWeight:400,color:'#9a8e84'}}>(optional)</span>
              </p>
              <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
                {ERAS.map(era => (
                  <button key={era.id} onClick={()=>toggleEra(era.id)}
                    className={'chip'+(eras.includes(era.id)?' active':'')}>
                    {era.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setStep(1)}
                style={{padding:'12px 18px',borderRadius:12,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Back
              </button>
              <button onClick={goResults} disabled={!canGo3}
                style={{flex:1,padding:'13px',borderRadius:12,
                  background:canGo3?'#d4956a':'#e0d8d0',
                  color:canGo3?'#fff':'#9a8e84',
                  border:'none',cursor:canGo3?'pointer':'default',fontSize:14,fontWeight:800}}>
                Find pieces
              </button>
            </div>
          </div>
        )}

        {/* STEP 3: Results */}
        {step===3 && results && (
          <div className="fade-up">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
              <div>
                <h2 style={{fontSize:16,fontWeight:800,color:'#1a1410',margin:'0 0 3px'}}>
                  {results.length} pieces for you
                </h2>
                <p style={{fontSize:12,color:'#9a8e84',margin:0}}>
                  {(SYLLABUSES.find(s=>s.id===syllabus)||{}).label||''}
                  {LEVELS.find(l=>l.id===level) ? ' · '+(LEVELS.find(l=>l.id===level).label) : ''}
                  {character && character!=='balanced' ? ' · '+(CHARACTERS.find(c=>c.id===character)||{}).label : ''}
                  {eras.length ? ' · '+eras.join(', ') : ''}
                </p>
              </div>
              <button onClick={regenerate}
                style={{padding:'7px 14px',borderRadius:9,background:'#f0ebe5',color:'#7a6e64',border:'1.5px solid #e0d8d0',cursor:'pointer',fontSize:12,fontWeight:700}}>
                Shuffle
              </button>
            </div>

            {results.map((piece,i) => (
              <ResultCard key={i} piece={piece} onWatch={openVideo} idx={i} />
            ))}

            <div style={{marginTop:18,display:'flex',gap:10,flexWrap:'wrap'}}>
              <button onClick={reset}
                style={{padding:'10px 18px',borderRadius:10,background:'#f0ebe5',color:'#7a6e64',border:'none',cursor:'pointer',fontSize:13,fontWeight:700}}>
                Start over
              </button>
              <a href="index.html"
                style={{padding:'10px 18px',borderRadius:10,background:'transparent',color:'#d4956a',border:'1.5px solid #d4956a',textDecoration:'none',fontSize:13,fontWeight:700}}>
                Search all 4,500 pieces
              </a>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error:null }; }
  static getDerivedStateFromError(err) { return { error:err }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,color:'#ef4444',fontFamily:'monospace',fontSize:13}}>
        <b>Error:</b> {this.state.error.message}<br/>
        <small style={{color:'#9a8e84'}}>Please refresh the page.</small>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

document.addEventListener('DOMContentLoaded', function() {
  function tryCompile() {
    if (typeof Babel === 'undefined') { setTimeout(tryCompile, 50); return; }
    try {
      var src = document.getElementById('app-jsx').textContent;
      var compiled = Babel.transform(src, { presets: ['react'] }).code;
      var s = document.createElement('script');
      s.textContent = compiled;
      document.body.appendChild(s);
    } catch(e) {
      document.getElementById('root').innerHTML = '<div style="padding:40px;color:#ef4444;font-family:monospace;font-size:13px"><b>Compile error:</b> ' + e.message + '</div>';
    }
  }
  tryCompile();
});
</script>
