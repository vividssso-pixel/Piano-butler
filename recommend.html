/* ─── Engine ─── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function scorepiece(p, prefs) {
  let score = 0;
  const focus = (p.focus||[]).join(' ').toLowerCase();
  const nat = (p.nat||'').toLowerCase();
  const era = p.era||'';

  // Era preference
  if (prefs.eras.length > 0 && prefs.eras.includes(era)) score += 30;

  // Character alignment
  const CHAR_WORDS = {
    technical:  ['finger','scale','arpeggio','technical','velocity','dexterity','agility','precision','hand independence','coordination','clarity'],
    expressive: ['cantabile','lyrical','expressive','phrasing','voicing','tone','singing','melodic','shaping','rubato'],
    playful:    ['dance','character','humour','playful','energetic','rhythmic drive','jazz','swing','wit','fun'],
    virtuosic:  ['virtuosity','brilliance','velocity','octave','dramatic','bravura','power','showpiece','toccata'],
    lyrical:    ['lyrical','cantabile','singing','melodic','lullaby','nocturne','romance','beautiful','smooth','legato'],
    balanced:   [],
  };
  const words = CHAR_WORDS[prefs.character]||[];
  if (words.length && words.find(w => focus.includes(w))) score += 25;

  // Random variety
  score += Math.random() * 12;

  return { ...p, _score:score };
}

function pickDiverse(scored, count) {
  const result = [];
  const usedEras = new Set();
  const usedNats = new Set();
  const sorted = [...scored].sort((a,b) => b._score - a._score);

  for (const p of sorted) {
    if (result.length >= count) break;
    if (result.some(r => r.c===p.c && r.t===p.t)) continue;
    const newEra = !usedEras.has(p.era);
    const newNat = !usedNats.has(p.nat);
    if (newEra) p._score += 15;
    if (newNat) p._score += 10;
    result.push(p);
    usedEras.add(p.era);
    usedNats.add(p.nat);
  }
  // Fill if not enough
  for (const p of sorted) {
    if (result.length >= count) break;
    if (!result.some(r => r.c===p.c && r.t===p.t)) result.push(p);
  }
  return result;
}

function generate(prefs) {
  let pool = CORPUS;

  // Filter by level → grade keys
  const gradeKeys = LEVEL_GRADE_KEYS[prefs.level]||[];
  pool = pool.filter(p => gradeKeys.includes(p._gradeKey));

  // Optional: filter by syllabus + exact grade
  if (prefs.syllabus && prefs.grade) {
    const sylPool = pool.filter(p =>
      (p._syllabus === prefs.syllabus || p._syllabus === prefs.syllabus + ' Diploma') &&
      p._gradeKey === prefs.grade
    );
    if (sylPool.length >= 4) pool = sylPool;
  } else if (prefs.syllabus) {
    const sylPool = pool.filter(p =>
      p._syllabus === prefs.syllabus || p._syllabus === prefs.syllabus + ' Diploma'
    );
    if (sylPool.length >= 4) pool = sylPool;
  }

  if (!pool.length) pool = CORPUS; // fallback

  const count = prefs.setSize || 4;
  const scored = shuffle(pool).map(p => scorepiece(p, prefs));
  return pickDiverse(scored, count);
}

const YT_API_KEY = "AIzaSyAUydn17tJCoduix-iv7f7bKfXweIrR6Mg";
function useVideoModal() {
  const [modal, setModal] = useState(null);
  const open = useCallback(async (composer, title) => {
    setModal({ loading:true, title });
    try {
      const q = encodeURIComponent(composer.split(',')[0].trim()+' '+title+' piano');
      const res = await fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&q='+q+'&type=video&maxResults=1&key='+YT_API_KEY);
      const data = await res.json();
      const item = data.items && data.items[0];
      if (item) setModal({ videoId:item.id.videoId, title:item.snippet.title, loading:false });
      else { setModal(null); window.open('https://www.youtube.com/results?search_query='+q,'_blank'); }
    } catch(e) { setModal(null); }
  },[]);
  const close = useCallback(() => setModal(null),[]);
  return { modal, open, close };
}

        )}
        {piece.l && (
          <span style={{background:'#2a2a2a',color:'#888880',fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:8,border:'1px solid #333'}}>
            List {piece.l}
          </span>
        )}
      </div>

      {/* Title + composer */}
      <div style={{fontSize:15,fontWeight:800,color:'#e8e3dc',marginBottom:3,lineHeight:1.3}}>{piece.t}</div>
      <a href={wikiUrl} target="_blank" rel="noopener noreferrer"
        style={{fontSize:12,color:'#d4956a',fontWeight:600,textDecoration:'none',display:'inline-block',marginBottom:10}}>
        {piece.c}
      </a>

      {/* Focus tags */}
      {piece.focus && piece.focus.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}}>
          {piece.focus.map((f,i) => (
            <span key={i} style={{background:'#2e2e2e',color:'#888880',fontSize:10,padding:'2px 8px',borderRadius:6,border:'1px solid #333'}}>
              {f}
            </span>
          ))}
        </div>
      )}

      {/* Action buttons */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button onClick={()=>onWatch(piece.c,piece.t)}
          style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,background:'#d4956a',color:'#1a1a1a',border:'none',cursor:'pointer',fontSize:11,fontWeight:700}}>
          ▶ Listen
        </button>
        <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
          style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,background:'#2e2e2e',color:'#aaa49e',textDecoration:'none',fontSize:11,fontWeight:700}}>
          ♩ Score
        </a>
      </div>
    </div>
  );
}

/* ─── App ─── */
// Steps: 0=character, 1=level, 2=era, 3=exam(optional), 4=results
function App() {
  const [step, setStep]           = useState(0);
  const [character, setCharacter] = useState(null);
  const [level, setLevel]         = useState(null);
  const [eras, setEras]           = useState([]);
  // Optional exam fields
  const [wantsExam, setWantsExam] = useState(null); // true/false/null
  const [syllabus, setSyllabus]   = useState(null);
  const [grade, setGrade]         = useState(null);
  const [setSize, setSetSize]     = useState(4);
  const [results, setResults]     = useState(null);
  const { modal:videoModal, open:openVideo, close:closeVideo } = useVideoModal();

  function toggleEra(era) {
    setEras(prev => prev.includes(era) ? prev.filter(e=>e!==era) : [...prev,era]);
  }

  function canAdvance() {
    if (step===0) return !!character;
    if (step===1) return !!level;
    if (step===2) return true; // era is optional
    if (step===3) return wantsExam === false || (wantsExam && !!syllabus);
    return false;
  }

  function next() {
    if (step < 3) { setStep(s=>s+1); return; }
    // Generate results
    const prefs = { character, level, eras, syllabus: wantsExam ? syllabus : null, grade: wantsExam ? grade : null, setSize };
    setResults(generate(prefs));
    setStep(4);
  }

  function back() {
    if (step === 0) return;
    setStep(s=>s-1);
  }

  function reset() {
    setStep(0); setCharacter(null); setLevel(null); setEras([]);
    setWantsExam(null); setSyllabus(null); setGrade(null); setSetSize(4); setResults(null);
  }

  function regenerate() {
    const prefs = { character, level, eras, syllabus: wantsExam ? syllabus : null, grade: wantsExam ? grade : null, setSize };
    setResults(generate(prefs));
  }

  // Progress dots (4 steps, 0-3)
  const TOTAL_STEPS = 4;
  const dots = Array.from({length:TOTAL_STEPS},(_,i)=>i);

  return (
    <div style={{minHeight:'100vh',background:'#1a1a1a'}}>
      <VideoModal modal={videoModal} onClose={closeVideo} />

      {/* Header */}
      <div style={{background:'#1e1e1e',borderBottom:'1px solid #333',padding:'18px 20px 22px'}}>
        <a href="index.html" style={{color:'#888880',fontSize:12,textDecoration:'none',display:'block',marginBottom:8}}>← Piano Butler</a>
        <h1 style={{color:'#e8e3dc',fontSize:20,fontWeight:900,margin:'0 0 3px',letterSpacing:'-0.02em'}}>🎹 Repertoire Recommender</h1>
        <p style={{color:'#888880',fontSize:12,margin:'0 0 14px'}}>Find the right pieces for your student</p>
        {step < 4 && (
          <div className="progress-bar">
            <div className="progress-fill" style={{width:Math.round((step/TOTAL_STEPS)*100)+'%'}} />
          </div>
        )}
      </div>

      <div style={{maxWidth:620,margin:'0 auto',padding:'24px 16px 96px'}}>

        {/* STEP 0: Character */}
        {step===0 && (
          <div className="fade-up">
            <h2 style={{fontSize:17,fontWeight:800,color:'#e8e3dc',marginBottom:5}}>What's this student like?</h2>
            <p style={{fontSize:13,color:'#888880',marginBottom:18}}>Choose the style that best fits their personality.</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {CHARACTERS.map(ch => (
                <button key={ch.id} onClick={()=>setCharacter(ch.id)}
                  className="option-btn"
                  style={{borderColor:character===ch.id?'#d4956a':'#333',background:character===ch.id?'#2d1e10':'#242424'}}>
                  <div style={{fontSize:14,fontWeight:700,color:character===ch.id?'#d4956a':'#e8e3dc'}}>
                    {ch.icon} {ch.label}
                  </div>
                  <div style={{fontSize:12,color:'#888880',marginTop:2}}>{ch.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 1: Level */}
        {step===1 && (
          <div className="fade-up">
            <h2 style={{fontSize:17,fontWeight:800,color:'#e8e3dc',marginBottom:5}}>What level are they at?</h2>
            <p style={{fontSize:13,color:'#888880',marginBottom:18}}>Approximate level — doesn't need to be exact.</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {LEVELS.map(lv => (
                <button key={lv.id} onClick={()=>setLevel(lv.id)}
                  className="option-btn"
                  style={{borderColor:level===lv.id?'#d4956a':'#333',background:level===lv.id?'#2d1e10':'#242424'}}>
                  <div style={{fontSize:14,fontWeight:700,color:level===lv.id?'#d4956a':'#e8e3dc'}}>{lv.label}</div>
                  <div style={{fontSize:12,color:'#888880',marginTop:2}}>{lv.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* STEP 2: Era */}
        {step===2 && (
          <div className="fade-up">
            <h2 style={{fontSize:17,fontWeight:800,color:'#e8e3dc',marginBottom:5}}>Any era preferences?</h2>
            <p style={{fontSize:13,color:'#888880',marginBottom:18}}>
              Skip this for a balanced mix, or pick what you'd like to include.
            </p>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
              {ERAS.map(era => (
                <button key={era.id} onClick={()=>toggleEra(era.id)}
                  className="chip"
                  style={eras.includes(era.id)
                    ? {background:era.color,borderColor:era.color,color:'#1a1a1a',fontWeight:700}
                    : {borderColor:'#444',color:'#aaa49e'}}>
                  {era.label}
                </button>
              ))}
            </div>
            {eras.length > 0 && (
              <p style={{fontSize:12,color:'#888880'}}>Selected: <strong style={{color:'#e8e3dc'}}>{eras.join(', ')}</strong></p>
            )}

            {/* Set size */}
            <div style={{marginTop:24,paddingTop:20,borderTop:'1px solid #333'}}>
              <p style={{fontSize:13,fontWeight:700,color:'#e8e3dc',marginBottom:12}}>How many pieces?</p>
              <div style={{display:'flex',gap:8}}>
                {[4,6].map(n => (
                  <button key={n} onClick={()=>setSetSize(n)}
                    className="chip"
                    style={setSize===n?{background:'#d4956a',borderColor:'#d4956a',color:'#1a1a1a',fontWeight:700}:{}}>
                    {n} pieces
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* STEP 3: Exam (optional) */}
        {step===3 && (
          <div className="fade-up">
            <h2 style={{fontSize:17,fontWeight:800,color:'#e8e3dc',marginBottom:5}}>Preparing for an exam?</h2>
            <p style={{fontSize:13,color:'#888880',marginBottom:18}}>Optional — skip this if you just want general recommendations.</p>

            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
              <button onClick={()=>setWantsExam(false)}
                className="option-btn"
                style={{borderColor:wantsExam===false?'#d4956a':'#333',background:wantsExam===false?'#2d1e10':'#242424'}}>
                <div style={{fontSize:14,fontWeight:700,color:wantsExam===false?'#d4956a':'#e8e3dc'}}>
                  No exam — just recommend great pieces
                </div>
                <div style={{fontSize:12,color:'#888880',marginTop:2}}>Search across all 4,500 pieces at the right level</div>
              </button>
              <button onClick={()=>setWantsExam(true)}
                className="option-btn"
                style={{borderColor:wantsExam===true?'#d4956a':'#333',background:wantsExam===true?'#2d1e10':'#242424'}}>
                <div style={{fontSize:14,fontWeight:700,color:wantsExam===true?'#d4956a':'#e8e3dc'}}>
                  Yes — filter by exam syllabus
                </div>
                <div style={{fontSize:12,color:'#888880',marginTop:2}}>Narrow results to a specific board and grade</div>
              </button>
            </div>

            {/* Syllabus + grade pickers — only if exam chosen */}
            {wantsExam && (
              <div className="fade-up">
                <p style={{fontSize:13,fontWeight:700,color:'#e8e3dc',marginBottom:10}}>Which syllabus?</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
                  {SYLLABUSES.map(s => (
                    <button key={s.id} onClick={()=>{setSyllabus(s.id);setGrade(null);}}
                      className="chip"
                      style={syllabus===s.id?{background:'#d4956a',borderColor:'#d4956a',color:'#1a1a1a',fontWeight:700}:{}}>
                      {s.label}
                    </button>
                  ))}
                </div>

                {syllabus && (
                  <div className="fade-up">
                    <p style={{fontSize:13,fontWeight:700,color:'#e8e3dc',marginBottom:10}}>Which grade? <span style={{fontWeight:400,color:'#888880'}}>(optional)</span></p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                      {(GRADE_OPTIONS[syllabus]||[]).map(g => (
                        <button key={g} onClick={()=>setGrade(grade===g?null:g)}
                          className="chip"
                          style={grade===g?{background:'#d4956a',borderColor:'#d4956a',color:'#1a1a1a',fontWeight:700}:{}}>
                          {GRADE_LABELS[g]||g}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* STEP 4: Results */}
        {step===4 && results && (
          <div className="fade-up">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:8}}>
              <div>
                <h2 style={{fontSize:17,fontWeight:800,color:'#e8e3dc',margin:'0 0 4px'}}>Your recommendations</h2>
                <p style={{fontSize:12,color:'#888880',margin:0}}>
                  {results.length} pieces · {CHARACTERS.find(c=>c.id===character) ? CHARACTERS.find(c=>c.id===character).label : ''} · {LEVELS.find(l=>l.id===level) ? LEVELS.find(l=>l.id===level).label.replace(/^\S+\s/,'') : ''}
                  {eras.length > 0 ? ' · '+eras.join(', ') : ''}
                </p>
              </div>
              <button onClick={regenerate}
                style={{padding:'7px 14px',borderRadius:9,background:'#d4956a',color:'#1a1a1a',border:'none',cursor:'pointer',fontSize:12,fontWeight:700}}>
                🔀 Regenerate
              </button>
            </div>

            {results.map((piece,i) => (
              <ResultCard key={i} piece={piece} onWatch={openVideo} />
            ))}

            <div style={{marginTop:20,display:'flex',gap:10,flexWrap:'wrap'}}>
              <button onClick={reset}
                style={{padding:'10px 18px',borderRadius:10,background:'#2e2e2e',color:'#aaa49e',border:'none',cursor:'pointer',fontSize:13,fontWeight:700}}>
                ← Start over
              </button>
              <a href="index.html"
                style={{padding:'10px 18px',borderRadius:10,background:'transparent',color:'#d4956a',border:'1.5px solid #d4956a',textDecoration:'none',fontSize:13,fontWeight:700}}>
                Search all pieces ↗
              </a>
            </div>
          </div>
        )}

        {/* Nav buttons */}
        {step < 4 && (
          <div style={{marginTop:28}}>
            {/* Step dots */}
            <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:20}}>
              {dots.map(i => (
                <span key={i} className={'step-dot'+(i===step?' active':i<step?' done':'')} />
              ))}
            </div>

            <div style={{display:'flex',gap:10}}>
              {step > 0 && (
                <button onClick={back}
                  style={{flex:'0 0 auto',padding:'13px 20px',borderRadius:12,background:'#2e2e2e',color:'#aaa49e',border:'1.5px solid #333',cursor:'pointer',fontSize:13,fontWeight:700}}>
                  ← Back
                </button>
              )}
              <button onClick={next} disabled={!canAdvance()}
                style={{flex:1,padding:'13px 20px',borderRadius:12,
                  background:canAdvance()?'#d4956a':'#2e2e2e',
                  color:canAdvance()?'#1a1a1a':'#555550',
                  border:'none',cursor:canAdvance()?'pointer':'default',fontSize:14,fontWeight:800,transition:'all 0.15s'}}>
                {step===3 ? '✨ Find pieces' : 'Continue →'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error:null }; }
  static getDerivedStateFromError(err) { return { error:err }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,color:'#ef4444',fontFamily:'monospace',fontSize:13}}>
        <b>Error:</b> {this.state.error.message}<br/>
        <small style={{color:'#888880'}}>Please refresh the page.</small>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
