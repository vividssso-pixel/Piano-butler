<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Metronome</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #000000;
      --mid: #888888;
      --line: #e0e0e0;
      --beat1: #000000;
      --beat-rest: #c8c8c8;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: stretch;
      padding: 32px 40px env(safe-area-inset-bottom, 32px);
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .time-sig-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* preset pills */
    .preset-pills {
      display: flex;
      gap: 6px;
    }

    .pill {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      color: var(--mid);
      background: transparent;
      transition: all 0.15s;
    }

    .pill:hover { border-color: #aaa; color: #444; }

    .pill.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    /* custom input */
    .custom-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px 4px 14px;
      transition: border-color 0.15s;
    }
    .custom-wrap:focus-within { border-color: var(--fg); }

    .custom-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.08em;
    }

    .custom-input {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      width: 28px;
      border: none;
      outline: none;
      background: transparent;
      color: var(--fg);
      text-align: center;
    }

    /* ── CENTER: BEAT NUMBER ── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .beat-number {
      font-family: 'DM Mono', monospace;
      font-size: clamp(180px, 38vw, 360px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.06em;
      color: var(--beat1);
      transition: color 60ms linear, opacity 60ms linear;
      will-change: color;
    }

    .beat-number.dim { color: var(--beat-rest); }

    /* dot strip */
    .dot-strip {
      display: flex;
      gap: 10px;
      align-items: center;
      height: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--line);
      transition: background 60ms linear, transform 60ms linear;
    }

    .dot.active {
      background: var(--fg);
      transform: scale(1.35);
    }

    .dot.beat1 { width: 8px; height: 8px; }

    /* ── FOOTER CONTROLS ── */
    footer {
      border-top: 1px solid var(--line);
      padding-top: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    /* BPM left block */
    .bpm-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 180px;
    }

    .bpm-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .bpm-value {
      font-family: 'DM Mono', monospace;
      font-size: 48px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .bpm-unit {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--mid);
      text-transform: uppercase;
    }

    .tempo-name {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .adj-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: transparent;
      color: var(--fg);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, border-color 0.1s;
      flex-shrink: 0;
      line-height: 1;
    }
    .adj-btn:hover { border-color: var(--fg); }
    .adj-btn:active { background: var(--fg); color: var(--bg); }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 1px;
      background: var(--fg);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--fg);
      cursor: pointer;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 1px var(--fg);
    }

    /* center: tap + play */
    .center-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--fg);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .play-btn:hover { background: var(--fg); }
    .play-btn:hover svg { fill: var(--bg); stroke: var(--bg); }
    .play-btn:active { opacity: 0.7; }

    .play-btn svg {
      fill: var(--fg);
      width: 20px;
      height: 20px;
    }

    .tap-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.1s;
      padding: 4px 0;
    }
    .tap-btn:hover { color: var(--fg); }

    /* right: shortcuts hint */
    .hints {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      min-width: 120px;
    }

    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--line);
      letter-spacing: 0.08em;
    }

    /* ── PLAYING state ── */
    body.playing .play-btn {
      background: var(--fg);
    }
    body.playing .play-btn svg {
      fill: var(--bg);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <span class="wordmark">Metronome</span>

    <div class="time-sig-area">
      <div class="preset-pills" id="presetPills">
        <button class="pill" data-beats="2">2/4</button>
        <button class="pill active" data-beats="3">3/4</button>
        <button class="pill" data-beats="4">4/4</button>
        <button class="pill" data-beats="6">6/8</button>
      </div>
      <div class="custom-wrap" title="Enter any number of beats">
        <span class="custom-label">Custom</span>
        <input
          class="custom-input"
          id="customInput"
          type="number"
          min="1"
          max="16"
          placeholder="—"
          inputmode="numeric"
        />
      </div>
    </div>
  </header>

  <!-- STAGE -->
  <div class="stage">
    <div class="beat-number" id="beatNum">1</div>
    <div class="dot-strip" id="dotStrip"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <!-- BPM -->
    <div class="bpm-block">
      <div class="bpm-row">
        <span class="bpm-value" id="bpmVal">80</span>
        <span class="bpm-unit">bpm</span>
      </div>
      <span class="tempo-name" id="tempoName">Andante</span>
    </div>

    <!-- Slider -->
    <div class="slider-row">
      <button class="adj-btn" id="btnMinus">−</button>
      <input type="range" id="slider" min="30" max="240" value="80" />
      <button class="adj-btn" id="btnPlus">+</button>
    </div>

    <!-- Play / Tap -->
    <div class="center-controls">
      <button class="play-btn" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <button class="tap-btn" id="tapBtn">tap tempo</button>
    </div>

    <!-- Hints -->
    <div class="hints">
      <span class="hint">space — play/stop</span>
      <span class="hint">↑ ↓ — bpm</span>
      <span class="hint">t — tap tempo</span>
    </div>
  </footer>

<script>
  // ── State ──
  let beats        = 3;
  let bpm          = 80;
  let playing      = false;
  let currentBeat  = 0;
  let schedulerTimer = null;
  let nextBeatTime   = 0;
  let audioCtx       = null;
  let tapTimes       = [];
  let adjTimer       = null;

  // ── DOM ──
  const beatNumEl  = document.getElementById('beatNum');
  const dotStrip   = document.getElementById('dotStrip');
  const bpmVal     = document.getElementById('bpmVal');
  const tempoName  = document.getElementById('tempoName');
  const slider     = document.getElementById('slider');
  const playBtn    = document.getElementById('playBtn');
  const playIcon   = document.getElementById('playIcon');
  const tapBtn     = document.getElementById('tapBtn');
  const presetPills = document.getElementById('presetPills');
  const customInput = document.getElementById('customInput');

  // ── Tempo names ──
  const TEMPOS = [
    [0,   'Grave'],
    [40,  'Largo'],
    [60,  'Larghetto'],
    [66,  'Adagio'],
    [76,  'Andante'],
    [108, 'Moderato'],
    [120, 'Allegro'],
    [156, 'Vivace'],
    [176, 'Presto'],
    [200, 'Prestissimo'],
  ];

  function getTempoName(b) {
    let name = 'Grave';
    for (const [threshold, label] of TEMPOS) {
      if (b >= threshold) name = label;
    }
    return name;
  }

  // ── Build dots ──
  function buildDots() {
    dotStrip.innerHTML = '';
    for (let i = 0; i < beats; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' beat1' : '');
      d.id = 'dot' + i;
      dotStrip.appendChild(d);
    }
    updateDots(0);
  }

  function updateDots(b) {
    for (let i = 0; i < beats; i++) {
      const d = document.getElementById('dot' + i);
      if (d) d.classList.toggle('active', i === b);
    }
  }

  // ── BPM UI ──
  function updateBpmUI() {
    bpmVal.textContent  = bpm;
    slider.value        = bpm;
    tempoName.textContent = getTempoName(bpm);
  }

  // ── Set beats ──
  function setBeats(n) {
    beats = Math.max(1, Math.min(16, n));
    buildDots();
    // deactivate all presets
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', parseInt(p.dataset.beats) === beats);
    });
    if (playing) restart();
  }

  // ── Audio ──
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function scheduleClick(time, accent) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (accent) {
      osc.frequency.value = 1200;
      gain.gain.setValueAtTime(0.85, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.065);
      osc.start(time); osc.stop(time + 0.065);
    } else {
      osc.frequency.value = 680;
      gain.gain.setValueAtTime(0.4, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
      osc.start(time); osc.stop(time + 0.04);
    }
  }

  // ── Scheduler ──
  const LOOKAHEAD   = 0.1;
  const SCHEDULE_MS = 25;

  function scheduler() {
    while (nextBeatTime < audioCtx.currentTime + LOOKAHEAD) {
      const beat = currentBeat;
      const t    = nextBeatTime;
      scheduleClick(t, beat === 0);

      const delay = Math.max(0, (t - audioCtx.currentTime) * 1000);
      setTimeout(() => showBeat(beat), delay);

      currentBeat  = (currentBeat + 1) % beats;
      nextBeatTime += 60 / bpm;
    }
  }

  function showBeat(b) {
    beatNumEl.textContent = b + 1;
    // dim non-beat-1
    beatNumEl.classList.toggle('dim', b !== 0);
    // flash back to beat1 style immediately
    if (b === 0) {
      beatNumEl.classList.remove('dim');
    }
    updateDots(b);
  }

  // ── Play / Stop ──
  function start() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentBeat  = 0;
    nextBeatTime = audioCtx.currentTime + 0.05;
    schedulerTimer = setInterval(scheduler, SCHEDULE_MS);
    playing = true;
    document.body.classList.add('playing');
    playIcon.innerHTML = '<rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/>';
  }

  function stop() {
    clearInterval(schedulerTimer);
    playing = false;
    document.body.classList.remove('playing');
    playIcon.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
    beatNumEl.textContent = '1';
    beatNumEl.classList.remove('dim');
    buildDots();
  }

  function restart() { stop(); start(); }

  // ── Events ──

  playBtn.addEventListener('click', () => playing ? stop() : start());

  // Presets
  presetPills.addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    customInput.value = '';
    setBeats(parseInt(btn.dataset.beats));
  });

  // Custom input
  customInput.addEventListener('change', () => {
    const v = parseInt(customInput.value);
    if (v >= 1 && v <= 16) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      setBeats(v);
    } else {
      customInput.value = '';
    }
  });

  customInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') customInput.blur();
    e.stopPropagation(); // don't trigger space/arrows on body
  });

  // Slider
  slider.addEventListener('input', () => {
    bpm = parseInt(slider.value);
    updateBpmUI();
    if (playing) restart();
  });

  // +/- buttons with hold
  function startAdj(dir) {
    bpm = Math.max(30, Math.min(240, bpm + dir));
    updateBpmUI();
    if (playing) restart();
    adjTimer = setInterval(() => {
      bpm = Math.max(30, Math.min(240, bpm + dir));
      updateBpmUI();
      if (playing) restart();
    }, 90);
  }
  function stopAdj() { clearInterval(adjTimer); }

  document.getElementById('btnMinus').addEventListener('mousedown', () => startAdj(-1));
  document.getElementById('btnPlus').addEventListener('mousedown',  () => startAdj(+1));
  document.getElementById('btnMinus').addEventListener('touchstart', e => { e.preventDefault(); startAdj(-1); });
  document.getElementById('btnPlus').addEventListener('touchstart',  e => { e.preventDefault(); startAdj(+1); });
  document.addEventListener('mouseup',  stopAdj);
  document.addEventListener('touchend', stopAdj);

  // Tap tempo
  tapBtn.addEventListener('click', () => {
    const now = Date.now();
    if (tapTimes.length && now - tapTimes[tapTimes.length - 1] > 3000) tapTimes = [];
    tapTimes.push(now);
    if (tapTimes.length > 8) tapTimes.shift();
    const recent = tapTimes.slice(-4);
    if (recent.length >= 2) {
      const intervals = recent.slice(1).map((t, i) => t - recent[i]);
      const avg = intervals.reduce((a, b) => a + b) / intervals.length;
      bpm = Math.max(30, Math.min(240, Math.round(60000 / avg)));
      updateBpmUI();
      if (playing) restart();
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (document.activeElement === customInput) return;
    if (e.code === 'Space')     { e.preventDefault(); playing ? stop() : start(); }
    if (e.code === 'ArrowUp')   { e.preventDefault(); bpm = Math.min(240, bpm+1); updateBpmUI(); if (playing) restart(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); bpm = Math.max(30,  bpm-1); updateBpmUI(); if (playing) restart(); }
    if (e.key === 't' || e.key === 'T') tapBtn.click();
  });

  // ── Init ──
  buildDots();
  updateBpmUI();
</script>
</body>
</html>
