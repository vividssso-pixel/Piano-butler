<script type="text/babel">
const { useState, useMemo, useCallback } = React;

/* ─── Data ─────────────────────────────────────────────────────────────── */
// Note: data files use `const` declarations — access directly by name, NOT via window.X
const GRADE_META = [
    { key: "Prelim", label: "Preliminary", gradeNum: null, link: "Prelim/piano-repertoire_prelim.html",
      comp: typeof DATA_PRELIM !== "undefined" ? DATA_PRELIM : null,
      leisure: typeof DATA_PRELIM_LEISURE !== "undefined" ? DATA_PRELIM_LEISURE : null,
      compCount: 93,  leisureCount: 71,
      color: "indigo", accent: "#4f46e5", bg: "#eef2ff" },
    { key: "G1",    label: "Grade 1",     gradeNum: 1,    link: "G1/piano-repertoire_g1.html",
      comp: typeof DATA_G1 !== "undefined" ? DATA_G1 : null,
      leisure: typeof DATA_G1_LEISURE !== "undefined" ? DATA_G1_LEISURE : null,
      compCount: 143, leisureCount: 70,
      color: "violet", accent: "#7c3aed", bg: "#f5f3ff" },
    { key: "G2",    label: "Grade 2",     gradeNum: 2,    link: "G2/piano-repertoire_g2.html",
      comp: typeof DATA_G2 !== "undefined" ? DATA_G2 : null,
      leisure: typeof DATA_G2_LEISURE !== "undefined" ? DATA_G2_LEISURE : null,
      compCount: 184, leisureCount: 64,
      color: "blue",   accent: "#2563eb", bg: "#eff6ff" },
    { key: "G3",    label: "Grade 3",     gradeNum: 3,    link: "G3/piano-repertoire_g3.html",
      comp: typeof DATA_G3 !== "undefined" ? DATA_G3 : null,
      leisure: typeof DATA_G3_LEISURE !== "undefined" ? DATA_G3_LEISURE : null,
      compCount: 196, leisureCount: 68,
      color: "cyan",   accent: "#0891b2", bg: "#ecfeff" },
    { key: "G4",    label: "Grade 4",     gradeNum: 4,    link: "G4/piano-repertoire_g4.html",
      comp: typeof DATA_G4 !== "undefined" ? DATA_G4 : null,
      leisure: typeof DATA_G4_LEISURE !== "undefined" ? DATA_G4_LEISURE : null,
      compCount: 156, leisureCount: 80,
      color: "teal",   accent: "#0d9488", bg: "#f0fdfa" },
    { key: "G5",    label: "Grade 5",     gradeNum: 5,    link: "G5/piano-repertoire_g5.html",
      comp: typeof DATA_G5_1 !== "undefined" ? DATA_G5_1 : null,
      leisure: typeof DATA_G5_LEISURE !== "undefined" ? DATA_G5_LEISURE : null,
      compCount: 168, leisureCount: 78,
      color: "green",  accent: "#16a34a", bg: "#f0fdf4" },
    { key: "G6",    label: "Grade 6",     gradeNum: 6,    link: "G6/piano-repertoire_g6.html",
      comp: typeof DATA_G6 !== "undefined" ? DATA_G6 : null,
      leisure: typeof DATA_G6_LEISURE !== "undefined" ? DATA_G6_LEISURE : null,
      compCount: 160, leisureCount: 88,
      color: "lime",   accent: "#65a30d", bg: "#f7fee7" },
    { key: "G7",    label: "Grade 7",     gradeNum: 7,    link: "G7/piano-repertoire_g7.html",
      comp: typeof DATA_G7 !== "undefined" ? DATA_G7 : null,
      leisure: typeof DATA_G7_LEISURE !== "undefined" ? DATA_G7_LEISURE : null,
      compCount: 148, leisureCount: 92,
      color: "amber",  accent: "#d97706", bg: "#fffbeb" },
    { key: "G8",    label: "Grade 8",     gradeNum: 8,    link: "G8/piano-repertoire_g8.html",
      comp: typeof DATA_G8 !== "undefined" ? DATA_G8 : null,
      leisure: typeof DATA_G8_LEISURE !== "undefined" ? DATA_G8_LEISURE : null,
      compCount: 145, leisureCount: 95,
      color: "orange", accent: "#ea580c", bg: "#fff7ed" },
];

const TOTAL_COMP    = 1393;
const TOTAL_LEISURE = 706;
const TOTAL_ALL     = 2099;

/* ─── Helpers ───────────────────────────────────────────────────────────── */
const eraClass = (era) => {
    if (!era) return "tag-modern";
    const e = era.toLowerCase();
    if (e.includes("baroque"))      return "tag-baroque";
    if (e.includes("classical"))    return "tag-classical";
    if (e.includes("romantic"))     return "tag-romantic";
    if (e.includes("contemporary")) return "tag-contemporary";
    return "tag-modern";
};

/* Build flat search corpus from all grades — 2,099 pieces total (Prelim–G8, General + Leisure) */
const buildCorpus = () => {
    const rows = [];
    GRADE_META.forEach(g => {
        if (g.comp) g.comp.forEach(p => rows.push({ ...p, _grade: g.label, _gradeKey: g.key, _type: "Comprehensive", _accent: g.accent, _link: g.link }));
        if (g.leisure) g.leisure.forEach(p => rows.push({ ...p, _grade: g.label, _gradeKey: g.key, _type: "Leisure", _accent: g.accent, _link: g.link }));
    });
    return rows;
};
const CORPUS = buildCorpus();

/* ─── Grade-up Recommender helpers ──────────────────────────────────────── */
// Score a next-grade piece against the user's current interests.
// Higher score = better stepping stone.
const scoreSteppingStone = (piece, interests) => {
    if (!interests || interests.length === 0) return 0;
    let score = 0;
    const interestEras   = new Set(interests.map(i => (i.era  || "").toLowerCase()).filter(Boolean));
    const interestFoci   = new Set(interests.flatMap(i => (i.focus || []).map(f => f.toLowerCase())));
    const interestNats   = new Set(interests.map(i => (i.nat  || "").toLowerCase()).filter(Boolean));
    const interestLists  = new Set(interests.map(i => i.list || ""));

    // Era match is the strongest signal
    if (piece.era && interestEras.has(piece.era.toLowerCase())) score += 4;
    // Focus tag overlap
    (piece.focus || []).forEach(f => { if (interestFoci.has(f.toLowerCase())) score += 2; });
    // Nationality match
    if (piece.nat && interestNats.has(piece.nat.toLowerCase())) score += 1;
    // List A pieces are the standard stepping-stone entry point
    if (piece.l === "A") score += 1;
    // Prefer lists the student is already familiar with
    if (interestLists.has(piece.l)) score += 1;

    return score;
};

// Return top N stepping-stone pieces for nextGradeMeta based on interests
const getSteppingStones = (nextGradeMeta, interests, syllabus = "comp", count = 6) => {
    const pool = syllabus === "comp" ? nextGradeMeta.comp : nextGradeMeta.leisure;
    if (!pool) return [];
    const gradeInterests = interests.filter(i => i.gradeKey !== nextGradeMeta.key);
    return pool
        .map(p => ({ ...p, _score: scoreSteppingStone(p, gradeInterests) }))
        .sort((a, b) => {
            if (b._score !== a._score) return b._score - a._score;
            // Secondary sort: List A first, then title alpha
            if (a.l !== b.l) return a.l < b.l ? -1 : 1;
            return a.t.localeCompare(b.t);
        })
        .slice(0, count);
};

/* ─── GradeUpRecommender Component ──────────────────────────────────────── */
const GradeUpRecommender = ({ interests }) => {
    const [currentGradeKey, setCurrentGradeKey] = useState("G3");
    const [syllabus, setSyllabus]               = useState("comp");

    // Determine next grade
    const currentIdx  = GRADE_META.findIndex(g => g.key === currentGradeKey);
    const nextGrade   = currentIdx >= 0 && currentIdx < GRADE_META.length - 1
        ? GRADE_META[currentIdx + 1]
        : null;

    const stones = useMemo(() => {
        if (!nextGrade) return [];
        return getSteppingStones(nextGrade, interests, syllabus, 6);
    }, [currentGradeKey, syllabus, interests]);

    const hasInterests = interests.length > 0;

    return (
        <div className="rounded-2xl bg-white border border-slate-100 shadow-sm overflow-hidden mb-6">
            {/* Header */}
            <div className="px-5 py-4 border-b border-slate-100 flex flex-wrap items-center justify-between gap-3">
                <div>
                    <div className="text-[13px] font-black text-slate-800 flex items-center gap-2">
                        🚀 Grade-Up Recommender
                    </div>
                    <div className="text-[11px] text-slate-400 font-semibold mt-0.5">
                        {hasInterests
                            ? "Stepping-stone pieces matched to your saved interests"
                            : "Top List A picks to start the next grade"}
                    </div>
                </div>
                {/* Syllabus toggle */}
                <div className="flex rounded-xl overflow-hidden border border-slate-200 text-[11px] font-bold shrink-0">
                    {[["comp","General"],["leisure","Leisure"]].map(([val, lbl]) => (
                        <button key={val} onClick={() => setSyllabus(val)}
                            className="px-3 py-1.5 transition-colors"
                            style={{
                                background: syllabus === val ? "#4f46e5" : "#f8fafc",
                                color:      syllabus === val ? "white"   : "#94a3b8",
                            }}>
                            {lbl}
                        </button>
                    ))}
                </div>
            </div>

            {/* Grade selector row */}
            <div className="px-5 py-3 border-b border-slate-50 flex flex-wrap items-center gap-2">
                <span className="text-[10px] font-black uppercase tracking-widest text-slate-300 whitespace-nowrap">
                    I'm currently at
                </span>
                <div className="flex flex-wrap gap-1.5">
                    {GRADE_META.slice(0, -1).map(g => (
                        <button key={g.key} onClick={() => setCurrentGradeKey(g.key)}
                            className="text-[11px] font-bold px-3 py-1 rounded-lg border transition-all"
                            style={{
                                background:   currentGradeKey === g.key ? g.accent          : "#f8fafc",
                                color:        currentGradeKey === g.key ? "white"            : "#64748b",
                                borderColor:  currentGradeKey === g.key ? g.accent           : "#e2e8f0",
                            }}>
                            {g.key === "Prelim" ? "Prelim" : g.key}
                        </button>
                    ))}
                </div>
                {nextGrade && (
                    <span className="text-[11px] font-bold text-slate-400 whitespace-nowrap">
                        → Ready for <span className="text-indigo-600">{nextGrade.label}</span>?
                    </span>
                )}
            </div>

            {/* Results */}
            {!nextGrade ? (
                <div className="px-5 py-8 text-center text-[13px] text-slate-300 font-semibold">
                    Grade 8 is the peak — nothing to recommend beyond! 🏆
                </div>
            ) : stones.length === 0 ? (
                <div className="px-5 py-8 text-center text-[13px] text-slate-300 font-semibold">
                    No {syllabus === "comp" ? "General" : "Leisure"} data available for {nextGrade.label}.
                </div>
            ) : (
                <div className="divide-y divide-slate-50">
                    {stones.map((p, i) => {
                        // Focus tags: shared with interests highlighted, unique dimmed
                        const interestFociSet = new Set(
                            interests.flatMap(it => (it.focus || []).map(f => f.toLowerCase()))
                        );
                        const sharedFocus = (p.focus || []).filter(f => interestFociSet.has(f.toLowerCase()));
                        const uniqueFocus = (p.focus || []).filter(f => !interestFociSet.has(f.toLowerCase()));

                        return (
                            <div key={i} className="px-5 py-3 flex flex-wrap items-start gap-3 hover:bg-slate-50 transition-colors">
                                {/* Rank badge */}
                                <div className="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-black shrink-0 mt-0.5"
                                    style={{ background: nextGrade.bg, color: nextGrade.accent }}>
                                    {i + 1}
                                </div>

                                {/* Piece info */}
                                <div className="flex-1 min-w-0">
                                    <div className="text-[14px] font-bold text-slate-800 leading-snug">{p.t}</div>
                                    <div className="text-[12px] text-slate-400 font-medium mt-0.5">{p.c}</div>
                                    <div className="flex flex-wrap gap-1 mt-1.5">
                                        <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">
                                            List {p.l}
                                        </span>
                                        {p.s && (
                                            <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-blue-50 text-blue-400 border border-blue-100">
                                                {seriesLabel(p.s)}
                                            </span>
                                        )}
                                        {p.era && (
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${eraClass(p.era)}`}>
                                                {p.era}
                                            </span>
                                        )}
                                        {p.nat && (
                                            <span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-50 text-slate-400 border border-slate-200">
                                                {p.nat}
                                            </span>
                                        )}
                                        {p.key && p.key !== "Variable" && (
                                            <span className="text-[10px] font-semibold text-slate-300">{p.key}</span>
                                        )}
                                    </div>
                                    {/* Focus tags — shared highlighted in violet, unique dimmed */}
                                    {(sharedFocus.length > 0 || uniqueFocus.length > 0) && (
                                        <div className="flex flex-wrap gap-1 mt-1.5">
                                            {sharedFocus.map((f, fi) => (
                                                <span key={"s"+fi} className="text-[10px] px-2 py-0.5 bg-violet-100 text-violet-600 rounded-full font-bold">
                                                    ✓ {f}
                                                </span>
                                            ))}
                                            {uniqueFocus.map((f, fi) => (
                                                <span key={"u"+fi} className="text-[10px] px-2 py-0.5 bg-slate-100 text-slate-400 rounded-full font-semibold">
                                                    {f}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Actions */}
                                <div className="flex flex-col gap-1.5 shrink-0">
                                    <a href={`https://www.youtube.com/results?search_query=piano+${encodeURIComponent(p.c + " " + p.t)}`}
                                        target="_blank" rel="noopener noreferrer"
                                        className="px-3 py-1.5 bg-slate-800 text-white text-[10px] font-bold rounded-lg hover:bg-slate-900 transition-colors whitespace-nowrap text-center">
                                        ▶ YouTube
                                    </a>
                                    <a href={imslpUrl(p.c, p.t, p.era)}
                                        target="_blank" rel="noopener noreferrer"
                                        title={PUBLIC_DOMAIN_ERAS.has(p.era) ? "View score on IMSLP" : "Search IMSLP — may not be available"}
                                        className="px-3 py-1.5 text-[10px] font-bold rounded-lg border transition-colors whitespace-nowrap text-center"
                                        style={{
                                            background:  PUBLIC_DOMAIN_ERAS.has(p.era) ? "#f0fdf4" : "#f8fafc",
                                            color:       PUBLIC_DOMAIN_ERAS.has(p.era) ? "#15803d" : "#94a3b8",
                                            borderColor: PUBLIC_DOMAIN_ERAS.has(p.era) ? "#bbf7d0" : "#e2e8f0",
                                        }}>
                                        {PUBLIC_DOMAIN_ERAS.has(p.era) ? "📄 Score" : "🔍 IMSLP"}
                                    </a>
                                    <a href={nextGrade.link} target="_blank" rel="noopener noreferrer"
                                        className="px-3 py-1.5 text-[10px] font-bold rounded-lg border transition-colors whitespace-nowrap text-center"
                                        style={{ color: nextGrade.accent, borderColor: nextGrade.accent + "55", background: nextGrade.bg }}>
                                        {nextGrade.key} →
                                    </a>
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}

            {/* Footer hint */}
            {nextGrade && stones.length > 0 && (
                <div className="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between gap-2">
                    <div className="text-[10px] text-slate-300 font-semibold">
                        {hasInterests
                            ? "Ranked by era, focus & style match with your saved pieces"
                            : "Star pieces from search results to get personalised recommendations"}
                    </div>
                    <a href={nextGrade.link} target="_blank" rel="noopener noreferrer"
                        className="text-[11px] font-bold whitespace-nowrap"
                        style={{ color: nextGrade.accent }}>
                        Browse all {nextGrade.label} →
                    </a>
                </div>
            )}
        </div>
    );
};

/* ─── Grade Card ─────────────────────────────────────────────────────────── */
const GradeCard = ({ g, searchActive }) => {

    return (
        <a href={g.link}

            </div>
            <div className="flex gap-3 mt-4">
                <div className="flex-1 rounded-xl py-2 px-3 bg-white/70 border border-white">
                    <div className="text-[11px] text-slate-400 font-bold uppercase tracking-wide">General</div>
                    <div className="text-[20px] font-black" style={{ color: g.accent }}>{g.compCount}</div>

                </div>

                    <div className="text-[20px] font-black text-slate-500">{g.leisureCount}</div>
                    <div className="text-[10px] text-slate-400">pieces</div>
                </div>
            </div>
            <div className="mt-3 text-[11px] font-bold uppercase tracking-wide text-right" style={{ color: g.accent }}>
                Open →
            </div>
        </a>
    );
};

/* ─── Series label helper ───────────────────────────────────────────────── */
const SERIES_LABEL = {
    "S19":      "Series 19",
    "S18":      "Series 18",
    "S17":      "Series 17",
    "AustAnth": "Aust. Anthology",
    "Manual":   "Manual",
    "S4":       "Leisure S4",
    "S3":       "Leisure S3",
    "S2":       "Leisure S2",
    "S1":       "Leisure S1",
};
const seriesLabel = (s) => SERIES_LABEL[s] || s;

/* ─── IMSLP link helper ──────────────────────────────────────────────────── */
// Public-domain eras get a direct IMSLP composer search; others fall back to IMSLP search.
// IMSLP only reliably has Baroque & Classical (pre-1900) works.
const PUBLIC_DOMAIN_ERAS = new Set(["Baroque", "Classical"]);

const imslpUrl = (composer, title, era) => {
    if (PUBLIC_DOMAIN_ERAS.has(era)) {
        // Normalise "SURNAME, Firstname" → "Firstname_Surname" for IMSLP page URL
        const parts = composer.replace(/,/g, "").trim().split(/\s+/);
        if (parts.length >= 2) {
            // Input: "BACH, J.S." → parts: ["BACH", "J.S."]
            // IMSLP format: Firstname_Lastname — swap and title-case
            const surname   = parts[0].charAt(0).toUpperCase() + parts[0].slice(1).toLowerCase();
            const firstname = parts.slice(1).join("_");
            return `https://imslp.org/wiki/Category:${encodeURIComponent(firstname + "_" + surname)}`;
        }
    }
    // Fallback: IMSLP search for title + composer
    return `https://imslp.org/wiki/Special:Search?search=${encodeURIComponent(title + " " + composer)}`;
};

/* ─── Similarity scoring ─────────────────────────────────────────────────── */
// Grade order index for proximity calculation
const GRADE_ORDER = ["Prelim", "G1", "G2", "G3", "G4", "G5", "G6", "G7", "G8"];

const getSimilar = (p, count = 5) => {
    const pFocus    = new Set((p.focus || []).map(f => f.toLowerCase()));
    const pGradeIdx = GRADE_ORDER.indexOf(p._gradeKey);

    return CORPUS
        .filter(x => !(x.c === p.c && x.t === p.t))  // exclude self
        .map(x => {
            let score = 0;

            // ── Focus tag overlap (strongest signal — 3 pts each) ──
            let focusMatches = 0;
            (x.focus || []).forEach(f => {
                if (pFocus.has(f.toLowerCase())) { score += 3; focusMatches++; }
            });

            // ── Era match (only meaningful alongside focus match) ──
            // Full 3 pts if focus also matches; just 1 pt if era-only (avoids flooding)
            if (x.era && p.era && x.era === p.era) {
                score += focusMatches > 0 ? 3 : 1;
            }

            // ── Nationality match (minor signal) ──
            if (x.nat && p.nat && x.nat === p.nat) score += 1;

            // ── Grade proximity bonus / penalty ──
            const xGradeIdx = GRADE_ORDER.indexOf(x._gradeKey);
            if (pGradeIdx >= 0 && xGradeIdx >= 0) {
                const dist = Math.abs(xGradeIdx - pGradeIdx);
                if      (dist === 0) score += 3;  // same grade
                else if (dist === 1) score += 2;  // adjacent grade
                else if (dist === 2) score += 1;  // 2 away
                else                score -= (dist - 2) * 2; // penalise distant grades
            }

            return { ...x, _score: score, _gradeDist: Math.abs((GRADE_ORDER.indexOf(x._gradeKey)) - pGradeIdx) };
        })
        // Require meaningful similarity: at least 1 focus match OR (era match + grade proximity)
        .filter(x => {
            const hasFocus = (x.focus || []).some(f => pFocus.has(f.toLowerCase()));
            const hasEraAndClose = x.era && p.era && x.era === p.era && x._gradeDist <= 2;
            return x._score > 0 && (hasFocus || hasEraAndClose);
        })
        .sort((a, b) => {
            if (b._score !== a._score) return b._score - a._score;
            // Tiebreak 1: grade proximity (closer first)
            if (a._gradeDist !== b._gradeDist) return a._gradeDist - b._gradeDist;
            // Tiebreak 2: List A before B/C/D
            if (a.l !== b.l) return a.l < b.l ? -1 : 1;
            // Tiebreak 3: alphabetical by title
            return a.t.localeCompare(b.t);
        })
        // Cap at 2 pieces per composer — ensures variety across different composers
        .reduce((acc, x) => {
            const composerCount = acc.filter(r => r.c === x.c).length;
            if (composerCount < 2) acc.push(x);
            return acc;
        }, [])
        .slice(0, count);
};

const saveInterests = arr => { try { localStorage.setItem(INTERESTS_KEY, JSON.stringify(arr)); } catch {} };

/* ─── Exam Readiness logic ───────────────────────────────────────────────── */
const getReadiness = (interests, gradeKey) => {
    const pieces = interests.filter(i => i.gradeKey === gradeKey && ["Learning","Mastered"].includes(i.status));
    const lists  = { A:0, B:0, C:0, D:0 };
    pieces.forEach(p => { if (lists[p.list] !== undefined) lists[p.list]++; });
    // AMEB exam: need 1 from each required list
    const hasA = lists.A > 0, hasB = lists.B > 0, hasC = lists.C > 0;
    const ready = hasA && hasB && hasC;
    return { lists, ready, total: pieces.length };
};

                                {/* Status selector */}
                                <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                                    {STATUS_OPTS.map(s => (
                                        <button key={s} onClick={()=>updateStatus(realIdx,s)}
                                            style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,border:"1px solid",cursor:"pointer",
                                                background: item.status===s ? st.bg:"white",
                                                color: item.status===s ? st.color:"#94a3b8",
                                                borderColor: item.status===s ? st.color+"55":"#e2e8f0"}}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                                {/* Note */}
                                {noteIdx === realIdx ? (
                                    <div style={{marginTop:8,display:"flex",gap:6}}>
                                        <input autoFocus value={noteText} onChange={e=>setNoteText(e.target.value)}
                                            placeholder="Add a note…"
                                            style={{flex:1,fontSize:12,padding:"5px 8px",borderRadius:6,border:"1px solid #c7d2fe",outline:"none"}}/>
                                        <button onClick={()=>saveNote(realIdx)} style={{fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:6,background:"#4f46e5",color:"white",border:"none",cursor:"pointer"}}>Save</button>
                                        <button onClick={()=>setNoteIdx(null)} style={{fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:6,background:"#f1f5f9",color:"#64748b",border:"none",cursor:"pointer"}}>Cancel</button>
                                    </div>
                                ) : (
                                    <div onClick={()=>{setNoteIdx(realIdx);setNoteText(item.note||"");}}
                                        style={{marginTop:6,fontSize:11,color: item.note?"#334155":"#cbd5e1",cursor:"pointer",fontStyle:item.note?"normal":"italic"}}>
                                        {item.note || "Add a note…"}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        </div>
    );
};

/* ─── Focus Picker Groups ────────────────────────────────────────────────── */
const FOCUS_GROUPS = [
    { label: "🎭 Character & Style", tags: ["Character piece", "Dance character", "Baroque style", "Classical style", "Romantic character", "Contemporary style", "Modern style", "Jazz idiom"] },
    { label: "🎵 Melody & Expression", tags: ["Lyrical melody", "Lyrical expression", "Cantabile", "Singing tone", "Expressive playing", "Expressive melody", "Lyricism"] },
    { label: "⚡ Rhythm & Drive", tags: ["Rhythmic energy", "Rhythmic drive", "Rhythmic precision", "Rhythm", "Syncopation"] },
    { label: "🖐 Technique", tags: ["Technical fluency", "Finger independence", "Light touch", "Articulation", "Ornamentation", "Scales", "Velocity", "Pedal technique"] },
    { label: "🌏 Nationality", tags: ["Australian music", "Australian character", "Folk character"] },
    { label: "🎨 Tone & Colour", tags: ["Tonal colour", "Tone colour", "Musical imagery", "Musical expression", "Creative expression"] },
];

/* ─── Main App ───────────────────────────────────────────────────────────── */
const App = () => {
    const [query, setQuery] = useState("");
    const [eraFilter, setEraFilter] = useState("All");
    const [gradeFilter, setGradeFilter] = useState("All");
    const [focusPicker, setFocusPicker] = useState(null);
    const [natFilter, setNatFilter] = useState("All");
    const [searchTriggered, setSearchTriggered] = useState(false);
    const [pickerOpen, setPickerOpen] = useState(false);
    const [interests, setInterests] = useState(() => loadInterests());
    const [interestsPanelOpen, setInterestsPanelOpen] = useState(false);

    const searchActive = searchTriggered || query.trim().length > 0 || eraFilter !== "All" || gradeFilter !== "All" || focusPicker !== null || natFilter !== "All";

    const handleSearch = () => setSearchTriggered(true);
    const handleClear  = () => { setQuery(""); setEraFilter("All"); setGradeFilter("All"); setFocusPicker(null); setNatFilter("All"); setSearchTriggered(false); setPickerOpen(false); };

    // Build sorted nationality list from corpus
    const NAT_LIST = useMemo(() => {
        const s = new Set();
        CORPUS.forEach(p => { if (p.nat) p.nat.split("/").forEach(n => s.add(n.trim())); });
        return ["All", ...Array.from(s).sort()];
    }, []);

    const results = useMemo(() => {
        if (!searchActive) return [];
        const q = query.toLowerCase();
        return CORPUS.filter(p => {
            const matchQuery = !q || (
                p.t.toLowerCase().includes(q) ||
                p.c.toLowerCase().includes(q) ||
                (p.nat && p.nat.toLowerCase().includes(q)) ||
                (p.era && p.era.toLowerCase().includes(q)) ||
                (p.focus && p.focus.join(" ").toLowerCase().includes(q))
            );
            const matchEra   = eraFilter === "All"   || p.era === eraFilter;
            const matchGrade = gradeFilter === "All" || p._gradeKey === gradeFilter;
            const matchFocus = focusPicker === null  || (p.focus && p.focus.some(f => f.toLowerCase().includes(focusPicker.toLowerCase())));
            const matchNat   = natFilter === "All"   || (p.nat && p.nat.toLowerCase().includes(natFilter.toLowerCase()));
            return matchQuery && matchEra && matchGrade && matchFocus && matchNat;
        });
    }, [query, eraFilter, gradeFilter, focusPicker, natFilter, searchActive]);

    const ERAS = ["All", "Baroque", "Classical", "Romantic", "Modern", "Contemporary"];

    return (
        <div className="min-h-screen">
            <InterestsPanel open={interestsPanelOpen} onClose={()=>setInterestsPanelOpen(false)} interests={interests} setInterests={setInterests} />
            {/* ── Hero Header ─────────────────────────────────────────────── */}
            <div className="bg-white border-b border-slate-100 shadow-sm">
                <div className="max-w-5xl mx-auto px-4 py-6 md:py-12">
                    <div className="flex flex-col gap-4">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="w-1.5 h-10 bg-indigo-600 rounded-full"></div>
                                <h1 className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">Piano Butler</h1>
                            </div>
                            <p className="text-slate-400 text-sm font-semibold uppercase tracking-widest ml-5">
                                Piano Repertoire — Master Database
                            </p>
                        </div>
                        {/* Totals summary + My Interests button */}
                        <div className="flex flex-wrap gap-2 ml-5 items-center">
                            <div className="bg-indigo-50 rounded-2xl px-3 py-2 md:px-4 md:py-3 text-center border border-indigo-100">
                                <div className="text-xl md:text-2xl font-black text-indigo-600">{TOTAL_ALL.toLocaleString()}</div>
                                <div className="text-[10px] text-indigo-400 font-bold uppercase tracking-wide">Total Pieces</div>
                            </div>
                            <div className="bg-slate-50 rounded-2xl px-3 py-2 md:px-4 md:py-3 text-center border border-slate-100">
                                <div className="text-xl md:text-2xl font-black text-slate-600">{TOTAL_COMP.toLocaleString()}</div>
                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wide">General</div>
                            </div>
                            <div className="bg-slate-50 rounded-2xl px-3 py-2 md:px-4 md:py-3 text-center border border-slate-100">
                                <div className="text-xl md:text-2xl font-black text-slate-500">{TOTAL_LEISURE}</div>
                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wide">Leisure</div>
                            </div>
                            <button onClick={() => setInterestsPanelOpen(true)}
                                className="bg-amber-50 rounded-2xl px-3 py-2 md:px-4 md:py-3 text-center border border-amber-100 hover:bg-amber-100 transition-colors cursor-pointer">
                                <div className="text-xl md:text-2xl font-black text-amber-500">{interests.length}</div>
                                <div className="text-[10px] text-amber-400 font-bold uppercase tracking-wide">⭐ Saved</div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div className="max-w-5xl mx-auto px-4 py-8">

                {/* ── Universal Search ──────────────────────────────────────── */}
                <div className="sticky top-4 z-20 mb-8">
                    <div className="bg-white/90 backdrop-blur-md rounded-2xl shadow-xl shadow-slate-200/60 border border-white p-4">
                        <div className="relative mb-3 flex gap-2">
                            <div className="relative flex-1">
                                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm">🔍</span>
                                <input
                                    type="text"
                                    value={query}
                                    onChange={e => setQuery(e.target.value)}
                                    onKeyDown={e => { if (e.key === "Escape") handleClear(); if (e.key === "Enter") handleSearch(); }}
                                    placeholder="Search by composer, title, era, nationality, or focus area…"
                                    className="w-full pl-9 pr-8 py-3 rounded-xl border border-slate-200 text-[14px] font-medium text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all placeholder-slate-300"
                                />
                                {query && (
                                    <button onClick={handleClear}
                                        className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 font-bold text-lg leading-none">×</button>
                                )}
                            </div>
                            <button
                                onClick={handleSearch}
                                className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-bold rounded-xl transition-colors whitespace-nowrap shadow-sm shadow-indigo-200">
                                Search
                            </button>
                        </div>

                        {/* Era filter chips */}
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar mb-2">
                            {ERAS.map(era => (
                                <button key={era} onClick={() => { setEraFilter(era); setSearchTriggered(true); }}
                                    className={`whitespace-nowrap text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all border ${
                                        eraFilter === era
                                            ? "bg-indigo-600 text-white border-indigo-600 shadow-sm"
                                            : "bg-slate-50 text-slate-400 border-slate-200 hover:border-slate-300"
                                    }`}>
                                    {era}
                                </button>
                            ))}
                        </div>

                        {/* Grade filter chips */}
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar mb-2">
                            {["All", ...GRADE_META.map(g => g.key)].map(gk => (
                                <button key={gk} onClick={() => { setGradeFilter(gk); setSearchTriggered(true); }}
                                    className={`whitespace-nowrap text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all border ${
                                        gradeFilter === gk
                                            ? "bg-slate-700 text-white border-slate-700 shadow-sm"
                                            : "bg-slate-50 text-slate-400 border-slate-200 hover:border-slate-300"
                                    }`}>
                                    {gk === "All" ? "All Grades" : gk === "Prelim" ? "Prelim" : gk.replace("G", "Grade ")}
                                </button>
                            ))}
                        </div>

                        {/* Nationality filter */}
                        <div className="flex items-center gap-2 mb-2">
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-300 whitespace-nowrap">🌏 Nationality</span>
                            <select
                                value={natFilter}
                                onChange={e => { setNatFilter(e.target.value); setSearchTriggered(true); }}
                                className="flex-1 text-[11px] font-semibold px-3 py-1.5 rounded-lg border border-slate-200 bg-slate-50 text-slate-500 outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100 transition-all cursor-pointer"
                                style={{maxWidth:220}}>
                                {NAT_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                            </select>
                            {natFilter !== "All" && (
                                <button onClick={() => { setNatFilter("All"); }}
                                    className="text-[11px] font-bold text-slate-300 hover:text-slate-500 transition-colors">×</button>
                            )}
                        </div>

                        {/* ✨ Repertoire Picker */}
                        <div className="border-t border-slate-100 pt-2 mt-1">
                            <button
                                onClick={() => setPickerOpen(o => !o)}
                                className="flex items-center gap-2 text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-indigo-500 transition-colors mb-2">
                                <span>✨ Find by what you want to work on</span>
                                <span className="text-[10px]">{pickerOpen ? "▲" : "▼"}</span>
                                {focusPicker && (
                                    <span className="ml-1 px-2 py-0.5 bg-indigo-100 text-indigo-600 rounded-full text-[10px] font-bold normal-case">
                                        {focusPicker} ×
                                    </span>
                                )}
                            </button>
                            {pickerOpen && (
                                <div className="space-y-2">
                                    {FOCUS_GROUPS.map(group => (
                                        <div key={group.label}>
                                            <div className="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-1">{group.label}</div>
                                            <div className="flex flex-wrap gap-1.5">
                                                {group.tags.map(tag => (
                                                    <button key={tag}
                                                        onClick={() => {
                                                            setFocusPicker(prev => prev === tag ? null : tag);
                                                            setSearchTriggered(true);
                                                        }}
                                                        className={`text-[11px] font-semibold px-3 py-1 rounded-full border transition-all ${
                                                            focusPicker === tag
                                                                ? "bg-indigo-600 text-white border-indigo-600 shadow-sm"
                                                                : "bg-indigo-50 text-indigo-400 border-indigo-100 hover:border-indigo-300"
                                                        }`}>
                                                        {tag}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Results count + back button */}
                        {searchActive && (
                            <div className="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between gap-2">
                                <div className="text-[12px] text-slate-400 font-semibold">
                                    {results.length === 0
                                        ? "No pieces found — try a different keyword"
                                        : `${results.length.toLocaleString()} piece${results.length !== 1 ? "s" : ""} found`}
                                {focusPicker && (
                                    <span className="ml-2 px-2 py-0.5 bg-indigo-100 text-indigo-600 rounded-full text-[10px] font-bold">
                                        ✨ {focusPicker}
                                    </span>
                                )}
                                </div>
                                <button onClick={handleClear}
                                    className="text-[11px] font-bold text-slate-400 hover:text-indigo-600 transition-colors whitespace-nowrap">
                                    ← Back to grades
                                </button>
                            </div>
                        )}
                    </div>
                </div>

                {/* ── Grade Cards Grid (shown when no search active) ─────────── */}
                {!searchActive && (
                    <div>
                        <div className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-4">
                            Select a Grade
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                            {GRADE_META.map(g => <GradeCard key={g.key} g={g} searchActive={false} />)}
                        </div>

                        {/* ── Grade-Up Recommender ──────────────────────────── */}
                        <GradeUpRecommender interests={interests} />

                        {/* Teacher Tools banner */}
                        <a href="teacher-dashboard.html" className="block rounded-2xl bg-indigo-600 hover:bg-indigo-700 transition-all p-5">
                            <div className="text-[11px] font-black uppercase tracking-widest text-indigo-300 mb-2">Teacher Tools</div>
                            <div className="flex items-center justify-between gap-4">
                                <div>
                                    <div className="text-[15px] font-black text-white">Teacher Dashboard</div>
                                    <div className="text-[12px] text-indigo-200 mt-0.5">Students · Monthly plans · Lesson logs · Schedule</div>
                                </div>
                                <div className="text-white text-xl opacity-60">→</div>
                            </div>
                        </a>

                        {/* Quick info strip */}
                        <div className="rounded-2xl bg-white border border-slate-100 shadow-sm p-5">
                            <div className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-4">About Piano Butler</div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-[13px] text-slate-500 font-medium leading-relaxed">
                                <div>
                                    <div className="text-indigo-600 font-black text-[12px] uppercase tracking-wide mb-1">📚 Repertoire Coverage</div>
                                    Comprehensive piano repertoire — both General and Leisure pathways — Preliminary through Grade 8. Every piece meticulously verified.
                                </div>
                                <div>
                                    <div className="text-indigo-600 font-black text-[12px] uppercase tracking-wide mb-1">🔍 Smart Filtering</div>
                                    Filter by era, nationality, list, and focus area. Use universal search above to find pieces across all grades simultaneously.
                                </div>
                                <div>
                                    <div className="text-indigo-600 font-black text-[12px] uppercase tracking-wide mb-1">🎼 For Each Piece</div>
                                    Era classification, key, pedagogical focus tags, direct YouTube search, and sheet music links — all in one place.
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── Search Results ─────────────────────────────────────────── */}
                {searchActive && (
                    <div className="space-y-2">
                        {results.length > 0
                            ? results.map((p, i) => <ResultRow key={i} p={p} interests={interests} setInterests={setInterests} />)
                            : (
                                <div className="py-20 text-center">
                                    <div className="text-4xl mb-4">🎹</div>
                                    <div className="text-slate-300 text-sm font-bold uppercase tracking-widest">No pieces found</div>
                                    <div className="text-slate-300 text-xs mt-2">Try a composer name, era, or focus area</div>
                                </div>
                            )
                        }
                    </div>
                )}
            </div>

            {/* Footer */}
            <div className="border-t border-slate-100 mt-12 py-6 text-center text-[11px] text-slate-300 font-semibold tracking-wide">
                Piano Butler · Piano Repertoire · {TOTAL_ALL.toLocaleString()} pieces
            </div>
        </div>
    );
};

// Check session before rendering — redirects to login.html if not logged in
requireAuth().then(session => {
  if (session) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
});
</script>
</body>
</html>
