            {popover.studentName}
          </p>
          <button onClick={()=>{setConfirmDelete(false);onCancel();}}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8",padding:0}}>✕</button>
        </div>

        {!confirmDelete ? (<>
          {/* Option 1 */}
          {optBtn(onSkipWeek,           "#e2e8f0","#f8fafc","#334155", "📅", "Skip this week only",     "Lesson resumes automatically from next week")}
          {/* Option 2 */}
          {optBtn(onSkipFromWeek,       "#fed7aa","#fff7ed","#b45309", "⏭", "Skip from this week on",  "Cancels this and all future occurrences · slot kept")}
          {/* Option 3 */}
          {optBtn(onDeleteSlot,         "#fde68a","#fffbeb","#92400e", "⏹", "Remove this lesson slot",  "Permanently removes slot · student card stays")}
          {/* Option 4 */}
          {optBtn(()=>setConfirmDelete(true), "#fecaca","#fff5f5","#dc2626", "🗑", "Delete student",     "Removes student and all lesson records")}
        </>) : (<>
          {/* 2-step confirm for full delete */}
          <p style={{margin:0, fontSize:13, color:"#dc2626", fontWeight:700}}>Are you sure?</p>
          <p style={{margin:"0 0 4px", fontSize:12, color:"#64748b", lineHeight:1.4}}>
            {popover.studentName}'s card and all lesson records will be permanently deleted.
          </p>
          <div style={{display:"flex", gap:8}}>
            <button onClick={()=>setConfirmDelete(false)} style={{
              flex:1, padding:"10px 0", borderRadius:9, border:"1px solid #e2e8f0",
              background:"#f8fafc", color:"#64748b", fontWeight:700, fontSize:13, cursor:"pointer",
            }}>Cancel</button>
            <button onClick={onDeleteStudent} style={{
              flex:1, padding:"10px 0", borderRadius:9, border:"none",
              background:"#dc2626", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer",
            }}>Delete</button>
          </div>
        </>)}
      </div>
    </>
  );
}

function ReschedulePopover({ activePopover, weekOverrides, onWeekOnly, onFromWeek, onAllTime, onReset, onDeleteSlot, onCancel }) {
  // ALL hooks must be declared unconditionally at the top — before any early return
  const [editDay,  setEditDay]  = React.useState(() => activePopover?.toDay  || activePopover?.fromDay  || null);
  const [editTime, setEditTime] = React.useState(() => activePopover?.toTime || activePopover?.fromTime || null);
  const [targetWeekOffset, setTargetWeekOffset] = React.useState(0);
  const popRef = React.useRef(null);
  const [pos, setPos] = React.useState({ left: 0, top: 0 });

  // Sync when a NEW slot is opened (overrideKey changes) — also reset week offset
  React.useEffect(() => {
    if (activePopover) {
      setEditDay(activePopover.toDay  || activePopover.fromDay);
      setEditTime(activePopover.toTime || activePopover.fromTime);
      setTargetWeekOffset(0);
    }
  }, [activePopover?.overrideKey]);

  // Position the popover next to the anchor slot rect
  React.useEffect(() => {
    if (!activePopover || !popRef.current) return;
    const { anchorRect } = activePopover;
    const pop = popRef.current.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const GAP = 8;
    let left = anchorRect.right + GAP;
    if (left + pop.width > vw - 8) left = anchorRect.left - pop.width - GAP;
    left = Math.max(8, left);
    let top = anchorRect.top;
    top = Math.min(top, vh - pop.height - 8);
    top = Math.max(8, top);
    setPos({ left, top });
  }, [activePopover, editDay, editTime, targetWeekOffset]);

  // ── Early returns AFTER all hooks ──
  if (!activePopover) return null;
  if (!editDay || !editTime) return null;

  const { slot, fromDay, fromTime } = activePopover;
  const studentName = slot.student.name;
  const dur = slot.dur || 45;

  // Time arithmetic helpers
  const timeToMins = (t) => { const [h,m] = (t||"09:00").split(":").map(Number); return h*60+(m||0); };
  const minsToTime = (m) => {
    const clamped = Math.max(0, Math.min(23*60+59, m));
    return String(Math.floor(clamped/60)).padStart(2,"0") + ":" + String(clamped%60).padStart(2,"0");
  };
  const adjustTime = (delta) => setEditTime(t => minsToTime(timeToMins(t) + delta));

  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const DAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Compute the ISO Monday for a given offset from today's week
  const getWeekKeyByOffset = (offset) => {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
    return mon.toISOString().slice(0, 10);
  };
  const targetWeekKey = getWeekKeyByOffset((activePopover?.calendarWeekOffset || 0) + targetWeekOffset);

  // Week label for display
  const weekLabel = (() => {
    const base = activePopover?.calendarWeekOffset || 0;
    const total = base + targetWeekOffset;
    if (total === 0) return "This week";
    if (total === 1) return "Next week";
    if (total === -1) return "Last week";
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + total * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => d.toLocaleDateString("en-AU", { day:"numeric", month:"short" });
    return `${fmt(mon)} – ${fmt(sun)}`;
  })();

  // Compute end time for display
  const endTime = minsToTime(timeToMins(editTime) + dur);
  const changed = editDay !== fromDay || editTime !== fromTime || targetWeekOffset !== 0;

  // Pass edited values back to handlers — include targetWeekKey
  const handleWeekOnly  = () => onWeekOnly({ toDay: editDay, toTime: editTime, weekKey: targetWeekKey });
  const handleFromWeek  = () => onFromWeek && onFromWeek({ toDay: editDay, toTime: editTime, fromWeek: targetWeekKey });
  const handleAllTime   = () => onAllTime  && onAllTime({ toDay: editDay, toTime: editTime });

  return (
    <>
      {/* Invisible backdrop to catch outside clicks */}
      <div style={{position:"fixed",inset:0,zIndex:999}} onClick={onCancel}/>
      {/* Popover card — positioned near the slot */}
      <div ref={popRef} style={{
        position:"fixed", left: pos.left, top: pos.top,
        zIndex:1000,
        background:"#fff", borderRadius:16, padding:"18px 18px 16px",
        width:320, boxShadow:"0 8px 32px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.08)",
        display:"flex", flexDirection:"column", gap:14,
        border:"1px solid #e2e8f0",
      }} onClick={e=>e.stopPropagation()}>

        {/* ── Title row ── */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div>
            <p style={{fontSize:15, fontWeight:800, color:"#0f172a", margin:0}}>Reschedule lesson</p>
            <p style={{fontSize:12, color:"#64748b", margin:"3px 0 0"}}>{studentName} · {dur}min</p>
          </div>
          <button onClick={onCancel} style={{
            background:"#f1f5f9", border:"none", borderRadius:"50%",
            width:28, height:28, cursor:"pointer", fontSize:13, color:"#64748b",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>✕</button>
        </div>

        {/* ── Date picker: week nav + day cells with actual dates ── */}
        {(() => {
          // Sun-first display order (matches schedule calendar)
          const WEEK_DAYS  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
          const WEEK_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

          // Compute the 7 dates — week starts on Sunday
          const now = new Date();
          const baseOffset = (activePopover?.calendarWeekOffset || 0) + targetWeekOffset;
          // Find the Sunday of the current week, then shift by baseOffset weeks
          const sun = new Date(now);
          sun.setDate(now.getDate() - now.getDay() + baseOffset * 7);
          // offsets from Sunday: Sun=0, Mon=1, ..., Sat=6
          const dayOffset = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };
          const weekDates = WEEK_DAYS.map(dayName => {
            const d = new Date(sun);
            d.setDate(sun.getDate() + dayOffset[dayName]);
            return d;
          });
          const todayStr = new Date().toDateString();
          const selectedDate = weekDates[WEEK_DAYS.indexOf(editDay)];
          const selectedDateStr = selectedDate ? selectedDate.toLocaleDateString("en-AU", { day:"numeric", month:"short" }) : "";
          const monthYear = sun.toLocaleDateString("en-AU", { month:"long", year:"numeric" });

          return (
            <div>
              {/* Month + week nav */}
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8}}>
                <button onClick={()=>setTargetWeekOffset(o=>o-1)} style={{
                  width:26, height:26, borderRadius:7, border:"1px solid #e2e8f0",
                  background:"#f8fafc", cursor:"pointer", fontSize:13, color:"#475569",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>‹</button>
                <div style={{textAlign:"center"}}>
                  <p style={{margin:0, fontSize:12, fontWeight:700, color:"#334155"}}>{monthYear}</p>
                  {targetWeekOffset !== 0 && (
                    <button onClick={()=>setTargetWeekOffset(0)} style={{
                      fontSize:10, color:"#6366f1", background:"none", border:"none",
                      cursor:"pointer", padding:0,
                    }}>↺ This week</button>
                  )}
                </div>
                <button onClick={()=>setTargetWeekOffset(o=>o+1)} style={{
                  width:26, height:26, borderRadius:7, border:"1px solid #e2e8f0",
                  background:"#f8fafc", cursor:"pointer", fontSize:13, color:"#475569",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>›</button>
              </div>

              {/* Day cells — Mon first */}
              <div style={{display:"flex", gap:4}}>
                {WEEK_DAYS.map((dayName, i) => {
                  const date = weekDates[i];
                  const isSelected = editDay === dayName;
                  const isToday = date.toDateString() === todayStr;
                  const isFrom = dayName === fromDay && targetWeekOffset === 0;
                  return (
                    <button key={dayName} onClick={()=>setEditDay(dayName)} style={{
                      flex:1, padding:"6px 2px", borderRadius:9, border:"none",
                      background: isSelected ? "#6366f1" : isFrom ? "#eef2ff" : "#f8fafc",
                      color: isSelected ? "#fff" : isFrom ? "#4338ca" : "#475569",
                      cursor:"pointer", transition:"all 0.12s",
                      outline: isFrom && !isSelected ? "1.5px solid #c7d2fe" : "none",
                    }}>
                      <p style={{margin:0, fontSize:"9px", fontWeight:600,
                        color: isSelected ? "rgba(255,255,255,0.75)" : "#94a3b8",
                        textTransform:"uppercase", letterSpacing:"0.04em"}}>
                        {WEEK_SHORT[i]}
                      </p>
                      <p style={{margin:"2px 0 0", fontSize:13, fontWeight: isSelected||isToday ? 800 : 500,
                        color: isSelected ? "#fff" : isToday ? "#6366f1" : "inherit"}}>
                        {date.getDate()}
                      </p>
                      {isToday && !isSelected && (
                        <div style={{width:4, height:4, borderRadius:"50%", background:"#6366f1", margin:"2px auto 0"}}/>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* Selected date summary */}
              <p style={{margin:"6px 0 0", fontSize:11, textAlign:"center", color: editDay !== fromDay || targetWeekOffset !== 0 ? "#6366f1" : "#94a3b8", fontWeight:600}}>
                {editDay !== fromDay || targetWeekOffset !== 0
                  ? `→ ${editDay}, ${selectedDateStr} · ${fmtTime(editTime)}`
                  : `${fromDay}, ${fmtTime(fromTime)} (original)`}
              </p>
            </div>
          );
        })()}

        {/* ── Time picker ── */}
        <div>
          <p style={{fontSize:11, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em", margin:"0 0 8px"}}>Time</p>
          <input
            type="time"
            value={editTime}
            onChange={e=>setEditTime(e.target.value)}
            style={{
              width:"100%", textAlign:"center", fontSize:22, fontWeight:800,
              color:"#4338ca", border:"2px solid #e0e7ff", borderRadius:12,
              padding:"10px 8px", background:"#f5f3ff", outline:"none",
              fontFamily:"inherit", boxSizing:"border-box",
            }}
          />
          <div style={{display:"none"}}>
            {/* nudge buttons removed — use native time picker */}
            {[-5,-1,+1,+5].map(d => (
              <button key={d}>{d}</button>
            ))}
          </div>
        </div>

        <hr style={{border:"none", borderTop:"1px solid #f1f5f9", margin:"0 -4px"}}/>

        {/* ── Save options ── */}
        {changed ? (
          <div style={{display:"flex", flexDirection:"column", gap:7}}>
            {[
              { onClick: handleWeekOnly, emoji:"📅", title:"This week only",         sub:"Reverts to normal schedule next week" },
              { onClick: handleFromWeek, emoji:"🔁", title:"From this week onwards", sub:"Previous weeks stay unchanged" },
              { onClick: handleAllTime,  emoji:"⚡", title:"All weeks",              sub:"Applies to past and future" },
            ].map(opt => (
              <button key={opt.title} onClick={opt.onClick} style={{
                display:"flex", alignItems:"center", gap:12,
                padding:"10px 14px", borderRadius:11,
                border:"1.5px solid #e2e8f0", background:"#fafafa",
                cursor:"pointer", textAlign:"left", transition:"all 0.15s",
              }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.background="#f5f3ff";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#fafafa";}}>
                <span style={{fontSize:18}}>{opt.emoji}</span>
                <div>
                  <p style={{fontSize:13, fontWeight:700, color:"#1e293b", margin:0}}>{opt.title}</p>
                  <p style={{fontSize:11, color:"#64748b", margin:"2px 0 0", lineHeight:1.3}}>{opt.sub}</p>
                </div>
              </button>
            ))}
          </div>
        ) : (
          <p style={{fontSize:12, color:"#94a3b8", textAlign:"center", margin:0}}>
            Change the day or time above to see save options
          </p>
        )}

        {/* Reset override */}
        {activePopover.slot.isOverridden && onReset && (
          <button onClick={onReset} style={{
            display:"flex", alignItems:"center", gap:10,
            padding:"9px 14px", borderRadius:10,
            border:"1.5px solid #fecaca", background:"#fff5f5",
            cursor:"pointer", textAlign:"left",
          }}>
            <span>↺</span>
            <div>
              <p style={{fontSize:12, fontWeight:700, color:"#dc2626", margin:0}}>Reset this week</p>
              <p style={{fontSize:11, color:"#f87171", margin:"1px 0 0"}}>Back to regular slot ({fromDay.slice(0,3)} {fmtTime(fromTime)})</p>
            </div>
          </button>
        )}

        {/* Delete slot — via ✕ button on slot */}

        <button onClick={onCancel} style={{
          background:"none", border:"none", cursor:"pointer",
          fontSize:12, color:"#94a3b8", textAlign:"center",
        }}>Cancel</button>
      </div>
    </>
  );
}

// Small helper for coarse nudge buttons
function nudgeBtnStyle(bg, color) {
  return {
    padding:"8px 10px", borderRadius:9, border:"1px solid #e2e8f0",
    background:bg, color, fontSize:11, fontWeight:700,
    cursor:"pointer", whiteSpace:"nowrap", minWidth:36,
  };
}

function ScheduleView({ students, logs, overrides, onLog, onAbsence, onSelect, onAdd, onSaveOverride, onDeleteOverride, onPermanentReschedule, onCreateSlot, onDeleteSlot, onCreateNewStudent, onDeleteStudent }) {
  const [weekOffset, setWeekOffset] = React.useState(0);
  // weekOverrides is now just an alias for the Supabase-backed overrides prop
  const weekOverrides = overrides || {};

  // ── Reschedule popover: { slot, fromDay, fromTime, anchorRect }
  const [activePopover, setActivePopover] = React.useState(null);

  // ── Skip confirm popover: { overrideKey, studentName, slotIdx, student, anchorX, anchorY }
  const [skipConfirm, setSkipConfirm] = React.useState(null);
  // ── Revert confirm popover: { overrideKey, studentName, slotIdx, student, originalDay, originalTime, anchorX, anchorY }
  const [revertConfirm, setRevertConfirm] = React.useState(null);

  // ── Drag state — all mutable refs, zero React state changes during drag
  const gridRef        = React.useRef(null);
  const slotsRef       = React.useRef([]);
  const gridParamsRef  = React.useRef({});
  // (no React drag state — all drag visuals handled in pure DOM)

  // ── New slot popover (빈 칸 클릭)
  const [newSlotPopover, setNewSlotPopover] = React.useState(null);
  // { day, time, anchorX, anchorY }

  // ── Snap to 15-min grid
  const snap15 = (mins) => Math.round(mins / 15) * 15;

  // Week label — "This week", "Next week", "Apr 28 – May 4", etc.
  const weekLabel = (() => {
    if (weekOffset === 0) return "This week";
    if (weekOffset === 1) return "Next week";
    if (weekOffset === -1) return "Last week";
    const now = new Date();
    const sun = new Date(now);
    sun.setDate(now.getDate() - now.getDay() + weekOffset * 7);
    const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
    const fmt = d => d.toLocaleDateString("en-AU", {day:"numeric", month:"short"});
    return `${fmt(sun)} – ${fmt(sat)}`;
  })();

  // ── Week key: ISO Monday date of the displayed week ──────────────────────
  const getWeekKey = (offset) => {
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
    return mon.toISOString().slice(0, 10);
  };
  const currentWeekKey = getWeekKey(weekOffset);

  // ── Resolve effective override for a given student/slot/week ───────────────
  // Priority: 1) exact week override  2) most-recent "from" override <= currentWeekKey  3) null
  const getEffectiveOverride = (studentId, slotIdx, weekKey) => {
    // 1. Exact week match
    const exactKey = `${weekKey}/${studentId}/${slotIdx}`;
    if (weekOverrides[exactKey]) return weekOverrides[exactKey];
    // 2. Find all "from" overrides for this student/slot, pick the latest one <= weekKey
    const fromEntries = Object.entries(weekOverrides)
      .filter(([k]) => k.startsWith(`from/`) && k.endsWith(`/${studentId}/${slotIdx}`))
      .map(([k, v]) => ({ fromWeek: k.split("/")[1], ...v }))
      .filter(e => e.fromWeek <= weekKey)
      .sort((a, b) => b.fromWeek.localeCompare(a.fromWeek)); // latest first
    return fromEntries[0] || null;
  };

  // ── Build slots — apply weekly overrides ─────────────────────────────────
  const slots = [];
  const skippedSlots = []; // slots hidden this week (skip override)
  students.forEach(s => {
    if (s.lessonDay) {
      const overrideKey = `${currentWeekKey}/${s.id}/1`;
      const ov = getEffectiveOverride(s.id, 1, currentWeekKey);
      const effectiveOvKey = ov?.fromWeek ? `from/${ov.fromWeek}/${s.id}/1` : overrideKey;
      if (ov?.skip) {
        skippedSlots.push({ day: s.lessonDay, time: s.lessonTime||"09:00", student: s, dur: s.lessonDuration||45, overrideKey: effectiveOvKey, slotIdx:1 });
      } else {
        slots.push({
          day: ov ? ov.day : s.lessonDay,
          time: ov ? ov.time : (s.lessonTime||"09:00"),
          student: s, dur: s.lessonDuration||45,
          fortnightly: s.lessonsPerWeek==="fortnightly",
          fortActive: s.lessonsPerWeek!=="fortnightly" || isFortnightWeek(s.startDate, weekOffset),
          overrideKey,
          isOverridden: !!ov,
          slotIdx: 1,
        });
      }
    }
    if (s.lessonsPerWeek === 2 && s.lessonDay2) {
      const overrideKey = `${currentWeekKey}/${s.id}/2`;
      const ov = getEffectiveOverride(s.id, 2, currentWeekKey);
      const effectiveOvKey2 = ov?.fromWeek ? `from/${ov.fromWeek}/${s.id}/2` : overrideKey;
      const dur2 = s.lessonDuration2 || s.lessonDuration || 45;
      if (ov?.skip) {
        skippedSlots.push({ day: s.lessonDay2, time: s.lessonTime2||"09:00", student: s, dur: dur2, overrideKey: effectiveOvKey2, slotIdx:2 });
      } else {
        slots.push({
          day: ov ? ov.day : s.lessonDay2,
          time: ov ? ov.time : (s.lessonTime2||"09:00"),
          student: s, dur: dur2,
          fortnightly: false, fortActive: true,
          overrideKey,
          isOverridden: !!ov,
          slotIdx: 2,
        });
      }
    }
  });

  const byDay = {};
  DAYS_ORDER.forEach(d => { byDay[d] = []; });
  slots.forEach(slot => { if (byDay[slot.day]) byDay[slot.day].push(slot); });
  DAYS_ORDER.forEach(d => { byDay[d].sort((a,b) => a.time.localeCompare(b.time)); });
  slotsRef.current = slots; // keep ref fresh for drag handlers

  const activeDays = DAYS_ORDER; // show all days including empty ones
  const unscheduled = students.filter(s => !s.lessonDay);

  if (students.length === 0) {
    return (
      <div className="card p-16 text-center fade-in">
        <div className="text-5xl mb-4">🗓</div>
        <p className="text-slate-600 font-semibold mb-1">No students yet</p>
        <p className="text-slate-400 text-sm mb-6">Add your first student to see the schedule.</p>
        <button className="btn-primary" onClick={onAdd}>+ Add student</button>
      </div>
    );
  }

  // ── Time grid config ─────────────────────────────────────────────────────
  // Find earliest/latest lesson to set grid bounds
  const allTimes = slots.map(s => {
    const [h,m] = s.time.split(":").map(Number);
    return h * 60 + (m||0);
  });
  const minTime = allTimes.length ? Math.max(0,   Math.floor((Math.min(...allTimes) - 30) / 60) * 60) : 8 * 60;
  const maxTime = allTimes.length ? Math.min(1440, Math.ceil((Math.max(...allTimes) + 90)  / 60) * 60) : 21 * 60;

  // Generate hour labels
  const hours = [];
  for (let t = minTime; t <= maxTime; t += 60) hours.push(t);

  const SLOT_H = 80;  // px per 60 min — 30min=40px, 45min=60px, 60min=80px
  const TIME_COL = 52; // px width of time label column
  const gridH = (maxTime - minTime) / 60 * SLOT_H;

  // Keep grid params fresh for drag handlers (avoids stale closure in mouseup)
  gridParamsRef.current = { SLOT_H, TIME_COL, minTime, maxTime, activeDays: DAYS_ORDER };

  // ── Date numbers for each day column ────────────────────────────────────
  // Get the Monday of the displayed week, then compute each day's date
  const weekDates = (() => {
    const now = new Date();
    const nowDay = now.getDay(); // 0=Sun
    // Sunday of the displayed week (anchor: Sun-first)
    const sun = new Date(now);
    sun.setDate(now.getDate() - nowDay + weekOffset * 7);
    // Build map: day name → Date object
    // DAYS_ORDER = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]
    const DAY_OFFSET = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };
    const map = {};
    DAYS_ORDER.forEach(d => {
      const dt = new Date(sun);
      dt.setDate(sun.getDate() + DAY_OFFSET[d]);
      map[d] = dt;
    });
    return map;
  })();

  const timeToY = (timeStr) => {
    const [h, m] = timeStr.split(":").map(Number);
    return ((h * 60 + (m||0)) - minTime) / 60 * SLOT_H;
  };
  const durToH = (dur) => (dur / 60) * SLOT_H;

  const fmtHour = (mins) => {
    const h = Math.floor(mins / 60);
    const suffix = h >= 12 ? "pm" : "am";
    const display = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `${display}${suffix}`;
  };

  // Today's day name for highlight
  const todayDay = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];

  const clearOverride = (overrideKey) => {
    if (onDeleteOverride) onDeleteOverride(overrideKey);
  };

  // ── Slot mousedown → pure-DOM drag, zero React state changes during move ──
  const onSlotMouseDown = (e, slot) => {
    if (e.button !== 0) return;
    e.stopPropagation();

    // Capture everything we need as local primitives at mousedown time
    const overrideKey  = slot.overrideKey;
    const slotIdx      = slot.slotIdx;
    const studentId    = slot.student.id;
    const studentName  = slot.student.name;
    const origDay      = slot.day;
    const dur          = slot.dur || 45;
    const fromDay      = slot.isOverridden
      ? (weekOverrides[overrideKey]?.day  || origDay)
      : (slot.student[slotIdx===2 ? "lessonDay2"  : "lessonDay"]  || origDay);
    const fromTime     = slot.isOverridden
      ? (weekOverrides[overrideKey]?.time || "09:00")
      : (slot.student[slotIdx===2 ? "lessonTime2" : "lessonTime"] || "09:00");
    const startX = e.clientX, startY = e.clientY;

    let active = false; // true once drag threshold crossed
    let overlay = null, clone = null, ghost = null;

    // ── Compute day/time from cursor ──────────────────────────────────────
    const hitTest = (cx, cy) => {
      const gp = gridParamsRef.current;
      const grid = gridRef.current;
      if (!grid || !gp || !gp.activeDays) return null;
      const { SLOT_H: SH, TIME_COL: TC, minTime: mn, maxTime: mx, activeDays: days } = gp;
      const rect = grid.getBoundingClientRect();
      const scrollLeft = grid.scrollLeft || 0;
      // x relative to start of day columns (accounting for scroll)
      const x = (cx - rect.left) + scrollLeft - TC;
      const y = cy - rect.top;
      if (y < 0 || y > rect.height) return null;
      // Use scrollWidth for true total width (all day columns)
      const totalColW = grid.scrollWidth - TC;
      const colW = totalColW / days.length;
      const dayIdx = Math.max(0, Math.min(days.length - 1, Math.floor(x / colW)));
      const rawMins = mn + (y / SH) * 60;
      const snapped = Math.round(rawMins / 15) * 15;
      const clamped = Math.max(mn, Math.min(mx - 15, snapped));
      const hh = String(Math.floor(clamped / 60)).padStart(2, "0");
      const mm = String(clamped % 60).padStart(2, "0");
      return { day: days[dayIdx], time: `${hh}:${mm}`, dayIdx, colW, rect, scrollLeft };
    };

    // ── Create overlay + visuals once drag threshold is crossed ──────────
    const startDrag = () => {
      document.body.classList.add("dragging");

      // Overlay: full-screen transparent div to capture all mouse events
      overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;z-index:9990;cursor:grabbing;";
      document.body.appendChild(overlay);

      // Floating clone
      clone = document.createElement("div");
      const dc = DAY_COLOR[origDay] || DAY_COLOR.Monday;
      clone.style.cssText = `position:fixed;z-index:9999;width:130px;border-radius:8px;
        padding:5px 8px;box-shadow:0 8px 24px rgba(0,0,0,0.25);pointer-events:none;
        opacity:0.95;background:${dc.blockBg};border-left:3px solid ${dc.border};`;
      clone.innerHTML = `
        <div style="font-size:10px;font-weight:700;color:${dc.blockText};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${studentName}</div>
        <div id="_dc_time" style="font-size:9px;color:${dc.border};font-weight:600;margin-top:1px;">${fmtTime(fromTime)} · ${dur}m</div>
        <div id="_dc_day" style="font-size:9px;color:#6366f1;font-weight:700;margin-top:1px;display:none;"></div>
      `;
      document.body.appendChild(clone);

      // Drop ghost
      ghost = document.createElement("div");
      ghost.style.cssText = "position:fixed;z-index:9991;border-radius:8px;border:2px dashed #6366f1;background:rgba(99,102,241,0.1);pointer-events:none;display:none;";
      ghost.innerHTML = `<span id="_dg_time" style="font-size:9px;color:#6366f1;font-weight:700;padding:3px 6px;display:block;"></span>`;
      document.body.appendChild(ghost);

      // Dim source slot in DOM directly (no React state)
      const sourceEl = document.querySelector(`[data-override-key="${overrideKey}"]`);
      if (sourceEl) sourceEl.style.opacity = "0.25";

      active = true;
    };

    // ── Update clone + ghost positions ───────────────────────────────────
    const updateVisuals = (cx, cy) => {
      clone.style.left = (cx + 14) + "px";
      clone.style.top  = (cy - 20) + "px";

      const hit = hitTest(cx, cy);
      if (hit) {
        const tEl = clone.querySelector("#_dc_time");
        if (tEl) tEl.textContent = `${fmtTime(hit.time)} · ${dur}m`;
        const dEl = clone.querySelector("#_dc_day");
        if (dEl) {
          if (hit.day !== fromDay) { dEl.textContent = `→ ${hit.day.slice(0,3)}`; dEl.style.display="block"; }
          else { dEl.style.display="none"; }
        }
        // Position ghost
        const [h,m] = hit.time.split(":").map(Number);
        const gp = gridParamsRef.current;
        const scrollLeft = gridRef.current ? gridRef.current.scrollLeft : 0;
        const topPx = ((h*60+(m||0) - gp.minTime) / 60) * gp.SLOT_H;
        const leftPx = hit.rect.left + gp.TIME_COL + hit.dayIdx * hit.colW - scrollLeft + 4;
        const ghostH = Math.max((dur/60)*gp.SLOT_H, 28) - 4;
        ghost.style.display = "block";
        ghost.style.top    = (hit.rect.top + topPx + 2) + "px";
        ghost.style.left   = leftPx + "px";
        ghost.style.width  = (hit.colW - 8) + "px";
        ghost.style.height = ghostH + "px";
        const gtEl = ghost.querySelector("#_dg_time");
        if (gtEl) gtEl.textContent = fmtTime(hit.time);
      } else {
        ghost.style.display = "none";
      }
    };

    // ── Cleanup helper ────────────────────────────────────────────────────
    const cleanup = () => {
      document.body.classList.remove("dragging");
      if (overlay) { overlay.remove(); overlay = null; }
      if (clone)   { clone.remove();   clone   = null; }
      if (ghost)   { ghost.remove();   ghost   = null; }
      // Restore source slot opacity
      const sourceEl = document.querySelector(`[data-override-key="${overrideKey}"]`);
      if (sourceEl) sourceEl.style.opacity = "";
    };

    const onMove = (ev) => {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!active) {
        if (Math.sqrt(dx*dx + dy*dy) < 6) return;
        startDrag();
      }
      updateVisuals(ev.clientX, ev.clientY);
    };

    const onUp = (ev) => {
      overlay && overlay.removeEventListener("mousemove", onMove);
      overlay && overlay.removeEventListener("mouseup", onUp);
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);

      if (!active) { cleanup(); return; }

      const hit = hitTest(ev.clientX, ev.clientY);
      const toDay  = hit ? hit.day  : fromDay;
      const toTime = hit ? hit.time : fromTime;
      cleanup();

      // Now safe to call React setters — drag is fully over
      const liveSlot = slotsRef.current.find(sl => sl.overrideKey === overrideKey);
      if (liveSlot) {
        setActivePopover({
          overrideKey,
          slot: liveSlot,
          fromDay, fromTime,
          toDay, toTime,
          calendarWeekOffset: weekOffset,
          anchorRect: { right: ev.clientX + 10, left: ev.clientX - 330, top: ev.clientY - 60 },
        });
      }
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  return (
    <div className="fade-in">
      {/* ── Week navigation ── */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={()=>setWeekOffset(w=>w-1)}
          className="btn-ghost text-sm py-1.5 px-4">← Prev</button>
        <div className="text-center">
          <span className="text-sm font-bold text-slate-700">{weekLabel}</span>
          {Object.keys(weekOverrides).filter(k=>k.startsWith(currentWeekKey)).length > 0 && (
            <button onClick={()=>{
              Object.keys(weekOverrides).filter(k=>k.startsWith(currentWeekKey)).forEach(k=>{
                if (onDeleteOverride) onDeleteOverride(k);
              });
            }}
              className="ml-3 text-xs font-semibold text-rose-400 hover:text-rose-600"
              style={{background:"none",border:"none",cursor:"pointer"}}>
              ↺ Reset moves
            </button>
          )}
        </div>
        <button onClick={()=>setWeekOffset(w=>w+1)}
          className="btn-ghost text-sm py-1.5 px-4">Next →</button>
      </div>

      {/* ── Weekly calendar grid ── */}
      <div className="card overflow-hidden" style={{marginBottom: unscheduled.length ? 24 : 0}}>
        {/* Header row — day names */}
        <div style={{display:"flex", borderBottom:"1px solid #f1f5f9"}}>
          {/* Time col spacer */}
          <div style={{width: TIME_COL, flexShrink:0, padding:"10px 0", borderRight:"1px solid #f1f5f9"}}/>
          {activeDays.map(day => {
            const dc = DAY_COLOR[day] || DAY_COLOR.Monday;
            return (
              <div key={day} style={{
                flex:1, textAlign:"center", padding:"10px 4px",
                borderRight:"1px solid #f1f5f9",
                background: dc.bg,
              }}>
                <span style={{
                  fontSize:"11px", fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase",
                  color: dc.text,
                }}>{day.slice(0,3)}</span>
                {/* Date number */}
                {(() => {
                  const dt = weekDates[day];
                  const dateNum = dt ? dt.getDate() : "";
                  const isToday = day === todayDay && weekOffset === 0;
                  return (
                    <span style={{
                      display:"block",
                      fontSize: isToday ? "15px" : "13px",
                      fontWeight: isToday ? 800 : 600,
                      color: isToday ? dc.border : dc.text,
                      marginTop: 2,
                      lineHeight: 1,
                    }}>{dateNum}</span>
                  );
                })()}
                {day===todayDay && weekOffset===0 && (
                  <span style={{display:"block",width:6,height:6,borderRadius:"50%",background:dc.border,margin:"3px auto 0"}}/>
                )}
                {(() => {
                  const count = byDay[day].length;
                  const totalMins = byDay[day].reduce((sum, slot) => sum + (slot.dur||45), 0);
                  const hrs = Math.floor(totalMins / 60);
                  const mins = totalMins % 60;
                  const timeStr = hrs > 0 ? (mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`) : `${mins}m`;
                  return (
                    <>
                      <span style={{display:"block",fontSize:"10px",color:dc.border,marginTop:2,opacity:0.8}}>
                        {count} lesson{count!==1?"s":""}
                      </span>
                      {count > 0 && (
                        <span style={{display:"block",fontSize:"9px",color:dc.border,opacity:0.6,marginTop:1}}>
                          {timeStr}
                        </span>
                      )}
                    </>
                  );
                })()}
              </div>
            );
          })}
        </div>

        {/* Grid body */}
        <div ref={gridRef} style={{display:"flex", overflowX:"auto"}}>
          {/* Time labels column */}
          <div style={{width:TIME_COL, flexShrink:0, position:"relative", height:gridH, borderRight:"1px solid #f1f5f9"}}>
            {hours.map(t => (
              <div key={t} style={{
                position:"absolute", top: (t - minTime)/60*SLOT_H - 8,
                left:0, right:0, textAlign:"right", paddingRight:8,
              }}>
                <span style={{fontSize:"10px",color:"#cbd5e1",fontWeight:600}}>{fmtHour(t)}</span>
              </div>
            ))}
          </div>

          {/* Day columns */}
          {activeDays.map(day => {
            const dc = DAY_COLOR[day] || DAY_COLOR.Monday;
            return (
            <div key={day} style={{
              flex:1, position:"relative", height:gridH, minWidth:120,
              borderRight:"1px solid #f1f5f9",
              background: dc.grid,
              cursor:"crosshair",
            }}
            onClick={e=>{
              // Only fire if click was directly on the column (not on a slot)
              if (e.target !== e.currentTarget && e.target.closest("[data-slot]")) return;
              const gp = gridParamsRef.current;
              if (!gp || !gp.SLOT_H) return;
              const rect = e.currentTarget.getBoundingClientRect();
              const y = e.clientY - rect.top;
              const rawMins = gp.minTime + (y / gp.SLOT_H) * 60;
              const snapped = Math.round(rawMins / 15) * 15;
              const clamped = Math.max(gp.minTime, Math.min(gp.maxTime - 30, snapped));
              const hh = String(Math.floor(clamped/60)).padStart(2,"0");
              const mm = String(clamped%60).padStart(2,"0");
              setNewSlotPopover({ day, time:`${hh}:${mm}`, anchorX: e.clientX, anchorY: e.clientY });
            }}
            >
              {/* Hour grid lines */}
              {hours.map(t => (
                <div key={t} style={{
                  position:"absolute", top: (t-minTime)/60*SLOT_H,
                  left:0, right:0, borderTop:"1px solid #f1f5f9",
                }}/>
              ))}

              {/* Drop ghost created in pure DOM during drag — no JSX */}

              {/* Lesson blocks */}
              {byDay[day].map((slot, i) => {
                const s = slot.student;
                const gc = GRADE_COLOR[s.grade] || GRADE_COLOR["Grade 5"];
                const plan = buildPlan({ startingPhase: isExamStudent(s)?"foundation":"exploration", ...s });
                const curM = plan.findIndex(m => m.monthStr === currentMonthStr());
                const phase = (curM>=0 ? plan[curM] : plan[plan.length-1])?.phase;
                const pm = PHASE_META[phase] || PHASE_META.foundation;
                const initials = s.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
                const top = timeToY(slot.time);
                const safeDur = (slot.dur && slot.dur > 0) ? slot.dur : 45;
                const height = Math.max(durToH(safeDur), 28);
                const isTiny    = height < 28;  // name only (very short slots <20min)
                const isCompact = height < 50;  // name+time only, no buttons
                const isShort   = isTiny;       // legacy alias for button guard below
                const isToday = day === todayDay && weekOffset === 0;
                const isOffWeek = slot.fortnightly && !slot.fortActive;

                // Status for today's slot only
                const todayStr = new Date().toISOString().slice(0,10);
                const todayLog = isToday ? logs.filter(l => l.studentId===s.id && l.date===todayStr).sort((a,b)=>b.date.localeCompare(a.date))[0] : null;
                const todayStatus = !isToday ? null : todayLog ? (todayLog.type==="absent" ? "absent" : "logged") : "pending";

                const isPopoverOpen = activePopover?.overrideKey === slot.overrideKey;

                return (
                  <div key={i}
                    data-slot="1"
                    data-override-key={slot.overrideKey}
                    onClick={()=>{ onSelect(s); }}
                    onMouseDown={e=>{ if (!s.paused && !isOffWeek) onSlotMouseDown(e, slot); }}
                    style={{
                      position:"absolute", top: top+2, left:4, right:4, height: height-4,
                      borderRadius:8,
                      background: (isOffWeek || s.paused) ? "#f1f5f9" : slot.isOverridden ? "#ede9fe" : dc.blockBg,
                      borderLeft:`3px solid ${(isOffWeek || s.paused) ? "#cbd5e1" : slot.isOverridden ? "#6366f1" : dc.border}`,
                      outline: isPopoverOpen ? "2px solid #6366f1" : slot.isOverridden ? "1.5px dashed #a5b4fc" : "none",
                      opacity: (isOffWeek || s.paused) ? 0.5 : 1,
                      filter: s.paused ? "grayscale(40%)" : "none",
                      cursor: s.paused || isOffWeek ? "default" : "grab",
                      overflow:"hidden", transition:"box-shadow 0.15s",
                      boxShadow: isPopoverOpen ? "0 0 0 3px rgba(99,102,241,0.15)" : slot.isOverridden ? "0 1px 4px rgba(99,102,241,0.2)" : "0 1px 4px rgba(0,0,0,0.08)",
                      padding: isTiny ? "1px 5px" : "3px 6px",
                      display:"flex", flexDirection:"column", alignItems:"flex-start", gap:1,
                      zIndex: isPopoverOpen ? 20 : 1,
                    }}
                    onMouseEnter={e=>{if(!isPopoverOpen){e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.15)";e.currentTarget.style.zIndex=10;}}}
                    onMouseLeave={e=>{if(!isPopoverOpen){e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.08)";e.currentTarget.style.zIndex=1;}}}>

                    {/* Name row + reschedule button */}
                    <div style={{display:"flex",alignItems:"center",width:"100%",gap:2,flexShrink:0}}>
                      <span style={{fontSize: isTiny ? "9px" : "10px", fontWeight:700,
                        color:(isOffWeek||s.paused)?"#94a3b8": slot.isOverridden ? "#4338ca" : dc.blockText,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                        flex:1, lineHeight:"1.2"}}>
                        {s.name}{s.paused ? " ⏸" : ""}
                      </span>
                      {/* ✎ reschedule icon */}
                      {!s.paused && !isOffWeek && (
                        <button
                          title="Reschedule"
                          onClick={e=>{
                            e.stopPropagation();
                            const rect = e.currentTarget.closest("[data-slot]").getBoundingClientRect();
                            const fromD = slot.isOverridden ? weekOverrides[slot.overrideKey]?.day  : s[slot.slotIdx===2?"lessonDay2":"lessonDay"];
                            const fromT = slot.isOverridden ? weekOverrides[slot.overrideKey]?.time : (s[slot.slotIdx===2?"lessonTime2":"lessonTime"] || "09:00");
                            setActivePopover(prev =>
                              prev?.overrideKey === slot.overrideKey ? null :
                              { overrideKey: slot.overrideKey, slot, fromDay: fromD, fromTime: fromT, calendarWeekOffset: weekOffset, anchorRect: rect }
                            );
                          }}
                          style={{fontSize:"9px",lineHeight:1,padding:"1px 3px",border:"none",
                            background: isPopoverOpen ? "#6366f1" : "transparent",
                            color: isPopoverOpen ? "#fff" : "#94a3b8",
                            cursor:"pointer",flexShrink:0,borderRadius:4,
                            transition:"all 0.1s"}}>✎</button>
                      )}
                      {slot.isOverridden && (
                        <button title="Revert this slot"
                          onClick={e=>{
                            e.stopPropagation();
                            const rect = e.currentTarget.getBoundingClientRect();
                            const origDay  = s[slot.slotIdx===2?"lessonDay2":"lessonDay"];
                            const origTime = s[slot.slotIdx===2?"lessonTime2":"lessonTime"] || "09:00";
                            setRevertConfirm({
                              overrideKey: slot.overrideKey,
                              studentName: s.name,
                              slotIdx: slot.slotIdx,
                              student: s,
                              originalDay: origDay,
                              originalTime: fmtTime(origTime),
                              anchorX: rect.right,
                              anchorY: rect.top,
                            });
                            setActivePopover(null);
                          }}
                          style={{fontSize:"9px",lineHeight:1,padding:"0 2px",border:"none",background:"transparent",
                            color:"#6366f1",cursor:"pointer",flexShrink:0,fontWeight:900}}>✕</button>
                      )}
                      {/* Skip this week button — only for non-overridden slots */}
                      {!s.paused && !isOffWeek && !slot.isOverridden && (
                        <button title="Remove lesson"
                          onClick={e=>{
                            e.stopPropagation();
                            const rect = e.currentTarget.getBoundingClientRect();
                            setSkipConfirm({
                              overrideKey: slot.overrideKey,
                              studentName: s.name,
                              slotIdx: slot.slotIdx,
                              student: s,
                              anchorX: rect.right,
                              anchorY: rect.top,
                            });
                          }}
                          style={{fontSize:"9px",lineHeight:1,padding:"1px 3px",border:"none",
                            background:"transparent", color:"#f87171",
                            cursor:"pointer",flexShrink:0,borderRadius:4,
                            transition:"all 0.1s", opacity:0,
                          }}
                          className="skip-btn"
                        >✕</button>
                      )}
                    </div>

                    {/* Time info */}
                    {!isTiny && (
                      <span style={{fontSize:"9px",color:(isOffWeek||s.paused)?"#94a3b8": slot.isOverridden?"#6366f1":dc.border,
                        fontWeight:600,whiteSpace:"nowrap",flexShrink:0,lineHeight:"1.2"}}>
                        {fmtTime(slot.time)} · {safeDur}m
                        {slot.isOverridden && <span style={{marginLeft:3,opacity:0.7}}>↪</span>}
                      </span>
                    )}

                    {/* Action buttons — today only */}
                    {!isTiny && isToday && todayStatus !== null && !s.paused && (
                      <div style={{marginTop:"auto",display:"flex",gap:3,paddingTop:2}} onClick={e=>e.stopPropagation()}>
                        {todayStatus === "logged" && (
                          <span style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,
                            background:"#f0fdf4",color:"#16a34a"}}>✓ Logged</span>
                        )}
                        {todayStatus === "absent" && (
                          <span style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,
                            background:"#fef2f2",color:"#dc2626"}}>😔 Absent</span>
                        )}
                        {todayStatus === "pending" && (
                          <>
                            <button onClick={()=>onLog(s)}
                              style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,border:"none",
                                background:dc.border,color:"white",cursor:"pointer"}}>+ Log</button>
                            <button onClick={()=>onAbsence(s)}
                              style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,border:"none",
                                background:"#fef2f2",color:"#dc2626",cursor:"pointer"}}>Absent</button>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Skipped slots — hidden cleanly (no ghost shown) */}
            </div>
          ); })}
        </div>
      </div>

      {/* Unscheduled */}
      {unscheduled.length > 0 && (
        <div>
          <p className="text-xs font-bold text-slate-400 mb-2" style={{textTransform:"uppercase",letterSpacing:"0.07em"}}>No day set ({unscheduled.length})</p>
          <div className="flex flex-wrap gap-2">
            {unscheduled.map(s => (
              <button key={s.id} onClick={()=>onSelect(s)}
                className="text-xs bg-white border border-slate-200 px-3 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                {s.name} · {s.grade}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Drag clone + ghost are created/removed in pure DOM inside onSlotMouseDown */}

      {/* ── Reschedule popover ── */}
      <ReschedulePopover
        activePopover={activePopover}
        weekOverrides={weekOverrides}
        onCancel={() => setActivePopover(null)}
        onWeekOnly={({ toDay, toTime, weekKey: targetKey }) => {
          // Single-week override — use week from popover's week picker (may differ from currentWeekKey)
          const studentId = activePopover.slot.student.id;
          const slotIdx   = activePopover.slot.slotIdx;
          const wk = targetKey || currentWeekKey;
          if (onSaveOverride) onSaveOverride({ weekKey: wk, studentId, slotIdx, day: toDay, time: toTime });
          setActivePopover(null);
        }}
        onFromWeek={({ toDay, toTime, fromWeek: targetKey }) => {
          // "From this week onwards" permanent override
          const fw = targetKey || currentWeekKey;
          if (!fw) { alert("Could not determine week — please try again."); return; }
          if (onSaveOverride) onSaveOverride({
            weekKey: null,
            fromWeek: fw,
            studentId: activePopover.slot.student.id,
            slotIdx: activePopover.slot.slotIdx,
            day: toDay, time: toTime,
          });
          setActivePopover(null);
        }}
        onAllTime={({ toDay, toTime }) => {
          // Change lesson_day/lesson_time directly (affects all weeks past+future)
          if (onPermanentReschedule) {
            onPermanentReschedule({ student: activePopover.slot.student, slotIdx: activePopover.slot.slotIdx, toDay, toTime });
          }
          if (onDeleteOverride) onDeleteOverride(activePopover.overrideKey);
          setActivePopover(null);
        }}
        onReset={() => {
          if (onDeleteOverride) onDeleteOverride(activePopover.overrideKey);
          setActivePopover(null);
        }}
        onDeleteSlot={() => {
          if (onDeleteSlot) onDeleteSlot(activePopover.slot.student, activePopover.slot.slotIdx);
          setActivePopover(null);
        }}
      />

      {/* ── Skip confirm popover ── */}
      <SkipConfirmPopover
        popover={skipConfirm}
        onCancel={() => setSkipConfirm(null)}
        onSkipWeek={() => {
          if (!skipConfirm) return;
          if (onSaveOverride) onSaveOverride({ weekKey: currentWeekKey, studentId: skipConfirm.student.id, slotIdx: skipConfirm.slotIdx, skip: true });
          setSkipConfirm(null);
        }}
        onSkipFromWeek={() => {
          if (!skipConfirm) return;
          if (onSaveOverride) onSaveOverride({ weekKey: null, fromWeek: currentWeekKey, studentId: skipConfirm.student.id, slotIdx: skipConfirm.slotIdx, skip: true });
          setSkipConfirm(null);
        }}
        onDeleteSlot={() => {
          if (!skipConfirm) return;
          if (onDeleteSlot) onDeleteSlot(skipConfirm.student, skipConfirm.slotIdx);
          setSkipConfirm(null);
        }}
        onDeleteStudent={() => {
          if (!skipConfirm) return;
          if (onDeleteStudent) onDeleteStudent(skipConfirm.student.id);
          setSkipConfirm(null);
        }}
      />

      {/* ── Revert confirm popover (overridden slot ✕) ── */}
      <RevertConfirmPopover
        popover={revertConfirm}
        onCancel={() => setRevertConfirm(null)}
        onRevertWeek={() => {
          if (!revertConfirm) return;
          // Delete only the single-week override key (exact week_key match)
          // Build a week-specific key for this week and delete it
          const weekKey = `${currentWeekKey}/${revertConfirm.student.id}/${revertConfirm.slotIdx}`;
          if (onDeleteOverride) onDeleteOverride(weekKey);
          // Also clear the effective override key in case it's a "from" key
          if (revertConfirm.overrideKey !== weekKey) {
            // Add a single-week "revert" by saving the original day/time for this week only
            const origDay  = revertConfirm.student[revertConfirm.slotIdx===2?"lessonDay2":"lessonDay"];
            const origTime = revertConfirm.student[revertConfirm.slotIdx===2?"lessonTime2":"lessonTime"] || "09:00";
            if (onSaveOverride) onSaveOverride({
              weekKey: currentWeekKey,
              studentId: revertConfirm.student.id,
              slotIdx: revertConfirm.slotIdx,
              day: origDay, time: origTime,
            });
          }
          setRevertConfirm(null);
        }}
        onRevertFromWeek={() => {
          if (!revertConfirm) return;
          // Delete the override — from this week on, use the regular schedule
          if (onDeleteOverride) onDeleteOverride(revertConfirm.overrideKey);
          // Also save a "from this week" override pointing back to original
          const origDay  = revertConfirm.student[revertConfirm.slotIdx===2?"lessonDay2":"lessonDay"];
          const origTime = revertConfirm.student[revertConfirm.slotIdx===2?"lessonTime2":"lessonTime"] || "09:00";
          if (onSaveOverride) onSaveOverride({
            weekKey: null,
            fromWeek: currentWeekKey,
            studentId: revertConfirm.student.id,
            slotIdx: revertConfirm.slotIdx,
            day: origDay, time: origTime,
          });
          setRevertConfirm(null);
        }}
        onRevertAll={() => {
          if (!revertConfirm) return;
          // Delete override entirely — restores regular slot for all weeks
          if (onDeleteOverride) onDeleteOverride(revertConfirm.overrideKey);
          setRevertConfirm(null);
        }}
      />

      {/* ── Create slot popover — 빈 칸 클릭 ── */}
      <CreateSlotPopover
        popover={newSlotPopover}
        students={students}
        onCancel={() => setNewSlotPopover(null)}
        onSave={({ studentId, day, time, dur, weekOnly }) => {
          const s = students.find(st => st.id === studentId);
          if (!s) return;
          const slotIdx = s.lessonDay ? 2 : 1;
          if (weekOnly) {
            // Store as a week override only — does not modify the student's regular slot
            if (onSaveOverride) onSaveOverride({
              weekKey: currentWeekKey,
              studentId: s.id,
              slotIdx,
              day,
              time,
            });
          } else {
            if (onCreateSlot) onCreateSlot({ student: s, slotIdx, day, time, dur });
          }
          setNewSlotPopover(null);
        }}
        onSaveNew={({ name, grade, day, time, dur, weekOnly }) => {
          // New students always get a permanent slot (weekOnly ignored for brand-new students)
          if (onCreateNewStudent) onCreateNewStudent({ name, grade, lessonDay: day, lessonTime: time, lessonDuration: dur });
          setNewSlotPopover(null);
        }}
      />
    </div>
  );
}

function App() {
  const [students, setStudents] = useState([]);
  const [logs,     setLogs]     = useState([]);
  const [view,     setView]     = useState("list");
  const [tab,      setTab]      = useState("today");
  const [selected, setSelected] = useState(null);
  const [showAdd,  setShowAdd]  = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [logging,  setLogging]  = useState(null);
  const [editLog,  setEditLog]  = useState(null);
  const [search,         setSearch]        = useState("");
  const [filterGrade,    setFilterGrade]   = useState("All");
  const [filterTrack,    setFilterTrack]   = useState("All");
  const [sortBy,         setSortBy]        = useState("name");
  const [showPaused,     setShowPaused]    = useState(true);
  const [showExportMenu, setShowExportMenu] = useState(false);
  const [importing,    setImporting]    = useState(false);
  const [absenceTarget, setAbsenceTarget] = useState(null); // student to mark absent
  const [pauseTarget,   setPauseTarget]   = useState(null); // student to pause (shows modal)
  const [userId,   setUserId]   = useState(null);
  const [loading,  setLoading]  = useState(true);
  const [dbError,  setDbError]  = useState("");
  // overrides: { "<weekKey>/<studentId>/<slotIdx>": { day, time, id } }
  // id = Supabase row id (for upsert/delete)
  const [overrides, setOverrides] = useState({});

  // ── Load data from Supabase on mount ──────────────────────────────────────
  useEffect(() => {
    async function init() {
      const session = await requireAuth();
      if (!session) return;
      const uid = session.user.id;
      setUserId(uid);

      const [{ data: sData, error: sErr }, { data: lData, error: lErr }, { data: oData, error: oErr }] = await Promise.all([
        _supabase.from("students").select("*").eq("user_id", uid).order("created_at"),
        _supabase.from("lesson_logs").select("*").eq("user_id", uid).order("date", { ascending: false }),
        _supabase.from("lesson_overrides").select("*").eq("user_id", uid),
      ]);

      if (sErr || lErr) {
        setDbError("Could not load data. Please refresh.");
      } else {
        setStudents((sData || []).map(rowToStudent));
        setLogs((lData || []).map(rowToLog));
        // Build overrides map from DB rows
        // Two key formats:
        //   "<weekKey>/<studentId>/<slotIdx>"  → single-week override
        //   "from/<fromWeek>/<studentId>/<slotIdx>" → "from this week onwards" permanent override
        const map = {};
        (oData || []).forEach(r => {
          if (r.from_week && !r.week_key) {
            // Permanent-from override
            const key = `from/${r.from_week}/${r.student_id}/${r.slot_idx}`;
            const val = r.day === "__skip__" ? { skip: true, id: r.id, fromWeek: r.from_week }
                                             : { day: r.day, time: r.time, id: r.id, fromWeek: r.from_week };
            map[key] = val;
          } else if (r.week_key) {
            // Single-week override (original behaviour)
            const key = `${r.week_key}/${r.student_id}/${r.slot_idx}`;
            map[key] = r.day === "__skip__" ? { skip: true, id: r.id }
                                            : { day: r.day, time: r.time, id: r.id };
          }
        });
        setOverrides(map);
      }
      setLoading(false);
    }
    init();
  }, []);

  // ── Override CRUD ─────────────────────────────────────────────────────────
  // fromWeek: if set, stores a "from this week onwards" permanent override (week_key=null, from_week=fromWeek)
  // weekKey only: stores a single-week override (original behaviour)
  const saveOverride = async ({ weekKey, studentId, slotIdx, day, time, skip, fromWeek }) => {
    const dbDay  = skip ? "__skip__" : day;
    const dbTime = skip ? null : time;

    // Guard: must have either fromWeek or weekKey — never save a row with both NULL
    if (!fromWeek && !weekKey) {
      console.error("saveOverride: both fromWeek and weekKey are null — skipping save", { studentId, slotIdx, day, time });
      return;
    }

    if (fromWeek) {
      // ── Permanent-from override ──
      const key = `from/${fromWeek}/${studentId}/${slotIdx}`;
      const existing = overrides[key];
      const localVal = skip ? { skip: true, fromWeek } : { day, time, fromWeek };
      const row = { user_id: userId, student_id: studentId, week_key: null, from_week: fromWeek, slot_idx: slotIdx, day: dbDay, time: dbTime };
      if (existing) {
        const { data, error } = await _supabase.from("lesson_overrides").update({ day: dbDay, time: dbTime }).eq("id", existing.id).select().single();
        if (error) { alert("Could not save override: " + error.message); return; }
        setOverrides(prev => ({ ...prev, [key]: { ...localVal, id: data.id } }));
      } else {
        const { data, error } = await _supabase.from("lesson_overrides").insert(row).select().single();
        if (error) { alert("Could not save override: " + error.message); return; }
        setOverrides(prev => ({ ...prev, [key]: { ...localVal, id: data.id } }));
      }
    } else {
      // ── Single-week override ──
      const key = `${weekKey}/${studentId}/${slotIdx}`;
      const existing = overrides[key];
      const localVal = skip ? { skip: true } : { day, time };
      if (existing) {
        const { data, error } = await _supabase.from("lesson_overrides").update({ day: dbDay, time: dbTime }).eq("id", existing.id).select().single();
        if (error) { alert("Could not save override: " + error.message); return; }
        setOverrides(prev => ({ ...prev, [key]: { ...localVal, id: data.id } }));
      } else {
        const { data, error } = await _supabase.from("lesson_overrides")
          .insert({ user_id: userId, student_id: studentId, week_key: weekKey, from_week: null, slot_idx: slotIdx, day: dbDay, time: dbTime })
          .select().single();
        if (error) { alert("Could not save override: " + error.message); return; }

      if (!showPaused && s.paused) return false;
      const matchSearch = s.name.toLowerCase().includes(q) || s.grade.toLowerCase().includes(q);
      const matchGrade  = filterGrade === "All" || s.grade === filterGrade;
      const matchTrack  = filterTrack === "All"
        || (filterTrack === "exam" && isExamStudent(s))
        || (filterTrack === "general" && !isExamStudent(s));
      return matchSearch && matchGrade && matchTrack;
    });
    list = [...list].sort((a, b) => {
      if (sortBy === "name")       return a.name.localeCompare(b.name);
      if (sortBy === "grade")      return GRADES.indexOf(a.grade) - GRADES.indexOf(b.grade);
      if (sortBy === "exam")  {
        if (!a.examDate && !b.examDate) return 0;
        if (!a.examDate) return 1;
        if (!b.examDate) return -1;
        return a.examDate.localeCompare(b.examDate);
      }
      if (sortBy === "lastlog") {
        const aLog = logs.filter(l=>l.studentId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
        const bLog = logs.filter(l=>l.studentId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
        if (!aLog && !bLog) return 0;
        if (!aLog) return 1;
        if (!bLog) return -1;
        return bLog.date.localeCompare(aLog.date);
      }
      if (sortBy === "monthcount") {
        const now = new Date();
        const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
        const aCount = logs.filter(l=>l.studentId===a.id && l.date&&l.date.startsWith(ym) && l.type!=="absent").length;
        const bCount = logs.filter(l=>l.studentId===b.id && l.date&&l.date.startsWith(ym) && l.type!=="absent").length;
        return bCount - aCount;
      }
      return 0;
    });

                    </button>
                    <button onClick={exportExcel}
                      className="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 flex items-center gap-2">
                      <span>📊</span> Download Excel
                    </button>
                    <div className="border-t border-slate-100"/>
                    <button onClick={()=>{exportJSON();setShowExportMenu(false);}}
                      className="w-full text-left px-4 py-2.5 text-xs text-slate-400 hover:bg-slate-50 flex items-center gap-2">
                      <span>💾</span> Backup JSON
                    </button>
                  </div>
                </>
              )}
            </div>
            <button onClick={bulkImport} disabled={importing}
              className="btn-ghost text-xs py-2 px-3 no-print"
              style={{color:"#0d9488", borderColor:"#0d9488", opacity: importing ? 0.6 : 1}}>
              {importing ? "Importing…" : "⬆ Import schedule"}
            </button>
            <button onClick={()=>setShowAdd(true)} className="btn-primary text-xs py-2 px-4 no-print">+ Add student</button>
            <button onClick={()=>signOut()} className="btn-ghost text-xs py-2 px-3 no-print" style={{color:"#94a3b8"}}>Sign out</button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">

        {/* Today tab */}
        {tab==="today" && (
          <TodayView
            students={students}
            logs={logs}
            onLog={setLogging}
            onAbsence={setAbsenceTarget}
            onSelect={s=>{setSelected(s);setView("detail");setTab("students");}}
            onDeleteLog={deleteLog}
            onMarkAttended={markAttended}
          />
        )}

        {/* Schedule tab */}
        {tab==="schedule" && (
          <ScheduleView
            students={students}
            logs={logs}
            overrides={overrides}
            onLog={setLogging}
            onAbsence={setAbsenceTarget}
            onSelect={s=>{setSelected(s);setView("detail");setTab("students");}}
            onAdd={()=>setShowAdd(true)}
            onSaveOverride={saveOverride}
            onDeleteOverride={deleteOverride}
            onPermanentReschedule={handlePermanentReschedule}
            onCreateSlot={handleCreateSlot}
            onDeleteSlot={handleDeleteSlot}
            onCreateNewStudent={handleCreateNewStudent}
            onDeleteStudent={_doDeleteStudent}
          />
        )}

        {/* Urgent banner */}
        {tab==="students" && urgent.length > 0 && view==="list" && (
          <div className="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6 flex flex-wrap items-center gap-3">
            <span className="text-red-500">⚠</span>
            <div>
              <p className="text-sm font-bold text-red-700">Exam coming up</p>
              <p className="text-xs text-red-400">{urgent.map(s=>`${s.name} (${weeksUntil(s.examDate)}w)`).join(" · ")}</p>
            </div>
          </div>
        )}

        {/* List view */}
        {tab==="students" && view==="list" && (
          <>
            {students.length > 0 && (
              <div className="flex flex-wrap items-center gap-2 mb-5 no-print">
                {/* Search */}
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="Search students…"
                  className="input" style={{width:"200px",flexShrink:0}}/>

                {/* Grade filter */}
                <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}
                  className="input" style={{width:"auto",flexShrink:0}}>
                  <option value="All">All grades</option>
                  {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
                </select>

                {/* Track filter */}
                <div className="flex gap-1 bg-slate-100 rounded-xl p-1" style={{flexShrink:0}}>
                  {[["All","All"],["exam","With exam"],["general","No exam"]].map(([val,label])=>(
                    <button key={val} onClick={()=>setFilterTrack(val)}
                      className="px-3 py-1 rounded-lg text-xs font-semibold transition-all"
                      style={filterTrack===val?{background:"white",color:"#4f46e5",boxShadow:"0 1px 4px #0001"}:{color:"#94a3b8"}}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Sort */}
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                  className="input" style={{width:"auto",flexShrink:0}}>
                  <option value="name">Sort: Name</option>
                  <option value="grade">Sort: Grade</option>
                  <option value="exam">Sort: Exam date</option>
                  <option value="lastlog">Sort: Last log</option>
                  <option value="monthcount">Sort: Lessons this month</option>
                </select>

                {/* Active filter count badge */}
                {(search || filterGrade!=="All" || filterTrack!=="All") && (
                  <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#eef2ff",color:"#4338ca"}}>
                    {filtered.length} / {students.filter(s=>!s.paused).length}
                  </span>
                )}

                {/* Show paused toggle */}
                {students.some(s=>s.paused) && (
                  <button onClick={()=>setShowPaused(p=>!p)}
                    style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",cursor:"pointer",border:"1px solid",
                      background:showPaused?"#fffbeb":"white",
                      color:showPaused?"#d97706":"#94a3b8",
                      borderColor:showPaused?"#fde68a":"#e2e8f0"}}>
                    ⏸ {students.filter(s=>s.paused).length} paused
                  </button>
                )}

                {/* Clear filters */}
                {(search || filterGrade!=="All" || filterTrack!=="All") && (
                  <button onClick={()=>{setSearch("");setFilterGrade("All");setFilterTrack("All");}}
                    style={{fontSize:"11px",fontWeight:700,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",padding:"3px 6px"}}>
                    ✕ Clear
                  </button>
                )}
              </div>
            )}
            {students.length === 0 ? (
              <div className="card p-16 text-center fade-in">
                <div className="text-5xl mb-4">🎹</div>
                <p className="text-slate-600 font-semibold mb-1">No students yet</p>
                <p className="text-slate-400 text-sm mb-6">Add your first student to get started.</p>
                <button className="btn-primary" onClick={()=>setShowAdd(true)}>+ Add student</button>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {filtered.map(s=>(
                  <StudentCard key={s.id} student={s} logs={logs}
                    onLog={setLogging} onEdit={setEditing}
                    onDelete={deleteStudent} onSelect={selectStudent}/>
                ))}
                {filtered.length===0 && (
                  <div className="col-span-3 text-center py-12 text-slate-400 text-sm">
                    No students match your filters.
                    <button onClick={()=>{setSearch("");setFilterGrade("All");setFilterTrack("All");}}
                      className="ml-2" style={{color:"#4f46e5",fontWeight:600,background:"none",border:"none",cursor:"pointer",fontSize:"inherit"}}>
                      Clear filters
                    </button>
                  </div>
                )}
              </div>
            )}
          </>
        )}

        {/* Detail view — always read student from live students array so edits reflect immediately */}
        {tab==="students" && view==="detail" && selected && (() => {
          const liveStudent = students.find(s=>s.id===selected.id) || selected;
          return (
            <StudentDetail
              student={liveStudent} logs={logs}
              onLog={setLogging}
              onEditLog={(log)=>{setEditLog(log);setLogging(liveStudent);}}
              onDeleteLog={deleteLog}
              onMarkAttended={markAttended}
              onBack={()=>{setView("list");setSelected(null);}}
              onEdit={setEditing}
              onPause={setPauseTarget}
              onResume={resumeStudent}
            />
          );
        })()}
      </main>

      {/* Modals */}
      {showAdd && <StudentModal onSave={addStudent} onClose={()=>setShowAdd(false)}/>}
      {editing  && <StudentModal initial={editing} onSave={updateStudent} onClose={()=>setEditing(null)}/>}
      {absenceTarget && <AbsenceModal student={absenceTarget} onSave={saveAbsence} onClose={()=>setAbsenceTarget(null)}/>}
      {pauseTarget && <PauseModal student={pauseTarget} onSave={(opts)=>pauseStudent(pauseTarget, opts)} onClose={()=>setPauseTarget(null)}/>}
      {logging  && (
        <LogModal
          student={logging}
          existingLog={editLog}
          currentMonth={MONTH_NAMES[new Date().getMonth()] + " " + new Date().getFullYear()}
          lastLog={!editLog ? logs.filter(l=>l.studentId===logging.id).sort((a,b)=>b.date.localeCompare(a.date))[0] : null}
          onSave={saveLog}
          onClose={()=>{setLogging(null);setEditLog(null);}}
        />
      )}
    </div>
  );
}

// ── Error boundary — catches any React render crash and shows the error ──
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  componentDidCatch(err, info) {
    console.error("React crash:", err, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:40, fontFamily:"monospace", background:"#fef2f2", minHeight:"100vh"}}>
          <h2 style={{color:"#dc2626", marginBottom:16}}>⚠ React render error</h2>
          <pre style={{background:"#fff", border:"1px solid #fca5a5", borderRadius:8, padding:16,
            fontSize:12, whiteSpace:"pre-wrap", wordBreak:"break-all", color:"#1e293b"}}>
            {this.state.error.toString()}
            {"\n\n"}
            {this.state.error.stack}
          </pre>
          <button onClick={()=>this.setState({error:null})}
            style={{marginTop:16, padding:"8px 20px", background:"#dc2626", color:"white",
              border:"none", borderRadius:8, cursor:"pointer", fontSize:14}}>
            Try again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Check session before rendering — redirects to login.html if not logged in
requireAuth().then(session => {
  if (session) {
    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary><App/></ErrorBoundary>
    );
  }
});
</script>
</body>
</html>
