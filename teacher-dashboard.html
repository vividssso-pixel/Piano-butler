<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════════════ */
const GRADES = ["Preliminary","Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8"];
const LESSON_DURATIONS = [30, 45, 60];
const PLAN_MONTHS = [1, 2, 3, 6, 12];

// Calculate goal date from startDate + N months
const addMonths = (dateStr, months) => {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T12:00:00");
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0,10);
};

// Time allocation by lesson duration (minutes)
const TIME_ALLOC = {
  30: { repertoire:18, technical:7,  sr:3,  gk:2  },
  45: { repertoire:25, technical:12, sr:5,  gk:3  },
  60: { repertoire:35, technical:15, sr:7,  gk:3  },
};
// For custom durations: scale proportionally from the 45-min baseline
const getAlloc = (mins) => {
  if (TIME_ALLOC[mins]) return TIME_ALLOC[mins];
  const ratio = mins / 45;
  return {
    repertoire: Math.round(25 * ratio),
    technical:  Math.round(12 * ratio),
    sr:         Math.round(5  * ratio),
    gk:         Math.round(3  * ratio),
  };
};

const PHASE_META = {
  foundation:    { name:"Foundation & Learning",      color:"#6366f1", bg:"#eef2ff", text:"#4338ca" },
  development:   { name:"Development & Technique",    color:"#0891b2", bg:"#ecfeff", text:"#0e7490" },
  consolidation: { name:"Consolidation",              color:"#16a34a", bg:"#f0fdf4", text:"#15803d" },
  polish:        { name:"Polish & Performance",       color:"#d97706", bg:"#fffbeb", text:"#b45309" },
  exam:          { name:"Exam Preparation",           color:"#dc2626", bg:"#fef2f2", text:"#b91c1c" },
  // General track phases
  exploration:   { name:"Exploration & Learning",     color:"#7c3aed", bg:"#f5f3ff", text:"#6d28d9" },
  performance:   { name:"Performance & Sharing",      color:"#0d9488", bg:"#f0fdfa", text:"#0f766e" },
};

const GRADE_COLOR = {
  "Preliminary":{ bg:"#eef2ff", text:"#4338ca" },
  "Grade 1":    { bg:"#f5f3ff", text:"#6d28d9" },
  "Grade 2":    { bg:"#eff6ff", text:"#1d4ed8" },
  "Grade 3":    { bg:"#ecfeff", text:"#0e7490" },
  "Grade 4":    { bg:"#f0fdfa", text:"#0f766e" },
  "Grade 5":    { bg:"#f0fdf4", text:"#15803d" },
  "Grade 6":    { bg:"#f7fee7", text:"#4d7c0f" },
  "Grade 7":    { bg:"#fffbeb", text:"#b45309" },
  "Grade 8":    { bg:"#fff7ed", text:"#c2410c" },
};

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
const uid = () => Math.random().toString(36).slice(2,9);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = (d) => d ? new Date(d+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}) : "—";
const fmtShort = (d) => d ? new Date(d+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"}) : "—";

const MONTH_NAMES = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const fmtMonth = (dateStr) => {
  if (!dateStr) return "—";
  const d = new Date(dateStr + "T12:00:00");
  return MONTH_NAMES[d.getMonth()] + " " + d.getFullYear();
};

const monthsUntil = (dateStr) => {
  if (!dateStr) return null;
  const now = new Date();
  const end = new Date(dateStr + "T12:00:00");
  const diff = (end.getFullYear() - now.getFullYear()) * 12 + (end.getMonth() - now.getMonth());
  return Math.max(diff, 0);
};
const monthsSince = (dateStr) => {
  if (!dateStr) return 1;
  const start = new Date(dateStr + "T12:00:00");
  const now   = new Date();
  const diff  = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  return Math.max(diff + 1, 1);
};
// Keep weeksUntil for exam countdown display only
const weeksUntil = (dateStr) => {
  if (!dateStr) return null;
  const diff = Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24*7));
  return Math.max(diff, 0);
};

/* ═══════════════════════════════════════════════════════════════════════════
   PLAN GENERATION
═══════════════════════════════════════════════════════════════════════════ */
function buildPlan(student) {
  const endDate = isExamStudent(student)
    ? student.examDate
    : addMonths(student.startDate, student.planMonths || 3);
  if (!endDate || !student.startDate) return [];

  const MONTH_FOCUS = {
    foundation:    ["Select all exam repertoire. Begin hands-separate reading of each piece.","Hands-together work begins. Establish daily practice routine.","Scales and technical exercises for this grade. Sight-reading starts.","Full review of all pieces HS and HT. Identify problem passages."],
    development:   ["Increase tempo on all pieces. Focus on voicing and tone.","Technical demands: scales, arpeggios, exercises at tempo.","Musical shaping — dynamics, articulation, phrasing across all pieces.","Aural training and General Knowledge for this grade.","Targeted passage work. Rhythm and memory check."],
    consolidation: ["Full run-throughs of all pieces. Record and self-review.","Technical work at performance tempo. Aural all required skills.","General Knowledge: composer context, form, Italian terms.","Back-to-back run-through. Note stamina and consistency."],
    polish:        ["Mock exam #1 — full run in exam order. Written feedback.","Address mock exam feedback. Performance detail on each piece.","Mock exam #2 — simulate exam conditions. Final refinements."],
    exam:          ["Light maintenance only. No new learning. Rest and trust your preparation."],
    exploration:   ["Discuss goals. Select repertoire together. Begin reading new pieces.","Hands-together work begins. Identify technical focus areas.","Establish daily practice structure suited to this student."],
    performance:   ["Polish all pieces to sharing standard. Record a home performance.","Reflect on progress. Celebrate achievements. Plan ahead."],
  };

  // Step 1: Generate every month from startDate to endDate (cursor-based, guaranteed correct)
  const allMonths = [];
  const cursor = new Date(student.startDate + "T12:00:00");
  cursor.setDate(1);
  const endD = new Date(endDate + "T12:00:00");
  endD.setDate(1);

  while (cursor <= endD) {
    allMonths.push({
      monthStr: cursor.toISOString().slice(0, 7),
      label: MONTH_NAMES[cursor.getMonth()] + " " + cursor.getFullYear(),
    });
    cursor.setMonth(cursor.getMonth() + 1);
  }

  const total = allMonths.length;
  if (total === 0) return [];

  // Step 2: Assign a phase to each month index by ratio (no rounding errors)
  const getPhase = (i) => {
    const ratio = i / total;
    if (isExamStudent(student)) {
      if (i === total - 1)       return "exam";
      if (ratio >= 0.85)         return "polish";
      if (ratio >= 0.60)         return "consolidation";
      if (ratio >= 0.30)         return "development";
      return "foundation";
    } else {
      if (ratio >= 0.85)         return "performance";
      if (ratio >= 0.65)         return "consolidation";
      if (ratio >= 0.35)         return "development";
      return "exploration";
    }
  };

  // Step 3: Apply startingPhase — clamp early phases upward (never remove months)
  const EXAM_ORDER    = ["foundation","development","consolidation","polish","exam"];
  const GENERAL_ORDER = ["exploration","development","consolidation","performance"];
  const order = isExamStudent(student) ? EXAM_ORDER : GENERAL_ORDER;
  const cutPhase = student.startingPhase || (isExamStudent(student) ? "foundation" : "exploration");
  const cutIdx   = Math.max(order.indexOf(cutPhase), 0);

  // Step 4: Build final month objects
  const phaseCounter = {};
  return allMonths
    .map((m, i) => {
      // Clamp phase — never go below the startingPhase
      const raw = getPhase(i);
      const rawIdx = order.indexOf(raw);
      const phase = rawIdx < cutIdx ? cutPhase : raw;
      return { ...m, phase };
    })
    .map(m => {
      phaseCounter[m.phase] = (phaseCounter[m.phase] || 0);
      const focusArr = MONTH_FOCUS[m.phase] || ["Continue focused practice."];
      const focus = focusArr[Math.min(phaseCounter[m.phase], focusArr.length - 1)];
      phaseCounter[m.phase]++;
      return { ...m, focus, alloc: getAlloc(student.lessonDuration) };
    });
}

// Current month string "YYYY-MM"
const currentMonthStr = () => new Date().toISOString().slice(0,7);
const monthsSinceStart = (startDate) => {
  if (!startDate) return 0;
  const s = new Date(startDate + "T12:00:00");
  const n = new Date();
  return Math.max((n.getFullYear()-s.getFullYear())*12 + (n.getMonth()-s.getMonth()), 0);
};

// Days until next occurrence of a weekday name (0 = today, 1 = tomorrow, …)
const daysUntilNext = (dayName) => {
  if (!dayName) return null;
  const DAY_IDX = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };
  const target = DAY_IDX[dayName];
  if (target === undefined) return null;
  const today = new Date().getDay();
  return (target - today + 7) % 7; // 0 = today
};

// Returns true if this week is a lesson week for a fortnightly student
// Uses startDate as the anchor — week 0 = lesson week, week 1 = off week, etc.
const isFortnightWeek = (startDate, weekOffset = 0) => {
  if (!startDate) return true; // fallback: always show
  const start = new Date(startDate + "T12:00:00");
  // Get Monday of the start week
  const startDay = start.getDay();
  const startMonday = new Date(start);
  startMonday.setDate(start.getDate() - ((startDay + 6) % 7));
  // Get Monday of target week (current week + offset)
  const now = new Date();
  const nowDay = now.getDay();
  const nowMonday = new Date(now);
  nowMonday.setDate(now.getDate() - ((nowDay + 6) % 7) + weekOffset * 7);
  // How many weeks apart?
  const weeksDiff = Math.round((nowMonday - startMonday) / (7 * 24 * 60 * 60 * 1000));
  return weeksDiff % 2 === 0;
};

// Days until exam date (floored)
const daysUntilExam = (examDate) => {
  if (!examDate) return null;
  const diff = Math.ceil((new Date(examDate + "T12:00:00") - new Date()) / (1000*60*60*24));
  return Math.max(diff, 0);
};

/* ═══════════════════════════════════════════════════════════════════════════
   AI GUIDE (rule-based)
═══════════════════════════════════════════════════════════════════════════ */
function generateGuide(student, logs, currentMonthIdx, plan) {
  const studentLogs = logs
    .filter(l => l.studentId === student.id)
    .sort((a,b) => b.date.localeCompare(a.date));

  const recentLogs = studentLogs.slice(0, 3);
  const phase = plan[currentMonthIdx]?.phase;
  const weeksLeft = isExamStudent(student) ? weeksUntil(student.examDate) : null;
  const monthsLeft = isExamStudent(student)
    ? monthsUntil(student.examDate)
    : monthsUntil(addMonths(student.startDate, student.planMonths||3));

  const alerts  = [];
  const tips    = [];
  let   status  = "on-track"; // "on-track" | "warning" | "urgent"

  if (studentLogs.length === 0) {
    return { status:"neutral", alerts:[], tips:["Start logging lessons to get personalised guidance."] };
  }

  // ── Check: missing sections ──
  const last2 = recentLogs.slice(0,2);
  const noTech  = last2.length >= 2 && last2.every(l => !l.technical?.trim());
  const noSR    = last2.length >= 2 && last2.every(l => !l.srAural?.trim());
  const noGK    = recentLogs.slice(0,3).every(l => !l.gk?.trim()) && recentLogs.length >= 3;

  if (noTech)  { alerts.push("Technical work hasn't been recorded for 2+ weeks."); status="warning"; }
  if (noSR)    { alerts.push("Sight-reading & Aural missing for 2+ weeks."); status="warning"; }
  if (noGK && (phase === "consolidation" || phase === "polish" || phase === "exam"))
               { alerts.push("General Knowledge not recorded — important at this stage."); status="warning"; }

  // ── Check: exam-specific urgency ──
  if (isExamStudent(student)) {
    if (weeksLeft !== null && weeksLeft <= 4) {
      status = "urgent";
      const hasMock = studentLogs.some(l => l.notes?.toLowerCase().includes("mock") || l.repertoire?.toLowerCase().includes("mock"));
      if (!hasMock) alerts.push("No mock exam recorded yet — schedule one this week.");
    }
    if (monthsLeft !== null && monthsLeft <= 2 && phase === "development") {
      alerts.push("Development phase is running long — consider moving to Consolidation.");
      status = "warning";
    }
    if (phase === "exam") {
      tips.push("Exam month: light maintenance only. No new learning. Rest and trust the preparation.");
    }
  }

  // ── Positive patterns ──
  const allSections = recentLogs.every(l => l.repertoire?.trim() && l.technical?.trim());
  if (allSections && recentLogs.length >= 2) tips.push("Great consistency — all sections covered recently.");

  // ── Phase-specific tips ──
  const phaseTips = {
    foundation:    "Focus on reading accuracy before adding speed.",
    development:   "Rotate piece focus each session — don't overload one piece.",
    consolidation: "Start recording full run-throughs. Note stamina and memory.",
    polish:        "Run mock exams. One specific fix per piece per lesson.",
    exam:          "Trust the preparation. Light practice, good sleep.",
    exploration:   "Keep it positive — let the student drive repertoire choices where possible.",
    performance:   "Celebrate what's been achieved this term.",
  };
  if (phaseTips[phase]) tips.push(phaseTips[phase]);

  // ── Lesson duration tip ──
  if (student.lessonDuration === 30 && recentLogs[0]) {
    const lastLog = recentLogs[0];
    const filledSections = [lastLog.repertoire, lastLog.technical, lastLog.srAural, lastLog.gk].filter(s => s?.trim()).length;
    if (filledSections >= 4) tips.push("30-min lesson — prioritise repertoire + one other section per week.");
  }

  if (alerts.length === 0 && status === "on-track") tips.unshift("On track — keep the current pace.");

  return { status, alerts, tips };
}

/* ═══════════════════════════════════════════════════════════════════════════
   SUPABASE DATA LAYER
   _supabase is provided by auth.js (loaded before this script)
═══════════════════════════════════════════════════════════════════════════ */

// Helper: treat a student as exam-bound if they have an exam date set
const isExamStudent = (s) => !!(s && s.examDate);

// Map Supabase row → app student object
const rowToStudent = (r) => {
  const extra = r.extra ? (() => { try { return JSON.parse(r.extra); } catch(e) { return {}; } })() : {};
  return {
    id: r.id,
    name: r.name,
    grade: extra.grade || r.grade || "",
    track: r.track || "general",
    examDate: r.exam_date || "",
    // Prefer startDate saved in extra (user-editable), fall back to row creation timestamp
    startDate: extra.startDate || (r.created_at ? r.created_at.slice(0,10) : todayStr()),
    planMonths: r.plan_months || 3,
    lessonDuration: r.lesson_dur || 45,
    lessonDay: r.lesson_day || "Monday",
    lessonTime: r.lesson_time || "16:00",
    lessonDay2: r.lesson_day2 || "",
    lessonTime2: r.lesson_time2 || "",
    startingPhase: r.start_phase || "foundation",
    // Spread remaining extra fields (startDate already handled above)
    ...extra,
  };
};

// Map app student object → Supabase row (for insert/update)
const studentToRow = (f, userId) => {
  // Pull out the core columns, stash the rest in `extra`
  const { id, name, grade, track, examDate, startDate, planMonths,
          lessonDuration, lessonDay, lessonTime, lessonDay2, lessonTime2,
          startingPhase, ...rest } = f;
  // Always persist startDate + grade (free text) in the extra blob
  const extraObj = { ...rest };
  if (startDate) extraObj.startDate = startDate;
  if (grade) extraObj.grade = grade;
  // derive track from examDate presence
  const derivedTrack = examDate ? "exam" : "general";
  return {
    ...(userId ? { user_id: userId } : {}),
    name: (name || "").trim(),
    grade: grade || "",
    track: derivedTrack,
    exam_date: examDate || null,
    plan_months: planMonths || 3,
    lesson_dur: lessonDuration || 45,
    lesson_day: lessonDay || "Monday",
    lesson_time: lessonTime || "16:00",
    lesson_day2: lessonDay2 || null,
    lesson_time2: lessonTime2 || null,
    start_phase: startingPhase || "foundation",
    extra: Object.keys(extraObj).length ? JSON.stringify(extraObj) : null,
  };
};

// Map Supabase row → app log object (gk is the canonical app field name)
const rowToLog = (r) => {
  const extra = r.extra ? (() => { try { return JSON.parse(r.extra); } catch(e) { return {}; } })() : {};
  return {
    id: r.id,
    studentId: r.student_id,
    date: r.date,
    monthStr: r.date ? r.date.slice(0,7) : "",
    repertoire: r.repertoire || "",
    technical: r.technical || "",
    srAural: r.sr_aural || "",
    gk: r.general_k || "",
    notes: r.notes || "",
    mood: extra.mood || "",
    pieceRating: extra.pieceRating || "",
    type: extra.type || "regular", // "regular" | "absent" | "makeup"
    makeupDate: extra.makeupDate || "",
  };
};

// Map app log object → Supabase row
// NOTE: extra column must exist in Supabase: ALTER TABLE lesson_logs ADD COLUMN extra text;
const logToRow = (f, studentId, userId) => ({
  ...(userId ? { user_id: userId } : {}),
  student_id: studentId,
  date: f.date || todayStr(),
  repertoire: f.repertoire || "",
  technical: f.technical || "",
  sr_aural: f.srAural || "",
  general_k: f.gk || "",
  notes: f.notes || "",
  extra: JSON.stringify({
    ...(f.mood       ? { mood: f.mood }             : {}),
    ...(f.pieceRating? { pieceRating: f.pieceRating }: {}),
    ...(f.type && f.type !== "regular" ? { type: f.type } : {}),
    ...(f.makeupDate ? { makeupDate: f.makeupDate }  : {}),
  }) || null,
});

/* ═══════════════════════════════════════════════════════════════════════════
   ABSENCE MODAL — mark a lesson as absent or makeup
═══════════════════════════════════════════════════════════════════════════ */
function PauseModal({ student, onSave, onClose }) {
  const [pauseFrom, setPauseFrom] = useState(todayStr());
  const [returnDate, setReturnDate] = useState("");
  const [undecided, setUndecided] = useState(false);

  const handleSave = () => {
    onSave({
      pauseFrom,
      pauseUntil: undecided ? null : (returnDate || null),
      pauseUndecided: undecided,
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div className="card p-6 fade-in" style={{width:"100%",maxWidth:400}}>
        <h3 className="font-bold text-slate-800 mb-1">⏸ Pause lessons</h3>
        <p className="text-sm text-slate-400 mb-5">{student.name}</p>

        <div className="space-y-4">
          <div>
            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Pause from</label>
            <input type="date" value={pauseFrom} onChange={e=>setPauseFrom(e.target.value)}
              className="input w-full" />
          </div>

          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Return date</label>
              <label className="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" checked={undecided} onChange={e=>setUndecided(e.target.checked)}
                  style={{accentColor:"#f59e0b"}} />
                <span className="text-xs font-semibold text-amber-600">Undecided</span>
              </label>
            </div>
            <input type="date" value={returnDate} onChange={e=>setReturnDate(e.target.value)}
              disabled={undecided}
              className="input w-full"
              style={{opacity: undecided ? 0.4 : 1, cursor: undecided ? "not-allowed" : "auto"}} />
            {undecided && (
              <p className="text-xs text-amber-600 mt-1.5">Return date TBD — you can set it later.</p>
            )}
          </div>
        </div>

        <div className="flex gap-3 mt-6">
          <button onClick={handleSave}
            className="flex-1 text-white text-sm font-bold py-2.5 rounded-xl"
            style={{background:"#f59e0b"}}>
            ⏸ Confirm pause
          </button>
          <button onClick={onClose}
            className="btn-ghost text-sm py-2.5 px-4">
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

            <div>
              <label className="field-label text-slate-500">Makeup scheduled for (optional)</label>

          {/* Notes */}
          <div>
            <label className="field-label text-slate-500">Notes (optional)</label>

        <div className="p-5 flex gap-3 border-t border-slate-100">
          <button className="btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary flex-1" onClick={handleSave}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   STUDENT MODAL
═══════════════════════════════════════════════════════════════════════════ */
function StudentModal({ initial, onSave, onClose }) {
  const PREP_PHASES = [
    { key:"foundation",    label:"Foundation",    sub:"Just starting — reading new pieces" },
    { key:"development",   label:"Development",   sub:"Pieces learned, building technique" },
    { key:"consolidation", label:"Consolidation", sub:"All pieces solid, polishing" },
    { key:"polish",        label:"Polish",        sub:"Mock exam ready" },
  ];
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const blank = {
    name:"", grade:"", level:"",
    examType:"", examDate:"",
    planMonths:3, termGoal:"",
    startDate: todayStr(),
    lessonDuration: 45, customDuration: false, lessonsPerWeek: 1,
    lessonDuration2: 45, customDuration2: false,
    startingPhase: "foundation",
    lessonDay: "Monday", lessonDay2: "",
    lessonTime: "16:00", lessonTime2: "",
  };
  const [f, setF] = useState(() => {
    if (!initial) return blank;
    return { ...blank, ...initial };
  });
  const [examOpen, setExamOpen] = useState(() => !!(initial?.examDate || initial?.examType));
  const set = (k,v) => setF(p => ({...p,[k]:v}));
  const valid = f.name.trim().length > 0;
  const hasExam = !!(f.examDate || f.examType);

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 overflow-y-auto" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg my-6 fade-in" onClick={e=>e.stopPropagation()}>
        <div className="p-6 border-b border-slate-100">
          <h2 className="text-base font-bold text-slate-800">{initial?"Edit student":"Add student"}</h2>
        </div>
        <div className="p-6 space-y-5 max-h-[70vh] overflow-y-auto">

          {/* Name */}
          <div>
            <label className="field-label text-slate-500">Student name</label>
            <input autoFocus className="input" value={f.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Clara Park"/>
          </div>

          {/* Grade / Level — free text */}
          <div>
            <label className="field-label text-slate-500">Grade / Level <span className="font-normal text-slate-400 normal-case">(optional)</span></label>
            <input className="input" value={f.grade || f.level || ""} onChange={e=>{set("grade",e.target.value);set("level",e.target.value);}}

          {/* Goal */}
          <div>
            <label className="field-label text-slate-500">Goal <span className="font-normal text-slate-400 normal-case">(optional)</span></label>
            <textarea className="input" rows={2} value={f.termGoal} onChange={e=>set("termGoal",e.target.value)}
              placeholder="e.g. Complete Sonatina Op.36 No.1, enjoy playing confidently"/>
          </div>

          {/* ── Exam section (collapsible) ── */}
          <div className="rounded-xl border transition-all overflow-hidden"
            style={{borderColor: examOpen ? "#c7d2fe" : "#e2e8f0", background: examOpen ? "#f8f7ff" : "white"}}>
            <button className="w-full flex items-center justify-between px-4 py-3 text-left"
              onClick={()=>setExamOpen(v=>!v)}>
              <div className="flex items-center gap-2">
                <span className="text-sm font-semibold text-slate-700">🎓 Exam preparation</span>
                {hasExam && !examOpen && (
                  <span className="text-xs px-2 py-0.5 rounded-full font-semibold"
                    style={{background:"#eef2ff",color:"#4f46e5"}}>
                    {f.examType || "exam"}{f.examDate ? " · " + f.examDate : ""}
                  </span>
                )}
              </div>
              <span className="text-slate-400 text-sm">{examOpen ? "▲" : "▼"}</span>
            </button>
            {examOpen && (
              <div className="px-4 pb-4 space-y-4 border-t border-indigo-100 pt-4">
                {/* Exam type — free text */}
                <div>
                  <label className="field-label text-slate-500">Exam type</label>
                  <input className="input" value={f.examType||""} onChange={e=>set("examType",e.target.value)}
                    placeholder="e.g. AMEB, RCM, Trinity, ABRSM…"/>
                </div>
                {/* Exam date */}
                <div>
                  <label className="field-label text-slate-500">Exam date <span className="font-normal text-slate-400 normal-case">(optional)</span></label>
                  <input type="date" className="input" value={f.examDate||""} onChange={e=>set("examDate",e.target.value)}/>
                  {f.examDate && (
                    <p className="text-xs text-indigo-600 mt-1">

                  )}
                </div>
                {/* Current prep stage */}
                <div>
                  <label className="field-label text-slate-500">
                    Current preparation stage
                    <span className="font-normal normal-case text-slate-400 ml-1">— where is this student right now?</span>
                  </label>
                  <div className="space-y-2">
                    {PREP_PHASES.map(({key,label,sub})=>{
                      const active = (f.startingPhase||"foundation") === key;
                      return (
                        <button key={key} onClick={()=>set("startingPhase",key)}

                <span className="text-base font-bold">Custom</span>
              </button>
            </div>
            {f.customDuration && (
              <div className="flex items-center gap-2">
                <input type="number" min="10" max="180" className="input text-sm"
                  style={{maxWidth:"100px"}}
                  value={f.lessonDuration}
                  onChange={e=>set("lessonDuration", Math.max(10,Math.min(180,parseInt(e.target.value)||45)))}
                  placeholder="45"/>

              </div>
            )}
          </div>

          {/* Lessons / week + day/time */}
          <div>
            <label className="field-label text-slate-500">Lesson frequency</label>

              {[{val:1,label:"1× week"},{val:2,label:"2× week"},{val:"fortnightly",label:"Fortnightly"}].map(opt=>(
                <button key={opt.val} onClick={()=>set("lessonsPerWeek",opt.val)}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold border transition-all"
                  style={f.lessonsPerWeek===opt.val?{background:"#4f46e5",color:"white",borderColor:"#4f46e5"}:{background:"white",color:"#64748b",borderColor:"#e2e8f0"}}>
                  {opt.label}

            <div className="flex gap-2 items-center mb-2">
              <select className="input text-sm" style={{flex:2}} value={f.lessonDay} onChange={e=>set("lessonDay",e.target.value)}>
                {DAYS.map(d=><option key={d}>{d}</option>)}
              </select>
              <input type="time" className="input text-sm" style={{flex:1}} value={f.lessonTime} onChange={e=>set("lessonTime",e.target.value)}/>
            </div>
            {f.lessonsPerWeek === 2 && (
              <div className="space-y-2">
                <div className="flex gap-2 items-center">
                  <select className="input text-sm" style={{flex:2}} value={f.lessonDay2||""} onChange={e=>set("lessonDay2",e.target.value)}>
                    <option value="">— 2nd day —</option>
                    {DAYS.map(d=><option key={d}>{d}</option>)}

                  <input type="time" className="input text-sm" style={{flex:1}} value={f.lessonTime2||""} onChange={e=>set("lessonTime2",e.target.value)}/>
                </div>
                {/* Duration for 2nd lesson — shown only if different from lesson 1 */}
                <div className="pl-1">
                  <p className="text-xs text-slate-400 mb-1.5">2nd lesson duration</p>
                  <div className="flex gap-2">
                    {[30,45,60].map(d=>{
                      const active = (f.lessonDuration2||45)===d && !f.customDuration2;
                      return (
                        <button key={d} onClick={()=>{set("lessonDuration2",d);set("customDuration2",false);}}
                          className="px-3 py-1.5 rounded-lg border text-xs font-bold transition-all"
                          style={active?{background:"#4f46e5",color:"white",borderColor:"#4f46e5"}:{background:"white",color:"#64748b",borderColor:"#e2e8f0"}}>
                          {d}m
                        </button>
                      );
                    })}
                    <button onClick={()=>set("customDuration2",true)}
                      className="px-3 py-1.5 rounded-lg border text-xs font-bold transition-all"
                      style={f.customDuration2?{background:"#4f46e5",color:"white",borderColor:"#4f46e5"}:{background:"white",color:"#64748b",borderColor:"#e2e8f0"}}>
                      Custom
                    </button>
                    {f.customDuration2 && (
                      <input type="number" min="10" max="180" className="input text-xs" style={{width:"64px"}}
                        value={f.lessonDuration2||45}
                        onChange={e=>set("lessonDuration2", Math.max(10,Math.min(180,parseInt(e.target.value)||45)))}/>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Start date */}
          <div>
            <label className="field-label text-slate-500">Lessons started with me</label>
            <input type="date" className="input" value={f.startDate||""} onChange={e=>set("startDate",e.target.value)}/>
          </div>

        </div>
        <div className="p-6 flex gap-3 border-t border-slate-100">
          <button className="btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary flex-1" onClick={()=>valid&&onSave(f)} disabled={!valid}>
            {initial?"Save changes":"Add student"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   LESSON LOG MODAL
═══════════════════════════════════════════════════════════════════════════ */
function LogModal({ student, existingLog, currentMonth, lastLog, onSave, onClose }) {
  const blank = { date:todayStr(), repertoire:"", technical:"", srAural:"", gk:"", notes:"", mood:"", pieceRating:"" };
  const [f, setF] = useState(existingLog ?? blank);
  const [copied, setCopied] = useState(false);
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  // ── Mood rating ──
  const MOODS = [
    { val:"rough",   emoji:"😕", label:"Rough" },
    { val:"okay",    emoji:"😐", label:"Okay"  },
    { val:"good",    emoji:"🙂", label:"Good"  },
    { val:"great",   emoji:"😀", label:"Great" },
  ];

  // ── Piece traffic light ──
  const TRAFFIC = [
    { val:"🔴", label:"Needs work" },
    { val:"🟡", label:"Progressing" },
    { val:"🟢", label:"Solid" },
  ];

  // ── Focus tag chips ──
  const CHIPS = {
    repertoire: ["HS","HT","Slow practice","Voicing","Dynamics","Phrasing","Memory","Bar-by-bar","LH alone","RH alone","Full run"],
    technical:  ["Scales","Arpeggios","Contrary motion","Broken chords","Octaves","Staccato","Legato","Fingering","Wrist","Tempo","Hands together"],
  };

  const appendChip = (key, chip) => {
    setF(p => {
      const cur = p[key];
      const sep = cur && !cur.endsWith(" ") && !cur.endsWith("\n") ? " " : "";
      return { ...p, [key]: cur + sep + chip + " " };
    });
  };

  const insertRating = (val) => {
    set("pieceRating", val);
    setF(p => {
      const cur = p.repertoire;
      // Replace existing leading traffic light if present
      const cleaned = cur.replace(/^[🔴🟡🟢]\s*/, "");
      return { ...p, repertoire: val + " " + cleaned, pieceRating: val };
    });
  };

  const copyHomework = () => {
    if (!f.notes?.trim()) return;
    navigator.clipboard.writeText(f.notes.trim()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const showLastHint = !existingLog && lastLog?.notes?.trim();

  return (
    <div className="fixed inset-0 bg-black/40 flex items-start justify-center z-50 p-4 overflow-y-auto" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg my-6 fade-in" onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="p-5 border-b border-slate-100">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <p className="font-bold text-slate-800">{student.name}</p>
              <p className="text-xs text-slate-400 mt-0.5">{student.grade} · {currentMonth} · {student.lessonDuration} min lesson</p>
            </div>
            <input type="date" className="input" style={{width:"auto",fontSize:"12px",padding:"6px 10px"}}
              value={f.date} onChange={e=>set("date",e.target.value)}/>
          </div>
          {/* Mood rating */}
          <div className="flex items-center gap-2">
            <span style={{fontSize:"10px",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8"}}>Today's lesson</span>
            <div className="flex gap-1">
              {MOODS.map(m=>(
                <button key={m.val} onClick={()=>set("mood", f.mood===m.val ? "" : m.val)}
                  title={m.label}
                  style={{
                    fontSize:"20px", padding:"4px 6px", borderRadius:"8px", border:"none", cursor:"pointer", lineHeight:1,
                    background: f.mood===m.val ? "#f1f5f9" : "transparent",
                    outline: f.mood===m.val ? "2px solid #6366f1" : "none",
                    transition:"all 0.1s",
                  }}>
                  {m.emoji}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Last lesson hint */}
        {showLastHint && (
          <div style={{margin:"12px 20px 0",padding:"10px 14px",background:"#f8fafc",borderRadius:"10px",border:"1px dashed #e2e8f0"}}>
            <p style={{margin:"0 0 3px",fontSize:"10px",fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#94a3b8"}}>Last lesson homework</p>
            <p style={{margin:0,fontSize:"12px",color:"#94a3b8",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{lastLog.notes.trim()}</p>
          </div>
        )}

        {/* Fields */}
        <div className="p-5 space-y-4 max-h-[55vh] overflow-y-auto">

          {/* Repertoire — with traffic light + chips */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="field-label" style={{color:"#4f46e5",marginBottom:0}}>Repertoire</label>
              <div className="flex gap-1">
                {TRAFFIC.map(t=>(
                  <button key={t.val} onClick={()=>insertRating(t.val)}
                    title={t.label}
                    style={{
                      fontSize:"15px", padding:"2px 5px", borderRadius:"6px", border:"none", cursor:"pointer", lineHeight:1,
                      background: f.pieceRating===t.val ? "#f1f5f9" : "transparent",
                      outline: f.pieceRating===t.val ? "2px solid #6366f1" : "none",
                    }}>
                    {t.val}
                  </button>
                ))}
              </div>
            </div>
            <textarea
              value={f.repertoire}
              onChange={e=>set("repertoire",e.target.value)}
              rows={2}
              placeholder="e.g. List A bars 1–16 HT, voicing in bar 8. List B HS, LH secure."
              className="input text-sm"
              style={{background:"#eef2ff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#4f46e5"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
            <div className="flex flex-wrap gap-1 mt-1">
              {CHIPS.repertoire.map(c=>(
                <button key={c} onClick={()=>appendChip("repertoire",c)}
                  style={{fontSize:"10px",fontWeight:600,padding:"2px 8px",borderRadius:"99px",border:"1px solid #c7d2fe",background:"#eef2ff",color:"#4338ca",cursor:"pointer"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* Technical — with chips */}
          <div>
            <label className="field-label" style={{color:"#7c3aed"}}>Technical work</label>
            <textarea
              value={f.technical}
              onChange={e=>set("technical",e.target.value)}
              rows={2}
              placeholder="e.g. 5B exercise – good. B major 4 oct, need more speed."
              className="input text-sm"
              style={{background:"#f5f3ff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#7c3aed"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
            <div className="flex flex-wrap gap-1 mt-1">
              {CHIPS.technical.map(c=>(
                <button key={c} onClick={()=>appendChip("technical",c)}
                  style={{fontSize:"10px",fontWeight:600,padding:"2px 8px",borderRadius:"99px",border:"1px solid #ddd6fe",background:"#f5f3ff",color:"#6d28d9",cursor:"pointer"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* SR & Aural */}
          <div>
            <label className="field-label" style={{color:"#0891b2"}}>Sight-reading & Aural</label>
            <textarea
              value={f.srAural}
              onChange={e=>set("srAural",e.target.value)}
              rows={2}
              placeholder="e.g. SR p.14 – hesitant bar 5. Intervals up to 6th solid."
              className="input text-sm"
              style={{background:"#ecfeff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#0891b2"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

          {/* General Knowledge */}
          <div>
            <label className="field-label" style={{color:"#d97706"}}>General Knowledge</label>
            <textarea
              value={f.gk}
              onChange={e=>set("gk",e.target.value)}
              rows={2}
              placeholder="e.g. Baroque style discussed. Terms: andante, legato. Binary form."
              className="input text-sm"
              style={{background:"#fffbeb",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#d97706"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

          {/* Notes & homework — with copy button */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="field-label" style={{color:"#64748b",marginBottom:0}}>Notes & homework</label>
              <button onClick={copyHomework}
                style={{
                  fontSize:"10px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",cursor:"pointer",
                  border:"1px solid #e2e8f0",background: copied ? "#f0fdf4" : "white",
                  color: copied ? "#15803d" : "#64748b", transition:"all 0.2s",
                }}>
                {copied ? "✓ Copied!" : "📋 Copy"}
              </button>
            </div>
            <textarea
              value={f.notes}
              onChange={e=>set("notes",e.target.value)}
              rows={2}
              placeholder="e.g. HW: List A bars 1–8 slowly ×3 daily. Parents updated re: exam."
              className="input text-sm"
              style={{background:"#f8fafc",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#64748b"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

        </div>

        <div className="p-5 flex gap-3 border-t border-slate-100">
          <button className="btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary flex-1" onClick={()=>onSave(f)}>Save lesson log</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   STUDENT CARD (list view)
═══════════════════════════════════════════════════════════════════════════ */
function StudentCard({ student, logs, onLog, onEdit, onDelete, onSelect }) {
  const gc = GRADE_COLOR[student.grade] || GRADE_COLOR["Grade 5"];
  const studentLogs = logs.filter(l=>l.studentId===student.id).sort((a,b)=>b.date.localeCompare(a.date));
  const lastLog = studentLogs[0];
  const thisMonthLogs = (() => {
    const now = new Date();
    const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    return studentLogs.filter(l => l.date && l.date.startsWith(ym) && l.type !== "absent").length;
  })();
  const studentNorm = { startingPhase: isExamStudent(student) ? "foundation" : "exploration", ...student };
  const plan = buildPlan(studentNorm);
  const curMonthStr = currentMonthStr();
  const currentMonthIdx = plan.findIndex(m => m.monthStr === curMonthStr);
  const currentPlanMonth = currentMonthIdx >= 0 ? plan[currentMonthIdx] : plan[plan.length-1];
  const phase = currentPlanMonth?.phase;
  const pm = PHASE_META[phase] || PHASE_META.foundation;

  const weeksLeft = isExamStudent(student) ? weeksUntil(student.examDate) : null;
  const monthsLeft = isExamStudent(student)
    ? monthsUntil(student.examDate)
    : monthsUntil(addMonths(student.startDate, student.planMonths||3));

  const guide = generateGuide(student, logs, Math.max(currentMonthIdx,0), plan);

  const urgentColor = weeksLeft !== null && weeksLeft <= 4 ? "#dc2626" : weeksLeft !== null && weeksLeft <= 8 ? "#d97706" : "#16a34a";

  // D-day helpers
  const nextLessonDays = daysUntilNext(student.lessonDay);
  const examDays = isExamStudent(student) ? daysUntilExam(student.examDate) : null;
  const nextLessonLabel = nextLessonDays === 0 ? "Today!" : nextLessonDays === 1 ? "Tomorrow" : nextLessonDays !== null ? `in ${nextLessonDays}d` : null;
  const isToday = nextLessonDays === 0;

  const initials = student.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

  return (
    <div className="card overflow-hidden hover:shadow-lg transition-all duration-200 cursor-pointer fade-in flex flex-col"
      style={student.paused ? {opacity:0.55, filter:"grayscale(40%)"} : {}}
      onClick={()=>onSelect(student)}>

      {/* Phase bar */}
      <div className="h-1.5" style={{background: student.paused ? "#d1d5db" : pm.color}}/>

      <div className="p-5 flex-1 flex flex-col">
        {/* Top row */}
        <div className="flex items-start justify-between gap-3 mb-3">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0"
              style={{background:gc.bg, color:gc.text}}>{initials}</div>
            <div>
              <div className="flex items-center gap-2">
                <p className="font-bold text-slate-800 text-sm leading-tight">{student.name}</p>
                {student.paused && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}>⏸ Paused</span>
                )}
              </div>
              <p className="text-xs text-slate-400 mt-0.5">{student.grade || student.level || "General"} · {student.lessonDuration}m</p>
              <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                {nextLessonLabel && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",
                    background:isToday?"#f0fdf4":"#f8fafc", color:isToday?"#16a34a":"#64748b",
                    border:isToday?"1px solid #bbf7d0":"1px solid #e2e8f0"}}>
                    {isToday ? "🎹 Today!" : `Next: ${(student.lessonDay||"").slice(0,3)} ${nextLessonLabel}`}
                  </span>
                )}
                {examDays !== null && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",
                    background:examDays<=14?"#fef2f2":examDays<=60?"#fffbeb":"#f8fafc",
                    color:examDays<=14?"#dc2626":examDays<=60?"#d97706":"#64748b",
                    border:examDays<=14?"1px solid #fecaca":examDays<=60?"1px solid #fde68a":"1px solid #e2e8f0"}}>
                    {`D-${examDays}`}
                  </span>
                )}
              </div>
            </div>
          </div>
          <div className="text-right shrink-0">
            {isExamStudent(student) && weeksLeft !== null ? (
              <>
                <p className="text-lg font-black" style={{color:urgentColor}}>{weeksLeft}w</p>
                <p className="text-xs text-slate-400">to exam</p>
              </>
            ) : null}
          </div>
        </div>

        {/* Phase + current month */}
        <div className="flex items-center gap-2 mb-3">
          <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:pm.bg,color:pm.text}}>
            {pm.name}
          </span>
          {currentPlanMonth && <span className="text-xs text-slate-400">{currentPlanMonth.label}</span>}
        </div>

        {/* This month focus */}
        {currentPlanMonth && (
          <div className="bg-slate-50 rounded-xl p-3 mb-3">
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">This month</p>
            <p className="text-xs text-slate-600 leading-relaxed line-clamp-2">{currentPlanMonth.focus}</p>
          </div>
        )}

        {/* AI guide */}
        {guide.status !== "neutral" && (
          <div className="rounded-xl p-3 mb-3"
            style={{background: guide.status==="urgent"?"#fef2f2": guide.status==="warning"?"#fffbeb":"#f0fdf4"}}>
            <p className="text-[10px] font-bold uppercase tracking-wide mb-1"
              style={{color: guide.status==="urgent"?"#dc2626": guide.status==="warning"?"#d97706":"#16a34a"}}>
              {guide.status==="urgent"?"⚠ Urgent": guide.status==="warning"?"⚡ Check":"✓ On track"}
            </p>
            <p className="text-xs leading-relaxed" style={{color:"#475569"}}>
              {guide.alerts[0] || guide.tips[0]}
            </p>
          </div>
        )}

        {/* Last log */}
        <div className="mt-auto">
          {lastLog ? (
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <p className="text-xs text-slate-400">Last lesson: {fmtShort(lastLog.date)}</p>
                {thisMonthLogs > 0 && (
                  <span title="Lessons this month" style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe"}}>
                    {thisMonthLogs}× this month
                  </span>
                )}
              </div>
              {/* Mood trend — last 3 logs */}
              {(() => {
                const recent = studentLogs.slice(0,3).map(l=>l.mood).filter(Boolean);
                const MOOD_EMOJI = { rough:"😕", okay:"😐", good:"🙂", great:"😀" };
                return recent.length > 0 ? (
                  <div className="flex gap-0.5" title="Recent lesson moods">
                    {recent.map((m,i)=>(
                      <span key={i} style={{fontSize:"14px",opacity: i===0?1:i===1?0.65:0.35}}>{MOOD_EMOJI[m]||""}</span>
                    ))}
                  </div>
                ) : null;
              })()}
            </div>
          ) : (
            <p className="text-xs text-slate-400 mb-3">No lessons logged yet</p>
          )}

          {/* Actions */}
          <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>onLog(student)}
              className="flex-1 text-white text-xs font-bold py-2 rounded-xl transition-all"
              style={{background:"#4f46e5"}}>
              + Log lesson
            </button>
            <button onClick={()=>onEdit(student)}
              className="px-3 py-2 border border-slate-200 rounded-xl text-xs text-slate-500 hover:bg-slate-50">
              Edit
            </button>
            <button onClick={()=>onDelete(student.id)}
              className="px-3 py-2 border border-red-100 rounded-xl text-xs text-red-400 hover:bg-red-50">
              ✕
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   GENERAL PLAN PANEL — Last Lesson + Focus Pattern
═══════════════════════════════════════════════════════════════════════════ */

function GeneralPlanPanel({ student, logs }) {
  const AREAS = [
    { key:"repertoire", label:"Repertoire", bg:"#eef2ff", col:"#4f46e5" },
    { key:"technical",  label:"Technical",  bg:"#f5f3ff", col:"#7c3aed" },
    { key:"srAural",    label:"SR & Aural", bg:"#ecfeff", col:"#0891b2" },
    { key:"gk",         label:"Gen. Knowledge", bg:"#fffbeb", col:"#d97706" },
    { key:"notes",      label:"Notes",      bg:"#f8fafc", col:"#64748b" },
  ];

  const sorted = [...logs].sort((a,b)=>b.date.localeCompare(a.date));
  const latestLog = sorted[0];

  // Count how many logs touched each area
  const counts = {};
  AREAS.forEach(a => { counts[a.key] = logs.filter(l=>l[a.key]?.trim()).length; });
  const maxCount = Math.max(...Object.values(counts), 1);

  return (
    <div className="mt-6 space-y-5">

      {/* Latest lesson snapshot */}
      <div className="card p-5">
        <h3 className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-4">
          {latestLog ? `Last lesson — ${latestLog.date}` : "Last lesson"}
        </h3>
        {latestLog ? (
          <div className="space-y-2">
            {AREAS.filter(a => latestLog[a.key]?.trim()).map(a => (
              <div key={a.key} className="px-3 py-2.5 rounded-xl text-xs" style={{background:a.bg}}>
                <span className="font-bold mr-2" style={{color:a.col}}>{a.label}</span>
                <span className="text-slate-600 leading-relaxed">
                  {latestLog[a.key].slice(0,140)}{latestLog[a.key].length>140?"…":""}
                </span>
              </div>
            ))}
          </div>
        ) : (
          <p className="text-xs text-slate-400 italic">Log your first lesson to see notes here.</p>
        )}
      </div>

      {/* Focus pattern — built from all logs */}
      <div className="card p-5">
        <h3 className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Focus pattern</h3>
        <p className="text-xs text-slate-400 mb-4">Based on {logs.length} lesson{logs.length!==1?"s":""} logged</p>
        {logs.length === 0 ? (
          <p className="text-xs text-slate-400 italic">No lessons logged yet — pattern will appear as you log lessons.</p>
        ) : (
          <div className="space-y-2.5">
            {AREAS.filter(a => counts[a.key] > 0).sort((a,b)=>counts[b.key]-counts[a.key]).map(a => (
              <div key={a.key} className="flex items-center gap-3">
                <span className="text-xs font-semibold w-28 shrink-0" style={{color:a.col}}>{a.label}</span>
                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all"
                    style={{width:`${Math.round((counts[a.key]/maxCount)*100)}%`, background:a.col, opacity:0.7}}/>
                </div>
                <span className="text-xs text-slate-400 w-12 text-right shrink-0">
                  {counts[a.key]} lesson{counts[a.key]!==1?"s":""}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

    </div>
  );
}

          <div className="flex flex-wrap gap-2">

              ["Technical",alloc.technical,"#f5f3ff","#7c3aed"],
              ["SR/Aural",alloc.sr,"#ecfeff","#0891b2"],

      {/* AI Guide */}
