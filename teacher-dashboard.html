    const { error } = await _supabase.from("lesson_logs").delete().eq("id", id);
    if (error) { alert("Could not delete log: " + error.message); return; }
    setLogs(p => p.filter(l => l.id !== id));
  };

  // Mark an absent log as attended (type → regular)
  const markAttended = async (log) => {
    if (!confirm(`Mark ${fmtDate(log.date)} as attended for ${selected?.name || "this student"}?`)) return;
    const extra = {};
    const row = { type: "regular", extra: Object.keys(extra).length ? JSON.stringify(extra) : null };
    const { data, error } = await _supabase.from("lesson_logs").update(row).eq("id", log.id).select().single();
    if (error) { alert("Could not update: " + error.message); return; }
    setLogs(p => p.map(l => l.id === log.id ? { ...l, type: "regular" } : l));
  };

  // Save absence or makeup record
  const saveAbsence = async (f) => {
    if (!absenceTarget) return;
    const row = logToRow({ ...f, type: f.type }, absenceTarget.id, userId);
    const { data, error } = await _supabase.from("lesson_logs").insert(row).select().single();
    if (error) { alert("Could not save: " + error.message); return; }
    setLogs(p => [rowToLog(data), ...p]);
    setAbsenceTarget(null);
  };

  const selectStudent = (s) => { setSelected(s); setView("detail"); };

  // ── Loading / error states ────────────────────────────────────────────────
  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>
      <div style={{textAlign:"center",color:"#94a3b8"}}>
        <div style={{fontSize:32,marginBottom:12}}>🎹</div>
        <div style={{fontSize:14,fontWeight:600}}>Loading your studio…</div>
      </div>
    </div>
  );
  if (dbError) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>
      <div style={{textAlign:"center",color:"#dc2626",fontSize:14,fontWeight:600}}>{dbError}</div>
    </div>
  );

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({students,logs,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`PianoButler_${todayStr()}.json`; a.click();
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();

    // ── Sheet 1: Students ──
    const studentRows = students.map(s => {
      const sNorm = { startingPhase: s.track==="exam"?"foundation":"exploration", ...s };
      const plan  = buildPlan(sNorm);
      const curM  = plan.findIndex(m => m.monthStr === currentMonthStr());
      const phase = (curM>=0 ? plan[curM] : plan[plan.length-1])?.phase || "—";
      const wl    = s.track==="exam" ? weeksUntil(s.examDate) : null;
      const ml    = s.track==="exam"
        ? monthsUntil(s.examDate)
        : monthsUntil(addMonths(s.startDate, s.planMonths||3));
      const studentLogs = logs.filter(l=>l.studentId===s.id);
      return {
        "Name":             s.name,
        "Grade":            s.grade,
        "Track":            s.track==="exam" ? "Exam" : "General",
        "Lesson Day":       s.lessonDay || "—",
        "Lesson Time":      fmtTime(s.lessonTime),
        "Duration (min)":   s.lessonDuration,
        "Lessons/week":     s.lessonsPerWeek,
        "Started":          fmtDate(s.startDate),
        "Exam Date":        s.track==="exam" ? fmtDate(s.examDate) : "—",
        "Weeks to Exam":    wl !== null ? wl : "—",
        "Months Left":      ml !== null ? ml : "—",
        "Current Phase":    PHASE_META[phase]?.name || phase,
        "Starting Phase":   PHASE_META[s.startingPhase]?.name || s.startingPhase || "—",
        "Plan Months":      s.track==="exam" ? "—" : (s.planMonths||3),
        "Total Logs":       studentLogs.length,
        "Last Log Date":    studentLogs.length ? studentLogs.sort((a,b)=>b.date.localeCompare(a.date))[0].date : "—",
      };
    });
    const ws1 = XLSX.utils.json_to_sheet(studentRows);
    ws1["!cols"] = [{wch:20},{wch:12},{wch:10},{wch:12},{wch:12},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12},{wch:22},{wch:22},{wch:12},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws1, "Students");

    // ── Sheet 2: Lesson Logs ──
    const logRows = logs.map(l => {
      const s = students.find(st=>st.id===l.studentId);
      return {
        "Student":      s?.name || "—",
        "Grade":        s?.grade || "—",
        "Date":         fmtDate(l.date),
        "Month":        l.monthStr ? MONTH_NAMES[parseInt(l.monthStr.slice(5,7))-1]+" "+l.monthStr.slice(0,4) : "—",
        "Repertoire":   l.repertoire || "",
        "Technical":    l.technical  || "",
        "SR & Aural":   l.srAural    || "",
        "General Knowledge": l.gk   || "",
        "Notes":        l.notes      || "",
      };
    }).sort((a,b)=>a["Student"].localeCompare(b["Student"])||b["Date"].localeCompare(a["Date"]));
    const ws2 = XLSX.utils.json_to_sheet(logRows);
    ws2["!cols"] = [{wch:20},{wch:12},{wch:14},{wch:14},{wch:30},{wch:30},{wch:20},{wch:20},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws2, "Lesson Logs");

    // ── Sheet 3: Monthly Plans ──
    const planRows = [];
    students.forEach(s => {
      const sNorm = { startingPhase: s.track==="exam"?"foundation":"exploration", ...s };
      const plan  = buildPlan(sNorm);
      plan.forEach(m => {
        planRows.push({
          "Student":  s.name,
          "Grade":    s.grade,
          "Month":    m.label,
          "Phase":    PHASE_META[m.phase]?.name || m.phase,
          "Focus":    m.focus,
          "Rep (min)":m.alloc.repertoire,
          "Tech (min)":m.alloc.technical,
          "SR (min)": m.alloc.sr,
          "GK (min)": m.alloc.gk,
        });
      });
    });
    const ws3 = XLSX.utils.json_to_sheet(planRows);
    ws3["!cols"] = [{wch:20},{wch:12},{wch:12},{wch:24},{wch:50},{wch:10},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws3, "Monthly Plans");

    XLSX.writeFile(wb, `PianoButler_${todayStr()}.xlsx`);
    setShowExportMenu(false);
  };

  const exportPDF = () => {
    window.print();
    setShowExportMenu(false);
  };

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <a href="Index.html" className="text-slate-400 hover:text-slate-600 text-sm no-print">← Piano Butler</a>
            <span className="text-slate-300 no-print">|</span>
            <h1 className="text-base font-bold text-slate-800">Teacher Dashboard</h1>
          </div>
          <div className="flex items-center gap-3">
            {/* Tab switcher */}
            <div className="flex gap-1 bg-slate-100 rounded-xl p-1 no-print">
              {[["today","Today"],["students","Students"],["schedule","Schedule"]].map(([key,label])=>(
                <button key={key} onClick={()=>{setTab(key);if(view==="detail"){setView("list");setSelected(null);}}}
                  className="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
                  style={tab===key?{background:"white",color:"#4f46e5",boxShadow:"0 1px 4px #0001"}:{color:"#94a3b8"}}>
                  {label}
                </button>
              ))}
            </div>
            {/* Export dropdown */}
            <div className="relative no-print">
              <button onClick={()=>setShowExportMenu(p=>!p)}
                className="btn-ghost text-xs py-1.5 px-3 flex items-center gap-1">
                ⬇ Export <span className="opacity-50 text-[10px]">▾</span>
              </button>
              {showExportMenu && (
                <>
                  <div className="fixed inset-0 z-40" onClick={()=>setShowExportMenu(false)}/>
                  <div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden min-w-[160px]">
                    <button onClick={exportPDF}
                      className="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 flex items-center gap-2">
                      <span>📄</span> Download PDF
                    </button>
                    <button onClick={exportExcel}
                      className="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-700 hover:bg-slate-50 flex items-center gap-2">
                      <span>📊</span> Download Excel
                    </button>
                    <div className="border-t border-slate-100"/>
                    <button onClick={()=>{exportJSON();setShowExportMenu(false);}}
                      className="w-full text-left px-4 py-2.5 text-xs text-slate-400 hover:bg-slate-50 flex items-center gap-2">
                      <span>💾</span> Backup JSON
                    </button>
                  </div>
                </>
              )}
            </div>
            <button onClick={bulkImport} disabled={importing}
              className="btn-ghost text-xs py-2 px-3 no-print"
              style={{color:"#0d9488", borderColor:"#0d9488", opacity: importing ? 0.6 : 1}}>
              {importing ? "Importing…" : "⬆ Import schedule"}
            </button>
            <button onClick={()=>setShowAdd(true)} className="btn-primary text-xs py-2 px-4 no-print">+ Add student</button>
            <button onClick={()=>signOut()} className="btn-ghost text-xs py-2 px-3 no-print" style={{color:"#94a3b8"}}>Sign out</button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">

        {/* Today tab */}
        {tab==="today" && (
          <TodayView
            students={students}
            logs={logs}
            onLog={setLogging}
            onAbsence={setAbsenceTarget}
            onSelect={s=>{setSelected(s);setView("detail");setTab("students");}}
            onDeleteLog={deleteLog}
            onMarkAttended={markAttended}
          />
        )}

        {/* Schedule tab */}
        {tab==="schedule" && (
          <ScheduleView
            students={students}
            logs={logs}
            onLog={setLogging}
            onAbsence={setAbsenceTarget}
            onSelect={s=>{setSelected(s);setView("detail");setTab("students");}}
            onAdd={()=>setShowAdd(true)}
          />
        )}

        {/* Urgent banner */}
        {tab==="students" && urgent.length > 0 && view==="list" && (
          <div className="bg-red-50 border border-red-200 rounded-2xl p-4 mb-6 flex flex-wrap items-center gap-3">
            <span className="text-red-500">⚠</span>
            <div>
              <p className="text-sm font-bold text-red-700">Exam coming up</p>
              <p className="text-xs text-red-400">{urgent.map(s=>`${s.name} (${weeksUntil(s.examDate)}w)`).join(" · ")}</p>
            </div>
          </div>
        )}

        {/* List view */}
        {tab==="students" && view==="list" && (
          <>
            {students.length > 0 && (
              <div className="flex flex-wrap items-center gap-2 mb-5 no-print">
                {/* Search */}
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="Search students…"
                  className="input" style={{width:"200px",flexShrink:0}}/>

                {/* Grade filter */}
                <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}
                  className="input" style={{width:"auto",flexShrink:0}}>
                  <option value="All">All grades</option>
                  {GRADES.map(g=><option key={g} value={g}>{g}</option>)}
                </select>

                {/* Track filter */}
                <div className="flex gap-1 bg-slate-100 rounded-xl p-1" style={{flexShrink:0}}>
                  {[["All","All"],["exam","Exam"],["general","General"]].map(([val,label])=>(
                    <button key={val} onClick={()=>setFilterTrack(val)}
                      className="px-3 py-1 rounded-lg text-xs font-semibold transition-all"
                      style={filterTrack===val?{background:"white",color:"#4f46e5",boxShadow:"0 1px 4px #0001"}:{color:"#94a3b8"}}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Sort */}
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                  className="input" style={{width:"auto",flexShrink:0}}>
                  <option value="name">Sort: Name</option>
                  <option value="grade">Sort: Grade</option>
                  <option value="exam">Sort: Exam date</option>
                  <option value="lastlog">Sort: Last log</option>
                  <option value="monthcount">Sort: Lessons this month</option>
                </select>

                {/* Active filter count badge */}
                {(search || filterGrade!=="All" || filterTrack!=="All") && (
                  <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#eef2ff",color:"#4338ca"}}>
                    {filtered.length} / {students.filter(s=>!s.paused).length}
                  </span>
                )}

                {/* Show paused toggle */}
                {students.some(s=>s.paused) && (
                  <button onClick={()=>setShowPaused(p=>!p)}
                    style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",cursor:"pointer",border:"1px solid",
                      background:showPaused?"#fffbeb":"white",
                      color:showPaused?"#d97706":"#94a3b8",
                      borderColor:showPaused?"#fde68a":"#e2e8f0"}}>
                    ⏸ {students.filter(s=>s.paused).length} paused
                  </button>
                )}

                {/* Clear filters */}
                {(search || filterGrade!=="All" || filterTrack!=="All") && (
                  <button onClick={()=>{setSearch("");setFilterGrade("All");setFilterTrack("All");}}
                    style={{fontSize:"11px",fontWeight:700,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",padding:"3px 6px"}}>
                    ✕ Clear
                  </button>
                )}
              </div>
            )}
            {students.length === 0 ? (
              <div className="card p-16 text-center fade-in">
                <div className="text-5xl mb-4">🎹</div>
                <p className="text-slate-600 font-semibold mb-1">No students yet</p>
                <p className="text-slate-400 text-sm mb-6">Add your first student to get started.</p>
                <button className="btn-primary" onClick={()=>setShowAdd(true)}>+ Add student</button>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {filtered.map(s=>(
                  <StudentCard key={s.id} student={s} logs={logs}
                    onLog={setLogging} onEdit={setEditing}
                    onDelete={deleteStudent} onSelect={selectStudent}/>
                ))}
                {filtered.length===0 && (
                  <div className="col-span-3 text-center py-12 text-slate-400 text-sm">
                    No students match your filters.
                    <button onClick={()=>{setSearch("");setFilterGrade("All");setFilterTrack("All");}}
                      className="ml-2" style={{color:"#4f46e5",fontWeight:600,background:"none",border:"none",cursor:"pointer",fontSize:"inherit"}}>
                      Clear filters
                    </button>
                  </div>
                )}
              </div>
            )}
          </>
        )}

        {/* Detail view — always read student from live students array so edits reflect immediately */}
        {tab==="students" && view==="detail" && selected && (() => {
          const liveStudent = students.find(s=>s.id===selected.id) || selected;
          return (
            <StudentDetail
              student={liveStudent} logs={logs}
              onLog={setLogging}
              onEditLog={(log)=>{setEditLog(log);setLogging(liveStudent);}}
              onDeleteLog={deleteLog}
              onMarkAttended={markAttended}
              onBack={()=>{setView("list");setSelected(null);}}
              onEdit={setEditing}
              onPause={setPauseTarget}
              onResume={resumeStudent}
            />
          );
        })()}
      </main>

      {/* Modals */}
      {showAdd && <StudentModal onSave={addStudent} onClose={()=>setShowAdd(false)}/>}
      {editing  && <StudentModal initial={editing} onSave={updateStudent} onClose={()=>setEditing(null)}/>}
      {absenceTarget && <AbsenceModal student={absenceTarget} onSave={saveAbsence} onClose={()=>setAbsenceTarget(null)}/>}
      {pauseTarget && <PauseModal student={pauseTarget} onSave={(opts)=>pauseStudent(pauseTarget, opts)} onClose={()=>setPauseTarget(null)}/>}
      {logging  && (
        <LogModal
          student={logging}
          existingLog={editLog}
          currentMonth={MONTH_NAMES[new Date().getMonth()] + " " + new Date().getFullYear()}
          lastLog={!editLog ? logs.filter(l=>l.studentId===logging.id).sort((a,b)=>b.date.localeCompare(a.date))[0] : null}
          onSave={saveLog}
          onClose={()=>{setLogging(null);setEditLog(null);}}
        />
      )}
    </div>
  );
}

// Check session before rendering — redirects to login.html if not logged in
requireAuth().then(session => {
  if (session) {
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  }
});
</script>
</body>
</html>
