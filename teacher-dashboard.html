<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════════════ */
const GRADES = ["Preliminary","Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8"];
const LESSON_DURATIONS = [30, 45, 60];
const PLAN_MONTHS = [1, 2, 3, 6, 12];

// Calculate goal date from startDate + N months
const addMonths = (dateStr, months) => {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T12:00:00");
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0,10);
};

// Time allocation by lesson duration (minutes)
const TIME_ALLOC = {
  30: { repertoire:18, technical:7,  sr:3,  gk:2  },
  45: { repertoire:25, technical:12, sr:5,  gk:3  },
  60: { repertoire:35, technical:15, sr:7,  gk:3  },
};
// For custom durations: scale proportionally from the 45-min baseline
const getAlloc = (mins) => {
  if (TIME_ALLOC[mins]) return TIME_ALLOC[mins];
  const ratio = mins / 45;
  return {
    repertoire: Math.round(25 * ratio),
    technical:  Math.round(12 * ratio),
    sr:         Math.round(5  * ratio),
    gk:         Math.round(3  * ratio),
  };
};

const PHASE_META = {
  foundation:    { name:"Foundation & Learning",      color:"#6366f1", bg:"#eef2ff", text:"#4338ca" },
  development:   { name:"Development & Technique",    color:"#0891b2", bg:"#ecfeff", text:"#0e7490" },
  consolidation: { name:"Consolidation",              color:"#16a34a", bg:"#f0fdf4", text:"#15803d" },
  polish:        { name:"Polish & Performance",       color:"#d97706", bg:"#fffbeb", text:"#b45309" },
  exam:          { name:"Exam Preparation",           color:"#dc2626", bg:"#fef2f2", text:"#b91c1c" },
  // General track phases
  exploration:   { name:"Exploration & Learning",     color:"#7c3aed", bg:"#f5f3ff", text:"#6d28d9" },
  performance:   { name:"Performance & Sharing",      color:"#0d9488", bg:"#f0fdfa", text:"#0f766e" },
};

const GRADE_COLOR = {
  "Preliminary":{ bg:"#eef2ff", text:"#4338ca" },
  "Grade 1":    { bg:"#f5f3ff", text:"#6d28d9" },
  "Grade 2":    { bg:"#eff6ff", text:"#1d4ed8" },
  "Grade 3":    { bg:"#ecfeff", text:"#0e7490" },
  "Grade 4":    { bg:"#f0fdfa", text:"#0f766e" },
  "Grade 5":    { bg:"#f0fdf4", text:"#15803d" },
  "Grade 6":    { bg:"#f7fee7", text:"#4d7c0f" },
  "Grade 7":    { bg:"#fffbeb", text:"#b45309" },
  "Grade 8":    { bg:"#fff7ed", text:"#c2410c" },
};

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
const uid = () => Math.random().toString(36).slice(2,9);
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = (d) => d ? new Date(d+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}) : "—";
const fmtShort = (d) => d ? new Date(d+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"}) : "—";

const MONTH_NAMES = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const fmtMonth = (dateStr) => {
  if (!dateStr) return "—";
  const d = new Date(dateStr + "T12:00:00");
  return MONTH_NAMES[d.getMonth()] + " " + d.getFullYear();
};

const monthsUntil = (dateStr) => {
  if (!dateStr) return null;
  const now = new Date();
  const end = new Date(dateStr + "T12:00:00");
  const diff = (end.getFullYear() - now.getFullYear()) * 12 + (end.getMonth() - now.getMonth());
  return Math.max(diff, 0);
};
const monthsSince = (dateStr) => {
  if (!dateStr) return 1;
  const start = new Date(dateStr + "T12:00:00");
  const now   = new Date();
  const diff  = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  return Math.max(diff + 1, 1);
};
// Keep weeksUntil for exam countdown display only
const weeksUntil = (dateStr) => {
  if (!dateStr) return null;
  const diff = Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24*7));
  return Math.max(diff, 0);
};

/* ═══════════════════════════════════════════════════════════════════════════
   PLAN GENERATION
═══════════════════════════════════════════════════════════════════════════ */
function buildPlan(student) {
  const endDate = student.track === "exam"
    ? student.examDate
    : addMonths(student.startDate, student.planMonths || 3);
  if (!endDate || !student.startDate) return [];

  const MONTH_FOCUS = {
    foundation:    ["Select all exam repertoire. Begin hands-separate reading of each piece.","Hands-together work begins. Establish daily practice routine.","Scales and technical exercises for this grade. Sight-reading starts.","Full review of all pieces HS and HT. Identify problem passages."],
    development:   ["Increase tempo on all pieces. Focus on voicing and tone.","Technical demands: scales, arpeggios, exercises at tempo.","Musical shaping — dynamics, articulation, phrasing across all pieces.","Aural training and General Knowledge for this grade.","Targeted passage work. Rhythm and memory check."],
    consolidation: ["Full run-throughs of all pieces. Record and self-review.","Technical work at performance tempo. Aural all required skills.","General Knowledge: composer context, form, Italian terms.","Back-to-back run-through. Note stamina and consistency."],
    polish:        ["Mock exam #1 — full run in exam order. Written feedback.","Address mock exam feedback. Performance detail on each piece.","Mock exam #2 — simulate exam conditions. Final refinements."],
    exam:          ["Light maintenance only. No new learning. Rest and trust your preparation."],
    exploration:   ["Discuss goals. Select repertoire together. Begin reading new pieces.","Hands-together work begins. Identify technical focus areas.","Establish daily practice structure suited to this student."],
    performance:   ["Polish all pieces to sharing standard. Record a home performance.","Reflect on progress. Celebrate achievements. Plan ahead."],
  };

  // Step 1: Generate every month from startDate to endDate (cursor-based, guaranteed correct)
  const allMonths = [];
  const cursor = new Date(student.startDate + "T12:00:00");
  cursor.setDate(1);
  const endD = new Date(endDate + "T12:00:00");
  endD.setDate(1);

  while (cursor <= endD) {
    allMonths.push({
      monthStr: cursor.toISOString().slice(0, 7),
      label: MONTH_NAMES[cursor.getMonth()] + " " + cursor.getFullYear(),
    });
    cursor.setMonth(cursor.getMonth() + 1);
  }

  const total = allMonths.length;
  if (total === 0) return [];

  // Step 2: Assign a phase to each month index by ratio (no rounding errors)
  const getPhase = (i) => {
    const ratio = i / total;
    if (student.track === "exam") {
      if (i === total - 1)       return "exam";
      if (ratio >= 0.85)         return "polish";
      if (ratio >= 0.60)         return "consolidation";
      if (ratio >= 0.30)         return "development";
      return "foundation";
    } else {
      if (ratio >= 0.85)         return "performance";
      if (ratio >= 0.65)         return "consolidation";
      if (ratio >= 0.35)         return "development";
      return "exploration";
    }
  };

  // Step 3: Apply startingPhase — clamp early phases upward (never remove months)
  const EXAM_ORDER    = ["foundation","development","consolidation","polish","exam"];
  const GENERAL_ORDER = ["exploration","development","consolidation","performance"];
  const order = student.track === "exam" ? EXAM_ORDER : GENERAL_ORDER;
  const cutPhase = student.startingPhase || (student.track === "exam" ? "foundation" : "exploration");
  const cutIdx   = Math.max(order.indexOf(cutPhase), 0);

  // Step 4: Build final month objects
  const phaseCounter = {};
  return allMonths
    .map((m, i) => {
      // Clamp phase — never go below the startingPhase
      const raw = getPhase(i);
      const rawIdx = order.indexOf(raw);
      const phase = rawIdx < cutIdx ? cutPhase : raw;
      return { ...m, phase };
    })
    .map(m => {
      phaseCounter[m.phase] = (phaseCounter[m.phase] || 0);
      const focusArr = MONTH_FOCUS[m.phase] || ["Continue focused practice."];
      const focus = focusArr[Math.min(phaseCounter[m.phase], focusArr.length - 1)];
      phaseCounter[m.phase]++;
      return { ...m, focus, alloc: getAlloc(student.lessonDuration) };
    });
}

// Current month string "YYYY-MM"
const currentMonthStr = () => new Date().toISOString().slice(0,7);
const monthsSinceStart = (startDate) => {
  if (!startDate) return 0;
  const s = new Date(startDate + "T12:00:00");
  const n = new Date();
  return Math.max((n.getFullYear()-s.getFullYear())*12 + (n.getMonth()-s.getMonth()), 0);
};

// Days until next occurrence of a weekday name (0 = today, 1 = tomorrow, …)
const daysUntilNext = (dayName) => {
  if (!dayName) return null;
  const DAY_IDX = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };
  const target = DAY_IDX[dayName];
  if (target === undefined) return null;
  const today = new Date().getDay();
  return (target - today + 7) % 7; // 0 = today
};

// Returns true if this week is a lesson week for a fortnightly student
// Uses startDate as the anchor — week 0 = lesson week, week 1 = off week, etc.
const isFortnightWeek = (startDate, weekOffset = 0) => {
  if (!startDate) return true; // fallback: always show
  const start = new Date(startDate + "T12:00:00");
  // Get Monday of the start week
  const startDay = start.getDay();
  const startMonday = new Date(start);
  startMonday.setDate(start.getDate() - ((startDay + 6) % 7));
  // Get Monday of target week (current week + offset)
  const now = new Date();
  const nowDay = now.getDay();
  const nowMonday = new Date(now);
  nowMonday.setDate(now.getDate() - ((nowDay + 6) % 7) + weekOffset * 7);
  // How many weeks apart?
  const weeksDiff = Math.round((nowMonday - startMonday) / (7 * 24 * 60 * 60 * 1000));
  return weeksDiff % 2 === 0;
};

// Days until exam date (floored)
const daysUntilExam = (examDate) => {
  if (!examDate) return null;
  const diff = Math.ceil((new Date(examDate + "T12:00:00") - new Date()) / (1000*60*60*24));
  return Math.max(diff, 0);
};

/* ═══════════════════════════════════════════════════════════════════════════
   AI GUIDE (rule-based)
═══════════════════════════════════════════════════════════════════════════ */
function generateGuide(student, logs, currentMonthIdx, plan) {
  const studentLogs = logs
    .filter(l => l.studentId === student.id)
    .sort((a,b) => b.date.localeCompare(a.date));

  const recentLogs = studentLogs.slice(0, 3);
  const phase = plan[currentMonthIdx]?.phase;
  const weeksLeft = student.track === "exam" ? weeksUntil(student.examDate) : null;
  const monthsLeft = student.track === "exam"
    ? monthsUntil(student.examDate)
    : monthsUntil(addMonths(student.startDate, student.planMonths||3));

  const alerts  = [];
  const tips    = [];
  let   status  = "on-track"; // "on-track" | "warning" | "urgent"

  if (studentLogs.length === 0) {
    return { status:"neutral", alerts:[], tips:["Start logging lessons to get personalised guidance."] };
  }

  // ── Check: missing sections ──
  const last2 = recentLogs.slice(0,2);
  const noTech  = last2.length >= 2 && last2.every(l => !l.technical?.trim());
  const noSR    = last2.length >= 2 && last2.every(l => !l.srAural?.trim());
  const noGK    = recentLogs.slice(0,3).every(l => !l.gk?.trim()) && recentLogs.length >= 3;

  if (noTech)  { alerts.push("Technical work hasn't been recorded for 2+ weeks."); status="warning"; }
  if (noSR)    { alerts.push("Sight-reading & Aural missing for 2+ weeks."); status="warning"; }
  if (noGK && (phase === "consolidation" || phase === "polish" || phase === "exam"))
               { alerts.push("General Knowledge not recorded — important at this stage."); status="warning"; }

  // ── Check: exam-specific urgency ──
  if (student.track === "exam") {
    if (weeksLeft !== null && weeksLeft <= 4) {
      status = "urgent";
      const hasMock = studentLogs.some(l => l.notes?.toLowerCase().includes("mock") || l.repertoire?.toLowerCase().includes("mock"));
      if (!hasMock) alerts.push("No mock exam recorded yet — schedule one this week.");
    }
    if (monthsLeft !== null && monthsLeft <= 2 && phase === "development") {
      alerts.push("Development phase is running long — consider moving to Consolidation.");
      status = "warning";
    }
    if (phase === "exam") {
      tips.push("Exam month: light maintenance only. No new learning. Rest and trust the preparation.");
    }
  }

  // ── Positive patterns ──
  const allSections = recentLogs.every(l => l.repertoire?.trim() && l.technical?.trim());
  if (allSections && recentLogs.length >= 2) tips.push("Great consistency — all sections covered recently.");

  // ── Phase-specific tips ──
  const phaseTips = {
    foundation:    "Focus on reading accuracy before adding speed.",
    development:   "Rotate piece focus each session — don't overload one piece.",
    consolidation: "Start recording full run-throughs. Note stamina and memory.",
    polish:        "Run mock exams. One specific fix per piece per lesson.",
    exam:          "Trust the preparation. Light practice, good sleep.",
    exploration:   "Keep it positive — let the student drive repertoire choices where possible.",
    performance:   "Celebrate what's been achieved this term.",
  };
  if (phaseTips[phase]) tips.push(phaseTips[phase]);

  // ── Lesson duration tip ──
  if (student.lessonDuration === 30 && recentLogs[0]) {
    const lastLog = recentLogs[0];
    const filledSections = [lastLog.repertoire, lastLog.technical, lastLog.srAural, lastLog.gk].filter(s => s?.trim()).length;
    if (filledSections >= 4) tips.push("30-min lesson — prioritise repertoire + one other section per week.");
  }

  if (alerts.length === 0 && status === "on-track") tips.unshift("On track — keep the current pace.");

  return { status, alerts, tips };
}

/* ═══════════════════════════════════════════════════════════════════════════
   SUPABASE DATA LAYER
   _supabase is provided by auth.js (loaded before this script)
═══════════════════════════════════════════════════════════════════════════ */

// Map Supabase row → app student object
const rowToStudent = (r) => ({
  id: r.id,
  name: r.name,
  grade: r.grade || "Grade 5",
  track: r.track || "exam",
  examDate: r.exam_date || "",
  startDate: r.created_at ? r.created_at.slice(0,10) : todayStr(),
  planMonths: r.plan_months || 3,
  lessonDuration: r.lesson_dur || 45,
  lessonDay: r.lesson_day || "Monday",
  lessonTime: r.lesson_time || "16:00",
  startingPhase: r.start_phase || "foundation",
  // extra fields stored as JSON blob in notes column
  ...(r.extra ? JSON.parse(r.extra) : {}),
});

// Map app student object → Supabase row (for insert/update)
const studentToRow = (f, userId) => {
  // Pull out the core columns, stash the rest in `extra`
  const { id, name, grade, track, examDate, startDate, planMonths,
          lessonDuration, lessonDay, lessonTime, startingPhase, ...rest } = f;
  return {
    ...(userId ? { user_id: userId } : {}),
    name: (name || "").trim(),
    grade: grade || "Grade 5",
    track: track || "exam",
    exam_date: examDate || null,
    plan_months: planMonths || 3,
    lesson_dur: lessonDuration || 45,
    lesson_day: lessonDay || "Monday",
    lesson_time: lessonTime || "16:00",
    start_phase: startingPhase || "foundation",
    extra: Object.keys(rest).length ? JSON.stringify(rest) : null,
  };
};

// Map Supabase row → app log object (gk is the canonical app field name)
const rowToLog = (r) => {
  const extra = r.extra ? (() => { try { return JSON.parse(r.extra); } catch(e) { return {}; } })() : {};
  return {
    id: r.id,
    studentId: r.student_id,
    date: r.date,
    monthStr: r.date ? r.date.slice(0,7) : "",
    repertoire: r.repertoire || "",
    technical: r.technical || "",
    srAural: r.sr_aural || "",
    gk: r.general_k || "",
    notes: r.notes || "",
    mood: extra.mood || "",
    pieceRating: extra.pieceRating || "",
    type: extra.type || "regular", // "regular" | "absent" | "makeup"
    makeupDate: extra.makeupDate || "",
  };
};

// Map app log object → Supabase row
// NOTE: extra column must exist in Supabase: ALTER TABLE lesson_logs ADD COLUMN extra text;
const logToRow = (f, studentId, userId) => ({
  ...(userId ? { user_id: userId } : {}),
  student_id: studentId,
  date: f.date || todayStr(),
  repertoire: f.repertoire || "",
  technical: f.technical || "",
  sr_aural: f.srAural || "",
  general_k: f.gk || "",
  notes: f.notes || "",
  extra: JSON.stringify({
    ...(f.mood       ? { mood: f.mood }             : {}),
    ...(f.pieceRating? { pieceRating: f.pieceRating }: {}),
    ...(f.type && f.type !== "regular" ? { type: f.type } : {}),
    ...(f.makeupDate ? { makeupDate: f.makeupDate }  : {}),
  }) || null,
});

/* ═══════════════════════════════════════════════════════════════════════════
   ABSENCE MODAL — mark a lesson as absent or makeup
═══════════════════════════════════════════════════════════════════════════ */
function PauseModal({ student, onSave, onClose }) {
  const [pauseFrom, setPauseFrom] = useState(todayStr());
  const [returnDate, setReturnDate] = useState("");
  const [undecided, setUndecided] = useState(false);

  const handleSave = () => {
    onSave({
      pauseFrom,
      pauseUntil: undecided ? null : (returnDate || null),
      pauseUndecided: undecided,
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div className="card p-6 fade-in" style={{width:"100%",maxWidth:400}}>
        <h3 className="font-bold text-slate-800 mb-1">⏸ Pause lessons</h3>
        <p className="text-sm text-slate-400 mb-5">{student.name}</p>

        <div className="space-y-4">
          <div>
            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Pause from</label>
            <input type="date" value={pauseFrom} onChange={e=>setPauseFrom(e.target.value)}
              className="input w-full" />
          </div>

          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Return date</label>
              <label className="flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" checked={undecided} onChange={e=>setUndecided(e.target.checked)}
                  style={{accentColor:"#f59e0b"}} />
                <span className="text-xs font-semibold text-amber-600">Undecided</span>
              </label>
            </div>
            <input type="date" value={returnDate} onChange={e=>setReturnDate(e.target.value)}
              disabled={undecided}
              className="input w-full"
              style={{opacity: undecided ? 0.4 : 1, cursor: undecided ? "not-allowed" : "auto"}} />
            {undecided && (
              <p className="text-xs text-amber-600 mt-1.5">Return date TBD — you can set it later.</p>
            )}
          </div>
        </div>

        <div className="flex gap-3 mt-6">
          <button onClick={handleSave}
            className="flex-1 text-white text-sm font-bold py-2.5 rounded-xl"
            style={{background:"#f59e0b"}}>
            ⏸ Confirm pause
          </button>
          <button onClick={onClose}
            className="btn-ghost text-sm py-2.5 px-4">
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

function AbsenceModal({ student, onSave, onClose }) {
  const [type, setType] = useState("absent");
  const [date, setDate] = useState(todayStr());
  const [makeupDate, setMakeupDate] = useState("");
  const [notes, setNotes] = useState("");

  const handleSave = () => {
    onSave({ date, type, makeupDate: type==="absent" ? makeupDate : "", notes, repertoire:"", technical:"", srAural:"", gk:"", mood:"", pieceRating:"" });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm fade-in" onClick={e=>e.stopPropagation()}>
        <div className="p-5 border-b border-slate-100">
          <h2 className="text-sm font-bold text-slate-800">Record absence / makeup</h2>
          <p className="text-xs text-slate-400 mt-0.5">{student.name}</p>
        </div>
        <div className="p-5 space-y-4">
          {/* Type */}
          <div>
            <label className="field-label text-slate-500">Type</label>
            <div className="flex gap-2">
              {[["absent","😔 Absent"],["makeup","🔄 Makeup"]].map(([val,label])=>(
                <button key={val} onClick={()=>setType(val)}
                  className="flex-1 py-2 rounded-xl text-sm font-semibold border transition-all"
                  style={type===val
                    ? {background: val==="absent"?"#fef2f2":"#f0fdf4", color: val==="absent"?"#dc2626":"#16a34a", borderColor: val==="absent"?"#fca5a5":"#86efac"}
                    : {background:"white", color:"#94a3b8", borderColor:"#e2e8f0"}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Date */}
          <div>
            <label className="field-label text-slate-500">{type==="absent" ? "Absent date" : "Makeup date"}</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="input"/>
          </div>

          {/* Makeup date (only when absent) */}
          {type==="absent" && (
            <div>
              <label className="field-label text-slate-500">Makeup scheduled for (optional)</label>
              <input type="date" value={makeupDate} onChange={e=>setMakeupDate(e.target.value)} className="input"/>
            </div>
          )}

          {/* Notes */}
          <div>
            <label className="field-label text-slate-500">Notes (optional)</label>
            <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. Sick, family trip…" className="input"/>
          </div>
        </div>
        <div className="p-5 flex gap-3 border-t border-slate-100">
          <button className="btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary flex-1" onClick={handleSave}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════

function LogModal({ student, existingLog, currentMonth, lastLog, onSave, onClose }) {
  const blank = { date:todayStr(), repertoire:"", technical:"", srAural:"", gk:"", notes:"", mood:"", pieceRating:"" };
  const [f, setF] = useState(existingLog ?? blank);
  const [copied, setCopied] = useState(false);
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  // ── Mood rating ──
  const MOODS = [
    { val:"rough",   emoji:"😕", label:"Rough" },
    { val:"okay",    emoji:"😐", label:"Okay"  },
    { val:"good",    emoji:"🙂", label:"Good"  },
    { val:"great",   emoji:"😀", label:"Great" },
  ];

  // ── Piece traffic light ──
  const TRAFFIC = [
    { val:"🔴", label:"Needs work" },
    { val:"🟡", label:"Progressing" },
    { val:"🟢", label:"Solid" },
  ];

  // ── Focus tag chips ──
  const CHIPS = {
    repertoire: ["HS","HT","Slow practice","Voicing","Dynamics","Phrasing","Memory","Bar-by-bar","LH alone","RH alone","Full run"],
    technical:  ["Scales","Arpeggios","Contrary motion","Broken chords","Octaves","Staccato","Legato","Fingering","Wrist","Tempo","Hands together"],
  };

  const appendChip = (key, chip) => {
    setF(p => {
      const cur = p[key];
      const sep = cur && !cur.endsWith(" ") && !cur.endsWith("\n") ? " " : "";
      return { ...p, [key]: cur + sep + chip + " " };
    });
  };

  const insertRating = (val) => {
    set("pieceRating", val);
    setF(p => {
      const cur = p.repertoire;
      // Replace existing leading traffic light if present
      const cleaned = cur.replace(/^[🔴🟡🟢]\s*/, "");
      return { ...p, repertoire: val + " " + cleaned, pieceRating: val };
    });
  };

  const copyHomework = () => {
    if (!f.notes?.trim()) return;
    navigator.clipboard.writeText(f.notes.trim()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const showLastHint = !existingLog && lastLog?.notes?.trim();

  return (
    <div className="fixed inset-0 bg-black/40 flex items-start justify-center z-50 p-4 overflow-y-auto" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg my-6 fade-in" onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div className="p-5 border-b border-slate-100">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <p className="font-bold text-slate-800">{student.name}</p>
              <p className="text-xs text-slate-400 mt-0.5">{student.grade} · {currentMonth} · {student.lessonDuration} min lesson</p>
            </div>
            <input type="date" className="input" style={{width:"auto",fontSize:"12px",padding:"6px 10px"}}
              value={f.date} onChange={e=>set("date",e.target.value)}/>
          </div>
          {/* Mood rating */}
          <div className="flex items-center gap-2">
            <span style={{fontSize:"10px",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8"}}>Today's lesson</span>
            <div className="flex gap-1">
              {MOODS.map(m=>(
                <button key={m.val} onClick={()=>set("mood", f.mood===m.val ? "" : m.val)}
                  title={m.label}
                  style={{
                    fontSize:"20px", padding:"4px 6px", borderRadius:"8px", border:"none", cursor:"pointer", lineHeight:1,
                    background: f.mood===m.val ? "#f1f5f9" : "transparent",
                    outline: f.mood===m.val ? "2px solid #6366f1" : "none",
                    transition:"all 0.1s",
                  }}>
                  {m.emoji}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Last lesson hint */}
        {showLastHint && (
          <div style={{margin:"12px 20px 0",padding:"10px 14px",background:"#f8fafc",borderRadius:"10px",border:"1px dashed #e2e8f0"}}>
            <p style={{margin:"0 0 3px",fontSize:"10px",fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#94a3b8"}}>Last lesson homework</p>
            <p style={{margin:0,fontSize:"12px",color:"#94a3b8",lineHeight:1.5,whiteSpace:"pre-wrap"}}>{lastLog.notes.trim()}</p>
          </div>
        )}

        {/* Fields */}
        <div className="p-5 space-y-4 max-h-[55vh] overflow-y-auto">

          {/* Repertoire — with traffic light + chips */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="field-label" style={{color:"#4f46e5",marginBottom:0}}>Repertoire</label>
              <div className="flex gap-1">
                {TRAFFIC.map(t=>(
                  <button key={t.val} onClick={()=>insertRating(t.val)}
                    title={t.label}
                    style={{
                      fontSize:"15px", padding:"2px 5px", borderRadius:"6px", border:"none", cursor:"pointer", lineHeight:1,
                      background: f.pieceRating===t.val ? "#f1f5f9" : "transparent",
                      outline: f.pieceRating===t.val ? "2px solid #6366f1" : "none",
                    }}>
                    {t.val}
                  </button>
                ))}
              </div>
            </div>
            <textarea
              value={f.repertoire}
              onChange={e=>set("repertoire",e.target.value)}
              rows={2}
              placeholder="e.g. List A bars 1–16 HT, voicing in bar 8. List B HS, LH secure."
              className="input text-sm"
              style={{background:"#eef2ff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#4f46e5"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
            <div className="flex flex-wrap gap-1 mt-1">
              {CHIPS.repertoire.map(c=>(
                <button key={c} onClick={()=>appendChip("repertoire",c)}
                  style={{fontSize:"10px",fontWeight:600,padding:"2px 8px",borderRadius:"99px",border:"1px solid #c7d2fe",background:"#eef2ff",color:"#4338ca",cursor:"pointer"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* Technical — with chips */}
          <div>
            <label className="field-label" style={{color:"#7c3aed"}}>Technical work</label>
            <textarea
              value={f.technical}
              onChange={e=>set("technical",e.target.value)}
              rows={2}
              placeholder="e.g. 5B exercise – good. B major 4 oct, need more speed."
              className="input text-sm"
              style={{background:"#f5f3ff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#7c3aed"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
            <div className="flex flex-wrap gap-1 mt-1">
              {CHIPS.technical.map(c=>(
                <button key={c} onClick={()=>appendChip("technical",c)}
                  style={{fontSize:"10px",fontWeight:600,padding:"2px 8px",borderRadius:"99px",border:"1px solid #ddd6fe",background:"#f5f3ff",color:"#6d28d9",cursor:"pointer"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* SR & Aural */}
          <div>
            <label className="field-label" style={{color:"#0891b2"}}>Sight-reading & Aural</label>
            <textarea
              value={f.srAural}
              onChange={e=>set("srAural",e.target.value)}
              rows={2}
              placeholder="e.g. SR p.14 – hesitant bar 5. Intervals up to 6th solid."
              className="input text-sm"
              style={{background:"#ecfeff",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#0891b2"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

          {/* General Knowledge */}
          <div>
            <label className="field-label" style={{color:"#d97706"}}>General Knowledge</label>
            <textarea
              value={f.gk}
              onChange={e=>set("gk",e.target.value)}
              rows={2}
              placeholder="e.g. Baroque style discussed. Terms: andante, legato. Binary form."
              className="input text-sm"
              style={{background:"#fffbeb",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#d97706"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

          {/* Notes & homework — with copy button */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <label className="field-label" style={{color:"#64748b",marginBottom:0}}>Notes & homework</label>
              <button onClick={copyHomework}
                style={{
                  fontSize:"10px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",cursor:"pointer",
                  border:"1px solid #e2e8f0",background: copied ? "#f0fdf4" : "white",
                  color: copied ? "#15803d" : "#64748b", transition:"all 0.2s",
                }}>
                {copied ? "✓ Copied!" : "📋 Copy"}
              </button>
            </div>
            <textarea
              value={f.notes}
              onChange={e=>set("notes",e.target.value)}
              rows={2}
              placeholder="e.g. HW: List A bars 1–8 slowly ×3 daily. Parents updated re: exam."
              className="input text-sm"
              style={{background:"#f8fafc",borderColor:"transparent"}}
              onFocus={e=>e.target.style.borderColor="#64748b"}
              onBlur={e=>e.target.style.borderColor="transparent"}
            />
          </div>

        </div>

        <div className="p-5 flex gap-3 border-t border-slate-100">
          <button className="btn-ghost flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary flex-1" onClick={()=>onSave(f)}>Save lesson log</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   STUDENT CARD (list view)
═══════════════════════════════════════════════════════════════════════════ */
function StudentCard({ student, logs, onLog, onEdit, onDelete, onSelect }) {
  const gc = GRADE_COLOR[student.grade] || GRADE_COLOR["Grade 5"];
  const studentLogs = logs.filter(l=>l.studentId===student.id).sort((a,b)=>b.date.localeCompare(a.date));
  const lastLog = studentLogs[0];
  const thisMonthLogs = (() => {
    const now = new Date();
    const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    return studentLogs.filter(l => l.date && l.date.startsWith(ym) && l.type !== "absent").length;
  })();
  const studentNorm = { startingPhase: student.track==="exam" ? "foundation" : "exploration", ...student };
  const plan = buildPlan(studentNorm);
  const curMonthStr = currentMonthStr();
  const currentMonthIdx = plan.findIndex(m => m.monthStr === curMonthStr);
  const currentPlanMonth = currentMonthIdx >= 0 ? plan[currentMonthIdx] : plan[plan.length-1];
  const phase = currentPlanMonth?.phase;
  const pm = PHASE_META[phase] || PHASE_META.foundation;

  const weeksLeft = student.track==="exam" ? weeksUntil(student.examDate) : null;
  const monthsLeft = student.track==="exam"
    ? monthsUntil(student.examDate)
    : monthsUntil(addMonths(student.startDate, student.planMonths||3));

  const guide = generateGuide(student, logs, Math.max(currentMonthIdx,0), plan);

  const urgentColor = weeksLeft !== null && weeksLeft <= 4 ? "#dc2626" : weeksLeft !== null && weeksLeft <= 8 ? "#d97706" : "#16a34a";

  // D-day helpers
  const nextLessonDays = daysUntilNext(student.lessonDay);
  const examDays = student.track==="exam" ? daysUntilExam(student.examDate) : null;
  const nextLessonLabel = nextLessonDays === 0 ? "Today!" : nextLessonDays === 1 ? "Tomorrow" : nextLessonDays !== null ? `in ${nextLessonDays}d` : null;
  const isToday = nextLessonDays === 0;

  const initials = student.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

  return (
    <div className="card overflow-hidden hover:shadow-lg transition-all duration-200 cursor-pointer fade-in flex flex-col"
      style={student.paused ? {opacity:0.55, filter:"grayscale(40%)"} : {}}

      {/* Phase bar */}
      <div className="h-1.5" style={{background: student.paused ? "#d1d5db" : pm.color}}/>

      <div className="p-5 flex-1 flex flex-col">
        {/* Top row */}
        <div className="flex items-start justify-between gap-3 mb-3">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0"
              style={{background:gc.bg, color:gc.text}}>{initials}</div>
            <div>
              <div className="flex items-center gap-2">
                <p className="font-bold text-slate-800 text-sm leading-tight">{student.name}</p>
                {student.paused && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}>⏸ Paused</span>
                )}
              </div>
              <p className="text-xs text-slate-400 mt-0.5">{student.track==="exam" ? student.grade : (student.level||"General")} · {student.lessonDuration}m</p>
              <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                {nextLessonLabel && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",
                    background:isToday?"#f0fdf4":"#f8fafc", color:isToday?"#16a34a":"#64748b",
                    border:isToday?"1px solid #bbf7d0":"1px solid #e2e8f0"}}>
                    {isToday ? "🎹 Today!" : `Next: ${(student.lessonDay||"").slice(0,3)} ${nextLessonLabel}`}
                  </span>
                )}
                {examDays !== null && (
                  <span style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",
                    background:examDays<=14?"#fef2f2":examDays<=60?"#fffbeb":"#f8fafc",
                    color:examDays<=14?"#dc2626":examDays<=60?"#d97706":"#64748b",
                    border:examDays<=14?"1px solid #fecaca":examDays<=60?"1px solid #fde68a":"1px solid #e2e8f0"}}>
                    {`D-${examDays}`}
                  </span>
                )}
              </div>
            </div>
          </div>
          <div className="text-right shrink-0">
            {student.track==="exam" && weeksLeft !== null ? (
              <>
                <p className="text-lg font-black" style={{color:urgentColor}}>{weeksLeft}w</p>
                <p className="text-xs text-slate-400">to exam</p>
              </>
            ) : null}
          </div>
        </div>

        {/* Phase + current month */}
        <div className="flex items-center gap-2 mb-3">
          <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:pm.bg,color:pm.text}}>
            {pm.name}
          </span>
          {currentPlanMonth && <span className="text-xs text-slate-400">{currentPlanMonth.label}</span>}
        </div>

        {/* This month focus */}
        {currentPlanMonth && (
          <div className="bg-slate-50 rounded-xl p-3 mb-3">
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">This month</p>
            <p className="text-xs text-slate-600 leading-relaxed line-clamp-2">{currentPlanMonth.focus}</p>
          </div>
        )}

        {/* AI guide */}
        {guide.status !== "neutral" && (
          <div className="rounded-xl p-3 mb-3"
            style={{background: guide.status==="urgent"?"#fef2f2": guide.status==="warning"?"#fffbeb":"#f0fdf4"}}>
            <p className="text-[10px] font-bold uppercase tracking-wide mb-1"
              style={{color: guide.status==="urgent"?"#dc2626": guide.status==="warning"?"#d97706":"#16a34a"}}>
              {guide.status==="urgent"?"⚠ Urgent": guide.status==="warning"?"⚡ Check":"✓ On track"}
            </p>
            <p className="text-xs leading-relaxed" style={{color:"#475569"}}>
              {guide.alerts[0] || guide.tips[0]}
            </p>
          </div>
        )}

        {/* Last log */}
        <div className="mt-auto">
          {lastLog ? (
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <p className="text-xs text-slate-400">Last lesson: {fmtShort(lastLog.date)}</p>
                {thisMonthLogs > 0 && (
                  <span title="Lessons this month" style={{fontSize:"10px",fontWeight:700,padding:"1px 7px",borderRadius:"99px",background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe"}}>
                    {thisMonthLogs}× this month
                  </span>
                )}
              </div>
              {/* Mood trend — last 3 logs */}
              {(() => {
                const recent = studentLogs.slice(0,3).map(l=>l.mood).filter(Boolean);
                const MOOD_EMOJI = { rough:"😕", okay:"😐", good:"🙂", great:"😀" };
                return recent.length > 0 ? (
                  <div className="flex gap-0.5" title="Recent lesson moods">
                    {recent.map((m,i)=>(
                      <span key={i} style={{fontSize:"14px",opacity: i===0?1:i===1?0.65:0.35}}>{MOOD_EMOJI[m]||""}</span>
                    ))}
                  </div>
                ) : null;
              })()}
            </div>
          ) : (
            <p className="text-xs text-slate-400 mb-3">No lessons logged yet</p>
          )}

          {/* Actions */}
          <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>onLog(student)}
              className="flex-1 text-white text-xs font-bold py-2 rounded-xl transition-all"
              style={{background:"#4f46e5"}}>
              + Log lesson
            </button>
            <button onClick={()=>onEdit(student)}
              className="px-3 py-2 border border-slate-200 rounded-xl text-xs text-slate-500 hover:bg-slate-50">
              Edit
            </button>
            <button onClick={()=>onDelete(student.id)}
              className="px-3 py-2 border border-red-100 rounded-xl text-xs text-red-400 hover:bg-red-50">
              ✕
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   GENERAL PLAN PANEL — Last Lesson + Focus Pattern
═══════════════════════════════════════════════════════════════════════════ */

function GeneralPlanPanel({ student, logs }) {
  const AREAS = [
    { key:"repertoire", label:"Repertoire", bg:"#eef2ff", col:"#4f46e5" },
    { key:"technical",  label:"Technical",  bg:"#f5f3ff", col:"#7c3aed" },
    { key:"srAural",    label:"SR & Aural", bg:"#ecfeff", col:"#0891b2" },
    { key:"gk",         label:"Gen. Knowledge", bg:"#fffbeb", col:"#d97706" },
    { key:"notes",      label:"Notes",      bg:"#f8fafc", col:"#64748b" },
  ];

  const sorted = [...logs].sort((a,b)=>b.date.localeCompare(a.date));
  const latestLog = sorted[0];

  // Count how many logs touched each area
  const counts = {};
  AREAS.forEach(a => { counts[a.key] = logs.filter(l=>l[a.key]?.trim()).length; });
  const maxCount = Math.max(...Object.values(counts), 1);

  return (
    <div className="mt-6 space-y-5">

      {/* Latest lesson snapshot */}
      <div className="card p-5">
        <h3 className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-4">
          {latestLog ? `Last lesson — ${latestLog.date}` : "Last lesson"}
        </h3>
        {latestLog ? (
          <div className="space-y-2">
            {AREAS.filter(a => latestLog[a.key]?.trim()).map(a => (
              <div key={a.key} className="px-3 py-2.5 rounded-xl text-xs" style={{background:a.bg}}>
                <span className="font-bold mr-2" style={{color:a.col}}>{a.label}</span>
                <span className="text-slate-600 leading-relaxed">
                  {latestLog[a.key].slice(0,140)}{latestLog[a.key].length>140?"…":""}
                </span>
              </div>
            ))}
          </div>
        ) : (
          <p className="text-xs text-slate-400 italic">Log your first lesson to see notes here.</p>
        )}
      </div>

      {/* Focus pattern — built from all logs */}
      <div className="card p-5">
        <h3 className="text-xs font-bold uppercase tracking-wide text-slate-500 mb-1">Focus pattern</h3>
        <p className="text-xs text-slate-400 mb-4">Based on {logs.length} lesson{logs.length!==1?"s":""} logged</p>
        {logs.length === 0 ? (
          <p className="text-xs text-slate-400 italic">No lessons logged yet — pattern will appear as you log lessons.</p>
        ) : (
          <div className="space-y-2.5">
            {AREAS.filter(a => counts[a.key] > 0).sort((a,b)=>counts[b.key]-counts[a.key]).map(a => (
              <div key={a.key} className="flex items-center gap-3">
                <span className="text-xs font-semibold w-28 shrink-0" style={{color:a.col}}>{a.label}</span>
                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all"
                    style={{width:`${Math.round((counts[a.key]/maxCount)*100)}%`, background:a.col, opacity:0.7}}/>
                </div>
                <span className="text-xs text-slate-400 w-12 text-right shrink-0">
                  {counts[a.key]} lesson{counts[a.key]!==1?"s":""}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

    </div>
  );
}

        ← All students
      </button>

      {/* Student header card */}
      <div className="card p-5 mb-5" style={{borderTop:`4px solid ${pm.color}`}}>
        <div className="flex flex-wrap items-start justify-between gap-4">
          <div className="flex items-center gap-4">
            <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold shrink-0"
              style={{background:gc.bg,color:gc.text}}>{initials}</div>
            <div>
              <h2 className="text-lg font-bold text-slate-800">{student.name}</h2>
              <p className="text-sm text-slate-400">{student.track==="exam" ? student.grade : (student.level||"General")} · {student.lessonDuration}min · {student.lessonsPerWeek==="fortnightly" ? "Fortnightly" : `${student.lessonsPerWeek}× per week`}</p>
              {student.track==="general" && student.termGoal && (

          </div>
          <div className="flex gap-3 flex-wrap">
            {student.track==="exam" && weeksLeft !== null && (
              <div className="text-center px-4 py-2 rounded-xl" style={{background: weeksLeft<=4?"#fef2f2": weeksLeft<=8?"#fffbeb":"#f0fdf4"}}>

              ⏸ Pause lessons

        {student.paused && (

            style={{background:"#fffbeb",color:"#92400e",border:"1px solid #fde68a"}}>
            ⏸ Paused since {fmtDate(student.pausedAt)}
            {student.pauseUndecided
              ? " · Return date TBD"
              : student.pauseUntil
                ? ` · Returning ${fmtDate(student.pauseUntil)}`

          <div className="flex items-center gap-2 mb-3">
            <span className="text-xs font-bold uppercase tracking-wide" style={{color:pm.text}}>This month — {currentPlanMonth.label}</span>
            <span className="text-xs px-2 py-0.5 rounded-full" style={{background:pm.bg,color:pm.text}}>{pm.name}</span>
          </div>
          <p className="text-sm text-slate-700 leading-relaxed mb-4">{currentPlanMonth.focus}</p>
          <div className="flex flex-wrap gap-2">
            {[["Repertoire",alloc.repertoire,"#eef2ff","#4f46e5"],
              ["Technical",alloc.technical,"#f5f3ff","#7c3aed"],
              ["SR/Aural",alloc.sr,"#ecfeff","#0891b2"],
              ["GK",alloc.gk,"#fffbeb","#d97706"]].map(([label,mins,bg,col])=>(
              <div key={label} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold"
                style={{background:bg,color:col}}>
                {label} <span className="font-normal opacity-70">{mins}m</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* AI Guide */}
      <div className="card p-5 mb-5" style={{
        borderLeft:`4px solid ${guide.status==="urgent"?"#dc2626":guide.status==="warning"?"#d97706":"#16a34a"}`
      }}>
        <p className="text-xs font-bold uppercase tracking-wide mb-3"
          style={{color:guide.status==="urgent"?"#dc2626":guide.status==="warning"?"#d97706":"#16a34a"}}>
          {guide.status==="urgent"?"⚠ Action needed":guide.status==="warning"?"⚡ Check these":"✓ Looking good"}
        </p>
        {guide.alerts.length > 0 && (
          <ul className="space-y-1.5 mb-3">
            {guide.alerts.map((a,i)=>(
              <li key={i} className="text-sm text-slate-700 flex gap-2">
                <span className="text-red-400 shrink-0">•</span>{a}
              </li>
            ))}
          </ul>
        )}
        {guide.tips.length > 0 && (
          <ul className="space-y-1.5">
            {guide.tips.map((t,i)=>(
              <li key={i} className="text-sm text-slate-500 flex gap-2">
                <span className="text-slate-300 shrink-0">→</span>{t}
              </li>
            ))}
          </ul>
        )}
      </div>

      {/* ── Progress Passport ── */}
      {(() => {
        // Period filter
        const now = new Date();
        const periodStart = passportPeriod === "month"
          ? new Date(now.getFullYear(), now.getMonth(), 1)
          : passportPeriod === "quarter"
            ? new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1)
            : null;
        const filteredLogs = periodStart
          ? studentLogs.filter(l => new Date(l.date + "T12:00:00") >= periodStart)
          : studentLogs;

        const totalLogs    = filteredLogs.filter(l => l.type !== "absent");
        const absentLogs   = filteredLogs.filter(l => l.type === "absent");
        const attendanceTotal = studentLogs.length;
        const attendanceRate  = attendanceTotal > 0
          ? Math.round(((attendanceTotal - absentLogs.length) / attendanceTotal) * 100)
          : null;

        // Section coverage — how many logs have each section filled
        const coverageOf = (key) => totalLogs.length === 0 ? 0
          : Math.round((totalLogs.filter(l => l[key]?.trim()).length / totalLogs.length) * 100);

        const repCov  = coverageOf("repertoire");
        const techCov = coverageOf("technical");
        const srCov   = coverageOf("srAural");
        const gkCov   = coverageOf("gk");

        // Repertoire keyword scan — look for List A/B/C mentions in repertoire logs
        const allRepText = totalLogs.map(l => (l.repertoire || "").toLowerCase()).join(" ");
        const listAMentions = (allRepText.match(/\blist a\b|\b\ba piece\b/g) || []).length;
        const listBMentions = (allRepText.match(/\blist b\b|\b\bb piece\b/g) || []).length;
        const listCMentions = (allRepText.match(/\blist c\b|\b\bc piece\b/g) || []).length;

        // Streak — consecutive weeks with at least 1 lesson logged
        const logDates = totalLogs.map(l => new Date(l.date)).sort((a,b) => b-a);
        let streak = 0;
        if (logDates.length > 0) {
          const msPerWeek = 7*24*60*60*1000;
          let ref = logDates[0];
          streak = 1;
          for (let i = 1; i < logDates.length; i++) {
            if ((ref - logDates[i]) <= msPerWeek * 1.5) { streak++; ref = logDates[i]; }
            else break;
          }
        }

        // Parent-facing summary
        const summaryParts = [];
        if (attendanceRate !== null) summaryParts.push(`${attendanceRate}% attendance`);
        if (repCov >= 80)  summaryParts.push("consistent repertoire work");
        if (techCov >= 80) summaryParts.push("strong technical focus");
        if (srCov >= 60)   summaryParts.push("regular sight-reading practice");
        if (gkCov >= 40)   summaryParts.push("general knowledge included");
        const summary = summaryParts.length > 0
          ? `${student.name.split(" ")[0]} is showing ${summaryParts.join(", ")}.`
          : `${student.name.split(" ")[0]}'s passport will fill in as more lessons are logged.`;

        const Bar = ({ pct, color }) => (
          <div style={{height:"6px",borderRadius:"99px",background:"#f1f5f9",overflow:"hidden",marginTop:"6px"}}>
            <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:"99px",transition:"width 0.6s ease"}} />
          </div>
        );

        const PassportStat = ({ label, value, sub, color }) => (
          <div className="text-center px-3 py-3 rounded-xl" style={{background:"#f8fafc"}}>
            <p className="text-2xl font-black" style={{color}}>{value}</p>
            <p className="text-xs font-bold text-slate-600 mt-0.5">{label}</p>
            {sub && <p className="text-[10px] text-slate-400 mt-0.5">{sub}</p>}
          </div>
        );

        const periodLabel = passportPeriod === "month"
          ? now.toLocaleString("en-AU", { month: "long", year: "numeric" })
          : passportPeriod === "quarter"
            ? `Q${Math.floor(now.getMonth()/3)+1} ${now.getFullYear()}`
            : "All time";

        return (
          <div className="card p-5 mb-5" style={{borderLeft:"4px solid #6366f1"}}>
            {/* Header */}

   TODAY VIEW — today's lessons in time order
═══════════════════════════════════════════════════════════════════════════ */
function TodayView({ students, logs, onLog, onAbsence, onSelect, onDeleteLog, onMarkAttended }) {
  const todayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
  const todayLabel = new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});

  // Collect today's slots — include paused students (shown dimmed)
  const slots = [];
  students.forEach(s => {
    const isFort = s.lessonsPerWeek === "fortnightly";
    const fortOk = !isFort || isFortnightWeek(s.startDate);
    if (s.lessonDay === todayName && fortOk) slots.push({ student:s, time: s.lessonTime||"09:00", dur: s.lessonDuration||45 });
    if (s.lessonsPerWeek===2 && s.lessonDay2===todayName) slots.push({ student:s, time: s.lessonTime2||"09:00", dur: s.lessonDuration||45 });
  });
  slots.sort((a,b) => a.time.localeCompare(b.time));

  const today = todayStr();
  const todayLogs = logs.filter(l => l.date === today);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-lg font-bold text-slate-800">{todayLabel}</h2>
          <p className="text-sm text-slate-400 mt-0.5">{slots.length} lesson{slots.length!==1?"s":""} today</p>
        </div>
      </div>

      {slots.length === 0 ? (
        <div className="card p-12 text-center">
          <div className="text-4xl mb-3">☀️</div>
          <p className="text-slate-600 font-semibold">No lessons today</p>
          <p className="text-slate-400 text-sm mt-1">Enjoy your day off!</p>
        </div>
      ) : (
        <div className="space-y-3">
          {slots.map((slot, i) => {
            const s = slot.student;
            const gc = GRADE_COLOR[s.grade] || GRADE_COLOR["Grade 5"];
            const initials = s.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
            const studentNorm = { startingPhase: s.track==="exam"?"foundation":"exploration", ...s };
            const plan = buildPlan(studentNorm);
            const curM = plan.findIndex(m => m.monthStr === currentMonthStr());
            const phase = (curM>=0 ? plan[curM] : plan[plan.length-1])?.phase;
            const pm = PHASE_META[phase] || PHASE_META.foundation;
            const examDays = s.track==="exam" ? daysUntilExam(s.examDate) : null;

            // Find today's log for this student
            const todayLog = todayLogs.find(l => l.studentId === s.id);
            const status = !todayLog ? "pending"
              : todayLog.type === "absent" ? "absent"
              : "logged";

            return (
              <div key={i} className="card overflow-hidden transition-all"
                style={{
                  borderLeft:`4px solid ${s.paused ? "#cbd5e1" : status==="absent" ? "#dc2626" : status==="logged" ? "#16a34a" : pm.color}`,
                  opacity: s.paused ? 0.55 : 1,
                  filter: s.paused ? "grayscale(40%)" : "none",
                }}>
                <div className="p-4 flex items-center gap-4">
                  {/* Time */}
                  <div className="text-center shrink-0 w-14">
                    <p className="text-base font-black text-slate-700">{fmtTime(slot.time)}</p>
                    <p className="text-xs text-slate-400">{slot.dur}m</p>
                  </div>

                  {/* Avatar + info — clickable to student detail */}
                  <div className="flex items-center gap-3 flex-1 min-w-0 cursor-pointer group"
                    onClick={()=>onSelect(s)}>
                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0 group-hover:ring-2 group-hover:ring-indigo-300 transition-all"
                      style={{background:gc.bg,color:gc.text}}>{initials}</div>
                    <div className="min-w-0">
                      <p className="font-bold text-slate-800 text-sm truncate group-hover:text-indigo-600 transition-colors">{s.name}</p>
                      <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                        <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:pm.bg,color:pm.text}}>{pm.name}</span>
                        {examDays !== null && (
                          <span className="text-xs font-bold" style={{color:examDays<=14?"#dc2626":examDays<=60?"#d97706":"#94a3b8"}}>D-{examDays}</span>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Actions — dynamic by status, hidden for paused */}
                  <div className="flex items-center gap-2 shrink-0 flex-wrap justify-end">
                    {s.paused && (
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}>⏸ Paused</span>
                    )}

                    {/* PENDING — not yet logged or marked absent */}
                    {!s.paused && status === "pending" && (<>
                      <button onClick={()=>onLog(s)}
                        className="btn-primary text-xs py-1.5 px-4">
                        + Log lesson
                      </button>
                      <button onClick={()=>onAbsence(s)}
                        className="text-xs py-1.5 px-2 transition-colors"
                        style={{color:"#cbd5e1",background:"none",border:"none",cursor:"pointer"}}
                        onMouseEnter={e=>e.currentTarget.style.color="#dc2626"}
                        onMouseLeave={e=>e.currentTarget.style.color="#cbd5e1"}>
                        Absent
                      </button>
                    </>)}

                    {/* ABSENT — marked absent today */}
                    {!s.paused && status === "absent" && (<>
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"}}>
                        😔 Absent
                      </span>
                      {todayLog.makeupDate && (
                        <span style={{fontSize:"11px",fontWeight:600,padding:"3px 10px",borderRadius:"99px",background:"#fffbeb",color:"#d97706"}}>
                          📅 Makeup: {fmtDate(todayLog.makeupDate)}
                        </span>
                      )}
                      <button onClick={()=>onMarkAttended(todayLog)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#16a34a",borderColor:"#bbf7d0"}}>
                        ✓ Attended
                      </button>
                      <button onClick={()=>onAbsence(s)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#d97706",borderColor:"#fde68a"}}>
                        📅 Set makeup
                      </button>
                      <button onClick={()=>onDeleteLog(todayLog.id)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#94a3b8",borderColor:"#e2e8f0"}}>
                        ↩ Undo
                      </button>
                    </>)}

                    {/* LOGGED — lesson logged today */}
                    {!s.paused && status === "logged" && (<>
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0"}}>
                        ✓ Logged
                      </span>
                      <button onClick={()=>onLog(s)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#4f46e5",borderColor:"#c7d2fe"}}>
                        Edit log
                      </button>
                    </>)}

                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCHEDULE VIEW
═══════════════════════════════════════════════════════════════════════════ */
const DAYS_ORDER = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_COLOR = {
  Monday:    { bg:"#e8ecf7", border:"#7f8ec4", text:"#363c6e", grid:"white", blockBg:"#dfe4f4", blockText:"#363c6e" },
  Tuesday:   { bg:"#f5e8f2", border:"#b87aaa", text:"#62324e", grid:"white", blockBg:"#f0dcea", blockText:"#62324e" },
  Wednesday: { bg:"#e4f2f7", border:"#5aaec2", text:"#1e5f6e", grid:"white", blockBg:"#d8ecf5", blockText:"#1e5f6e" },
  Thursday:  { bg:"#f7ede3", border:"#c08a55", text:"#6b3f18", grid:"white", blockBg:"#f2e3d0", blockText:"#6b3f18" },
  Friday:    { bg:"#e4f2e8", border:"#5eaa7a", text:"#1e5c38", grid:"white", blockBg:"#d6edde", blockText:"#1e5c38" },
  Saturday:  { bg:"#ede8f5", border:"#8e78bb", text:"#3d2e68", grid:"white", blockBg:"#e4ddf0", blockText:"#3d2e68" },
  Sunday:    { bg:"#f5e8e8", border:"#b87a7a", text:"#622e2e", grid:"white", blockBg:"#f0d8d8", blockText:"#622e2e" },
};
const fmtTime = (t) => {
  if (!t) return "";
  const [h,m] = t.split(":");
  const hr = parseInt(h);
  const ampm = hr >= 12 ? "PM" : "AM";
  const hr12 = hr % 12 || 12;
  return `${hr12}:${m} ${ampm}`;
};

function ScheduleView({ students, logs, onLog, onAbsence, onSelect, onAdd }) {
  const [weekOffset, setWeekOffset] = React.useState(0); // 0 = this week, 1 = next, -1 = last

  // Week label — "This week", "Next week", "Apr 28 – May 4", etc.
  const weekLabel = (() => {
    if (weekOffset === 0) return "This week";
    if (weekOffset === 1) return "Next week";
    if (weekOffset === -1) return "Last week";
    const now = new Date();
    const mon = new Date(now);
    mon.setDate(now.getDate() - now.getDay() + 1 + weekOffset * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => d.toLocaleDateString("en-AU", {day:"numeric", month:"short"});
    return `${fmt(mon)} – ${fmt(sun)}`;
  })();

  // ── Build slots — include paused students (shown dimmed) ─────────────────
  const slots = [];
  students.forEach(s => {
    if (s.lessonDay) slots.push({ day: s.lessonDay, time: s.lessonTime||"09:00", student: s, dur: s.lessonDuration||45, fortnightly: s.lessonsPerWeek==="fortnightly", fortActive: s.lessonsPerWeek!=="fortnightly" || isFortnightWeek(s.startDate, weekOffset) });
    if (s.lessonsPerWeek === 2 && s.lessonDay2) slots.push({ day: s.lessonDay2, time: s.lessonTime2||"09:00", student: s, dur: s.lessonDuration||45, fortnightly: false, fortActive: true });
  });

  const byDay = {};
  DAYS_ORDER.forEach(d => { byDay[d] = []; });
  slots.forEach(slot => { if (byDay[slot.day]) byDay[slot.day].push(slot); });
  DAYS_ORDER.forEach(d => { byDay[d].sort((a,b) => a.time.localeCompare(b.time)); });

  const activeDays = DAYS_ORDER; // show all days including empty ones
  const unscheduled = students.filter(s => !s.lessonDay);

  if (students.length === 0) {
    return (
      <div className="card p-16 text-center fade-in">
        <div className="text-5xl mb-4">🗓</div>
        <p className="text-slate-600 font-semibold mb-1">No students yet</p>
        <p className="text-slate-400 text-sm mb-6">Add your first student to see the schedule.</p>
        <button className="btn-primary" onClick={onAdd}>+ Add student</button>
      </div>
    );
  }

  // ── Time grid config ─────────────────────────────────────────────────────
  // Find earliest/latest lesson to set grid bounds
  const allTimes = slots.map(s => {
    const [h,m] = s.time.split(":").map(Number);
    return h * 60 + (m||0);
  });
  const minTime = allTimes.length ? Math.max(0,   Math.floor((Math.min(...allTimes) - 30) / 60) * 60) : 8 * 60;
  const maxTime = allTimes.length ? Math.min(1440, Math.ceil((Math.max(...allTimes) + 90)  / 60) * 60) : 21 * 60;

  // Generate hour labels
  const hours = [];
  for (let t = minTime; t <= maxTime; t += 60) hours.push(t);

  const SLOT_H = 56;  // px per 60 min
  const TIME_COL = 52; // px width of time label column
  const gridH = (maxTime - minTime) / 60 * SLOT_H;

  const timeToY = (timeStr) => {
    const [h, m] = timeStr.split(":").map(Number);
    return ((h * 60 + (m||0)) - minTime) / 60 * SLOT_H;
  };
  const durToH = (dur) => (dur / 60) * SLOT_H;

  const fmtHour = (mins) => {
    const h = Math.floor(mins / 60);
    const suffix = h >= 12 ? "pm" : "am";
    const display = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `${display}${suffix}`;
  };

  // Today's day name for highlight
  const todayDay = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];

  return (
    <div className="fade-in">
      {/* ── Week navigation ── */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={()=>setWeekOffset(w=>w-1)}
          className="btn-ghost text-sm py-1.5 px-4">← Prev</button>
        <div className="text-center">
          <span className="text-sm font-bold text-slate-700">{weekLabel}</span>
          {weekOffset !== 0 && (
            <button onClick={()=>setWeekOffset(0)}
              className="ml-3 text-xs font-semibold text-indigo-500 hover:text-indigo-700"
              style={{background:"none",border:"none",cursor:"pointer"}}>
              Today
            </button>
          )}
        </div>
        <button onClick={()=>setWeekOffset(w=>w+1)}
          className="btn-ghost text-sm py-1.5 px-4">Next →</button>
      </div>

      {/* ── Weekly calendar grid ── */}
      <div className="card overflow-hidden" style={{marginBottom: unscheduled.length ? 24 : 0}}>
        {/* Header row — day names */}
        <div style={{display:"flex", borderBottom:"1px solid #f1f5f9"}}>
          {/* Time col spacer */}
          <div style={{width: TIME_COL, flexShrink:0, padding:"10px 0", borderRight:"1px solid #f1f5f9"}}/>
          {activeDays.map(day => {
            const dc = DAY_COLOR[day] || DAY_COLOR.Monday;
            return (
              <div key={day} style={{
                flex:1, textAlign:"center", padding:"10px 4px",
                borderRight:"1px solid #f1f5f9",
                background: dc.bg,
              }}>
                <span style={{
                  fontSize:"11px", fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase",
                  color: dc.text,
                }}>{day.slice(0,3)}</span>
                {day===todayDay && weekOffset===0 && (
                  <span style={{display:"block",width:6,height:6,borderRadius:"50%",background:dc.border,margin:"3px auto 0"}}/>
                )}
                {(() => {
                  const count = byDay[day].length;
                  const totalMins = byDay[day].reduce((sum, slot) => sum + (slot.dur||45), 0);
                  const hrs = Math.floor(totalMins / 60);
                  const mins = totalMins % 60;
                  const timeStr = hrs > 0 ? (mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`) : `${mins}m`;
                  return (
                    <>
                      <span style={{display:"block",fontSize:"10px",color:dc.border,marginTop:2,opacity:0.8}}>
                        {count} lesson{count!==1?"s":""}
                      </span>
                      {count > 0 && (
                        <span style={{display:"block",fontSize:"9px",color:dc.border,opacity:0.6,marginTop:1}}>
                          {timeStr}
                        </span>
                      )}
                    </>
                  );
                })()}
              </div>
            );
          })}
        </div>

        {/* Grid body */}
        <div style={{display:"flex", overflowX:"auto"}}>
          {/* Time labels column */}
          <div style={{width:TIME_COL, flexShrink:0, position:"relative", height:gridH, borderRight:"1px solid #f1f5f9"}}>
            {hours.map(t => (
              <div key={t} style={{
                position:"absolute", top: (t - minTime)/60*SLOT_H - 8,
                left:0, right:0, textAlign:"right", paddingRight:8,
              }}>
                <span style={{fontSize:"10px",color:"#cbd5e1",fontWeight:600}}>{fmtHour(t)}</span>
              </div>
            ))}
          </div>

          {/* Day columns */}
          {activeDays.map(day => {
            const dc = DAY_COLOR[day] || DAY_COLOR.Monday;
            return (
            <div key={day} style={{
              flex:1, position:"relative", height:gridH, minWidth:120,
              borderRight:"1px solid #f1f5f9",
              background: dc.grid,
            }}>
              {/* Hour grid lines */}
              {hours.map(t => (
                <div key={t} style={{
                  position:"absolute", top: (t-minTime)/60*SLOT_H,
                  left:0, right:0, borderTop:"1px solid #f1f5f9",
                }}/>
              ))}

              {/* Lesson blocks */}
              {byDay[day].map((slot, i) => {
                const s = slot.student;
                const gc = GRADE_COLOR[s.grade] || GRADE_COLOR["Grade 5"];
                const plan = buildPlan({ startingPhase: s.track==="exam"?"foundation":"exploration", ...s });
                const curM = plan.findIndex(m => m.monthStr === currentMonthStr());
                const phase = (curM>=0 ? plan[curM] : plan[plan.length-1])?.phase;
                const pm = PHASE_META[phase] || PHASE_META.foundation;
                const initials = s.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
                const top = timeToY(slot.time);
                const height = Math.max(durToH(slot.dur), 28);
                const isTiny    = height < 30;  // name only (e.g. <30min)
                const isCompact = height < 44;  // name + time on one line, no grade/buttons
                const isShort   = isTiny;       // legacy alias for button guard below
                const isToday = day === todayDay && weekOffset === 0;
                const isOffWeek = slot.fortnightly && !slot.fortActive;

                // Status for today's slot only
                const todayStr = new Date().toISOString().slice(0,10);
                const todayLog = isToday ? logs.filter(l => l.studentId===s.id && l.date===todayStr).sort((a,b)=>b.date.localeCompare(a.date))[0] : null;
                const todayStatus = !isToday ? null : todayLog ? (todayLog.type==="absent" ? "absent" : "logged") : "pending";

                return (
                  <div key={i}
                    onClick={()=>onSelect(s)}
                    style={{
                      position:"absolute", top: top+2, left:4, right:4, height: height-4,
                      borderRadius:8,
                      background: (isOffWeek || s.paused) ? "#f1f5f9" : dc.blockBg,
                      borderLeft:`3px solid ${(isOffWeek || s.paused) ? "#cbd5e1" : dc.border}`,
                      opacity: (isOffWeek || s.paused) ? 0.5 : 1,
                      filter: s.paused ? "grayscale(40%)" : "none",
                      cursor:"pointer", overflow:"hidden", transition:"all 0.15s",
                      boxShadow:"0 1px 4px rgba(0,0,0,0.08)",
                      padding: isTiny ? "2px 6px" : isCompact ? "3px 6px" : "5px 8px",
                      display:"flex",
                      flexDirection: "column",
                      alignItems: "flex-start",
                      gap: 1,
                    }}
                    onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,0.12)"; e.currentTarget.style.zIndex=10;}}
                    onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.06)"; e.currentTarget.style.zIndex=1;}}>
                    {/* Name — always first, never clipped by flex */}
                    <span style={{fontSize:"10px",fontWeight:700,color:(isOffWeek||s.paused)?"#94a3b8":dc.blockText,
                      whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                      width:"100%",flexShrink:0}}>
                      {s.name}{s.paused ? " ⏸" : ""}
                    </span>
                    {/* Time info — only when not tiny */}
                    {!isTiny && (
                      <span style={{fontSize:"9px",color:(isOffWeek||s.paused)?"#94a3b8":dc.border,fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>
                        {fmtTime(slot.time)} · {slot.dur}m
                      </span>
                    )}
                    {/* Action buttons — today only, status-aware, not for paused */}
                    {!isTiny && isToday && todayStatus !== null && !s.paused && (
                      <div style={{marginTop:"auto",display:"flex",gap:3,paddingTop:2}} onClick={e=>e.stopPropagation()}>
                        {todayStatus === "logged" && (
                          <span style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,
                            background:"#f0fdf4",color:"#16a34a"}}>✓ Logged</span>
                        )}
                        {todayStatus === "absent" && (
                          <span style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,
                            background:"#fef2f2",color:"#dc2626"}}>😔 Absent</span>
                        )}
                        {todayStatus === "pending" && (
                          <>
                            <button onClick={()=>onLog(s)}
                              style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,border:"none",
                                background:dc.border,color:"white",cursor:"pointer"}}>
                              + Log
                            </button>
                            <button onClick={()=>onAbsence(s)}
                              style={{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:5,border:"none",
                                background:"#fef2f2",color:"#dc2626",cursor:"pointer"}}>
                              Absent
                            </button>
                          </>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ); })}
        </div>
      </div>

      {/* Unscheduled */}
      {unscheduled.length > 0 && (
        <div>
          <p className="text-xs font-bold text-slate-400 mb-2" style={{textTransform:"uppercase",letterSpacing:"0.07em"}}>No day set ({unscheduled.length})</p>
          <div className="flex flex-wrap gap-2">
            {unscheduled.map(s => (
              <button key={s.id} onClick={()=>onSelect(s)}
                className="text-xs bg-white border border-slate-200 px-3 py-2 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                {s.name} · {s.grade}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

      if (!session) return;

      setUserId(uid);

      const [{ data: sData, error: sErr }, { data: lData, error: lErr }] = await Promise.all([
        _supabase.from("students").select("*").eq("user_id", uid).order("created_at"),
        _supabase.from("lesson_logs").select("*").eq("user_id", uid).order("date", { ascending: false }),
      ]);

      if (sErr || lErr) {
        setDbError("Could not load data. Please refresh.");
      } else {
        setStudents((sData || []).map(rowToStudent));
        setLogs((lData || []).map(rowToLog));
      }
      setLoading(false);
    }
    init();
  }, []);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    let list = students.filter(s => {
      if (!showPaused && s.paused) return false;
      const matchSearch = s.name.toLowerCase().includes(q) || s.grade.toLowerCase().includes(q);
      const matchGrade  = filterGrade === "All" || s.grade === filterGrade;
      const matchTrack  = filterTrack === "All" || s.track === filterTrack;
      return matchSearch && matchGrade && matchTrack;
    });
    list = [...list].sort((a, b) => {
      if (sortBy === "name")       return a.name.localeCompare(b.name);
      if (sortBy === "grade")      return GRADES.indexOf(a.grade) - GRADES.indexOf(b.grade);
      if (sortBy === "exam")  {
        if (!a.examDate && !b.examDate) return 0;
        if (!a.examDate) return 1;
        if (!b.examDate) return -1;
        return a.examDate.localeCompare(b.examDate);
      }
      if (sortBy === "lastlog") {
        const aLog = logs.filter(l=>l.studentId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
        const bLog = logs.filter(l=>l.studentId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
        if (!aLog && !bLog) return 0;
        if (!aLog) return 1;
        if (!bLog) return -1;
        return bLog.date.localeCompare(aLog.date);
      }
      if (sortBy === "monthcount") {
        const now = new Date();
        const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
        const aCount = logs.filter(l=>l.studentId===a.id && l.date&&l.date.startsWith(ym) && l.type!=="absent").length;
        const bCount = logs.filter(l=>l.studentId===b.id && l.date&&l.date.startsWith(ym) && l.type!=="absent").length;
        return bCount - aCount;
      }
      return 0;
    });
    return list;
  },[students, search, filterGrade, filterTrack, sortBy, logs]);
