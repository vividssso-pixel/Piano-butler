        borderLeft:`4px solid ${guide.status==="urgent"?"#dc2626":guide.status==="warning"?"#d97706":"#16a34a"}`
      }}>
        <p className="text-xs font-bold uppercase tracking-wide mb-3"
          style={{color:guide.status==="urgent"?"#dc2626":guide.status==="warning"?"#d97706":"#16a34a"}}>
          {guide.status==="urgent"?"⚠ Action needed":guide.status==="warning"?"⚡ Check these":"✓ Looking good"}
        </p>
        {guide.alerts.length > 0 && (
          <ul className="space-y-1.5 mb-3">
            {guide.alerts.map((a,i)=>(
              <li key={i} className="text-sm text-slate-700 flex gap-2">
                <span className="text-red-400 shrink-0">•</span>{a}
              </li>
            ))}
          </ul>
        )}
        {guide.tips.length > 0 && (
          <ul className="space-y-1.5">
            {guide.tips.map((t,i)=>(
              <li key={i} className="text-sm text-slate-500 flex gap-2">
                <span className="text-slate-300 shrink-0">→</span>{t}
              </li>
            ))}
          </ul>
        )}
      </div>

      {/* ── Progress Passport ── */}
      {(() => {
        // Period filter
        const now = new Date();
        const periodStart = passportPeriod === "month"
          ? new Date(now.getFullYear(), now.getMonth(), 1)
          : passportPeriod === "quarter"
            ? new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1)
            : null;
        const filteredLogs = periodStart
          ? studentLogs.filter(l => new Date(l.date + "T12:00:00") >= periodStart)
          : studentLogs;

        const totalLogs    = filteredLogs.filter(l => l.type !== "absent");
        const absentLogs   = filteredLogs.filter(l => l.type === "absent");
        const attendanceTotal = studentLogs.length;
        const attendanceRate  = attendanceTotal > 0
          ? Math.round(((attendanceTotal - absentLogs.length) / attendanceTotal) * 100)
          : null;

        // Section coverage — how many logs have each section filled
        const coverageOf = (key) => totalLogs.length === 0 ? 0
          : Math.round((totalLogs.filter(l => l[key]?.trim()).length / totalLogs.length) * 100);

        const repCov  = coverageOf("repertoire");
        const techCov = coverageOf("technical");
        const srCov   = coverageOf("srAural");
        const gkCov   = coverageOf("gk");

        // Repertoire keyword scan — look for List A/B/C mentions in repertoire logs
        const allRepText = totalLogs.map(l => (l.repertoire || "").toLowerCase()).join(" ");
        const listAMentions = (allRepText.match(/\blist a\b|\b\ba piece\b/g) || []).length;
        const listBMentions = (allRepText.match(/\blist b\b|\b\bb piece\b/g) || []).length;
        const listCMentions = (allRepText.match(/\blist c\b|\b\bc piece\b/g) || []).length;

        // Streak — consecutive weeks with at least 1 lesson logged
        const logDates = totalLogs.map(l => new Date(l.date)).sort((a,b) => b-a);
        let streak = 0;
        if (logDates.length > 0) {
          const msPerWeek = 7*24*60*60*1000;
          let ref = logDates[0];
          streak = 1;
          for (let i = 1; i < logDates.length; i++) {
            if ((ref - logDates[i]) <= msPerWeek * 1.5) { streak++; ref = logDates[i]; }
            else break;
          }
        }

        // Parent-facing summary
        const summaryParts = [];
        if (attendanceRate !== null) summaryParts.push(`${attendanceRate}% attendance`);
        if (repCov >= 80)  summaryParts.push("consistent repertoire work");
        if (techCov >= 80) summaryParts.push("strong technical focus");
        if (srCov >= 60)   summaryParts.push("regular sight-reading practice");
        if (gkCov >= 40)   summaryParts.push("general knowledge included");
        const summary = summaryParts.length > 0
          ? `${student.name.split(" ")[0]} is showing ${summaryParts.join(", ")}.`
          : `${student.name.split(" ")[0]}'s passport will fill in as more lessons are logged.`;

        const Bar = ({ pct, color }) => (
          <div style={{height:"6px",borderRadius:"99px",background:"#f1f5f9",overflow:"hidden",marginTop:"6px"}}>
            <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:"99px",transition:"width 0.6s ease"}} />
          </div>
        );

        const PassportStat = ({ label, value, sub, color }) => (
          <div className="text-center px-3 py-3 rounded-xl" style={{background:"#f8fafc"}}>
            <p className="text-2xl font-black" style={{color}}>{value}</p>
            <p className="text-xs font-bold text-slate-600 mt-0.5">{label}</p>
            {sub && <p className="text-[10px] text-slate-400 mt-0.5">{sub}</p>}
          </div>
        );

        const periodLabel = passportPeriod === "month"
          ? now.toLocaleString("en-AU", { month: "long", year: "numeric" })
          : passportPeriod === "quarter"
            ? `Q${Math.floor(now.getMonth()/3)+1} ${now.getFullYear()}`
            : "All time";

        return (
          <div className="card p-5 mb-5" style={{borderLeft:"4px solid #6366f1"}}>
            {/* Header */}
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <div className="flex items-center gap-2">
                <span style={{fontSize:"18px"}}>📋</span>
                <span className="text-sm font-bold text-slate-700">Progress Passport</span>
                <span className="text-[10px] px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-500 font-bold uppercase tracking-wide">
                  {totalLogs.length} lessons
                </span>
              </div>
              {/* Period selector */}
              <div className="flex gap-1 no-print">
                {[["month","Month"],["quarter","Quarter"],["all","All time"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setPassportPeriod(val)}
                    className="text-[11px] px-3 py-1 rounded-full border font-semibold transition-all"
                    style={passportPeriod===val
                      ? {background:"#6366f1",color:"white",borderColor:"#6366f1"}
                      : {background:"white",color:"#94a3b8",borderColor:"#e2e8f0"}}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
            <p className="text-[11px] text-slate-400 mb-4">{periodLabel} · {filteredLogs.length} of {studentLogs.length} lessons</p>

            {totalLogs.length === 0 ? (
              <p className="text-sm text-slate-400 text-center py-4">
                {studentLogs.length === 0 ? "No lessons logged yet — passport will appear here." : `No lessons logged in ${periodLabel}.`}
              </p>
            ) : (
              <>
                {/* Top stats row */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                  <PassportStat
                    label="Attendance"
                    value={attendanceRate !== null ? `${attendanceRate}%` : "—"}
                    sub={`${absentLogs.length} absent`}
                    color={attendanceRate >= 80 ? "#16a34a" : attendanceRate >= 60 ? "#d97706" : "#dc2626"}
                  />
                  <PassportStat
                    label="Lessons logged"
                    value={totalLogs.length}
                    sub={`${absentLogs.length} absences`}
                    color="#6366f1"
                  />
                  <PassportStat
                    label="Lesson streak"
                    value={streak}
                    sub="consecutive weeks"
                    color="#0891b2"
                  />
                  <PassportStat
                    label="GK covered"
                    value={`${gkCov}%`}
                    sub="of logged lessons"
                    color={gkCov >= 40 ? "#16a34a" : "#d97706"}
                  />
                </div>

                {/* Section coverage bars */}
                <div className="mb-5">
                  <p className="text-xs font-bold uppercase tracking-wide text-slate-400 mb-3">Lesson section coverage</p>
                  <div className="space-y-3">
                    {[
                      { label:"Repertoire",       pct:repCov,  color:"#4f46e5" },
                      { label:"Technical",        pct:techCov, color:"#7c3aed" },
                      { label:"SR & Aural",       pct:srCov,   color:"#0891b2" },
                      { label:"General Knowledge",pct:gkCov,   color:"#d97706" },
                    ].map(({ label, pct, color }) => (
                      <div key={label}>
                        <div className="flex justify-between items-center">
                          <span className="text-xs font-semibold text-slate-600">{label}</span>
                          <span className="text-xs font-bold" style={{color}}>{pct}%</span>
                        </div>
                        <Bar pct={pct} color={color} />
                      </div>
                    ))}
                  </div>
                </div>

                {/* Repertoire list mentions (exam track) */}
                {isExamStudent(student) && (listAMentions + listBMentions + listCMentions > 0) && (
                  <div className="mb-5">
                    <p className="text-xs font-bold uppercase tracking-wide text-slate-400 mb-3">Repertoire list mentions in logs</p>
                    <div className="flex gap-3 flex-wrap">
                      {[["List A", listAMentions,"#4f46e5","#eef2ff"],
                        ["List B", listBMentions,"#7c3aed","#f5f3ff"],
                        ["List C", listCMentions,"#0891b2","#ecfeff"]].map(([label,count,color,bg])=>(
                        <div key={label} className="flex items-center gap-2 px-3 py-2 rounded-xl" style={{background:bg}}>
                          <span className="text-xs font-bold" style={{color}}>{label}</span>
                          <span className="text-xs font-black" style={{color}}>{count}×</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Parent summary */}
                <div className="rounded-xl p-4" style={{background:"#f0fdf4",border:"1px solid #bbf7d0"}}>
                  <p className="text-[10px] font-bold uppercase tracking-wide text-green-600 mb-1">Parent summary</p>
                  <p className="text-sm text-slate-700 leading-relaxed">{summary}</p>
                </div>
              </>
            )}
          </div>
        );
      })()}

      {/* ── Makeup Schedule ── */}
      {(() => {
        // Absent logs that have a makeupDate set (pending makeups)
        const pendingMakeups = studentLogs
          .filter(l => l.type === "absent" && l.makeupDate)
          .sort((a, b) => a.makeupDate.localeCompare(b.makeupDate));

        if (pendingMakeups.length === 0) return null;

        const today = todayStr();

        return (
          <div className="card p-5 mb-5" style={{borderLeft:"4px solid #f59e0b"}}>
            <div className="flex items-center gap-2 mb-4">
              <span style={{fontSize:"16px"}}>🔄</span>
              <span className="text-sm font-bold text-slate-700">Makeup Schedule</span>
              <span className="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wide"
                style={{background:"#fffbeb",color:"#d97706"}}>
                {pendingMakeups.length} pending
              </span>
            </div>
            <div className="space-y-3">
              {pendingMakeups.map(log => {
                const isOverdue = log.makeupDate < today;
                const isToday   = log.makeupDate === today;
                return (
                  <div key={log.id} className="flex items-center justify-between gap-3 px-4 py-3 rounded-xl"
                    style={{
                      background: isOverdue ? "#fef2f2" : isToday ? "#f0fdf4" : "#f8fafc",
                      border: `1px solid ${isOverdue ? "#fecaca" : isToday ? "#bbf7d0" : "#e2e8f0"}`
                    }}>
                    <div>
                      <p className="text-xs text-slate-400 mb-0.5">
                        Absent: <span className="font-semibold text-slate-600">{fmtDate(log.date)}</span>
                      </p>
                      <p className="text-sm font-bold"
                        style={{color: isOverdue ? "#dc2626" : isToday ? "#16a34a" : "#1e293b"}}>
                        {isOverdue ? "⚠ Overdue — " : isToday ? "✓ Today — " : "📅 "}
                        Makeup: {fmtDate(log.makeupDate)}
                      </p>
                    </div>
                    <div className="flex gap-2 shrink-0">
                      <button
                        onClick={() => onMarkAttended(log)}
                        className="text-xs font-bold px-3 py-1.5 rounded-lg transition-colors"
                        style={{background:"#f0fdf4", color:"#16a34a"}}
                        title="Makeup completed — mark as attended">
                        ✓ Done
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="text-[10px] text-slate-400 mt-3">
              Click <strong>✓ Done</strong> when the makeup lesson has taken place — it will be recorded as an attended lesson.
            </p>
          </div>
        );
      })()}

      {/* Lesson log */}
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-sm font-bold text-slate-700">Lesson history</h3>
        <button onClick={()=>onLog(student)} className="btn-primary text-xs py-2 px-4">+ Log lesson</button>
      </div>

      {studentLogs.length === 0 ? (
        <div className="card p-10 text-center text-slate-400 text-sm">No lessons logged yet.</div>
      ) : (
        <div className="space-y-4">
          {studentLogs.map(log=>(
            <div key={log.id} className="card overflow-hidden">
              <div className="px-5 py-3 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <span className="text-xs text-slate-400 font-mono">{log.monthStr ? MONTH_NAMES[parseInt(log.monthStr.slice(5,7))-1]+" "+log.monthStr.slice(0,4) : fmtDate(log.date)}</span>
                  <span className="text-sm font-semibold text-slate-700">{fmtDate(log.date)}</span>
                  {log.type==="absent" && <span style={{fontSize:"10px",fontWeight:700,padding:"1px 8px",borderRadius:"99px",background:"#fef2f2",color:"#dc2626"}}>😔 Absent</span>}
                  {log.type==="makeup" && <span style={{fontSize:"10px",fontWeight:700,padding:"1px 8px",borderRadius:"99px",background:"#f0fdf4",color:"#16a34a"}}>🔄 Makeup</span>}
                </div>
                <div className="flex gap-2">
                  {log.type === "absent" && (
                    <button onClick={()=>onMarkAttended(log)}
                      className="text-xs font-bold px-2 py-1 rounded-lg transition-colors"
                      style={{background:"#f0fdf4",color:"#16a34a"}}
                      title="Change this to an attended lesson">
                      ✓ Mark attended
                    </button>
                  )}
                  <button onClick={()=>onEditLog(log)} className="text-xs text-slate-400 hover:text-indigo-600 px-2 py-1 rounded-lg hover:bg-indigo-50">Edit</button>
                  <button onClick={()=>onDeleteLog(log.id)} className="text-xs text-slate-400 hover:text-red-500 px-2 py-1 rounded-lg hover:bg-red-50">Delete</button>
                </div>
              </div>
              <div className="p-5 grid grid-cols-1 md:grid-cols-2 gap-4">
                {LOG_SECTIONS.filter(s=>log[s.key]?.trim()).map(s=>(
                  <div key={s.key}>
                    <p className="text-xs font-bold uppercase tracking-wide mb-1" style={{color:s.color}}>{s.label}</p>
                    <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{log[s.key]}</p>
                  </div>
                ))}
                {LOG_SECTIONS.every(s=>!log[s.key]?.trim()) && (
                  <p className="text-sm text-slate-400 col-span-2">No content recorded.</p>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Full plan timeline — exam students only */}
      {isExamStudent(student) && plan.length > 0 && (
        <div className="mt-8" style={{breakBefore:"auto"}}>
          <h3 className="text-sm font-bold text-slate-700 mb-4">Full plan — {plan.length} months</h3>
          <div className="space-y-1.5">
            {plan.map((m,i)=>{
              const pm2 = PHASE_META[m.phase]||PHASE_META.foundation;
              const isCurrent = m.monthStr === curMonthStr;
              const isPast    = m.monthStr < curMonthStr;
              const hasLog    = studentLogs.some(l=>l.monthStr===m.monthStr);
              return (
                <div key={i} className="flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all"
                  style={{
                    background: isCurrent ? pm2.bg : isPast ? "#f8fafc" : "transparent",
                    border: isCurrent ? `1px solid ${pm2.color}40` : "1px solid transparent",
                    breakInside: "avoid",
                  }}>
                  <span className="text-xs font-bold text-slate-500 w-16 shrink-0">{m.label}</span>
                  <span className="text-xs px-2 py-0.5 rounded-full font-semibold shrink-0" style={{background:pm2.bg,color:pm2.text}}>{pm2.name}</span>
                  <span className="text-xs text-slate-500 flex-1 truncate">{m.focus}</span>
                  {isCurrent && <span className="text-xs font-bold shrink-0" style={{color:pm2.color}}>← now</span>}
                  {hasLog && !isCurrent && <span className="text-xs text-green-500 shrink-0">✓</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* General plan panel — shown when no exam date set */}
      {!isExamStudent(student) && (
        <GeneralPlanPanel student={student} logs={studentLogs} alloc={alloc} />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   TODAY VIEW — today's lessons in time order
═══════════════════════════════════════════════════════════════════════════ */
function TodayView({ students, logs, onLog, onAbsence, onSelect, onDeleteLog, onMarkAttended }) {
  const todayName = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
  const todayLabel = new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});

  // Collect today's slots — include paused students (shown dimmed)
  const slots = [];
  students.forEach(s => {
    const isFort = s.lessonsPerWeek === "fortnightly";
    const fortOk = !isFort || isFortnightWeek(s.startDate);
    if (s.lessonDay === todayName && fortOk) slots.push({ student:s, time: s.lessonTime||"09:00", dur: s.lessonDuration||45 });
    if (s.lessonsPerWeek===2 && s.lessonDay2===todayName) slots.push({ student:s, time: s.lessonTime2||"09:00", dur: s.lessonDuration2||s.lessonDuration||45 });
  });
  slots.sort((a,b) => a.time.localeCompare(b.time));

  const today = todayStr();
  const todayLogs = logs.filter(l => l.date === today);

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-lg font-bold text-slate-800">{todayLabel}</h2>
          <p className="text-sm text-slate-400 mt-0.5">{slots.length} lesson{slots.length!==1?"s":""} today</p>
        </div>
      </div>

      {slots.length === 0 ? (
        <div className="card p-12 text-center">
          <div className="text-4xl mb-3">☀️</div>
          <p className="text-slate-600 font-semibold">No lessons today</p>
          <p className="text-slate-400 text-sm mt-1">Enjoy your day off!</p>
        </div>
      ) : (
        <div className="space-y-3">
          {slots.map((slot, i) => {
            const s = slot.student;
            const gc = GRADE_COLOR[s.grade] || GRADE_COLOR["Grade 5"];
            const initials = s.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
            const studentNorm = { startingPhase: isExamStudent(s)?"foundation":"exploration", ...s };
            const plan = buildPlan(studentNorm);
            const curM = plan.findIndex(m => m.monthStr === currentMonthStr());
            const phase = (curM>=0 ? plan[curM] : plan[plan.length-1])?.phase;
            const pm = PHASE_META[phase] || PHASE_META.foundation;
            const examDays = isExamStudent(s) ? daysUntilExam(s.examDate) : null;

            // Find today's log for this student
            const todayLog = todayLogs.find(l => l.studentId === s.id);
            const status = !todayLog ? "pending"
              : todayLog.type === "absent" ? "absent"
              : "logged";

            return (
              <div key={i} className="card overflow-hidden transition-all"
                style={{
                  borderLeft:`4px solid ${s.paused ? "#cbd5e1" : status==="absent" ? "#dc2626" : status==="logged" ? "#16a34a" : pm.color}`,
                  opacity: s.paused ? 0.55 : 1,
                  filter: s.paused ? "grayscale(40%)" : "none",
                }}>
                <div className="p-4 flex items-center gap-4">
                  {/* Time */}
                  <div className="text-center shrink-0 w-14">
                    <p className="text-base font-black text-slate-700">{fmtTime(slot.time)}</p>
                    <p className="text-xs text-slate-400">{slot.dur}m</p>
                  </div>

                  {/* Avatar + info — clickable to student detail */}
                  <div className="flex items-center gap-3 flex-1 min-w-0 cursor-pointer group"
                    onClick={()=>onSelect(s)}>
                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0 group-hover:ring-2 group-hover:ring-indigo-300 transition-all"
                      style={{background:gc.bg,color:gc.text}}>{initials}</div>
                    <div className="min-w-0">
                      <p className="font-bold text-slate-800 text-sm truncate group-hover:text-indigo-600 transition-colors">{s.name}</p>
                      <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                        <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:pm.bg,color:pm.text}}>{pm.name}</span>
                        {examDays !== null && (
                          <span className="text-xs font-bold" style={{color:examDays<=14?"#dc2626":examDays<=60?"#d97706":"#94a3b8"}}>D-{examDays}</span>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* Actions — dynamic by status, hidden for paused */}
                  <div className="flex items-center gap-2 shrink-0 flex-wrap justify-end">
                    {s.paused && (
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}>⏸ Paused</span>
                    )}

                    {/* PENDING — not yet logged or marked absent */}
                    {!s.paused && status === "pending" && (<>
                      <button onClick={()=>onLog(s)}
                        className="btn-primary text-xs py-1.5 px-4">
                        + Log lesson
                      </button>
                      <button onClick={()=>onAbsence(s)}
                        className="text-xs py-1.5 px-2 transition-colors"
                        style={{color:"#cbd5e1",background:"none",border:"none",cursor:"pointer"}}
                        onMouseEnter={e=>e.currentTarget.style.color="#dc2626"}
                        onMouseLeave={e=>e.currentTarget.style.color="#cbd5e1"}>
                        Absent
                      </button>
                    </>)}

                    {/* ABSENT — marked absent today */}
                    {!s.paused && status === "absent" && (<>
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"}}>
                        😔 Absent
                      </span>
                      {todayLog.makeupDate && (
                        <span style={{fontSize:"11px",fontWeight:600,padding:"3px 10px",borderRadius:"99px",background:"#fffbeb",color:"#d97706"}}>
                          📅 Makeup: {fmtDate(todayLog.makeupDate)}
                        </span>
                      )}
                      <button onClick={()=>onMarkAttended(todayLog)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#16a34a",borderColor:"#bbf7d0"}}>
                        ✓ Attended
                      </button>
                      <button onClick={()=>onAbsence(s)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#d97706",borderColor:"#fde68a"}}>
                        📅 Set makeup
                      </button>
                      <button onClick={()=>onDeleteLog(todayLog.id)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#94a3b8",borderColor:"#e2e8f0"}}>
                        ↩ Undo
                      </button>
                    </>)}

                    {/* LOGGED — lesson logged today */}
                    {!s.paused && status === "logged" && (<>
                      <span style={{fontSize:"11px",fontWeight:700,padding:"3px 10px",borderRadius:"99px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0"}}>
                        ✓ Logged
                      </span>
                      <button onClick={()=>onLog(s)}
                        className="btn-ghost text-xs py-1.5 px-3"
                        style={{color:"#4f46e5",borderColor:"#c7d2fe"}}>
                        Edit log
                      </button>
                    </>)}

                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCHEDULE VIEW
═══════════════════════════════════════════════════════════════════════════ */
const DAYS_ORDER = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_COLOR = {
  Monday:    { bg:"#e8ecf7", border:"#7f8ec4", text:"#363c6e", grid:"white", blockBg:"#dfe4f4", blockText:"#363c6e" },
  Tuesday:   { bg:"#f5e8f2", border:"#b87aaa", text:"#62324e", grid:"white", blockBg:"#f0dcea", blockText:"#62324e" },
  Wednesday: { bg:"#e4f2f7", border:"#5aaec2", text:"#1e5f6e", grid:"white", blockBg:"#d8ecf5", blockText:"#1e5f6e" },
  Thursday:  { bg:"#f7ede3", border:"#c08a55", text:"#6b3f18", grid:"white", blockBg:"#f2e3d0", blockText:"#6b3f18" },
  Friday:    { bg:"#e4f2e8", border:"#5eaa7a", text:"#1e5c38", grid:"white", blockBg:"#d6edde", blockText:"#1e5c38" },
  Saturday:  { bg:"#ede8f5", border:"#8e78bb", text:"#3d2e68", grid:"white", blockBg:"#e4ddf0", blockText:"#3d2e68" },
  Sunday:    { bg:"#f5e8e8", border:"#b87a7a", text:"#622e2e", grid:"white", blockBg:"#f0d8d8", blockText:"#622e2e" },
};
const fmtTime = (t) => {
  if (!t) return "";
  const [h,m] = t.split(":");
  const hr = parseInt(h);
  const ampm = hr >= 12 ? "PM" : "AM";
  const hr12 = hr % 12 || 12;
  return `${hr12}:${m} ${ampm}`;
};

function RescheduleModal({ pendingDrop, onWeekOnly, onPermanent, onCancel }) {
  // Legacy — no longer used as a modal; kept for compat but renders nothing
  return null;
}

// ── Create Slot Popover — 빈 칸 클릭 시 학생 선택 + 시간 확인 ──────────────
function CreateSlotPopover({ popover, students, onSave, onSaveNew, onCancel }) {
  const [mode,       setMode]       = React.useState("existing"); // "existing" | "new"
  const [selectedId, setSelectedId] = React.useState("");
  const [newName,    setNewName]    = React.useState("");
  const [newGrade,   setNewGrade]   = React.useState("Grade 3");
  const [editTime,   setEditTime]   = React.useState(popover?.time || "09:00");
  const [dur,        setDur]        = React.useState(45);
  const popRef = React.useRef(null);
  const [pos, setPos] = React.useState({ left: 0, top: 0 });

  React.useEffect(() => {
    if (popover) { setEditTime(popover.time); setSelectedId(""); setNewName(""); setMode("existing"); setDur(45); }
  }, [popover?.day, popover?.time]);

  React.useEffect(() => {
    if (!popRef.current || !popover) return;
    const pop = popRef.current.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = popover.anchorX + 10;
    if (left + pop.width > vw - 8) left = popover.anchorX - pop.width - 10;
    let top = popover.anchorY - 20;
    top = Math.min(top, vh - pop.height - 8);
    top = Math.max(8, top);
    setPos({ left, top });
  }, [popover, mode, selectedId, newName, editTime]);

  if (!popover) return null;

  const timeToMins = (t) => { const [h,m] = (t||"09:00").split(":").map(Number); return h*60+(m||0); };
  const minsToTime = (m) => {
    const c = Math.max(0, Math.min(23*60+59, m));
    return String(Math.floor(c/60)).padStart(2,"0")+":"+String(c%60).padStart(2,"0");
  };
  const adjust = (d) => setEditTime(t => minsToTime(timeToMins(t) + d));
  const endTime = minsToTime(timeToMins(editTime) + dur);
  const available = students.filter(s => !s.paused);
  const canSave = mode === "existing" ? !!selectedId : newName.trim().length > 0;

  const handleSave = (weekOnly) => {
    if (!canSave) return;
    if (mode === "existing") {
      onSave({ studentId: selectedId, day: popover.day, time: editTime, dur, weekOnly: !!weekOnly });
    } else {
      onSaveNew({ name: newName.trim(), grade: newGrade, day: popover.day, time: editTime, dur, weekOnly: !!weekOnly });
    }
  };

  const tabStyle = (active) => ({
    flex:1, padding:"7px 0", borderRadius:8, border:"none",
    background: active ? "#6366f1" : "#f1f5f9",
    color: active ? "#fff" : "#64748b",
    fontWeight: active ? 700 : 500, fontSize:12, cursor:"pointer",
    transition:"all 0.12s",
  });

  return (
    <>
      <div style={{position:"fixed",inset:0,zIndex:999}} onClick={onCancel}/>
      <div ref={popRef} style={{
        position:"fixed", left:pos.left, top:pos.top, zIndex:1000,
        background:"#fff", borderRadius:16, padding:"18px 18px 16px",
        width:310, boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
        border:"1px solid #e2e8f0", display:"flex", flexDirection:"column", gap:14,
      }} onClick={e=>e.stopPropagation()}>

        {/* Title */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div>
            <p style={{fontSize:15, fontWeight:800, color:"#0f172a", margin:0}}>Add lesson</p>
            <p style={{fontSize:12, color:"#64748b", margin:"3px 0 0"}}>{popover.day} · {fmtTime(editTime)}</p>
          </div>
          <button onClick={onCancel} style={{
            background:"#f1f5f9", border:"none", borderRadius:"50%",
            width:28, height:28, cursor:"pointer", fontSize:13, color:"#64748b",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>✕</button>
        </div>

        {/* Mode tabs */}
        <div style={{display:"flex", gap:6}}>
          <button style={tabStyle(mode==="existing")} onClick={()=>setMode("existing")}>Existing student</button>
          <button style={tabStyle(mode==="new")}      onClick={()=>setMode("new")}>+ New student</button>
        </div>

        {/* Student picker / new student form */}
        {mode === "existing" ? (
          <div>
            <select value={selectedId} onChange={e=>setSelectedId(e.target.value)}
              style={{width:"100%", border:"1px solid #e2e8f0", borderRadius:10, padding:"9px 12px",
                fontSize:13, outline:"none", background:"white", color: selectedId ? "#1e293b" : "#94a3b8"}}>
              <option value="">Select student…</option>
              {available.map(s => <option key={s.id} value={s.id}>{s.name} · {s.grade}</option>)}
            </select>
          </div>
        ) : (
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            <input
              autoFocus
              type="text" placeholder="Student name"
              value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter" && canSave) handleSave(); }}
              style={{width:"100%", border:"1px solid #e2e8f0", borderRadius:10, padding:"9px 12px",
                fontSize:13, outline:"none", background:"white", boxSizing:"border-box"}}
            />
            <select value={newGrade} onChange={e=>setNewGrade(e.target.value)}
              style={{width:"100%", border:"1px solid #e2e8f0", borderRadius:10, padding:"9px 12px",
                fontSize:13, outline:"none", background:"white"}}>
              {["Preliminary","Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8"].map(g =>
                <option key={g} value={g}>{g}</option>
              )}
            </select>
          </div>
        )}

        {/* Time */}
        <div>
          <p style={{fontSize:11, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em", margin:"0 0 8px"}}>Time</p>
          <input type="time" value={editTime} onChange={e=>setEditTime(e.target.value)}
            style={{width:"100%", textAlign:"center", fontSize:22, fontWeight:800, color:"#4338ca",
              border:"2px solid #e0e7ff", borderRadius:12, padding:"10px 8px",
              background:"#f5f3ff", outline:"none", fontFamily:"inherit", boxSizing:"border-box"}}/>
          <p style={{fontSize:11, color:"#94a3b8", textAlign:"center", margin:"6px 0 0"}}>{fmtTime(editTime)} – {fmtTime(endTime)}</p>
        </div>

        {/* Duration */}
        <div style={{display:"flex", gap:6}}>
          {[30,45,60].map(d => (
            <button key={d} onClick={()=>setDur(d)} style={{
              flex:1, padding:"8px 0", borderRadius:9, border:"none",
              background: dur===d ? "#6366f1" : "#f1f5f9",
              color: dur===d ? "#fff" : "#64748b",
              fontWeight: dur===d ? 800 : 500, fontSize:12, cursor:"pointer",
            }}>{d}m</button>
          ))}
        </div>

        {/* Two save modes */}
        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          <button disabled={!canSave} onClick={()=>handleSave(false)} style={{
            padding:"11px", borderRadius:11, border:"none",
            background: canSave ? "#6366f1" : "#e2e8f0",
            color: canSave ? "#fff" : "#94a3b8",
            fontWeight:700, fontSize:13, cursor: canSave ? "pointer" : "not-allowed",
            textAlign:"left", paddingLeft:14,
          }}>
            📅 {mode === "new" ? "Register student + recurring lesson" : "Save as recurring lesson"}
            <span style={{display:"block", fontSize:11, fontWeight:400, opacity:0.75, marginTop:1}}>
              Fixed to this day &amp; time every week
            </span>
          </button>
          {mode === "existing" && (
            <button disabled={!canSave} onClick={()=>handleSave(true)} style={{
              padding:"11px", borderRadius:11, border:"1.5px solid #e2e8f0",
              background: canSave ? "#f8fafc" : "#f1f5f9",
              color: canSave ? "#334155" : "#94a3b8",
              fontWeight:700, fontSize:13, cursor: canSave ? "pointer" : "not-allowed",
              textAlign:"left", paddingLeft:14,
            }}>
              🗓 This week only
              <span style={{display:"block", fontSize:11, fontWeight:400, color:"#94a3b8", marginTop:1}}>
                Won't appear from next week
              </span>
            </button>
          )}
        </div>
      </div>
    </>
  );
}

// ── RevertConfirmPopover: overridden slot ✕ click — revert options ───────────
function RevertConfirmPopover({ popover, onRevertWeek, onRevertFromWeek, onRevertAll, onCancel }) {
  const popRef = React.useRef(null);
  const [pos, setPos] = React.useState({ left: 0, top: 0 });

  React.useEffect(() => {
    if (!popRef.current || !popover) return;
    const pop = popRef.current.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = (popover.anchorX || 0) + 10;
    if (left + pop.width > vw - 8) left = (popover.anchorX || 0) - pop.width - 10;
    let top = (popover.anchorY || 0) - 20;
    top = Math.min(top, vh - pop.height - 8);
    top = Math.max(8, top);
    setPos({ left, top });
  }, [popover]);

  if (!popover) return null;

  const { studentName, originalDay, originalTime } = popover;

  const optBtn = (onClick, border, bg, color, emoji, title, sub) => (
    <button onClick={onClick} style={{
      width:"100%", padding:"11px 14px", borderRadius:10,
      border:`1.5px solid ${border}`, background:bg, color,
      fontWeight:700, fontSize:13, cursor:"pointer",
      textAlign:"left", lineHeight:1,
    }}>
      {emoji} {title}
      <span style={{display:"block", fontSize:11, fontWeight:400, color:"#94a3b8", marginTop:3}}>
        {sub}
      </span>
    </button>
  );

  return (
    <>
      <div style={{position:"fixed",inset:0,zIndex:1099}} onClick={onCancel}/>
      <div ref={popRef} style={{
        position:"fixed", left:pos.left, top:pos.top, zIndex:1100,
        background:"#fff", borderRadius:14, padding:"16px 18px",
        width:280, boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
        border:"1.5px solid #e0e7ff", display:"flex", flexDirection:"column", gap:8,
      }} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:2}}>
          <div>
            <p style={{margin:0, fontSize:13, fontWeight:800, color:"#0f172a"}}>{studentName}</p>
            <p style={{margin:"2px 0 0", fontSize:11, color:"#6366f1"}}>↪ This slot has been moved</p>
          </div>
          <button onClick={onCancel}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8",padding:0}}>✕</button>
        </div>
        {optBtn(onRevertWeek,    "#e2e8f0","#f8fafc","#334155", "↺", "Revert this week only",
          `Back to ${originalDay ? originalDay.slice(0,3)+" "+originalTime : "original time"} · next week keeps this slot`)}
        {optBtn(onRevertFromWeek,"#c7d2fe","#eef2ff","#3730a3", "↺↺", "Revert from this week on",
          "All future weeks return to original schedule")}
        {optBtn(onRevertAll,     "#fde68a","#fffbeb","#92400e", "⚡", "Revert all weeks",
          "Restores original time across past and future")}
      </div>
    </>
  );
}

// ── SkipConfirmPopover: ✕ 클릭 시 3가지 삭제 옵션 ──────────────────────────

  const popRef = React.useRef(null);
  const [pos, setPos] = React.useState({ left: 0, top: 0 });

  React.useEffect(() => {
    if (!popRef.current || !popover) return;
    const pop = popRef.current.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = (popover.anchorX || 0) + 10;
    if (left + pop.width > vw - 8) left = (popover.anchorX || 0) - pop.width - 10;
    let top = (popover.anchorY || 0) - 20;
    top = Math.min(top, vh - pop.height - 8);
    top = Math.max(8, top);
    setPos({ left, top });
  }, [popover]);

  if (!popover) return null;

  const optBtn = (onClick, border, bg, color, emoji, title, sub) => (
    <button onClick={onClick} style={{
      width:"100%", padding:"11px 14px", borderRadius:10,
      border:`1.5px solid ${border}`, background:bg, color,
      fontWeight:700, fontSize:13, cursor:"pointer",
      textAlign:"left", lineHeight:1,
    }}>

        background:"#fff", borderRadius:14, padding:"16px 18px",

        border:"1px solid #e2e8f0", display:"flex", flexDirection:"column", gap:8,
