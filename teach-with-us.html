<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Teach with Piano Butler | Reach Online Students</title>
  <meta name="description" content="Join Piano Butler's teacher network. Reach students who are already searching for piano lessons online. Free to apply.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://thepianobutler.com/teach-with-us.html">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0eb; color: #1a1008; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: #f5f0eb; border-bottom: 1px solid #e8e0d8; position: sticky; top: 0; z-index: 10; }
    .nav-logo { font-weight: 700; font-size: 15px; color: #1a1008; display: flex; align-items: center; gap: 8px; }
    .nav-logo-bar { width: 3px; height: 18px; background: #d4956a; border-radius: 2px; }
    .nav-back { font-size: 13px; color: #8a7a6a; }
    .nav-back:hover { color: #d4956a; }

    .hero { text-align: center; padding: 64px 24px 48px; max-width: 600px; margin: 0 auto; }
    .hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: #d4956a; text-transform: uppercase; margin-bottom: 16px; }
    .hero-title { font-size: 36px; font-weight: 800; line-height: 1.15; color: #1a1008; margin-bottom: 16px; }
    .hero-sub { font-size: 15px; color: #6a5a4a; line-height: 1.6; }

    .perks { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 640px; margin: 0 auto 48px; padding: 0 24px; }
    @media (max-width: 520px) { .perks { grid-template-columns: 1fr; } }
    .perk { background: #fff; border: 1px solid #e8e0d8; border-radius: 12px; padding: 20px; text-align: center; }
    .perk-icon { font-size: 24px; margin-bottom: 10px; }
    .perk-title { font-size: 13px; font-weight: 700; color: #1a1008; margin-bottom: 6px; }
    .perk-desc { font-size: 12px; color: #6a5a4a; line-height: 1.5; }

    .card { background: #fff; border-radius: 16px; border: 1px solid #e8e0d8; max-width: 560px; margin: 0 auto 40px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8a7a6a; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0e8e0; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #3a2a1a; margin-bottom: 8px; }
    .field label span { font-weight: 400; color: #8a7a6a; margin-left: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0d8d0; border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #1a1008; background: #faf8f5;
      transition: border-color 0.15s; appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #d4956a; background: #fff; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e0d8d0; font-size: 13px; cursor: pointer; background: #faf8f5; color: #3a2a1a; transition: all 0.15s; }
    .chip:hover { border-color: #d4956a; }
    .chip.selected { border-color: #d4956a; background: #fdf0e8; color: #b8703a; font-weight: 600; }

    .btn-submit { width: 100%; padding: 14px; background: #d4956a; color: #fff; font-size: 15px; font-weight: 700; border-radius: 12px; transition: background 0.15s; margin-top: 8px; }
    .btn-submit:hover:not(:disabled) { background: #b8703a; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .success-card { text-align: center; padding: 48px 32px; }
    .success-icon { font-size: 48px; margin-bottom: 20px; }
    .success-title { font-size: 24px; font-weight: 800; color: #1a1008; margin-bottom: 12px; }
    .success-msg { font-size: 15px; color: #6a5a4a; line-height: 1.6; margin-bottom: 28px; }
    .btn-back { display: inline-block; padding: 11px 24px; border: 1.5px solid #e0d8d0; border-radius: 10px; font-size: 14px; color: #3a2a1a; }
    .btn-back:hover { border-color: #d4956a; color: #d4956a; }
    .error-msg { font-size: 13px; color: #c0392b; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><div class="nav-logo-bar"></div>Piano Butler</div>
    <a href="index.html" class="nav-back">← Back to search</a>
  </nav>
  <div id="root"></div>

  <script id="app-jsx" type="text/jsx-raw">
  const { useState } = React;

  const LEVELS = ["Beginner / Preliminary", "Grade 1–4", "Grade 5–8", "Diploma / Advanced", "Adult learners", "Children (under 12)"];
  const SYLLABUSES = ["AMEB", "ABRSM", "Trinity", "RCM", "No preference"];
  const TIMEZONES = ["AEST (Sydney/Melbourne)", "ACST (Adelaide/Darwin)", "AWST (Perth)", "NZT (New Zealand)", "Other / International"];
  const AVAILABILITY = ["Weekday mornings", "Weekday afternoons", "Weekday evenings", "Weekends"];

  function ChipGroup({ options, value, onChange, multi }) {
    const toggle = (opt) => {
      if (multi) {
        const cur = value || [];
        onChange(cur.includes(opt) ? cur.filter(x => x !== opt) : [...cur, opt]);
      } else {
        onChange(value === opt ? '' : opt);
      }
    };
    const isSelected = (opt) => multi ? (value || []).includes(opt) : value === opt;
    return (
      <div className="chips">
        {options.map(opt => (
          <button key={opt} type="button" className={"chip" + (isSelected(opt) ? " selected" : "")} onClick={() => toggle(opt)}>{opt}</button>
        ))}
      </div>
    );
  }

  function App() {
    const [submitted, setSubmitted] = useState(false);
    const [submitting, setSubmitting] = useState(false);
    const [error, setError] = useState('');

    const [form, setForm] = useState({
      name: '', email: '', location: '',
      levels: [], syllabuses: [], timezone: '',
      availability: [], rate: '', experience: '', bio: ''
    });

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const canSubmit = form.name.trim() && form.email.trim() && form.levels.length > 0 && form.timezone;

    const handleSubmit = async () => {
      setSubmitting(true);
      setError('');
      try {
        const body = {
          access_key: '1905cf40-5bcd-463a-87dd-c9d5ee673f56',
          subject: 'New Teacher Application — Piano Butler',
          name: form.name,
          email: form.email,
          message: `
TEACHER APPLICATION
-------------------
Name: ${form.name}
Email: ${form.email}
Location: ${form.location || '—'}
Timezone: ${form.timezone}
Levels: ${form.levels.join(', ')}
Syllabuses: ${form.syllabuses.join(', ') || '—'}
Availability: ${form.availability.join(', ') || '—'}
Rate: ${form.rate || '—'}
Experience: ${form.experience || '—'}
Bio: ${form.bio || '—'}
          `.trim()
        };
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
          setSubmitted(true);
        } else {
          setError('Something went wrong. Please try again.');
        }
      } catch (e) {
        setError('Network error. Please check your connection and try again.');
      }
      setSubmitting(false);
    };

    if (submitted) {
      return (
        <div style={{ maxWidth: 560, margin: '0 auto', padding: '0 24px' }}>
          <div className="card success-card">
            <div className="success-icon">🎹</div>
            <div className="success-title">Application received!</div>
            <div className="success-msg">
              Thank you, {form.name.split(' ')[0]}! We'll be in touch within a few days to get you set up.
            </div>
            <a href="index.html" className="btn-back">← Back to Piano Butler</a>
          </div>
        </div>
      );
    }

    return (
      <div style={{ padding: '0 24px' }}>
        <div className="hero">
          <div className="hero-eyebrow">For Teachers</div>
          <div className="hero-title">Teach online. Reach students who are already looking.</div>
          <div className="hero-sub">Piano Butler is searched by pianists and teachers every day. Join the network and we'll connect you with students that match your teaching style.</div>
        </div>

        <div className="perks">
          <div className="perk">
            <div className="perk-icon">🌏</div>
            <div className="perk-title">Online only</div>
            <div className="perk-desc">Teach students anywhere — no commute, no location limits.</div>
          </div>
          <div className="perk">
            <div className="perk-icon">🎯</div>
            <div className="perk-title">Pre-matched</div>
            <div className="perk-desc">Students come to you with a clear goal and level already stated.</div>
          </div>
          <div className="perk">
            <div className="perk-icon">💸</div>
            <div className="perk-title">Free to join</div>
            <div className="perk-desc">No upfront fees. We're building this together from the ground up.</div>
          </div>
        </div>

        <div className="card">
          <div className="section-label">Your details</div>
          <div className="field-row">
            <div className="field">
              <label>Full name</label>
              <input type="text" placeholder="Your name" value={form.name} onChange={e => set('name', e.target.value)} />
            </div>
            <div className="field">
              <label>Email</label>
              <input type="email" placeholder="your@email.com" value={form.email} onChange={e => set('email', e.target.value)} />
            </div>
          </div>
          <div className="field">
            <label>Where are you based? <span>(city / country)</span></label>
            <input type="text" placeholder="e.g. Sydney, Australia" value={form.location} onChange={e => set('location', e.target.value)} />
          </div>
          <div className="field">
            <label>Your timezone</label>
            <ChipGroup options={TIMEZONES} value={form.timezone} onChange={v => set('timezone', v)} />
          </div>

          <div className="section-label" style={{ marginTop: 28 }}>What you teach</div>
          <div className="field">
            <label>Levels you teach <span>(pick all that apply)</span></label>
            <ChipGroup options={LEVELS} value={form.levels} onChange={v => set('levels', v)} multi />
          </div>
          <div className="field">
            <label>Syllabuses <span>(optional)</span></label>
            <ChipGroup options={SYLLABUSES} value={form.syllabuses} onChange={v => set('syllabuses', v)} multi />
          </div>
          <div className="field">
            <label>General availability <span>(optional)</span></label>
            <ChipGroup options={AVAILABILITY} value={form.availability} onChange={v => set('availability', v)} multi />
          </div>

          <div className="section-label" style={{ marginTop: 28 }}>About you</div>
          <div className="field-row">
            <div className="field">
              <label>Years of teaching experience <span>(optional)</span></label>
              <input type="text" placeholder="e.g. 5 years" value={form.experience} onChange={e => set('experience', e.target.value)} />
            </div>
            <div className="field">
              <label>Hourly rate <span>(optional)</span></label>
              <input type="text" placeholder="e.g. $70/hr AUD" value={form.rate} onChange={e => set('rate', e.target.value)} />
            </div>
          </div>
          <div className="field">
            <label>One or two sentences about your teaching style <span>(optional)</span></label>
            <textarea
              placeholder="e.g. I specialise in adult returners and AMEB exam preparation. I love helping students find pieces they're genuinely excited to play."
              value={form.bio}
              onChange={e => set('bio', e.target.value)}
            />
          </div>

          {error && <div className="error-msg">{error}</div>}
          <button className="btn-submit" onClick={handleSubmit} disabled={!canSubmit || submitting}>
            {submitting ? 'Sending...' : '🎹 Apply to join'}
          </button>
          {!canSubmit && (
            <div style={{ fontSize: 12, color: '#a09080', textAlign: 'center', marginTop: 8 }}>
              Name, email, levels, and timezone required
            </div>
          )}
        </div>

        <div style={{ textAlign: 'center', fontSize: 12, color: '#a09080', paddingBottom: 40 }}>
          Your details are only used to match you with students. We never share your information publicly without your permission.
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function tryCompile() {
        if (typeof Babel === 'undefined') { setTimeout(tryCompile, 50); return; }
        try {
          const src = document.getElementById('app-jsx').textContent;
          const compiled = Babel.transform(src, { presets: ['react'] }).code;
          const s = document.createElement('script');
          s.textContent = compiled;
          document.body.appendChild(s);
        } catch(e) {
          document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:monospace">Error: ' + e.message + '</div>';
        }
      }
      tryCompile();
    });
  </script>
</body>
</html>
